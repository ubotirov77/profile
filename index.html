<style>
:root{--bg:#f5f5f5;--card:#fff;--border:#e0e0e0;--text:#212121;--muted:#757575;--accent:#5b7fff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--card);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.1);position:sticky;top:0;z-index:100}
.header-title{font-size:20px;font-weight:700;margin-bottom:8px}
.header-subtitle{font-size:13px;color:var(--muted)}
.progress-section{background:var(--card);padding:16px;margin:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);border-radius:12px}
.progress-stat{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stat-label{font-size:14px;color:var(--muted)}
.stat-value{font-weight:700;color:var(--accent);font-size:16px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.content-wrapper{flex:1;overflow-y:auto}
.chapters-section{padding:16px}
.chapters-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.chapter-card{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;border-top:4px solid}
.chapter-card.onko{border-top-color:#ff6b9d}.chapter-card.endo{border-top-color:#34d399}
.chapter-card.inf{border-top-color:#38bdf8}.chapter-card.neuro{border-top-color:#f59e0b}
.chapter-top{padding:16px;display:flex;align-items:center;justify-content:space-between}
.chapter-info{display:flex;align-items:center;gap:12px;flex:1}
.chapter-icon{font-size:32px}.chapter-name{font-size:16px;font-weight:600}
.chapter-count{font-size:13px;color:var(--muted);margin-top:2px}
.chapter-arrow{color:var(--muted);font-size:20px}
.chapter-progress{padding:0 16px 12px}
.progress-numbers{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-numbers strong{color:var(--text)}
.progress-bar-chapter{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill-chapter{height:100%;background:#34d399;border-radius:3px}
.questions-view{display:none;padding:16px;padding-bottom:20px}
.questions-view.active{display:block}
.questions-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.back-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--accent);padding:4px;font-weight:600}
.questions-title{font-size:18px;font-weight:700}
.search-box{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:14px;outline:none}
.search-box:focus{border-color:var(--accent)}
.question-card{background:var(--card);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:4px solid var(--accent)}
.question-card.done{border-left-color:#34d399}
.question-header{padding:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.question-meta{flex:1}
.question-num{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.question-text{font-size:14px;font-weight:500;line-height:1.5}
.question-toggle{color:var(--muted);font-size:18px;flex-shrink:0}
.question-body{border-top:1px solid var(--border);padding:14px;background:#fafafa;display:none}
.question-body.open{display:block}
.answer-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.answer-text{font-size:13.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
.question-done{margin-top:12px}
.btn-done{width:100%;padding:10px 12px;border:1.5px solid #34d399;background:rgba(52,211,153,.08);color:#34d399;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-done.active{background:#34d399;color:#fff}
.footer{background:var(--card);border-top:1px solid var(--border);padding:16px;text-align:center;margin-top:auto;font-size:12px;color:var(--muted)}
.footer strong{color:var(--accent);font-weight:700}
.chapters-view.hidden{display:none}
.empty{text-align:center;padding:40px;color:var(--muted)}
</style>

<script>
const APP_DATA={"chapters": [{"id": "onko", "name": "Onkologiya", "icon": "🔬", "count": 72, "questions": [{"num": 1, "text": "O'pka rakining atipik formalari", "answer": "Atipik (klassik bo'lmagan) formalarda kasallik birinchi navbatda boshqa a'zo yoki tizim belgilari bilan namoyon bo'ladi, birlamchi o'pka o'chog'i esa kech aniqlanadi:\n1) Pnevmoniyasimon forma — infiltrativ o'sish, isitma, yo'tal; antibiotiklarga javob bermaydigan \"pnevmoniya\" sifatida kechadi.\n2) Mediastinal forma — o'sma yoki metastatik limfa tugunlari mediastinani bosadi, yuqori kovak vena sindromi beradi (yuz va bo'yin shishi, bo'yin venalari kengayishi).\n3) Miya (serebral) formasi — birinchi belgi miya metastazi: bosh og'rig'i, falaj, tutqanoq.\n4) Suyak formasi — patologik sinish, suyak og'rig'i bilan boshlanadi.\n5) Plevral forma — eksudativ, ko'pincha qonli plevrit.\n6) Yurak/perikard formasi — perikardit yoki tamponada bilan namoyon bo'ladi."}, {"num": 2, "text": "O'pka rakining qaysi shaklida klinik simptomlar kech boshlanadi", "answer": "Periferik shaklda simptomlar kech paydo bo'ladi. Sababi: o'sma mayda bronxlar, bronxiolalar va alveolalarda — o'pka parenximasining chetida joylashadi. Parenximada og'riq retseptorlari kam va yirik bronx o'tkazuvchanligi uzoq saqlanadi, shuning uchun o'sma ancha kattalashguncha shikoyat bermaydi (\"sokin zona\"). Belgilar faqat o'sma plevra, ko'krak devori yoki yirik bronxga yetib borgach paydo bo'ladi: ko'krak og'rig'i, nafas qisishi, yo'tal. Markaziy shaklda esa o'sma yirik bronxda joylashib uni erta toraytiradi → yo'tal, qon tupurish, nafas qisishi erta boshlanadi. Aynan shuning uchun periferik rak ko'pincha tasodifan, profilaktik tekshiruvda (flyuorografiya/KT) topiladi."}, {"num": 3, "text": "O'pka rakining periferik shaklida qaysi qismlar zararlanadi", "answer": "Periferik rak segmentar va undan mayda bronxlar, bronxiolalar hamda alveolalardan o'sadi (o'pka parenximasi cheti). Tarqalish yo'nalishi: plevra (og'riq, plevrit), ko'krak devori (qovurg'a destruksiyasi), diafragma.\nAlohida tur — Penkost (Pancoast) o'smasi: o'pka cho'qqisida joylashadi va yaqin tuzilmalarni bosadi → plexus brachialis (qo'lda og'riq, kuchsizlik), bo'yin simpatik tuguni (Horner sindromi: ptoz, mioz, enoftalm, terlamaslik), qovurg'alar va umurtqa pog'onasi. Periferik o'sma kavernalashishi (parchalanish) ham mumkin."}, {"num": 4, "text": "O'pka rakining markaziy shaklida qaysi qismlar zararlanadi", "answer": "Markaziy rak bosh (asosiy), bo'lak va segment bronxlaridan boshlanadi. O'sma bronx lumeniga o'sib uni toraytiradi yoki butkul bekitadi → avval gipoventilyatsiya, so'ng atelektaz, obstruksion pnevmoniya, abssess yoki bronxoektaz rivojlanadi.\nErta belgilar: quruq yoki balgʻamli yo'tal, qon tupurish (gemoptoe), nafas qisishi, takroriy \"pnevmoniyalar\". Markaziy o'sma bronxoskopiyada ko'rinadi va to'g'ridan-to'g'ri biopsiya qilinadi, shuning uchun erta tashxislanadi."}, {"num": 5, "text": "O'pka saratoni profilaktikasi", "answer": "Birlamchi profilaktika (kanserogen ta'sirni yo'qotish):\n1) Chekishni butunlay tashlash — eng muhim chora; passiv chekishdan ham himoyalanish.\n2) Kasbiy zararlardan himoya: asbest, radon, og'ir metallar, mishyak, ko'mir changi.\n3) Atmosfera va maishiy havo ifloslanishini kamaytirish.\n4) Sabzavot-mevaga boy, muvozanatli ovqatlanish.\nIkkilamchi (erta aniqlash): xavf guruhida past dozali ko'krak KT-skrining, flyuorografiya, balgʻam sitologiyasi.\nUchlamchi: davolangan bemorlarda retsidiv/asorat profilaktikasi va reabilitatsiya."}, {"num": 6, "text": "O'pka saratonining davolash turlari", "answer": "1) Jarrohlik (rezektabel nomayda hujayrali rak — I–II, ayrim IIIA bosqichlar): lobektomiya, bilobektomiya, pulmonektomiya yoki sublobar rezeksiya; limfa tugunlari disseksiyasi bilan.\n2) Nur terapiyasi — operatsiya mumkin bo'lmaganda; stereotaktik nur (SBRT) kichik o'choqlarda.\n3) Ximioterapiya — mayda hujayrali rakda asosiy usul, platina asosida (sisplatin/karboplatin + etoposid).\n4) Immunoterapiya — PD-1/PD-L1 ingibitorlari (pembrolizumab, atezolizumab).\n5) Maqsadli terapiya — EGFR (osimertinib), ALK, ROS1 mutatsiyalarida.\n6) Kombinatsiyalangan yoki palliativ davo.\nTanlov gistologik turga, bosqichga, molekulyar profilga va bemor umumiy holatiga bog'liq."}, {"num": 7, "text": "O'pka raki diagnostikasida instrumental tekshirish usullari", "answer": "1) Ko'krak rentgenografiyasi 2 proyeksiyada — boshlang'ich, skrining usul.\n2) Ko'krak KT (kontrast bilan) — asosiy usul; o'sma o'lchami, joylashuvi, LT baholanadi.\n3) Bronxoskopiya + biopsiya/yuvindi — markaziy rakda.\n4) Transtorakal igna biopsiyasi (KT nazoratida) — periferik o'choqda.\n5) Mediastinoskopiya, torakoskopiya, EBUS — mediastinal LT va plevra holatini aniqlash.\n6) PET-KT — uzoq metastazlarni topish va aniq bosqichlash.\n7) Bosh miya MRT — miya metastazi.\n8) Balgʻam sitologiyasi, plevra suyuqligini tahlil qilish."}, {"num": 8, "text": "Sut bezi saratoni TNM bo'yicha klassifikatsiyasi", "answer": "T — o'sma o'lchami: T1 ≤2 sm; T2 >2–5 sm; T3 >5 sm; T4 — ko'krak devori yoki teriga o'sgan (yara, \"apelsin po'sti\", yallig'lanishli rak).\nN — regional limfa tugunlari: N0 — yo'q; N1 — qo'ltiq osti harakatchan tugunlar; N2 — qo'ltiq osti tugunlari bir-biriga/to'qimaga qotgan yoki ichki ko'krak LT; N3 — o'mrov osti/usti tugunlari yoki ichki ko'krak + qo'ltiq birgalikda.\nM — uzoq metastaz: M0 — yo'q; M1 — bor.\nShular asosida 0–IV bosqichlar aniqlanadi."}, {"num": 9, "text": "Sut bezi saratoni gormonal davolash haqida tushuncha", "answer": "Gormonal davo faqat gormon-retseptor musbat (ER+/PR+) o'smalarda samarali — estrogen ta'sirini to'sishga qaratilgan.\n1) Tamoksifen (SERM) — har qanday yoshda, ayniqsa premenopauzal ayollarda; 5–10 yil.\n2) Aromataza ingibitorlari (letrozol, anastrozol, eksemestan) — postmenopauzal ayollarda.\n3) Tuxumdon funksiyasini bostirish — GnRH analoglari (goserelin) yoki ovariektomiya; yosh bemorlarda.\n4) Fulvestrant (estrogen retseptor degradatori) — metastatik holatda.\n5) CDK4/6 ingibitorlari (palbosiklib, ribosiklib) bilan birgalikda — samaradorlikni oshiradi."}, {"num": 10, "text": "Sut bezi saratoniga olib keluvchi kanserogen omillar", "answer": "1) Yosh >50; ayol jinsi.\n2) Genetik: BRCA1/BRCA2 mutatsiyasi, oilaviy anamnez.\n3) Reproduktiv: erta menarxe (<12), kech menopauza (>55), birinchi tug'ruq kechligi (>30), farzandsizlik, emizmaslik.\n4) Gormonal: uzoq muddat gormon o'rnini bosuvchi terapiya (HRT), kombinatsiyalangan og'iz kontratseptivlari.\n5) Turmush tarzi: semizlik (ayniqsa postmenopauzada), alkogol, kam jismoniy faollik.\n6) Nurlanish: yoshlikda ko'krak sohasiga nur ta'siri.\n7) Avvalgi proliferativ mastopatiya, atipik giperplaziya."}, {"num": 11, "text": "Sut bezi saratoniga olib keluvchi kanserogen omillar (qo'shimcha)", "answer": "Xavf omillarini guruhlarga ajratamiz:\n- Reproduktiv: erta menarxe, kech menopauza, kech tug'ish yoki farzandsizlik, qisqa emizish — bularning hammasi umrbod estrogen ta'sirini oshiradi.\n- Genetik: BRCA1/2 (umrbod xavf ~66–87% gacha), oilada erta yoshda rak holatlari.\n- Gormonal: uzoq HRT, ba'zi og'iz kontratseptivlari.\n- Tashqi: ionlovchi nurlanish (ko'krak sohasi).\n- Turmush tarzi: semizlik, alkogol iste'moli, kam harakat.\nProgesteron va estrogen disbalansi hujayra proliferatsiyasini kuchaytirib o'smani rivojlantiradi."}, {"num": 12, "text": "Sut bezi saratonida operativ davolash usullari", "answer": "1) Radikal mastektomiya (Halsted) — bez, ikkala ko'krak mushagi va qo'ltiq osti LT bilan (hozir kam qo'llaniladi).\n2) Modifikatsiyalangan radikal mastektomiya (Madden/Patey) — mushaklar (yoki katta ko'krak mushagi) saqlanadi.\n3) Oddiy mastektomiya — faqat bez olib tashlanadi.\n4) Bezni saqlovchi operatsiyalar: kvadrantektomiya, lumpektomiya (tumorektomiya) + qo'ltiq osti LT disseksiyasi — nur terapiyasi bilan birga.\n5) \"Qorovul\" (sentinel) limfa tuguni biopsiyasi — qo'ltiq LT holatini aniqlash uchun.\n6) Rekonstruktiv (plastik) operatsiyalar."}, {"num": 13, "text": "Sut bezi saratonida uchraydigan patologik simptomlar", "answer": "1) Og'riqsiz, zich, harakatsiz tugun (eng tipik belgi).\n2) \"Apelsin po'sti\" simptomi — teri limfostazidan donador ko'rinish.\n3) Teri qizarishi, mahalliy isish (yallig'lanishli formada).\n4) So'rg'ich (nipel) ichkariga tortilishi (retraksiya).\n5) So'rg'ichdan qonli yoki seroz ajralma.\n6) Paget kasalligi — so'rg'ich va atrofidagi ekzemasimon o'zgarish.\n7) Qo'ltiq osti limfa tugunlari kattalashishi.\n8) Bez deformatsiyasi, terining tortilishi (\"chuqurcha\" simptomi)."}, {"num": 14, "text": "Sut bezi saratoni rak oldi kasalliklari", "answer": "1) Fibroadenoma (xavfsiz, ammo kuzatuv talab etadi).\n2) Proliferativ mastopatiya, ayniqsa atipik (duktal/lobular) giperplaziya — eng xavfli holat.\n3) Sut yo'li ichi papillomasi.\n4) LCIS — lobular karsinoma in situ (xavf belgisi).\n5) DCIS — duktal karsinoma in situ (haqiqiy rak oldi, invaziv rakka o'tishi mumkin).\n6) Sklerozlovchi adenoz.\n7) Murakkab (proliferativ) kista.\nUmumiy printsip: atipik giperplaziya bo'lgan ayollarda rak xavfi sezilarli oshadi."}, {"num": 15, "text": "Sut bezi saratoni profilaktikasi", "answer": "Birlamchi: sog'lom ovqatlanish, muntazam jismoniy faollik, optimal vaznni saqlash, tug'ish va emizish, alkogolni cheklash.\nIkkilamchi (erta aniqlash): 40–74 yoshda mammografiya har 1–2 yilda; o'z-o'zini tekshirish; xavf guruhida UST va MRT.\nKimyoviy profilaktika: yuqori xavfli ayollarda tamoksifen yoki aromataza ingibitorlari.\nJarrohlik profilaktikasi: BRCA1/2 tashuvchilarda profilaktik mastektomiya va/yoki ovariektomiya."}, {"num": 16, "text": "Sut bezi saratonida radikal operatsiyalar", "answer": "Radikal operatsiyalar o'sma bilan birga regional limfa kollektorlarini ham olib tashlashga qaratilgan:\n1) Radikal mastektomiya (Halsted) — bez, katta va kichik ko'krak mushaklari, qo'ltiq osti kletchatka va LT bilan.\n2) Kengaytirilgan radikal mastektomiya — qo'shimcha ichki ko'krak (parasternal) LT bilan.\n3) Modifikatsiyalangan radikal mastektomiya (Madden) — mushaklar saqlanadi.\n4) Bezni saqlovchi radikal operatsiya (kvadrantektomiya/lumpektomiya) + qo'ltiq disseksiyasi + nur terapiyasi.\n5) Sentinel LT biopsiyasi — keraksiz keng disseksiyadan saqlaydi."}, {"num": 17, "text": "Sut bezi saratonining klinikasi va diagnostikasi", "answer": "Klinika: og'riqsiz zich tugun, teri o'zgarishlari (\"apelsin po'sti\", chuqurcha), so'rg'ich retraksiyasi yoki ajralmasi, qo'ltiq LT kattalashishi.\nDiagnostika:\n1) Mammografiya — \"oltin standart\" skrining.\n2) UST — zich bezda va yosh ayollarda.\n3) MRT — implant, ko'p o'choqli holat, BRCA tashuvchilar.\n4) Ingichka igna aspiratsion biopsiyasi (sitologiya).\n5) Trepan-biopsiya (gistologiya) — asosiy tasdiqlash.\n6) Immunogistokimyo: ER, PR, HER2, Ki-67 — davo tanlash uchun."}, {"num": 18, "text": "Qalqonsimon bez saratoni klinikasi", "answer": "Erta bosqich: bo'yinda og'riqsiz, qattiq, harakatsiz tugun; sekin kattalashadi.\nKech bosqich (qo'shni tuzilmalar bosilganda):\n- Ovoz xirillashi — qaytuvchi (rekurrent) nerv zararlanishi.\n- Nafas qisishi, stridor — traxeya bosilishi.\n- Yutinishning qiyinlashuvi (disfagiya) — qizilo'ngach bosilishi.\nMetastazlar: avval bo'yin (servikal) limfa tugunlari; uzoqqa — o'pka, suyak, miya. Medullyar rakda kalsitonin ko'p chiqib, diareya va yuzning qizarishi kuzatilishi mumkin."}, {"num": 19, "text": "Qalqonsimon bez saratoni gistologik turlari", "answer": "1) Papillyar rak (60–70%) — eng ko'p; prognoz yaxshi; limfogen yo'l bilan tarqaladi.\n2) Follikulyar rak (15–20%) — gematogen (qon orqali) metastaz beradi (o'pka, suyak).\n3) Medullyar rak (5–10%) — parafollikulyar C-hujayralardan; kalsitonin ishlab chiqaradi; MEN-2 sindromi bilan bog'liq.\n4) Anaplastik (differensiatsiyalanmagan) rak (<5%) — eng agressiv, tez o'sadi, prognoz juda yomon.\n5) Limfoma — kam uchraydi (ko'pincha Hashimoto fonida)."}, {"num": 20, "text": "Qalqonsimon bez saratoni TNM klassifikatsiyasi", "answer": "T — o'sma o'lchami va tarqalishi: T1 ≤2 sm; T2 >2–4 sm; T3 >4 sm yoki bezdan tashqariga minimal o'sgan; T4a — teri, qizilo'ngach, traxeya, qaytuvchi nervga; T4b — umurtqaoldi fastsiya yoki uyqu arteriyasiga.\nN — regional LT: N0 — yo'q; N1a — pretraxeal/paratraxeal (VI guruh); N1b — boshqa servikal yoki yuqori mediastinal.\nM — M0/M1.\nMuhim: papillyar va follikulyar rakda bosqichlash bemor yoshiga (55 yosh chegarasi) ham bog'liq."}, {"num": 21, "text": "Qalqonsimon bez saratoni diagnostikasi", "answer": "1) UST + elastografiya — tugun tuzilishi, mikrokalsinatlar, chegaralarni baholaydi.\n2) Ingichka igna aspiratsion biopsiyasi (IIAB) — asosiy usul, Bethesda tizimi bo'yicha baholanadi.\n3) Gormonlar: TTG, T3, T4 — funksiyani aniqlash.\n4) Kalsitonin — medullyar rak markeri.\n5) Tireoglobulin — operatsiyadan keyin papillyar/follikulyar rak monitoringi.\n6) KT/MRT — yirik yoki tarqalgan o'smada.\n7) Radioyod (131I) ssintigrafiyasi — \"sovuq\" tugunlar va metastazlarni aniqlash.\n8) PET-KT — differensiatsiyasi past o'smalar."}, {"num": 22, "text": "Qalqonsimon bez rak oldi kasalliklari", "answer": "To'g'ridan-to'g'ri rak oldi holatlar kam, biroq xavfni oshiruvchilar:\n1) Follikulyar adenoma.\n2) Nodozli (ko'p tugunli) zob.\n3) Hashimoto tiroiditi (ayniqsa limfoma xavfi).\n4) Diffuz toksik zob.\n5) Boshqa sababli (ayniqsa bolalik davridagi) bo'yin nurlanishi anamnezi.\n6) MEN-2 sindromi (medullyar rak xavfi).\n7) UST da 1 sm dan katta, shubhali \"sovuq\" tugunlar (mikrokalsinatlar, notekis chegara)."}, {"num": 23, "text": "Qalqonsimon bez saratoni etiopatogenezi", "answer": "Etiologiya: ionlovchi nurlanish (eng muhim, ayniqsa bolalikda), yod yetishmovchiligi yoki ortiqchaligi, irsiyat (MEN-2, oilaviy medullyar rak), surunkali avtoimmun tiroidit (Hashimoto), gormonal disbalans.\nPatogenez: RET (medullyar va papillyarda), BRAF (papillyarda), RAS, PAX8-PPARγ genlarining mutatsiyasi → hujayra bo'linishi ustidan nazorat yo'qoladi → tartibsiz proliferatsiya → kapsuladan o'tib invaziya va metastaz. Yod yetishmasligida TTG surunkali oshib bezni rag'batlantiradi va o'sma rivojini osonlashtiradi."}, {"num": 24, "text": "Qalqonsimon bez yomon sifatli o'smalarini davolash", "answer": "1) Jarrohlik — asosiy usul: total yoki subtotal tireoidektomiya + (ko'rsatma bo'lsa) bo'yin limfa disseksiyasi.\n2) Radioyod terapiyasi (131I) — papillyar va follikulyar rakda qoldiq to'qima va metastazlarni yo'qotish uchun.\n3) Suppressiv L-tiroksin terapiyasi — TTG ni bostirib o'sma rag'batini kamaytiradi va o'rin bosadi.\n4) Tashqi nur terapiyasi — anaplastik va ayrim medullyar raklarda.\n5) Ximioterapiya — anaplastik rakda.\n6) Maqsadli terapiya — sorafenib, lenvatinib (radioyodga rezistent), vandetanib (medullyar)."}, {"num": 25, "text": "Buyrak saratoni klinikasi", "answer": "Klassik triada (kech va kam uchraydi): 1) og'riqsiz gematuriya; 2) bel/yon og'rig'i; 3) paypaslanadigan o'sma.\nKo'pincha kasallik simptomsiz kechib, tasodifan UST/KT da topiladi.\nParaneoplastik belgilar: sababsiz isitma, polisitemiya (eritropoetin), giperkalsiemiya (PTHrP), arterial gipertenziya (renin), gepatik disfunksiya (Shtauffer sindromi).\nMetastazlar: o'pka (eng ko'p), suyak, jigar, miya. Erkaklarda chap tomonda paydo bo'lgan varikotsele buyrak venasi/v.cava bosilishidan dalolat berishi mumkin."}, {"num": 26, "text": "Buyrak saratoni gistologik turlari", "answer": "1) Yorug' hujayrali (clear cell) rak — 75–80%, eng ko'p; VHL gen bilan bog'liq.\n2) Papillyar rak — 10–15%.\n3) Xromofob rak — ~5%, prognozi nisbatan yaxshi.\n4) Bellini yig'uvchi naychasi karsinomasi — kam, juda agressiv.\n5) Wilms o'smasi (nefroblastoma) — bolalarda.\nXavfsiz o'smalar: angiomiolipoma, onkotsitoma. Ular ham buyrakda uchraydi, ammo malign emas."}, {"num": 27, "text": "Buyrak saratoni TNM klassifikatsiyasi", "answer": "T — o'sma o'lchami va tarqalishi: T1a ≤4 sm; T1b >4–7 sm; T2a >7–10 sm; T2b >10 sm (buyrak ichida); T3a — buyrak venasi yoki paranefral yog'ga; T3b — diafragma ostidagi pastki kovak venaga; T3c — diafragma ustidagi v.cava yoki uning devoriga; T4 — Gerota fastsiyasidan tashqariga (jumladan buyrak usti beziga).\nN — N0 (yo'q) / N1 (regional LT bor).\nM — M0 / M1 (uzoq metastaz)."}, {"num": 28, "text": "Buyrak saratoni kliniko-anatomik klassifikatsiyasi", "answer": "Joylashuvi bo'yicha: yuqori yoki quyi qutb, o'rta qism; intrarenal (bez ichida) yoki ekstrarenal (kapsuladan tashqariga o'sgan).\nTarqalish bosqichlari (soddalashtirilgan):\nI — o'sma buyrak ichida, kapsula buzilmagan;\nII — Gerota fastsiyasi ichida tarqalgan, ammo undan o'tmagan;\nIII — buyrak venasi/v.cava yoki regional LT zararlangan;\nIV — qo'shni a'zolar yoki uzoq metastazlar."}, {"num": 29, "text": "Buyrak saratoni rak oldi kasalliklari", "answer": "Aniq \"rak oldi\" holati kam, lekin xavfni oshiruvchi omillar va sindromlar:\n1) Von Hippel-Lindau sindromi (ko'p o'choqli, ikki tomonlama rak).\n2) Irsiy papillyar buyrak karsinomasi.\n3) Birt-Hogg-Dubé sindromi.\n4) Tuberoz skleroz (angiomiolipoma fonida).\n5) Surunkali buyrak yetishmovchiligi va uzoq dializ → orttirilgan kistalar kasalligi.\nQo'shimcha xavf: chekish, semizlik, gipertenziya, analgetiklarni suiiste'mol qilish."}, {"num": 30, "text": "Buyrak saratoni diagnostikasi", "answer": "1) UST — birinchi, qo'lda qulay usul (qattiq massa/kistadan farqlash).\n2) Kontrastli KT — asosiy usul; o'sma, tomir invaziyasi, LT baholanadi.\n3) MRT — venoz tromb va kontrastga allergiyada.\n4) Ko'krak rentgen/KT — o'pka metastazi.\n5) Suyak ssintigrafiyasi — suyak metastazi shubhasida.\n6) Igna biopsiyasi — noaniq hollarda (ko'pincha kerak emas).\n7) Umumiy siydik tahlili — gematuriya; qon — anemiya/polisitemiya, kalsiy."}, {"num": 31, "text": "Buyrak saratoni profilaktikasi", "answer": "1) Chekishni tashlash (asosiy o'zgartiriladigan omil).\n2) Arterial gipertenziyani nazorat qilish.\n3) Optimal vaznni saqlash (semizlikni kamaytirish).\n4) Analgetiklar (ayniqsa fenatsetin) suiiste'molidan saqlanish.\n5) Kasbiy zararlardan himoya (kadmiy, asbest, neft mahsulotlari).\n6) Irsiy sindromlarda genetik maslahat va kuzatuv.\n7) Xavf guruhida UST skrining."}, {"num": 32, "text": "Moyak saratoni diagnostikasi", "answer": "1) Skrotum UST — birinchi va asosiy usul (qattiq intratestikulyar o'choq).\n2) O'sma markerlari: AFP (noseminomada oshadi), beta-hCG (seminoma va noseminomada), LDH (o'sma massasi/prognoz).\n3) Ko'krak, qorin va tos KT — retroperitoneal LT va uzoq metastazlar.\n4) Bosh miya MRT — neyrologik belgilarda.\n5) Inguinal (chov) orxiektomiya — gistologik tasdiq (skrotal biopsiya qilinmaydi!).\n6) PET-KT — qoldiq massalarni baholash, ayniqsa seminomada."}, {"num": 33, "text": "Moyak saratoni klinikasi", "answer": "Erta belgilar: moyakda og'riqsiz, zich tugun yoki kattalashish; skrotumda og'irlik hissi.\nKech belgilar: retroperitoneal limfa tugunlari kattalashganda bel og'rig'i; o'pka metastazida nafas qisishi va yo'tal; beta-hCG ta'sirida ginekomastiya.\nAsosan 15–35 yoshli erkaklarda uchraydi. Xavf omillari: kriptorxizm (tushmagan moyak), oilaviy anamnez, oldingi moyak raki."}, {"num": 34, "text": "Prostata bezi saratoni klinikasi", "answer": "Erta bosqich ko'pincha simptomsiz — PSA tekshiruvida yoki rektal palpatsiyada aniqlanadi.\nMahalliy simptomlar (bez kattalashganda): siydik chiqishining qiyinlashuvi, oqimning kuchsizlanishi, tez-tez va tunda siyish, qoldiq siydik hissi (BPG belgilariga o'xshash).\nKech/metastatik bosqich: suyak og'rig'i (umurtqa, tos suyaklari — osteoblastik metastaz), anemiya, patologik sinishlar, siydik yo'li obstruksiyasi va buyrak yetishmovchiligi."}, {"num": 35, "text": "Prostata bezi saratoni rak oldi kasalliklari", "answer": "1) Yuqori darajali prostatik intraepitelial neoplaziya (HGPIN) — eng muhim, bevosita rak oldi holati.\n2) Atipik mayda atsinar proliferatsiya (ASAP) — biopsiyada topilsa, qayta biopsiya talab etadi.\n3) Xavfsiz prostata giperplaziyasi (BPG) — bevosita rak oldi emas, ammo tashxisni qiyinlashtiradi va simptomlar berib aralashadi.\n4) Surunkali prostatit — yallig'lanish PSA ni oshirib chalg'itishi mumkin."}, {"num": 36, "text": "Prostata bezi saratoni davolash usullari", "answer": "Mahalliy (lokalizatsiyalangan) rak:\n1) Radikal prostatektomiya (ko'pincha robot/laparoskopik).\n2) Nur terapiyasi — tashqi nur + brakiterapiya.\n3) Faol kuzatuv — past xavfli o'smalarda.\nTarqalgan/metastatik rak:\n4) Androgen-deprivatsion terapiya (ADT): GnRH analoglari, antiandrogenlar.\n5) Ximioterapiya: dotsetaksel, kabazitaksel.\n6) Yangi gormonal vositalar: abirateron, enzalutamid.\n7) Radium-223 — simptomatik suyak metastazlarida."}, {"num": 37, "text": "Siydik pufagi saratoni etiopatogenezi", "answer": "Etiologiya:\n1) Chekish — eng asosiy omil (taxminan yarmi).\n2) Sanoat kanserogenlari: anilin bo'yoqlari, aromatik aminlar (rezina, charm, bo'yoq sanoati).\n3) Schistosoma haematobium infeksiyasi → yassi hujayrali rak (Afrika, Yaqin Sharq).\n4) Siklofosfamid, tos sohasi nurlanishi.\nPatogenez: FGFR3, TP53 va boshqa genlar mutatsiyasi → urotelial giperplaziya → displaziya → karsinoma in situ → invaziv (mushak qatlamiga o'suvchi) rak. Ko'pchiligi o'tuvchi hujayrali (urotelial) rak."}, {"num": 38, "text": "Siydik pufagi rak oldi kasalliklarini davolash", "answer": "1) Karsinoma in situ (CIS): transuretral rezeksiya (TUR) + intravezikal BCG immunoterapiyasi — birinchi tanlov.\n2) Yuzaki past darajali o'smalar (Ta–T1): TUR + intravezikal ximioterapiya (mitomitsin).\n3) Yuqori darajali T1: TUR + BCG; progressiyada radikal sistektomiya.\n4) Papilloma/giperplaziya: TUR va keyin muntazam sistoskopik kuzatuv (har 3–6 oyda).\nMaqsad — invaziv rakka o'tishning oldini olish va retsidivni nazorat qilish."}, {"num": 39, "text": "Siydik pufagi rak oldi kasalliklari", "answer": "1) Papilloma (urotelial).\n2) Urotelial giperplaziya.\n3) Yassi (flat) displaziya.\n4) Karsinoma in situ (CIS) — eng xavfli rak oldi holat; davolanmasa katta qismi invaziv rakka o'tadi.\n5) Teskari (inverted) papilloma.\n6) Leykoplakiya, urotelial metaplaziya (surunkali ta'sirlanish fonida)."}, {"num": 40, "text": "Siydik pufagi rakini diagnostikasi", "answer": "1) Umumiy siydik tahlili — og'riqsiz gematuriya (asosiy belgi).\n2) Siydik sitologiyasi — atipik hujayralar.\n3) Sistoskopiya + biopsiya — asosiy usul; o'smani ko'rib, namuna olinadi.\n4) Fluoressent (ko'k-nur) sistoskopiya — kichik o'choqlar va CIS ni yaxshi ko'rsatadi.\n5) UST, KT-urografiya, MRT — tarqalish va yuqori siydik yo'llarini baholash.\n6) TUR-biopsiya — invaziya chuqurligini aniqlash.\n7) PET-KT — metastaz."}, {"num": 41, "text": "Tuxumdon rakida operatsiya turlari", "answer": "1) Bir tomonlama salpingo-ooforektomiya — erta bosqich, fertillikni saqlash zarur bo'lganda.\n2) Total abdominal gisterektomiya + ikki tomonlama salpingo-ooforektomiya (TAH-BSO) — standart radikal hajm.\n3) Sitoreduktiv (debulking) operatsiya — ko'rinadigan o'sma to'qimasini maksimal olib tashlash.\n4) Interval debulking — neoadyuvant ximioterapiyadan keyin.\n5) Bosqichlash laparotomiyasi: peritoneal yuvindi/biopsiyalar, omentektomiya, regional LT olish."}, {"num": 42, "text": "Tuxumdon rakini davolash", "answer": "1) Jarrohlik — sitoreduktiv operatsiya + bosqichlash (asosiy).\n2) Ximioterapiya — karboplatin + paklitaksel (standart kombinatsiya).\n3) Bevatsizumab (anti-VEGF) — ximioterapiyaga qo'shimcha.\n4) PARP ingibitorlari (olaparib) — BRCA mutatsiyasi yoki gomologik rekombinatsiya yetishmovchiligida (saqlovchi terapiya).\n5) Gormonal terapiya — ayrim stromal va past darajali o'smalarda.\nDavo bosqich, gistologiya va molekulyar profilga moslab tanlanadi."}, {"num": 43, "text": "Tuxumdon raki differentsial diagnostikasi", "answer": "Tuxumdon o'smasini quyidagilardan farqlash kerak:\n1) Funksional kistalar (follikulyar, sariq tana kistasi).\n2) Endometrioma.\n3) Dermoid kista (yetuk teratoma).\n4) Fibroma, tekoma.\n5) Tuxum yo'li (Fallopiy) kasalliklari, gidrosalpinks.\n6) Retroperitoneal o'smalar.\n7) Peritoneal karsinomatoz.\n8) Krukenberg metastazi (oshqozon yoki yo'g'on ichak rakidan tuxumdonga). Markerlar va vizualizatsiya farqlashga yordam beradi."}, {"num": 44, "text": "Tuxumdon raki diagnostikasi", "answer": "1) Transvaginal UST — o'choq tuzilishi (qattiq qism, septalar, qon oqimi).\n2) O'sma markerlari: CA-125 (epitelial), AFP, beta-hCG (german hujayrali), ingibin (granulyozali).\n3) Qorin va tos KT — tarqalish, assit, omentum.\n4) MRT — noaniq massalarni aniqlashtirish.\n5) PET-KT — uzoq metastaz.\n6) Laparoskopiya/laparotomiya + biopsiya — yakuniy tashxis va bosqichlash.\n7) BRCA genetik tekshiruvi."}, {"num": 45, "text": "Tuxumdon raki klinikasi", "answer": "Erta bosqich ko'pincha simptomsiz yoki noaniq: qorinda noqulaylik, dam bo'lish, og'riq, tez to'yish hissi.\nKech bosqich: qorin kattalashishi (assit), vazn yo'qolishi, charchoq, dispepsiya, siyish va defekatsiya o'zgarishlari.\nKasallik ko'pincha kech (III–IV bosqich) aniqlanadi — shu sababli \"jim qotil\" deyiladi.\nMeygs sindromi: tuxumdon fibromasi + assit + gidrotoraks (o'sma olib tashlangach yo'qoladi)."}, {"num": 46, "text": "Tuxumdonlar saratoni profilaktikasi", "answer": "1) Kombinatsiyalangan og'iz kontratseptivlari — uzoq qabulda xavfni sezilarli kamaytiradi.\n2) Ko'p tug'ish va emizish.\n3) BRCA genetik tekshiruvi (oilaviy anamnezda).\n4) Profilaktik ikki tomonlama salpingo-ooforektomiya — BRCA1/2 tashuvchilarda (odatda 35–40 yoshdan keyin, farzandsizlik tugagach).\n5) Naychalarni bog'lash/olib tashlash (salpingektomiya) — xavfni kamaytiradi.\n6) Yuqori xavf guruhida UST + CA-125 kuzatuvi."}, {"num": 47, "text": "Bachadon bo'yni rak oldi kasalliklari, klinikasi, diagnostikasi va davolash", "answer": "Rak oldi: servikal intraepitelial neoplaziya CIN I–III va karsinoma in situ. Asosiy sabab — yuqori onkogen HPV (16, 18 turlari).\nKlinika: ko'pincha simptomsiz; jinsiy aloqadan keyin qon ketishi, patologik ajralma.\nDiagnostika: Pap-smear (sitologiya), kolposkopiya, nishonli biopsiya, HPV-tiplash.\nDavolash: CIN I — ko'pincha kuzatuv (o'z-o'zidan regress bo'lishi mumkin); CIN II/III — LEEP (elektroeksiziya), konizatsiya, krio- yoki lazer destruksiya; karsinoma in situ — konizatsiya yoki gisterektomiya."}, {"num": 48, "text": "Bachadon bo'yni rakida operatsiyadan keyingi asoratlar", "answer": "1) Siydik nayi (ureter) yoki qovuq jarohati → gidronefroz, siydik fistulasi (stent, nefrostoma yoki tiklash kerak).\n2) To'g'ri ichak yaralanishi → rektovaginal fistula.\n3) Tos limfostazi (limfoedema) — kompressiya, fizioterapiya.\n4) Vezikovaginal/rektovaginal fistulalar — jarrohlik tuzatish.\n5) Tuxumdon funksiyasi yo'qolishi → erta menopauza (gormon o'rnini bosuvchi terapiya).\n6) Qin stenozi — dilatatsiya. Qo'shimcha: qon ketish, infeksiya, tromboz."}, {"num": 49, "text": "Bachadon bo'yni rakini davolash", "answer": "IA1: konizatsiya yoki oddiy gisterektomiya.\nIA2–IIA: radikal gisterektomiya (Wertheim) + tos LT disseksiyasi yoki ximionur terapiyasi.\nIIB–IVA: bir vaqtning o'zida ximionur terapiya — sisplatin + tashqi nur + brakiterapiya.\nIVB (uzoq metastaz): palliativ ximioterapiya ± immunoterapiya.\nProfilaktika: HPV vaksinasi (masalan, Gardasil) va muntazam skrining."}, {"num": 50, "text": "Ayollar jinsiy a'zolari xavfli o'smalari diagnostikasi", "answer": "1) Bimanual (qo'l bilan) tekshiruv.\n2) Kolposkopiya + biopsiya — bachadon bo'yni.\n3) Transvaginal UST — bachadon va tuxumdonlar.\n4) Tos KT/MRT — tarqalishni baholash.\n5) O'sma markerlari: CA-125, CA-19-9, CEA, AFP, beta-hCG.\n6) Fraksion diagnostik kюretaj (bachadon shilliq qavati).\n7) Gisteroskopiya.\n8) Laparoskopiya.\n9) PET-KT — uzoq metastaz va retsidiv."}, {"num": 51, "text": "Oshqozon raki etiopatogenezi", "answer": "Etiologiya: Helicobacter pylori (I darajali kanserogen), tuzlangan/dudlangan/quritilgan ovqatlar, chekish, alkogol, surunkali atrofik gastrit, pernisioz anemiya, Menetrier kasalligi, irsiyat.\nPatogenez (Correa kaskadi): normal shilliq qavat → surunkali (atrofik) gastrit → ichak metaplaziyasi → displaziya → karsinoma. Irsiy diffuz rakda CDH1 (E-kadgerin) gen mutatsiyasi rol o'ynaydi. H.pylori surunkali yallig'lanish va shilliq atrofiyasini keltirib chiqarib bu jarayonni boshlaydi."}, {"num": 52, "text": "Oshqozon rakining rentgenologik belgilari", "answer": "Bariy bilan kontrast tekshiruvda:\n1) To'ldirish nuqsoni (defekt) — ekzofit (lumenga o'suvchi) o'sma.\n2) \"Nisha\" (depoo) — yarali (ulserativ) forma.\n3) Nishaning notekis, atipik shakli.\n4) Devor rigidligi va peristaltika yo'qolishi — diffuz infiltratsiya (\"charm shisha\", linitis plastica).\n5) Kardia yoki pilorus sohasida torayish.\n6) Oshqozon hajmining kichrayishi va deformatsiyasi."}, {"num": 53, "text": "Oshqozon rakida limfogen metastazlar", "answer": "Regional: kichik va katta egrilik bo'ylab, prepilorik, jigar darvozasi limfa tugunlari.\nUzoq (klassik, nomli) metastazlar:\n- Virxov tuguni — chap o'mrov usti sohasidagi LT.\n- Krukenberg metastazi — tuxumdon(lar)ga.\n- Mariya Iosif opa (Sister Mary Joseph) tugunchasi — kindik atrofiga.\n- Schnitzler metastazi — to'g'ri ichak-qovuq (Duglas) chuqurchasiga (rektal tekshiruvda paypaslanadi)."}, {"num": 54, "text": "Oshqozonning rak oldi kasalliklari klinikasi", "answer": "1) Surunkali atrofik gastrit — epigastriyda og'irlik, ishtaha pasayishi.\n2) Oshqozon yarasi (xususan kallezli) — ovqatdan keyin og'riq.\n3) Adenomatoz polip — ko'pincha simptomsiz, tasodifan topiladi.\n4) Menetrier kasalligi — og'riq, oqsil yo'qolishi (gipoproteinemiya), shishlar.\n5) Pernisioz (B12-tanqis) anemiya — charchoq, glossit, neyrologik belgilar.\n6) Oshqozon rezeksiyasidan keyingi kult — kech rak xavfi."}, {"num": 55, "text": "Oshqozonning rak oldi kasalliklari diagnostikasi", "answer": "1) FEGDS (fibrogastroskopiya) + biopsiya — asosiy usul.\n2) H. pylori testi (nafas testi, tezkor urease, gistologiya).\n3) Bariy bilan rentgen.\n4) Endoskopik UST (EUS) — devor qatlamlari va polip asosini baholash.\n5) Kontrastli KT.\n6) Gistologik tekshiruv — displaziya darajasi.\n7) Qon: B12 darajasi, parietal hujayralarga qarshi antitanalar (atrofik gastritda)."}, {"num": 56, "text": "Oshqozonning xavfsiz o'smalari", "answer": "1) Adenoma (polip) — eng muhim, malignlanishi mumkin.\n2) Leyomioma.\n3) Fibroma.\n4) Lipoma.\n5) Nevrinoma.\n6) Gemangioma.\n7) Karsinoid (neyroendokrin) o'sma.\n8) GIST (oshqozon-ichak stromal o'smasi) — potensial malign, xavf darajasi o'lcham va mitoz soniga bog'liq.\nDiagnostika: FEGDS + biopsiya, EUS (asosini va qatlamini aniqlash uchun)."}, {"num": 57, "text": "Oshqozonning rak oldi kasalliklarini davolash", "answer": "1) H. pylori eradikatsiyasi — uch komponentli sxema (PPI + ikki antibiotik).\n2) Adenomatoz poliplar — endoskopik rezeksiya (polipektomiya, EMR).\n3) Yuqori darajali displaziya — endoskopik mukozal/submukozal rezeksiya (EMR/ESD) yoki subtotal gastrektomiya.\n4) Yara — konservativ davo (PPI); samarasiz bo'lsa va malignlik shubhasida — jarrohlik.\n5) Muntazam endoskopik kuzatuv (har 6–12 oyda)."}, {"num": 58, "text": "Oshqozon rakini davolash", "answer": "I–II bosqich: gastrektomiya (subtotal yoki total) + D2 limfa disseksiyasi.\nIII bosqich: perioperativ ximioterapiya (FLOT: 5-FU, leykovorin, oksaliplatin, dotsetaksel) + jarrohlik.\nIV bosqich: palliativ ximioterapiya; HER2 musbat o'smalarda trastuzumab qo'shiladi.\nNur terapiyasi — ayrim hollarda adyuvant rejimda.\nDavo bosqich, gistologiya va molekulyar belgilarga moslanadi."}, {"num": 59, "text": "Oshqozon rakida adjuvant ximioterapiya", "answer": "Maqsad — operatsiyadan keyin qolgan mikrometastazlarni yo'qotish va retsidiv xavfini kamaytirish.\n- Perioperativ FLOT (4 kurs operatsiyagacha + 4 kurs keyin) — mahalliy tarqalgan (III) rakda standart.\n- Adyuvant XELOX/CAPOX (kapesitabin + oksaliplatin) — rezeksiyadan keyin.\n- S-1 asosidagi sxemalar (asosan Sharqiy Osiyoda).\n- HER2 musbat metastatik rakda birinchi qatorda trastuzumab + ximioterapiya."}, {"num": 60, "text": "Oshqozon raki klinikasi", "answer": "Erta bosqich (\"kichik belgilar\"): ishtaha pasayishi, go'sht ovqatdan ko'ngil qolishi, epigastriyda og'irlik, tez to'yish hissi, holsizlik.\nKech bosqich: doimiy og'riq, qon ketish (qora najas — melena, qon qusish — gematemez), pilorus torayganda qusish, kardia rakida disfagiya (yutinish qiyinligi), ozish va kaxeksiya. Belgilar o'sma joylashuviga bog'liq."}, {"num": 61, "text": "Oshqozon raki diagnostikasi", "answer": "1) FEGDS + ko'p nuqtali biopsiya — asosiy va eng aniq usul.\n2) Bariy bilan rentgen — to'ldirish nuqsoni, rigidlik.\n3) Endoskopik UST (EUS) — invaziya chuqurligi (T) va yaqin LT.\n4) Kontrastli KT — tarqalish va metastaz.\n5) PET-KT — uzoq metastaz.\n6) Diagnostik laparoskopiya — peritoneal tarqalishni aniqlash.\n7) Markerlar: CEA, CA 19-9.\n8) HER2 testi.\n9) Suyak ssintigrafiyasi (ko'rsatma bo'lsa)."}, {"num": 62, "text": "Oshqozon raki differentsial diagnostikasi", "answer": "Oshqozon rakini quyidagilardan farqlash kerak:\n1) Xavfsiz (kallezli) yara — biopsiya hal qiladi.\n2) Oshqozon limfomasi (MALT).\n3) GIST.\n4) Surunkali gastrit, pankreatit.\n5) Boshqa a'zolardan metastaz.\n6) Karsinoid o'sma.\n7) Leyomiosarkoma.\n8) Menetrier kasalligi.\nFarqlash uchun endoskopiya + gistologiya, EUS va KT asosiy o'rin tutadi."}, {"num": 63, "text": "Oshqozonning qaysi qismida rak ko'p rivojlanadi", "answer": "Eng ko'p — antrum va pilorik qism (taxminan 50–60%).\nKeyingi o'rinda — kichik egrilik (20–25%).\nKardia (qizilo'ngachga o'tish joyi) raki dunyoda ortib bormoqda.\nFundus va katta egrilikda kamroq (5–10%).\nDiffuz forma (linitis plastica) butun oshqozonni egallashi mumkin. Joylashuv davo hajmini (subtotal yoki total rezeksiya) belgilaydi."}, {"num": 64, "text": "Oshqozon rakida operatsiya turlari", "answer": "Radikal operatsiyalar:\n- Subtotal distal gastrektomiya — antrum/pilorik rakda.\n- Total gastrektomiya — tana yoki kardia rakida.\n- Hammasi D2 limfa disseksiyasi bilan bajariladi.\nPalliativ operatsiyalar (simptomni yengillashtirish): gastroenteroanastomoz, gastrostomiya, eyunostomiya, shuntlash.\nEndoskopik (erta rakda): EMR, ESD — shilliq qavatda chegaralangan o'smalarda."}, {"num": 65, "text": "Oshqozon rakida operatsiyadan keyingi asoratlar", "answer": "1) Anastomoz yetishmovchiligi — drenajlash, qayta operatsiya.\n2) Qon ketish — endoskopik gemostaz.\n3) Anastomoz torayishi — bujlash (dilatatsiya).\n4) Demping-sindrom — kichik-kichik, ko'p marta ovqatlanish; somatostatin.\n5) Gastrektomiyadan keyingi anemiya — B12 va temir o'rnini to'ldirish.\n6) Vazn yo'qolishi va ozish — nutritiv qo'llab-quvvatlash.\n7) Infeksiya, tromboz."}, {"num": 66, "text": "Oshqozon rakida palliativ davolash", "answer": "Maqsad — radikal davo mumkin bo'lmaganda simptomlarni yengillatish va hayot sifatini saqlash:\n1) Gastroenteroanastomoz — pilorus obstruksiyasida o'tkazgich yo'l.\n2) Endoskopik stent — torayishni kengaytirish.\n3) Gastrostomiya yoki eyunostomiya — ovqatlantirish yo'li.\n4) Lazer/argon ablatsiya — o'sma va qon ketishni nazorat qilish.\n5) Palliativ ximioterapiya — o'sishni sekinlashtirish va og'riqni kamaytirish."}, {"num": 67, "text": "Savitskiy kichik simptomlar sindromi", "answer": "A. V. Savitskiy taklif etgan oshqozon rakining erta (\"kichik\") belgilari majmui:\n1) Umumiy holsizlik, charchoq.\n2) Ishtahaning pasayishi.\n3) Go'sht taomlaridan ko'ngil qolishi (nafratlanish).\n4) Epigastriyda doimiy og'irlik va noqulaylik.\n5) Sababsiz ozish.\n6) Ruhiy tushkunlik, ishga layoqatning pasayishi.\nBu belgilar bir necha hafta-oy davom etsa, albatta onkologik yo'nalishda (FEGDS) tekshirish lozim."}, {"num": 68, "text": "Savitskiy katta simptomlar sindromi", "answer": "Oshqozon rakining kech (\"katta\") belgilari — kasallik avj olganini ko'rsatadi:\n1) Doimiy, kuchli og'riq.\n2) Qon ketish — melena (qora najas), gematemez (qon qusish).\n3) Obstruksiya belgilari — qusish (pilorus), disfagiya (kardia).\n4) Ko'rinadigan yoki paypaslanadigan o'sma.\n5) Metastaz belgilari — sariqlik, assit, Virxov tuguni.\n6) Og'ir kaxeksiya (charchash)."}, {"num": 69, "text": "Oshqozon saratoni TNM klassifikatsiyasi", "answer": "T — devorga invaziya chuqurligi: Tis — in situ; T1a — lamina propria/mushak plastinka; T1b — submukoza; T2 — mushak qavati; T3 — subseroza; T4a — seroza (visseral pardadan o'tgan); T4b — qo'shni a'zolar.\nN — zararlangan regional LT soni: N0; N1 — 1–2; N2 — 3–6; N3a — 7–15; N3b — ≥16.\nM — uzoq metastaz: M0 / M1."}, {"num": 70, "text": "Yo'g'on ichak saratoni gistologik turlari", "answer": "1) Adenokarsinoma (90–95%) — eng ko'p tarqalgan tur.\n2) Shilliqli (mutsinoz) karsinoma — ko'p miqdorda shilimshiq ishlab chiqaradi.\n3) Uzuksimon (signet-ring) hujayrali rak — yomon prognoz.\n4) Medullyar rak — ko'pincha MSI-H (mikrosatellit beqaror).\n5) Neyroendokrin karsinoma.\n6) Yassi hujayrali rak (kam, asosan anorektal sohada)."}, {"num": 71, "text": "To'g'ri ichak saratoni TNM klassifikatsiyasi", "answer": "T — devorga invaziya: T1 — submukoza; T2 — mushak qavati; T3 — perirektal to'qima; T4a — visseral peritoneum; T4b — qo'shni a'zolar.\nN — regional LT: N0; N1a — 1 ta LT; N1b — 2–3 ta; N1c — \"tumor deposits\" (LTsiz o'sma o'choqlari); N2a — 4–6 ta; N2b — ≥7 ta.\nM — uzoq metastaz: M1a — bitta a'zo; M1b — bir nechta a'zo; M1c — peritoneal tarqalish."}, {"num": 72, "text": "To'g'ri ichak saratoni klinikasi", "answer": "1) To'g'ri ichakdan qon ketishi (najasda qizil qon) — ko'pincha birinchi belgi.\n2) Ich kelishi xarakterining o'zgarishi (qabziyat/diareya almashinuvi).\n3) Tenezmlar — yolg'on, og'riqli ichak bo'shatish istagi.\n4) To'liq bo'shamaganlik hissi.\n5) Og'riq — anal, chot yoki dumg'aza sohasida.\n6) Shilliq va qon aralash ajralma.\n7) Obstruksiya — kech bosqichda.\n8) Metastazlar: jigar, o'pka, peritoneum."}]}, {"id": "endo", "name": "Endokrinologiya", "icon": "🧬", "count": 90, "questions": [{"num": 1, "text": "Gipofiz qayerda joylashgan va u qanday qismlardan iborat", "answer": "Turk egar (sella turcica) da. Qismlar: 1) Adenogipofiz (oldingi): GTG, TSH, AKTG, STG, prolaktin, MSH; 2) Neyrogipofiz (orqa): ADG (vazopressin) va oksitotsin. Gipotalamus bilan portal tizim orqali bog'liq."}, {"num": 2, "text": "Oldingi gipofiz gormonlari", "answer": "1) STG — o'sish; 2) TSH — qalqonsimon bez; 3) AKTG — buyrak usti; 4) FSH — follikul; 5) LG — lyuteinizatsiya; 6) Prolaktin — sut bezi; 7) MSH — melanin."}, {"num": 3, "text": "AKTG funktsiyalari", "answer": "Adenogipofizda (CRH ta'sirida). Buyrak usti bezining qobiq qatlamini stimulyatsiya → kortizol sintezi ↑ → androgen ↑ → melanin. Diurnal ritm — ertalab eng yuqori. Salbiy teskari aloqa: kortizol ↑ → AKTG ↓."}, {"num": 4, "text": "TTG (TSH) funktsiyalari", "answer": "TRH ta'sirida. 1) Qalqonsimon bez o'sishi; 2) T3/T4 sintezi ↑; 3) Yod qabul ↑; 4) Tireoglobulin sintezi ↑. Teskari aloqa: T3/T4 oshganda TTG ↓."}, {"num": 5, "text": "STG ning biologik ta'sirlari", "answer": "1) Suyak/tog'ay o'sishi (IGF-1 orqali); 2) Protein sintezi ↑; 3) Lipoliz ↑; 4) Glyukoza utilizatsiya ↓ (diabetogen); 5) Suv/elektrolit balans; 6) Immunitet ↑. Uyqu paytida eng ko'p."}, {"num": 6, "text": "Gipotalamus gormonlari va vazifalari", "answer": "Liberinlar: GnRH (LG/FSH), TRH (TTG/prolaktin), CRH (AKTG), GHRH (STG). Statinlar: somatostatin (STG ↓). Neyrogipofiz: ADG (suv balans), oksitotsin (bachadon/sut)."}, {"num": 7, "text": "Endokrin tizimda teskari aloqa mexanizmi", "answer": "Salbiy feed-back (keng): kortizol ↑ → AKTG ↓, CRH ↓. Ijobiy (noyob): estrogen ↑ → LG toshishi (ovulyatsiya). Qisqa: gipofiz → gipotalamus. Uzun: periferik gormon → gipotalamus + gipofiz."}, {"num": 8, "text": "Voyaga yetganda ortiqcha STG — qaysi kasalliklar", "answer": "Epifizlar yopilgandan keyin → akromegaliya. Epifizlar ochiq bo'lganda → gigantizm. Akromegaliya: qo'l, oyoq, yuz kattalashadi. Gigantizm: bo'y uzayadi. Sabab: adenogipofiz adenomasi."}, {"num": 9, "text": "Gigantizm va akromegaliya farqi", "answer": "Gigantizm: bolalar (epifizlar ochiq) → bo'y >2 m, proporsional. Akromegaliya: kattalar (yopiq) → akral qismlar (qo'l, oyoq, yuz) kattalashadi. Umumiy: STG ↑, IGF-1 ↑, OGTT da STG bostirmaydi, MRT adenoma."}, {"num": 10, "text": "Gipofiz nanizmi — sabablari", "answer": "STG tanqisligi → past bo'y (<−2 SD), proporsional qomat, bolalar yuzi, jinsiy rivojlanish kechikishi. Sabablar: idiopatik, adenoma, kraniofaringioma, travma, nurlanish, irsiy (GH1 mutatsiya)."}, {"num": 11, "text": "Akromegaliya etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: gipofiz STG adenomasi (99%). Patogenez: STG ↑ → IGF-1 ↑ → gipertrofiya. Klinika: qo'l/oyoq/yuz kattalashishi, terlash, bosh og'rig'i, ko'ruv buzilishi, diabet, AH. Diagnostika: IGF-1 ↑, OGTT, MRT. Davolash: transphenoidal adenomektomiya, oktreotid, kabergolin."}, {"num": 12, "text": "Akromegaliya diagnostikasi", "answer": "1) IGF-1 — skrining; 2) STG OGTT (75 g glyukoza) — norma <1 ng/ml; 3) MRT gipofiz; 4) Ko'ruv maydoni; 5) EKG, exo; 6) Koloskopiya; 7) Uyqu polisomnografiya."}, {"num": 13, "text": "Akromegaliyani zamonaviy davolash", "answer": "1) Transphenoidal adenomektomiya (birinchi); 2) Oktreotid LAR, lanreotid; 3) Kabergolin; 4) Pegvisomant (GH retseptor antagonisti); 5) Gamma-knife; Maqsad: IGF-1 norma, STG <1 ng/ml."}, {"num": 14, "text": "Jismoniy rivojlanishni persentil jadvallar bo'yicha baholash", "answer": "3–97 persentil — norma. <3 — past bo'y (<−2 SD). >97 — baland. SDS = (bemorning bo'yi − o'rtacha bo'y) / SD. Bo'y, vazn, bosh aylanasi jadvalga solinadi."}, {"num": 15, "text": "Shixan sindromi etiologiya, patogenez, klinika, diagnostika", "answer": "Etiologiya: tug'ruq paytida qon ketishi → gipofiz nekrozi. Klinika: laktatsiya yo'qligi, amenoreya, gipotireoz, gipokortisizm, jinsiy belgilar susayishi. Diagnostika: gormonlar (barchasi ↓), MRT — bo'shliq."}, {"num": 16, "text": "Gigantizm etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: bolada gipofiz STG-adenomasi, MEN-1. Klinika: bo'y >2 m, bosh og'rig'i, ko'ruv buzilishi, giperhidroz, diabet. Diagnostika: STG ↑, IGF-1 ↑, MRT, suyak rentgeni. Davolash: transphenoidal, oktreotid, radioxirurgiya."}, {"num": 17, "text": "Qandsiz diabet etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Markaziy: ADG ↓ (kraniofaringioma, travma); Nefrogen: buyraklar ADG ga javob bermaydi (litiy, giperkalsemiya). Klinika: poliyuriya >3 l/kun, polidipsiya, zichlik <1005. Diagnostika: suvsizlanish sinovi + ADG analog. Davolash: Markaziy — desmopressin; Nefrogen — gidroxlortiyazid."}, {"num": 18, "text": "Quruq ovqatlanish sinami (suvsizlanish testi)", "answer": "8 soat suv bermay → soatda siydik osmolallik. Norma: >700 mOsm/kg. QD: <300. ADG analog bersak: Markaziy QD da ↑, nefrogenda oshmaydi. Psixogen polidipsiyada osmolallik oshadi."}, {"num": 19, "text": "Markaziy qandsiz diabetni davolash", "answer": "1) Desmopressin (burun/sublingual/in'eksiya); 2) Gidroxlortiyazid; 3) Karbаmazepin; 4) Sabab bo'lgan o'sma davolash."}, {"num": 20, "text": "Itenko-Kushing kasalligining etiologiyasi va klinikasi", "answer": "Etiologiya: gipofiz AKTG adenomasi. Klinika: oy yuz, qorin semizligi, buffalo hump, qizg'ish striyalar, teri yupqalashishi, AH, osteoporoz, steroid diabet, girs utizm, psixoz."}, {"num": 21, "text": "Semizlik etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: irsiyat, ortiqcha kaloriya, gipotireoz, Kushing, PKOS, dorilar. Patogenez: energiya sarf < kirim → yog'. Diagnostika: IMT ≥30, bel atrof. Davolash: dieta + faollik; orlistat; semaglutid; bariatrik (IMT≥40)."}, {"num": 22, "text": "BMI (tana massasi indeksi) nima va uni hisoblash", "answer": "BMI = vazn (kg) / bo'y² (m²). <18.5 — tanqislik; 18.5–24.9 — norma; 25–29.9 — ortiqcha; 30–34.9 — I daraja; 35–39.9 — II; ≥40 — III (patologik). Bel atrof: erkaklar >94 sm, ayollar >80 sm — qorin semizligi."}, {"num": 23, "text": "Metabolik sindrom etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: irsiyat + noto'g'ri ovqat + kam harakat. Patogenez: insulin rezistentligi → giperinsulinemiya → AH, dislipidemiya, giperglikemiya. Diagnostika IDF: bel >94/80 + yana 2 belgi. Davolash: turmush tarzi, metformin, statinlar."}, {"num": 24, "text": "Semizlikni davolash usullari", "answer": "1) Dieta (500–1000 kkal deficit) + faollik 150 daq/hafta; 2) Orlistat (lipoaza ingibitori); 3) Semaglutid (GPP-1 analog); 4) Intragastrik ballon; 5) Bariatrik jarrohlik (sleeve/gastrik shunt) — IMT≥40 yoki ≥35+kasallik."}, {"num": 25, "text": "Qandli diabet tasnifi va ta'rifi", "answer": "Insulin sekretsiya yoki ta'sir yetishmovchiligi → giperglikemiya. Turlari: 1) QD 1 — autoimmun; 2) QD 2 — IR + nisbiy insulinopenik; 3) Gestatsion; 4) MODY, pankreatogen. Diagnostika: och glyukoza ≥7.0 mmol/l yoki HbA1c ≥6.5%."}, {"num": 26, "text": "QD 1-tur etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: autoimmun (T-hujayralar β-hujayralarni yo'q qiladi), HLA-DR3/DR4, virus. Klinika: yoshlarda, keskin, poliyuriya, ozish, ketoacidoz. Diagnostika: glyukoza ↑, C-peptid ↓, GAD, ICA+. Davolash: insulin — umrbod, bazis-bolus."}, {"num": 27, "text": "QD 2-tur etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: genetik + semizlik + yosh. Patogenez: IR + β-hujayra yetishmovchiligi. Klinika: 40+ yosh, sekin, ko'pincha simptomsiz. Diagnostika: glyukoza ≥7.0, HbA1c ≥6.5%. Davolash: turmush tarzi + metformin → SGLT2, GLP-1, insulin."}, {"num": 28, "text": "QD 1 va 2 tur klinik simptomlar farqi", "answer": "QD 1: yosh, ozg'in, keskin, ketoacidoz xavfi ↑, insulin mutlaq. QD 2: katta yosh, semiz, sekin, ketoacidoz kamroq. Farq: C-peptid (1 — ↓, 2 — ↑), autoantitanalar (1 — bor, 2 — yo'q)."}, {"num": 29, "text": "QD 1 va 2 tur differentsial diagnostikasi", "answer": "QD1 / QD2 — Yosh: 40 gacha / 40+; Boshlanish: o'tkir/sekin; Vazn: ozg'in/semiz; Ketoacidoz: ko'p/kam; C-peptid: <0.2/<0.6 nmol/l; GAD+/−; LADA: kattalar, sekin, ammo autoimmun."}, {"num": 30, "text": "Qandli diabet diagnostikasi mezonlari", "answer": "1) Och glyukoza ≥7.0 mmol/l; 2) GTT 2 soat ≥11.1; 3) HbA1c ≥6.5%; 4) Simptomlar + tasodifiy glyukoza ≥11.1. Simptom yo'qda — 2 marta tasdiqlash. Prediabet: 5.6–6.9 yoki GTT 7.8–11.0 yoki HbA1c 5.7–6.4%."}, {"num": 31, "text": "Glikirli gemoglobin (HbA1c) va diagnostikadagi ahamiyati", "answer": "Oxirgi 2–3 oy o'rtacha glikemiya. Mezonlar: <5.7% norma; 5.7–6.4% prediabet; ≥6.5% QD. Maqsad davolashda: <7.0% (umumiy), 6.5% (yosh), 8.0% (keksa). Kamchilik: anemiya, gemoglobinopatiyalarda noto'g'ri."}, {"num": 32, "text": "Prediabet tushunchasi, diagnostikasi, davolash", "answer": "IFG: och 5.6–6.9; IGT: GTT 7.8–11.0; HbA1c 5.7–6.4%. QD ga o'tish xavfi 15–30% / 5–10 yil. Davolash: turmush tarzi (semizlikni ↓ — QD 58% kamaytiradi); metformin — yuqori xavfli."}, {"num": 33, "text": "GTT o'tkazish ko'rsatmalari va usuli", "answer": "Ko'rsatma: prediabet, gestatsion diabet skrining (24–28 hafta), xavf omillari. Usul: 3 kun oddiy ovqat → 8–14 soat och → och qon → 75 g glyukoza → 2 soat qon. Faollik, chekish ta'siri yo'q bo'lsin."}, {"num": 34, "text": "GTT natijalarini talqin qilish", "answer": "Och / 2 soat: Norma <5.6 va <7.8; IGT <7.0 va 7.8–11.0; IFG 5.6–6.9 va <7.8; QD ≥7.0 yoki ≥11.1. Gestatsion (IADPSG): och ≥5.1, 1 soat ≥10.0, 2 soat ≥8.5 mmol/l."}, {"num": 35, "text": "Qandli diabet uchun dietoterapiya", "answer": "Kaloriya: 500 kkal deficit (semizlikda). Uglevodlar: 45–60%, past GI. Tolalar ≥25 g. Yog' <35%, to'yinmagan afzal. Shirin ichimliklar, oddiy shakar cheklash. Ovqat vaqti: bir xil, kichik porsiya. Tuz <2.3 g/kun."}, {"num": 36, "text": "Gipoglikemik dorilar tasnifi", "answer": "1) Metformin — IR ga; 2) Sulfanilmochevina — sekretagog; 3) Glinidlar — qisqa; 4) DPP-4 ing (sitagliptin); 5) GPP-1 agonist (semaglutid); 6) SGLT2 ing (empagliflozin); 7) Akarboza; 8) Pioglitazon."}, {"num": 37, "text": "Metformin (biguanid) — ko'rsatma, mexanizm, nojo'ya", "answer": "Ko'rsatma: QD 2 birinchi tanlov, prediabet. Mexanizm: jigar glyukoneogenezi ↓ (asosiy), insulin sezgirlik ↑. Nojo'ya: GI (aynishi, diarеya), laktatsidoz (noyob, buyrak ↓da), B12 ↓. Qarshi: SCr >1.5, jigar ↓."}, {"num": 38, "text": "Sulfanilmochevina — ko'rsatma, mexanizm, nojo'ya", "answer": "Ko'rsatma: QD 2. Glibenklamid, glipizid, gliklazid. Mexanizm: β-hujayra K-ATP kanali → depolarizatsiya → insulin ↑. Nojo'ya: gipoglikemiya (xavfli!), vazn ↑. Qarshi: QD 1, buyrak/jigar ↓, homiladorlik."}, {"num": 39, "text": "DPP-4 ingibitorlari — ko'rsatma, mexanizm, nojo'ya", "answer": "Sitagliptin, linagliptin. Ko'rsatma: QD 2, gipoglikemiya xavfi bo'lsa. Mexanizm: DPP-4 bloki → GLP-1/GIP ↑ → insulin ↑, glyukagon ↓. Nojo'ya: nazofaringit, pankreatit (noyob). Vazn neytral."}, {"num": 40, "text": "GPP-1 analoglari — ko'rsatma, mexanizm, nojo'ya", "answer": "Semaglutid (haftalik), liraglutid. Ko'rsatma: QD 2, YuQT xavfi, semizlik. Mexanizm: GLP-1 retseptor → glyukozaga bog'liq insulin ↑, glyukagon ↓, ishtaha ↓. Nojo'ya: aynishi, qusish (boshlanishida). Vazn ↓."}, {"num": 41, "text": "SGLT2 ingibitorlari — ko'rsatma, mexanizm, nojo'ya", "answer": "Empagliflozin, dapagliflozin. Ko'rsatma: QD 2, YuQT ↓, SBK. Mexanizm: proksimal naychada glyukoza reabsorbsiya ↓ → glukozuriya → glyukoza ↓, qon bosim ↓, vazn ↓. Nojo'ya: urogenital kandidoz, DKA (noyob). Kardiorenal himoya."}, {"num": 42, "text": "Insulin terapiyasini tayinlash ko'rsatmalari", "answer": "Mutlaq: QD 1, DKA, koma. Nisbiy QD 2 da: HbA1c >9–10%, og'iz dorilar samarasi ↓, jarrohlik, o'tkir infeksiya, MI, jigar/buyrak ↓, homiladorlik."}, {"num": 43, "text": "Insulinlarning ta'sir muddati bo'yicha tasnifi", "answer": "Tez (analog): lispro, aspart — 10–15 daq, 1–2 soat, 3–5 soat. Qisqa: oddiy insulin — 30–60 daq, 2–3 soat, 5–8 soat. O'rta: NPH — 2–4 soat, 4–10 soat, 10–16 soat. Uzoq (analog): glargin, degludek — cho'qqisiz, 20–42 soat."}, {"num": 44, "text": "1-tur QD uchun insulin doza hisoblash", "answer": "TDD: 0.5–1 U/kg/kun. 50% bazal + 50% bolus. Bolus: 1 U — 10–15 g uglevod. Korreksiya: 1 U — glyukoza 2.5–3 mmol/l pasaytiradi (1800/TDD). Nazorat asosida sozlash."}, {"num": 45, "text": "Bazis-bolus insulin terapiyasi nima", "answer": "Fiziologik sekretsiya taqlidi. Bazal (glargin/degludek — kechasi): sutkalik bazal. Bolus (lispro/aspart — ovqat oldidan): glikemiya cho'qqisini bostiradi. Afzallik: moslashuvchan jadval, gipoglikemiya kamroq."}, {"num": 46, "text": "Diabetik ketoacidoz klinika va davolash", "answer": "Klinika: aynish, qusish, qorin og'rig'i, Kussmaul nafas, aceton hidi, poliyuriya, ong buzilishi. Lab: glyukoza >14, ketonlar+++, pH <7.3. Davolash: infuziya (0.9% NaCl), oddiy insulin 0.1 U/kg/soat, kaliy korreksiyasi."}, {"num": 47, "text": "Gipoglikemik koma klinika va davolash", "answer": "Glyukoza <3.9; og'ir <2.8. Klinika: terlaş, titrash, taxikardiya, ochlik (adrenergik); ong buzilishi, xuruj (neyroglükopenik). Davolash: ong bor — 15–20 g uglevod; ong yo'q — 40% glyukoza 40–60 ml IV, glazkagon 1 mg IM."}, {"num": 48, "text": "Diabetik nefropatiya etiologiya, patogenez, klinika, davolash", "answer": "Giperglikemiya → oksidativ stress → glomeruloskleroz. Bosqichlar: giperfiltration → normoalbuminuriya → mikroalbuminuriya (30–299 mg) → makroalbuminuriya (≥300 mg) → UChS. Davolash: ACE ing/ARB, SGLT2, qon bosim <130/80."}, {"num": 49, "text": "Diabetik retinopatiya tasnif, klinika, davolash", "answer": "NPDR: fon (mikroanevrizm, gemorragiya), o'rtacha, og'ir. PDR: neovaskularizatsiya, vitreoz gemorragiya, retinal ajralish. Davolash: lazer fotokoagulyatsiya; bevatsizumab (anti-VEGF); vitrektomiya."}, {"num": 50, "text": "Diabetik neyropatiya etiologiya, patogenez, klinika, davolash", "answer": "Aldoza reduktaza → sorbitol → AGE → nerv buzilishi. Distal simmetrik: 'paypoq/qo'lqop', kechasi yonish. Avtonom: taxikardiya, gastroparez. Davolash: glikemiya nazorat; pregabalin, gabapentin, duloksetin, alfa-lipoik kislota."}, {"num": 51, "text": "Diabetik to'piq sindromi etiologiya, patogenez, klinika, davolash", "answer": "Neyropatiya + angiopatiya + infeksiya. Wagner 0–5. Klinika: oyoq yarasi, qizillik, shish, Charcot. Davolash: debraidment, offloading, antibiotiklar, revaskulyarizatsiya, amputatsiya."}, {"num": 52, "text": "Qalqonsimon bez anatomiya, fiziologiya, gormonlar biosintezi", "answer": "Bo'yinda, 25–30 g. Follikullar (T3, T4) + C-hujayralar (kalsitonin). Biosintez: yod → organifikatsiya (tireoperoksidaza) → MIT + DIT → T3 (MIT+DIT), T4 (DIT+DIT). T4 atrof-muhitda T3 ga (deiodinaza)."}, {"num": 53, "text": "T4 va T3 ning biologik ta'siri", "answer": "1) Bazal metabolizm ↑; 2) Yurak — taxikardiya; 3) Miya rivojlanishi; 4) Protein sintezi ↑; 5) Lipoliz; 6) Glyukoneogenez; 7) GI motilitet; 8) β-adrenoretseptorlar ekspressiyasi ↑. T3 faolroq, T4 prohormone."}, {"num": 54, "text": "Endemik bo'qoq etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Yod ↓ → T3/T4 ↓ → TTG ↑ → bez gipertrofiya. Klinika: bo'yinda kattalashgan bez, bosim belgilari. Diagnostika: UST, TTG, T4, siydikda yod. Davolash: kaliy yodid, L-tiroksin, og'ir — jarrohlik."}, {"num": 55, "text": "Endemik bo'qoq profilaktikasi", "answer": "1) Yodlangan tuz (20–40 mkg/g — eng samarali); 2) Homiladorlar, emizuvchi, bolalar — kaliy yodid; 3) Oziq-ovqat xilma-xilligi; 4) UST skrining; 5) JSST mezonlari: siydikda yod >100 mkg/l."}, {"num": 56, "text": "JSST va Nikolaev bo'yicha qalqonsimon bez kattalashish darajasi", "answer": "Nikolaev: 0 — yo'q; I — paypaslanadi; II — ko'rinadi va paypaslanadi; III — bo'yin shaklini o'zgartiradi; IV — deformatsiya; V — juda katta. JSST: 0 — yo'q; 1 — paypaslanadi; 2 — ko'rinadi."}, {"num": 57, "text": "Gipotireoz etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: Hashimoto, yod ↓, tireoidektomiya, radioiod. T3/T4 ↓ → metabolizm ↓. Klinika: charchoq, vazn ↑, sovuqdan qo'rqish, quruq teri, bradikardiya, miksedema, depressiya. Diagnostika: TTG ↑, T4 ↓. Davolash: L-tiroksin, maqsad TTG 0.5–2.5."}, {"num": 58, "text": "Tug'ma gipotireoz etiologiya, klinika, diagnostika", "answer": "Etiologiya: aplaziya, biosintez defekti, maternal antitanalar. Klinika: yangi tug'ilganda — sariqlik uzayadi, gipotermiya, katta til, kindik churrasi, bo'sh mushaklar. Kechiksa: kretinizm. Diagnostika: YTT skrining (TTG). Davolash: L-tiroksin darhol."}, {"num": 59, "text": "Diffuz toksik bo'qoq (Bazedov) etiologiya, klinika, davolash", "answer": "TRAb/TSI — stimulyatsiyalovchi antitanalar. Klinika: taxikardiya, issiqdan qo'rqish, terlash, titrash, ozish, tashvish; Bazedov triadasi: bo'qoq + oftalmopatiya + pretibial miksedema. Diagnostika: TTG ↓, fT4 ↑, TRAb+. Davolash: tiamazol, radioiod, tireoidektomiya."}, {"num": 60, "text": "Gipotireozda gormonal profil", "answer": "Birlamchi: TTG ↑, fT4 ↓. Ikkilamchi (gipofiz): TTG ↓/norma, fT4 ↓. Subklinik: TTG ↑, fT4 norma. Hashimoto: anti-TPO ↑, anti-TG ↑."}, {"num": 61, "text": "Diffuz toksik bo'qoqda gormonal profil", "answer": "TTG ↓↓; fT4 ↑; fT3 ↑; TRAb+ (spetsifik). Tekshirish: avval TTG → pasaygan → fT4/fT3 → Bazedov gumohi → TRAb → UST + ssintigrafiya."}, {"num": 62, "text": "Tirotoksikoz va gipotireoz differentsial diagnostikasi", "answer": "Tirotoksikoz: taxikardiya, issiq/nam teri, ozish, diareya, titrash, tashvish, gipetrefleksiya, oftalmopatiya. Gipotireoz: bradikardiya, quruq/sovuq teri, vazn ↑, ich qotishi, psixomotor sekinlik, miksedema. Lab: TTG ↓ (tireotoks), TTG ↑ (gipotireoz)."}, {"num": 63, "text": "Tirotoksik kriz belgilari va shoshilinch yordam", "answer": "Kriz: isitma >40°C, taxikardiya >150, aritmiya, koma. Trigger: jarrohlik, infeksiya. Yordam: 1) PTU 600 mg; 2) Lugol eritmasi; 3) Propranolol; 4) Gidrokortizon; 5) Sovutish; 6) ICU."}, {"num": 64, "text": "Tiroiditlarning tasnifi", "answer": "1) O'tkir — bakterial; 2) Yarim o'tkir (De Quervain) — viral; 3) Surunkali: Hashimoto (autoimmun), Riedel (fibrozli), nurlanish, medikamentoz (amiodarone); 4) Postpartum."}, {"num": 65, "text": "Tiroiditlar etiologiya, klinika, davolash", "answer": "O'tkir: bakterial → abssess, og'riq, isitma → antibiotiklar, drenaj. De Quervain: viral → og'riq + tirotoksikoz → NSAIDs, steroid. Hashimoto: autoimmun → gipotireoz → L-tiroksin."}, {"num": 66, "text": "Yarim o'tkir tiroidit (De Quervain) belgilari", "answer": "Viral infeksiyadan 2–3 hafta keyin. Bo'yin og'rig'i (quloq, jag'ga irradiyatsiya); isitma 38–39°C; tirotoksikoz faza → gipotireoz faza; ESR ↑ (>50 mm/s); TTG avval ↓ keyin ↑; radioiod yutilishi ↓."}, {"num": 67, "text": "O'tkir tiroidit etiologiya, klinika, davolash", "answer": "Stafilokokk, streptokokk. Klinika: keskin og'riq, isitma, qizillik, shish; yutinish og'riq; leykositoz. Diagnostika: UST (abssess), qon. Davolash: ampisilin/sulbaktam, klindamisin; abssess — drenaj."}, {"num": 68, "text": "Hashimoto tiroiditi (surunkali autoimmun)", "answer": "Anti-TPO, anti-TG antitanalari → T-hujayralar destruksiyasi → gipotireoz. Ko'pincha simptomsiz yoki gipotireoz; bez qattiq, katta. Diagnostika: TTG ↑, fT4 ↓, anti-TPO ↑; UST — gipoekoik. Davolash: L-tiroksin."}, {"num": 69, "text": "Qalqon oldi bezlarining vazifasi", "answer": "PTG (paratgormon) ishlab chiqaradi. Funktsiya: 1) Suyakdan Ca²⁺ ajratadi; 2) Buyrakda Ca²⁺ reabsorbsiya ↑, fosfat chiqarish ↑; 3) Kalsitriol aktivatsiya → ichakda Ca²⁺ yutilishi ↑."}, {"num": 70, "text": "PTH ning kaltsiy va fosfor almashinuvidagi roli", "answer": "PTH ↑ ta'sirlari: Suyak — osteoklastlar → Ca²⁺ ↑; Buyrak — Ca²⁺ reabsorbsiya ↑, fosfat ekskresiya ↑; 1,25(OH)₂D3 aktivatsiya → ichakda Ca²⁺ ↑. Natija: qon Ca²⁺ ↑, fosfat ↓."}, {"num": 71, "text": "Gipoparatireoz etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: posoperatsion (tireoidektomiya), autoimmun, DiGeorge. PTH ↓ → Ca²⁺ ↓, fosfat ↑. Klinika: tetaniya, Xvostek, Trousseau, xuruj, QT ↑. Diagnostika: Ca²⁺ ↓, fosfat ↑, PTH ↓. Davolash: Ca²⁺ glyukonat IV (o'tkir), Ca²⁺ + D vitamin."}, {"num": 72, "text": "Giperparatireoz etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: PTG adenomasi (80%). PTH ↑ → Ca²⁺ ↑, fosfat ↓. Klinika: 'stones, bones, groans, psychic moans' — toshlari, osteoporoz, peptic ulcer, depressiya. Diagnostika: Ca²⁺ ↑, PTH ↑, dexa-skan. Davolash: paratiroidektomiya."}, {"num": 73, "text": "Giperparatireozning klinik ko'rinishlari", "answer": "1) Suyak: osteoporoz, sinish; 2) Buyrak: toshlar, poliyuriya; 3) GI: peptic ulcer, pankreatit, qabziyat; 4) Neyromuskular: charchoq, depressiya; 5) Yurak: AH, QT ↓; 6) Ko'z: keratopаtiya."}, {"num": 74, "text": "Giperparatireoz va gipoparatireoz diagnostikasi", "answer": "Giperparatireoz: Ca²⁺ ↑, fosfat ↓, PTH ↑, ALP ↑; UST/sestamibi ssintigrafiya — adenoma. Gipoparatireoz: Ca²⁺ ↓, fosfat ↑, PTH ↓, QT ↑. Psevdogipoparatirez: Ca²⁺ ↓, PTH ↑ (organ javobsizligi)."}, {"num": 75, "text": "Buyrak usti bezlarining tuzilishi va gormonlar", "answer": "Korteks (80%): glomeruloza — aldosteron; fassikuloza — kortizol; retikular — DHEA. Medulla (20%): adrenalin (80%), noradrenalin (20%). Korteks boshqaruvi: AKTG; glomeruloza — RAAS; medulla — simpatik NS."}, {"num": 76, "text": "Glyukokortikoidlarning biologik ta'siri", "answer": "Kortizol: 1) Uglevod — glyukoneogenez ↑, utilizatsiya ↓; 2) Oqsil — katabolizm ↑; 3) Yog' — sentral yog' ↑, lipoliz periferada; 4) Immunitet — yallig'lanish ↓; 5) Suyak — osteoporoz; 6) Qon — neytrofiliya, eozinopenia; 7) Stress gormoni."}, {"num": 77, "text": "Mineralokortikoidlarning vazifalari", "answer": "Aldosteron (RAAS boshqaradi). 1) Distal naychada: Na⁺ ↑, K⁺/H⁺ ↓; 2) Na⁺ ushlanishi → suv ushlanishi → qon bosim ↑; 3) Gipokaliemiya. Boshqaruv: Ang II, K⁺."}, {"num": 78, "text": "Konn sindromi etiologiyasi va patogenezi", "answer": "Birlamchi aldosteronizm. Etiologiya: aldosteron adenomasi (60%), ikki tomonlama giperplaziya (35%). Patogenez: aldosteron ↑ (Ang II/AKTG mustaqil) → Na⁺ ushlanishi, K⁺ ↓ → qon hajmi ↑ → gipertenziya + gipokaliemiya."}, {"num": 79, "text": "Konn sindromi klinik ko'rinishi va davolash", "answer": "Klinika: rezistentli AH, gipokaliemiya (kuchsizlik, paraliz, paresteziya, tetaniya), poliyuriya, nikturia. EKG: U to'lqin, QT ↑. Diagnostika: aldosteron/renin nisbati ↑, KT buyrak usti. Davolash: adenoma — adrenalektomiya; giperplaziya — spironolakton."}, {"num": 80, "text": "Feoxromositoma belgilari", "answer": "Katekolaminlar sekretsiya. Klinika: gipertenziv krizlar (bosh og'rig'i, terlash, titroq, taxikardiya); oqarish yoki qizarish; panic attack; giperglikemiya. Provokatsiya: bosim, anasteziya, dorilar."}, {"num": 81, "text": "Feoxromositoma diagnostikasi", "answer": "1) 24 soatlik siydik: metanefrinlar, normetanefrinlar (eng sezgir); 2) Plazma: erkin metanefrinlar (skrining); 3) KT/MRT; 4) 123I-MIBG ssintigrafiya; 5) PET-KT; 6) Genetik: VHL, RET, SDHB mutatsiyalari."}, {"num": 82, "text": "Feoxromositoma davolash tamoyillari", "answer": "1) Alfa-blokator 7–14 kun (doksazosin) oldin; keyin beta-blokator; 2) Gidratatsiya; 3) Laparoskopik adrenalektomiya (birinchi); 4) Metastatikda: MIBG terapiya, ximioterapiya."}, {"num": 83, "text": "Buyrak usti bezlarining surunkali yetishmovchiligi etiologiya, klinika, davolash", "answer": "Etiologiya: Addison — autoimmun (70%), TB; Ikkilamchi — gipofiz, steroid to'xtatilishi. Klinika: charchoq, gipotenziya, giperpigrmentatsiya (birlamchi), giponatremia, giperkalemiya, gipoglikemiya. Davolash: gidrokortizon 15–25 mg/kun, fludrokortizon."}, {"num": 84, "text": "Addison kasalligining klinik belgilari", "answer": "1) Charchoq, kuchsizlik; 2) Giperpigrmentatsiya (qo'l kataklari, lab, tish go'shti); 3) Anoreksiya, qorin og'rig'i; 4) Vazn ↓; 5) Ortostatik gipotenziya; 6) Sho'r ishtiyoqi; 7) Giponatremia, giperkalemiya, gipoglikemiya; 8) Depressiya."}, {"num": 85, "text": "O'tkir buyrak usti bezi yetishmovchiligi (Addison krizi)", "answer": "Trigger: infeksiya, jarrohlik, stress. Klinika: kollaps, qorin og'rig'i, qusish, gipoglikemiya, ong buzilishi. Shoshilinch: gidrokortizon 100 mg IV → 200–400 mg/kun; 0.9% NaCl + glyukoza infuziyasi; sabab davolash."}, {"num": 86, "text": "Gipokortisizmga xos alomatlar", "answer": "1) Charchoq, kuchsizlik; 2) Ortostatik gipotenziya; 3) Giponatremia; 4) Giperkalemiya; 5) Gipoglikemiya; 6) Anoreksiya, ozish; 7) Qorin og'rig'i; 8) Melanodermiya (birlamchi); 9) Eozinofiliya; 10) Stress javobining yo'qligi."}, {"num": 87, "text": "Giperkortisizm belgilari", "answer": "1) Oy yuz; 2) Qorin semizligi, buffalo hump; 3) Qizil-binafsha striyalar; 4) Teri yupqalashishi; 5) Mushak atrofiyasi; 6) Osteoporoz; 7) AH; 8) Giperglikemiya; 9) Girs utizm (ayollarda); 10) Psixoz, depressiya; 11) Immunosupressiya."}, {"num": 88, "text": "Itenko-Kushing kasalligi va sindromi differentsial diagnostikasi", "answer": "Kasallik (gipofiz AKTG): AKTG ↑, kortizol ↑, bilateral adrenal giperplaziya. Birlamchi adrenal: kortizol ↑, AKTG ↓, adenoma. Ektopik AKTG: AKTG ↑↑, kortizol ↑↑. Testlar: kechqurun kortizol, 1 mg DST, 8 mg DST, MRT gipofiz, KT buyrak usti."}, {"num": 89, "text": "Birlamchi va ikkilamchi giperparatireoz farqi", "answer": "Birlamchi: PTG adenomasi → PTH ↑ → Ca²⁺ ↑, fosfat ↓. Ikkilamchi: buyrak ↓/D vitamini ↓ → Ca²⁺ ↓ → kompensator PTH ↑ → Ca²⁺ norma. Uchinchi: uzoq ikkilamchi → PTG mustaqil → Ca²⁺ ↑ ham."}, {"num": 90, "text": "Itenko-Kushing sindromi etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: gipofiz AKTG (70%), adrenal adenoma (20%), ektopik AKTG (10%), iatrogen. Klinika: yuqoridagi. Diagnostika: tükürik kortizol, 1 mg DST, UFC, AKTG, KT/MRT. Davolash: transphenoidal (kasallik), adrenalektomiya (adrenal), ketokonazol."}]}, {"id": "inf", "name": "Infeksion kasalliklar", "icon": "🦠", "count": 72, "questions": [{"num": 1, "text": "Общее понятие об инфекционных болезнях", "answer": "Инфекционные болезни вызваны патогенными микроорганизмами. Признаки: этиологический агент, заразность, цикличность (инкубация→продром→разгар→реконвалесценция), формирование иммунитета. Эпидпроцесс: источник → механизм передачи → восприимчивый организм."}, {"num": 2, "text": "Процесс развития инфекционного процесса", "answer": "Фазы: 1) Адгезия — прикрепление; 2) Инвазия — проникновение; 3) Колонизация — размножение; 4) Диссеминация — распространение; 5) Повреждение (токсины, иммунные реакции). Зависит от вирулентности, дозы, ворот, иммунитета."}, {"num": 3, "text": "Патогенез брюшного тифа", "answer": "S. typhi → рот → тонкая кишка → пейеровы бляшки → ЛУ (первичная бактериемия) → макрофаги → генерализованная бактериемия → паренхиматозная диффузия → повторное выделение в кишку → некроз → язвы → осложнения."}, {"num": 4, "text": "Клиническая классификация брюшного тифа", "answer": "По тяжести: лёгкая, средняя, тяжёлая. По течению: типичное, атипичное (абортивное, стёртое). Редкие: пневмотиф, менинготиф. По осложнениям: кровотечение, перфорация, ИТШ. Носительство: острое <3 мес, хроническое >3 мес."}, {"num": 5, "text": "Симптомы начального периода брюшного тифа", "answer": "1–7 день: постепенное начало, нарастающая лихорадка (лестничная кривая Вундерлиха), нарастающая головная боль, слабость, адинамия, бессонница, снижение аппетита, относительная брадикардия, обложенный язык, гепатоспленомегалия начало."}, {"num": 6, "text": "Клиника брюшного тифа (разгар)", "answer": "7–21 день: высокая лихорадка 39–40°С постоянная; тифозный статус (помрачение сознания, бред); розеолёзная сыпь 8–10 день (грудь, живот); брадикардия, дикротия; гепатоспленомегалия; феномен Падалки; запор → метеоризм."}, {"num": 7, "text": "Опорные и решающие симптомы брюшного тифа", "answer": "Опорные: постепенное начало, тифозный статус, розеолёзная сыпь, брадикардия, гепатоспленомегалия. Решающие (лаборатория): гемокультура (1–10 день), миелокультура, РА Видаля ≥1:200, РНГА, ПЦР."}, {"num": 8, "text": "Типы температурных кривых при брюшном тифе", "answer": "1) Вундерлиха — подъём 1 нед, плато 2 нед, снижение 1 нед; 2) Боткинская — быстрый подъём + волны; 3) Кильдюшевского — неправильная ремиттирующая; 4) Рецидивирующая. Относительная брадикардия — ЧСС отстаёт от t°."}, {"num": 9, "text": "Дифференциальная диагностика брюшного тифа", "answer": "От: 1) Паратиф А/В — острее; 2) Сепсис — озноб, очаг; 3) Малярия — пароксизмы; 4) Лептоспироз — желтуха, миалгии, ОПН; 5) Бруцеллёз — скот, полиартрит; 6) ИМ; 7) Грипп — острое начало; 8) Лимфогранулематоз."}, {"num": 10, "text": "Лечение и профилактика брюшного тифа", "answer": "Лечение: ципрофлоксацин 500 мг х2, 10–14 дн; дезинтоксикация; диета №4; постельный режим. Профилактика: санитарный контроль воды/пищи, контроль носителей, вакцинация, дезинфекция выделений, наблюдение контактных 25 дней."}, {"num": 11, "text": "Этиология, эпидемиология гепатита А", "answer": "HAV (Picornaviridae, РНК). Источник: больной (заразен за 2 нед до и 2 нед после желтухи). Механизм: фекально-оральный. Инкубация: 15–50 дней. Иммунитет пожизненный. Вакцинация: 2 дозы."}, {"num": 12, "text": "Этиология, эпидемиология гепатита В", "answer": "HBV (Hepadnaviridae, ДНК). Источник: больной, носитель. Парентеральный (кровь, половой, вертикальный). Инкубация: 60–180 дней. Хронизация: 10% взрослых, 90% новорождённых. Маркёры: HBsAg, анти-HBc IgM. Вакцинация: 0, 1, 6 мес."}, {"num": 13, "text": "Патогенез гепатита А", "answer": "HAV → ЖКТ → гепатоциты → репликация → иммуноопосредованный цитолиз (T-клетки) → АЛТ ↑ → нарушение конъюгации билирубина → желтуха при поражении >80% гепатоцитов. Исход: полное выздоровление, хронизации нет."}, {"num": 14, "text": "Патогенез гепатита В", "answer": "HBV → кровь → гепатоциты → репликация (не цитопатогенный) → иммунный ответ (CTL) → цитолиз; иммунокомплексный — артралгии; хронизация при иммунодефиците; HBsAg → интеграция → ГЦК. HDV только с HBV."}, {"num": 15, "text": "Клиника преджелтушного периода гепатита А", "answer": "7–14 дней. Гриппоподобный вариант (самый частый): лихорадка, катар. Диспептический: тошнота, рвота, боли в правом подреберье. К концу: тёмная моча, обесцвеченный кал, зуд, увеличение печени."}, {"num": 16, "text": "Клиника преджелтушного периода гепатита В", "answer": "2–4 нед. Артралгический (сывороточная болезнь): боли в суставах, высыпания (крапивница — иммунокомплексная). Астеновегетативный. Температура субфебрильная. Желтуха постепенная."}, {"num": 17, "text": "Клиника желтушного периода гепатита А", "answer": "2–4 нед. Желтуха нарастает 7–14 дней. Иктеричность кожи/склер; тёмная моча; обесцвеченный кал; гепатоспленомегалия; кожный зуд; улучшение самочувствия с желтухой; АЛТ, АСТ ↑ в 10–100 раз."}, {"num": 18, "text": "Клиника желтушного периода гепатита В", "answer": "4–6 нед. Нарастающая желтуха; выраженная слабость, анорексия; гепатомегалия; тёмная моча; интоксикация нарастает (в отличие от ГА); геморрагии при тяжёлой форме; АЛТ > АСТ. ОПЭ — молниеносная форма."}, {"num": 19, "text": "Ранняя дифференциальная диагностика вирусных гепатитов", "answer": "В преджелтушном периоде от: грипп/ОРВИ (катар, нет гепатомегалии), лептоспироз (миалгии, ОПН), сепсис, ИМ. Маркёры: анти-HAV IgM, HBsAg + анти-HBc IgM, анти-HCV. АЛТ ↑ уже в преджелтушном."}, {"num": 20, "text": "Гепатиты с надпечёночной желтухой (дифдиагноз)", "answer": "Надпечёночная (гемолитическая): анемия, непрямой билирубин ↑, АЛТ норма, стул тёмный (стеркобилин↑), моча тёмная (уробилин, нет билирубина), спленомегалия, ретикулоцитоз. Причины: гемолиз, малярия, несовместимые гемотрансфузии."}, {"num": 21, "text": "Правила взятия крови при вирусных гепатитах", "answer": "Натощак (12 ч); венозная кровь в сухую пробирку; не трясти; центрифугировать 10 мин; сыворотку заморозить при транспортировке. Показатели: АЛТ, АСТ, ГГТ, ЩФ, общий и прямой билирубин, ПТИ, альбумин."}, {"num": 22, "text": "Гепатиты с подпечёночной желтухой (дифдиагноз)", "answer": "Подпечёночная (механическая): прямой билирубин ↑, кал обесцвечен, моча тёмная (билирубинурия), ЩФ резко ↑, АЛТ умеренно, КТ/УЗИ — расширение протоков. Причины: ЖКБ, рак поджелудочной, стриктуры."}, {"num": 23, "text": "Осложнения вирусных гепатитов", "answer": "Острые: ОПЭ, ОПН, геморрагический синдром, ОПН. Хронические (ГВ, ГС, ГД): хронический гепатит, цирроз, ГЦК. Внепечёночные (ГВ): гломерулонефрит, полиартериит."}, {"num": 24, "text": "Клиника острой печёночной энцефалопатии", "answer": "I — эйфория/депрессия, нарушение сна; II — заторможенность, астериксис, дезориентация; III — сопор, непроизвольное мочеиспускание; IV — кома. Лаборатория: билирубин ↑, ПТИ ↓, альбумин ↓, аммиак ↑."}, {"num": 25, "text": "Принципы лечения вирусных гепатитов", "answer": "Базисная: постельный режим, диета №5, питьё. Патогенетическая: дезинтоксикация, урсодезоксихолевая к-та, витамины. Этиотропная: ГВ — тенофовир/энтекавир; ГС — даклатасвир+софосбувир; ГА — нет. ОПЭ: лактулоза, рифаксимин, плазмаферез."}, {"num": 26, "text": "Методы диагностики вирусных гепатитов", "answer": "Серология: анти-HAV IgM, HBsAg, HBeAg, анти-HBc IgM, анти-HCV. Молекулярные: ПЦР (генотип, нагрузка). Биохимия: АЛТ, АСТ, билирубин, ПТИ, альбумин. Инструментальные: УЗИ, фиброскан, биопсия."}, {"num": 27, "text": "Клиническая классификация дизентерии", "answer": "По возбудителю: Shigella dysenteriae, flexneri, sonnei. По тяжести: лёгкая, средняя, тяжёлая. По течению: острая <1 мес, затяжная 1–3 мес, хроническая >3 мес. Формы: колитическая, гастроэнтероколитическая."}, {"num": 28, "text": "Этиология и патогенез дизентерии", "answer": "Shigella spp. Фекально-оральный. Шигеллы → толстая кишка → инвазия энтероцитов → цитотоксины → воспаление; шига-токсин (S. dysenteriae 1) → ГУС. Поражение: сигмовидная и прямая кишка."}, {"num": 29, "text": "Симптомы колитической острой дизентерии", "answer": "1) Острое начало; 2) Лихорадка 38–39°С; 3) Схваткообразные боли слева; 4) Тенезмы; 5) Стул 'ректальный плевок' — слизь+кровь, скудный; 6) Стул 10–30 р/сут; 7) Спазм сигмовидной; 8) Интоксикация."}, {"num": 30, "text": "Клиника и течение острой дизентерии", "answer": "Инкубация 1–7 дней. Острое начало. 5–7 дней лёгкая, до 3 нед тяжёлая. Лихорадка + боли + тенезмы + слизь/кровь. Тяжёлая: ИТШ, нейротоксикоз. Лаборатория: лейкоцитоз; бакпосев — Shigella."}, {"num": 31, "text": "Клиника хронической дизентерии", "answer": ">3 мес. Рецидивирующая или непрерывная. Периодические боли, жидкий стул 3–5 р/сут, снижение аппетита, похудание, мальабсорбция, астения. Ректороманоскопия: атрофические изменения."}, {"num": 32, "text": "Лечение и профилактика дизентерии", "answer": "Лечение: ципрофлоксацин 500 мг х2, 5 дн; регидратация; диета №4; пробиотики; спазмолитики. Профилактика: санитарный контроль, мытьё рук, дезинфекция, изоляция."}, {"num": 33, "text": "Этиология, эпидемиология холеры", "answer": "V. cholerae O1/O139 (Гр−, запятая). Биовары: классический, Эль-Тор. Источник: больной/носитель. Механизм: фекально-оральный (водный — основной). Инкубация: часы–5 дней. Особо опасная, карантинная."}, {"num": 34, "text": "Патогенез холеры", "answer": "V. cholerae → тонкая кишка → холерный токсин (CT) → GM1 → аденилатциклаза → цАМФ ↑ → гиперсекреция Cl−/H₂O → профузная диарея. Нет воспаления. Обезвоживание → гипокалиемия, ацидоз → шок → ОПН. Стул 'рисовый отвар'."}, {"num": 35, "text": "Клиника холеры. Ранние симптомы", "answer": "Без лихорадки. 1) Водянистая диарея без болей ('рисовый отвар'); 2) Рвота фонтаном без тошноты; 3) Быстрое обезвоживание; 4) Судороги (гипокалиемия); 5) Сухость, 'руки прачки'; 6) Цианоз, анурия. Степени I–IV (потеря до >10%). t° норма или снижена."}, {"num": 36, "text": "Ранняя дифдиагностика холеры", "answer": "От: ПТИ (интоксикация, рвота сначала), сальмонеллёз (лихорадка, зелёный стул), дизентерия (тенезмы, кровь), ротавирус (дети, катар). Решает: бакпосев — V. cholerae, серология, ПЦР."}, {"num": 37, "text": "Лечение и профилактика холеры", "answer": "Лечение: регидратация (оральная I–II, в/в III–IV — трисоль); доксициклин 300 мг однократно или ципрофлоксацин 1 г. Профилактика: кипячение воды, вакцина (Дюкорал), санитарный контроль, карантин; контактным — доксициклин."}, {"num": 38, "text": "Этиология, эпидемиология сальмонеллёза", "answer": "Salmonella (typhimurium, enteritidis). Источник: птица, яйца. Фекально-оральный (пищевой — основной). Инкубация: 2–72 ч (в среднем 12–24). Зооноз."}, {"num": 39, "text": "Клиническая классификация сальмонеллёза", "answer": "1) Гастроинтестинальная (гастрит, гастроэнтерит, гастроэнтероколит); 2) Генерализованная (тифоподобная,
