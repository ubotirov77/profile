mmunitet/yallig'lanish: bostiradi (yallig'lanishga qarshi);\n5) Suyak: osteoporozga olib keladi;\n6) Qon: neytrofiliya, eozinopeniya, limfopeniya;\n7) Stress gormoni — organizmni zo'riqishga moslaydi."}, {"num": 77, "text": "Mineralokortikoidlarning vazifalari", "answer": "Asosiy mineralokortikoid — aldosteron (renin-angiotenzin tizimi boshqaradi).\nVazifalari:\n1) Buyrak distal naychasida Na⁺ qayta so'rilishini oshiradi, K⁺ va H⁺ chiqarilishini kuchaytiradi;\n2) Na⁺ ushlanishi → suv ushlanishi → qon hajmi va bosimi ↑;\n3) Qonda kaliyni kamaytiradi (gipokaliemiya).\nBoshqaruvchi omillar: angiotenzin II va qonda kaliy darajasi."}, {"num": 78, "text": "Konn sindromi etiologiyasi va patogenezi", "answer": "Konn sindromi — birlamchi giperaldosteronizm.\nEtiologiya: aldosteron ishlab chiqaruvchi adenoma (~60%), ikki tomonlama buyrak usti giperplaziyasi (~35%).\nPatogenez: aldosteron ↑ (angiotenzin/AKTG ga bog'liq bo'lmagan holda) → Na⁺ ushlanishi va K⁺ yo'qotilishi → qon hajmi ↑ → arterial gipertenziya + gipokaliemiya.\nRenin esa teskari aloqa orqali pasayadi (renin past, aldosteron yuqori)."}, {"num": 79, "text": "Konn sindromi klinik ko'rinishi va davolash", "answer": "Klinika: davolashga chidamli arterial gipertenziya; gipokaliemiya belgilari — mushak kuchsizligi, falaj, paresteziya, tetaniya, poliuriya, nikturiya.\nEKG: U to'lqini, QT cho'zilishi.\nDiagnostika: aldosteron/renin nisbati oshgan, KT bilan buyrak usti bezini ko'rish.\nDavolash:\n- Adenoma → adrenalektomiya (jarrohlik);\n- Giperplaziya → spironolakton (aldosteron antagonisti)."}, {"num": 80, "text": "Feoxromotsitoma belgilari", "answer": "Feoxromotsitoma — buyrak usti mag'iz qatlami o'smasi, katexolaminlar (adrenalin/noradrenalin) ishlab chiqaradi.\nKlinika:\n- Gipertenziv krizlar — to'satdan bosh og'rig'i, terlash, yurak tez urishi, titroq (klassik triada);\n- Rangparlik yoki qizarish;\n- Vahima xurujlari (panik);\n- Giperglikemiya.\nKrizni qo'zg'atuvchilar: bosim o'tkazish, narkoz, ayrim dorilar."}, {"num": 81, "text": "Feoxromotsitoma diagnostikasi", "answer": "1) 24 soatlik siydikda metanefrinlar va normetanefrinlar — eng sezgir;\n2) Plazmada erkin metanefrinlar — skrining;\n3) Buyrak usti KT/MRT — o'smani topish;\n4) 123I-MIBG ssintigrafiyasi — o'choq va metastazlar;\n5) PET-KT;\n6) Genetik tekshiruv: VHL, RET, SDHB mutatsiyalari (irsiy shakllar).\nLaboratoriya tasdiqlangach, joylashuvi vizualizatsiya bilan aniqlanadi."}, {"num": 82, "text": "Feoxromotsitoma davolash tamoyillari", "answer": "1) Operatsiyadan oldin 7–14 kun alfa-blokator (doksazosin, feneoksibenzamin) — gipertenziv krizning oldini olish uchun;\n2) So'ngra beta-blokator (faqat alfa-blokadadan keyin!);\n3) Hidratatsiya (suyuqlik bilan to'ldirish);\n4) Laparoskopik adrenalektomiya — asosiy davo;\n5) Metastatik holatda — MIBG terapiyasi, ximioterapiya.\nTartib muhim: avval alfa, keyin beta-blokada."}, {"num": 83, "text": "Buyrak usti bezlarining surunkali yetishmovchiligi: etiologiya, klinika, davolash", "answer": "Etiologiya: birlamchi (Addison) — autoimmun (~70%), sil; ikkilamchi — gipofiz yetishmovchiligi, steroidni to'satdan to'xtatish.\nKlinika: charchoq, gipotenziya, terining qorayishi (giperpigmentatsiya — birlamchida), giponatremiya, giperkaliemiya, gipoglikemiya, sho'r ishtahasi.\nDavolash: gidrokortizon 15–25 mg/kun (glyukokortikoid o'rnini bosish); birlamchida fludrokortizon (mineralokortikoid)."}, {"num": 84, "text": "Addison kasalligining klinik belgilari", "answer": "1) Charchoq, holsizlik;\n2) Giperpigmentatsiya — qo'l burmalarida, lablar va milkda terining qorayishi (AKTG ko'pligidan);\n3) Anoreksiya, qorin og'rig'i;\n4) Vazn yo'qotish;\n5) Ortostatik gipotenziya;\n6) Sho'r taomga ishtaha;\n7) Giponatremiya, giperkaliemiya, gipoglikemiya;\n8) Depressiya, apatiya.\nGiperpigmentatsiya — birlamchi (Addison) yetishmovchilik uchun xarakterli."}, {"num": 85, "text": "O'tkir buyrak usti bezi yetishmovchiligi (Addison krizi)", "answer": "Triggerlar: infeksiya, jarrohlik, travma, steroidni keskin to'xtatish.\nKlinika: qon bosimining keskin tushishi (kollaps), qorin og'rig'i, qusish, gipoglikemiya, ong buzilishi, koma.\nShoshilinch yordam:\n1) Gidrokortizon 100 mg vena ichiga, keyin 200–400 mg/kun;\n2) 0.9% NaCl + glyukoza infuziyasi (suvsizlanish va gipoglikemiyaga qarshi);\n3) Sababiy omilni davolash.\nHayot uchun o'ta xavfli, tez yordam talab qiladigan holat."}, {"num": 86, "text": "Gipokortisizmga xos alomatlar", "answer": "1) Charchoq, holsizlik;\n2) Ortostatik gipotenziya;\n3) Giponatremiya;\n4) Giperkaliemiya;\n5) Gipoglikemiya;\n6) Anoreksiya, ozish;\n7) Qorin og'rig'i;\n8) Melanodermiya (terining qorayishi — birlamchida);\n9) Eozinofiliya;\n10) Stressga javob bera olmaslik.\nBu belgilar kortizol (va aldosteron) yetishmovchiligi natijasidir."}, {"num": 87, "text": "Giperkortisizm belgilari", "answer": "1) \"Oysimon\" yuz;\n2) Markaziy (qorin) semizlik, \"bizon o'rkachi\";\n3) Qizil-binafsha striyalar;\n4) Teri yupqalashishi, oson ko'karish;\n5) Mushak atrofiyasi va kuchsizligi;\n6) Osteoporoz;\n7) Arterial gipertenziya;\n8) Giperglikemiya (steroidli diabet);\n9) Ayollarda girsutizm;\n10) Psixoz, depressiya;\n11) Immunosupressiya (infeksiyalarga moyillik)."}, {"num": 88, "text": "Itsenko-Kushing kasalligi va sindromi qiyosiy diagnostikasi", "answer": "Kushing kasalligi (gipofiz AKTG-adenomasi): AKTG ↑, kortizol ↑, ikki tomonlama buyrak usti giperplaziyasi.\nBirlamchi buyrak usti (adenoma/rak): kortizol ↑, AKTG ↓ (bostirilgan).\nEktopik AKTG sindromi (o'pka raki va b.): AKTG ↑↑, kortizol ↑↑.\nTestlar: kechki kortizol, 1 mg deksametazon testi (skrining), 8 mg deksametazon testi (manbani aniqlash), gipofiz MRT, buyrak usti KT."}, {"num": 89, "text": "Birlamchi va ikkilamchi giperparatireoz farqi", "answer": "Birlamchi: paratireoid bezi adenomasi → PTG ↑ → Ca²⁺ ↑, fosfat ↓.\nIkkilamchi: surunkali buyrak yetishmovchiligi yoki D vitamini tanqisligi → Ca²⁺ ↓ → kompensator PTG ↑, ammo Ca²⁺ normal yoki past.\nUchlamchi: uzoq davom etgan ikkilamchidan keyin bezlar mustaqil ishlay boshlaydi → PTG ↑ va Ca²⁺ ham ↑.\nKalsiy darajasi asosiy farqlovchi mezon."}, {"num": 90, "text": "Itsenko-Kushing sindromi: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: gipofiz AKTG-adenomasi (~70%), buyrak usti adenomasi (~20%), ektopik AKTG (~10%), iatrogen (steroid qabuli).\nPatogenez: ortiqcha kortizol → giperkortisizm sindromi.\nKlinika: oysimon yuz, markaziy semizlik, striyalar, gipertenziya, giperglikemiya, osteoporoz, mushak kuchsizligi.\nDiagnostika: tungi kortizol, 1 mg deksametazon testi, sutkalik siydik kortizoli, AKTG, KT/MRT.\nDavolash: transsfenoidal operatsiya (kasallikda), adrenalektomiya (buyrak usti shaklida), ketokonazol (kortizol sintezini bloklaydi)."}]}, {"id": "inf", "name": "Infeksion kasalliklar", "icon": "🦠", "count": 72, "questions": [{"num": 1, "text": "Yuqumli kasalliklar haqida umumiy tushuncha", "answer": "Yuqumli (infeksion) kasalliklar patogen mikroorganizmlar (bakteriya, virus, zamburug', protozoa) ta'sirida kelib chiqadi.\nAsosiy xususiyatlari:\n1) Aniq qo'zg'atuvchining (etiologik omilning) borligi;\n2) Yuqumlilik (kontagiozlik);\n3) Sikllilik — bosqichli kechish: inkubatsiya → prodromal davr → avj olish → sog'ayish (rekonvalessensiya);\n4) Kasallikdan keyin immunitet shakllanishi.\nEpidemik jarayon uch bo'g'indan iborat: infeksiya manbai → yuqish mexanizmi → ta'sirchan (qabul qiluvchi) organizm."}, {"num": 2, "text": "Infeksion jarayonning rivojlanish bosqichlari", "answer": "Infeksion jarayon bosqichlari:\n1) Adgeziya — mikrobning to'qima yuzasiga yopishishi;\n2) Invaziya — to'qimaga kirib borishi;\n3) Kolonizatsiya — ko'payishi;\n4) Disseminatsiya — tarqalishi (qon va limfa orqali);\n5) Zararlanish — toksinlar va immun reaksiyalar tufayli to'qima shikastlanishi.\nKasallikning og'irligi qo'zg'atuvchining virulentligi, yuqtirilgan miqdori (dozasi), kirish darvozasi va organizm immunitetiga bog'liq."}, {"num": 3, "text": "Qorin tifi patogenezi", "answer": "S. typhi → og'iz orqali → ingichka ichak → Peyer pristalari (limfoid to'qima) → mezenterial limfa tugunlari (birlamchi bakteriemiya) → makrofaglar ichida ko'payadi → umumiy (generalizatsiyalangan) bakteriemiya → parenximatoz a'zolarga (jigar, taloq, suyak ko'migi) tarqaladi → ichakka qayta ajraladi → Peyer pristalarida nekroz → yaralar hosil bo'lishi → asoratlar (qon ketish, perforatsiya).\nDavri 4 hafta: har haftaning o'z patogenetik bosqichi bor."}, {"num": 4, "text": "Qorin tifining klinik tasnifi", "answer": "Og'irligi bo'yicha: yengil, o'rta, og'ir.\nKechishi bo'yicha: tipik; atipik (abortiv — qisqargan, yengil; o'chgan — kam belgili).\nNoyob shakllar: pnevmotif (o'pka belgilari ustun), meningotif (meningeal belgilar bilan).\nAsoratlari bo'yicha: ichak qon ketishi, ichak perforatsiyasi, infeksion-toksik shok (ITSh).\nBakteriya tashuvchanlik: o'tkir (<3 oy), surunkali (>3 oy)."}, {"num": 5, "text": "Qorin tifining boshlang'ich davri simptomlari", "answer": "1–7 kun (boshlang'ich davr):\n- Sekin-asta boshlanish;\n- Bosqichma-bosqich ko'tariluvchi isitma (Vunderlix \"zinapoyasimon\" egri chizig'i);\n- Kuchayib boruvchi bosh og'rig'i, holsizlik, adinamiya (harakatsizlik);\n- Uyqusizlik, ishtaha pasayishi;\n- Nisbiy bradikardiya (isitmaga nisbatan puls sekin);\n- Til oq qoplam bilan qoplanadi, chetlari toza;\n- Jigar va taloq kattalashishi boshlanadi."}, {"num": 6, "text": "Qorin tifining avj olish davri klinikasi", "answer": "7–21 kun (avj davri):\n- Yuqori, doimiy isitma 39–40°C;\n- Tifoz status — ong xiralashuvi, alahsirash, loqaydlik;\n- Rozeolyoz toshma — 8–10-kuni ko'krak va qorinda (bir nechta, oqaradigan dog'lar);\n- Nisbiy bradikardiya, dikrotiya (puls ikki to'lqinli);\n- Jigar va taloq kattalashgan;\n- Padalka simptomi (o'ng yonbosh sohasida bo'g'iq tovush);\n- Qabziyat, keyin meteorizm (qorin dam bo'lishi)."}, {"num": 7, "text": "Qorin tifining tayanch va hal qiluvchi simptomlari", "answer": "Tayanch (klinik) belgilar: sekin boshlanish, tifoz status, rozeolyoz toshma, nisbiy bradikardiya, jigar va taloq kattalashishi.\nHal qiluvchi (laboratoriya) belgilar:\n- Gemokultura — qon ekmasi (1–10-kuni eng samarali);\n- Miyelokultura — suyak ko'migi ekmasi (eng sezgir);\n- Vidal agglyutinatsiya reaksiyasi ≥1:200;\n- RNGA (passiv gemagglyutinatsiya);\n- PSR (PCR) — qo'zg'atuvchi DNK ni aniqlash."}, {"num": 8, "text": "Qorin tifida harorat egri chiziqlari turlari", "answer": "1) Vunderlix turi — 1-hafta ko'tariladi, 2-hafta plato (doimiy yuqori), 3-hafta pasayadi;\n2) Botkin turi — tez ko'tarilib, to'lqinsimon kechadi;\n3) Kildyushevskiy turi — notekis (remittiruyuvchi);\n4) Retsidivlovchi tur.\nXarakterli belgi — nisbiy bradikardiya: harorat yuqori bo'lsa ham puls undan orqada qoladi (isitmaning har 1°C ko'tarilishiga puls kam mos keladi)."}, {"num": 9, "text": "Qorin tifining qiyosiy (differensial) diagnostikasi", "answer": "Farqlash kerak:\n1) Paratif A/B — o'tkirroq boshlanadi;\n2) Sepsis — qaltirash, yiringli o'choq;\n3) Bezgak — tipik xurujlar (paroksizmlar);\n4) Leptospiroz — sariqlik, mushak og'rig'i, buyrak yetishmovchiligi;\n5) Brutsellyoz — chorva bilan aloqa, poliartrit;\n6) Sil (miliar);\n7) Gripp — o'tkir boshlanish;\n8) Limfogranulematoz (limfoma)."}, {"num": 10, "text": "Qorin tifini davolash va profilaktikasi", "answer": "Davolash:\n- Etiotrop: siprofloksatsin 500 mg kuniga 2 mahal, 10–14 kun (yoki seftriakson);\n- Dezintoksikatsiya (infuzion terapiya);\n- Parhez №4, qattiq yotoq tartibi (perforatsiya xavfi tufayli).\nProfilaktika:\n- Suv va oziq-ovqat sanitar nazorati;\n- Bakteriya tashuvchilarni aniqlash va nazorat qilish;\n- Vaksinatsiya;\n- Ajralmalarni dezinfeksiya qilish;\n- Kontaktdagilarni 25 kun kuzatish."}, {"num": 11, "text": "A gepatiti etiologiyasi va epidemiologiyasi", "answer": "Qo'zg'atuvchi: HAV (Picornaviridae oilasi, RNK-virus).\nManba: kasal odam (sariqlik chiqishidan 2 hafta oldin va 2 hafta keyin yuqumli).\nYuqish mexanizmi: fekal-oral (iflos suv, ovqat, qo'l orqali).\nInkubatsiya davri: 15–50 kun.\nKechishi: ko'pincha yengil, surunkalanmaydi.\nImmunitet: umrbod.\nProfilaktika: vaksina (2 doza), gigiyena, toza suv."}, {"num": 12, "text": "B gepatiti etiologiyasi va epidemiologiyasi", "answer": "Qo'zg'atuvchi: HBV (Hepadnaviridae oilasi, DNK-virus).\nManba: kasal odam va virus tashuvchi.\nYuqish: parenteral — qon orqali, jinsiy aloqa, vertikal (onadan bolaga).\nInkubatsiya: 60–180 kun.\nSurunkalanish: kattalarda ~10%, yangi tug'ilganlarda ~90%.\nMarkerlar: HBsAg, anti-HBc IgM.\nVaksinatsiya: 0, 1, 6 oy sxemasi bo'yicha."}, {"num": 13, "text": "A gepatiti patogenezi", "answer": "HAV → me'da-ichak yo'li → jigar hujayralari (gepatotsitlar) → ko'payish → immun (T-hujayralar) vositali sitoliz → ALT ko'tariladi → bilirubin konyugatsiyasi buziladi → gepatotsitlarning >80% zararlanganda sariqlik paydo bo'ladi.\nVirusning o'zi gepatotsitni to'g'ridan-to'g'ri o'ldirmaydi, asosiy zarar immun javobdan.\nOqibati: to'liq sog'ayish, surunkalanish yo'q."}, {"num": 14, "text": "B gepatiti patogenezi", "answer": "HBV → qon → gepatotsitlar → ko'payish (virus sitopatogen emas) → sitotoksik T-limfotsitlar javobi → gepatotsitlar sitolizi.\nImmunokompleks mexanizmi — artralgiya, toshma, glomerulonefrit.\nSurunkalanish — immuniteti zaif odamlarda.\nHBsAg ning genomga integratsiyasi → uzoq muddatda gepatotsellyulyar karsinoma (jigar raki) xavfi.\nHDV (D gepatiti) faqat HBV bilan birga rivojlanadi."}, {"num": 15, "text": "A gepatitining sariqlikgacha bo'lgan davri klinikasi", "answer": "7–14 kun. Variantlar:\n1) Grippsimon (eng ko'p) — isitma, kataral belgilar;\n2) Dispeptik — ko'ngil aynishi, qusish, o'ng qovurg'a osti og'rig'i;\n3) Astenovegetativ — holsizlik, charchoq.\nDavr oxirida: siydik to'qlashadi, najas rangsizlanadi, teri qichishi paydo bo'ladi, jigar kattalashadi. Aynan shu davrda ALT allaqachon ko'tarilgan bo'ladi."}, {"num": 16, "text": "B gepatitining sariqlikgacha bo'lgan davri klinikasi", "answer": "2–4 hafta. Variantlar:\n1) Artralgik (zardob kasalligiga o'xshash) — bo'g'im og'riqlari, eshakyem (krapivnitsa) — immunokompleks mexanizmi;\n2) Astenovegetativ — holsizlik.\nHarorat odatda subfebril.\nSariqlik sekin-asta rivojlanadi.\nA gepatitidan farqli o'laroq, kataral belgilar kam, intoksikatsiya kuchliroq."}, {"num": 17, "text": "A gepatitining sariqlik davri klinikasi", "answer": "2–4 hafta. Sariqlik 7–14 kun davomida kuchayadi:\n- Teri va sklera sarg'ayishi (ikteriklik);\n- Siydik to'q (\"pivo\" rangida);\n- Najas oqargan (axoliya);\n- Jigar va taloq kattalashishi;\n- Teri qichishi.\nXarakterli: sariqlik paydo bo'lishi bilan bemorning ahvoli yaxshilanadi.\nLaboratoriya: ALT va AST 10–100 baravar oshadi."}, {"num": 18, "text": "B gepatitining sariqlik davri klinikasi", "answer": "4–6 hafta. Belgilar:\n- Kuchayib boruvchi sariqlik;\n- Yaqqol holsizlik, ishtahasizlik;\n- Jigar kattalashishi;\n- Siydik to'qlashishi.\nA gepatitidan farqli: sariqlik paydo bo'lgach ham intoksikatsiya kamaymaydi, balki kuchayadi.\nOg'ir shaklda — gemorragik (qon ketish) sindromi.\nALT > AST. Eng og'ir asorat — o'tkir jigar ensefalopatiyasi (chaqmoqsimon shakl)."}, {"num": 19, "text": "Virusli gepatitlarning erta qiyosiy diagnostikasi", "answer": "Sariqlikgacha bo'lgan davrda farqlash kerak:\n- Gripp/ORVI — kataral belgilar, jigar kattalashmaydi;\n- Leptospiroz — mushak og'riqlari, buyrak yetishmovchiligi;\n- Sepsis, o'tkir holesitsit.\nHal qiluvchi markerlar: anti-HAV IgM, HBsAg + anti-HBc IgM, anti-HCV.\nMuhim: ALT sariqlikgacha bo'lgan davrda allaqachon oshgan bo'ladi — bu erta tashxis uchun qimmatli."}, {"num": 20, "text": "Bavar (gemolitik) sariqlik bilan qiyoslash", "answer": "Bavar (jigar usti, gemolitik) sariqlik:\n- Anemiya;\n- Bog'lanmagan (bilvosita) bilirubin oshgan;\n- ALT normal;\n- Najas to'q (sterkobilin ko'p);\n- Siydik to'q (urobilin ko'p, ammo bilirubin yo'q);\n- Taloq kattalashishi, retikulotsitoz.\nSabablari: gemoliz, bezgak, mos kelmaydigan qon quyilish.\nGepatitdan farqi — jigar funksiyasi va ALT normal, asosiy muammo eritrotsitlar parchalanishi."}, {"num": 21, "text": "Virusli gepatitlarda qon olish qoidalari", "answer": "- Nahorda (12 soat och);\n- Vena qonini quruq probirkaga olish;\n- Probirkani chayqamaslik (gemoliz bo'lmasligi uchun);\n- 10 daqiqa sentrifugalash;\n- Tashishda zardobni muzlatish.\nAniqlanadigan ko'rsatkichlar: ALT, AST, GGT, ishqoriy fosfataza (ISHF), umumiy va to'g'ri bilirubin, protrombin indeksi (PTI), albumin."}, {"num": 22, "text": "Mexanik (jigar osti) sariqlik bilan qiyoslash", "answer": "Jigar osti (mexanik, obstruktiv) sariqlik:\n- To'g'ri (bog'langan) bilirubin oshgan;\n- Najas rangsiz (axoliya);\n- Siydik to'q (bilirubinuriya);\n- Ishqoriy fosfataza keskin oshgan;\n- ALT mo''tadil oshgan;\n- KT/UST da o't yo'llari kengaygan.\nSabablari: o't-tosh kasalligi, oshqozonosti bezi raki, chandiqli torayishlar.\nGepatitdan farqi — o't oqimi to'silgan, ISHF dominant oshadi."}, {"num": 23, "text": "Virusli gepatitlarning asoratlari", "answer": "O'tkir asoratlar:\n- O'tkir jigar ensefalopatiyasi (OJE);\n- O'tkir buyrak yetishmovchiligi;\n- Gemorragik sindrom.\nSurunkali asoratlar (B, C, D gepatitlarida):\n- Surunkali gepatit;\n- Jigar sirrozi;\n- Gepatotsellyulyar karsinoma (jigar raki).\nJigardan tashqari asoratlar (B): glomerulonefrit, tugunchali poliarteriit."}, {"num": 24, "text": "O'tkir jigar ensefalopatiyasi klinikasi", "answer": "Bosqichlar:\nI — evforiya yoki depressiya, uyqu buzilishi;\nII — loqaydlik, dezorientatsiya, asteriksis (\"qanot qoqish\" tremori);\nIII — sopor, beixtiyor siyish;\nIV — koma.\nLaboratoriya: bilirubin oshgan, protrombin indeksi pasaygan, albumin pasaygan, ammiak (qonda) oshgan.\nBu — jigar yetishmovchiligining og'ir, hayot uchun xavfli ko'rinishi."}, {"num": 25, "text": "Virusli gepatitlarni davolash tamoyillari", "answer": "Bazis: yotoq tartibi, parhez №5, ko'p suyuqlik.\nPatogenetik: dezintoksikatsiya, ursodezoksixol kislotasi, vitaminlar.\nEtiotrop:\n- B gepatiti — tenofovir/entekavir;\n- C gepatiti — to'g'ridan-to'g'ri ta'sir qiluvchilar (daklatasvir + sofosbuvir);\n- A gepatiti — maxsus etiotrop davo yo'q.\nJigar ensefalopatiyasida: laktuloza, rifaksimin, plazmaferez."}, {"num": 26, "text": "Virusli gepatitlar diagnostika usullari", "answer": "Serologiya: anti-HAV IgM, HBsAg, HBeAg, anti-HBc IgM, anti-HCV.\nMolekulyar: PSR (PCR) — virus genotipi va yuki (virusologik nagruzka).\nBiokimyo: ALT, AST, bilirubin, protrombin indeksi, albumin.\nInstrumental: UST, fibroskan (jigar fibrozi darajasi), jigar biopsiyasi (zarurat bo'lsa)."}, {"num": 27, "text": "Dizenteriya klinik tasnifi", "answer": "Qo'zg'atuvchi bo'yicha: Shigella dysenteriae, flexneri, sonnei.\nOg'irligi bo'yicha: yengil, o'rta, og'ir.\nKechishi bo'yicha: o'tkir (<1 oy), cho'zilgan (1–3 oy), surunkali (>3 oy).\nKlinik shakllari: kolitik (yo'g'on ichak ustun), gastroenterokolitik.\nDizenteriya asosan distal yo'g'on ichakni (sigma va to'g'ri ichak) zararlaydi."}, {"num": 28, "text": "Dizenteriya etiologiyasi va patogenezi", "answer": "Qo'zg'atuvchi: Shigella turlari. Yuqishi: fekal-oral.\nPatogenez: shigellalar → yo'g'on ichak → enterotsitlarga invaziya → sitotoksinlar → yallig'lanish, yaralanish.\nShiga-toksin (S. dysenteriae 1 turi) → gemolitik-uremik sindrom (GUS) chaqirishi mumkin.\nZararlanish joyi: sigmasimon va to'g'ri ichak (distal kolit)."}, {"num": 29, "text": "Kolitik o'tkir dizenteriya simptomlari", "answer": "1) O'tkir boshlanish;\n2) Isitma 38–39°C;\n3) Chap yonbosh sohada tutqanoqsimon og'riq (spazm);\n4) Tenezmlar — og'riqli, yolg'on ich kelishi istagi;\n5) Najas \"rektal tupurik\" ko'rinishida — kam miqdorda shilliq + qon;\n6) Najas kuniga 10–30 marta;\n7) Sigmasimon ichak spazmi (paypaslaganda);\n8) Intoksikatsiya."}, {"num": 30, "text": "O'tkir dizenteriya klinikasi va kechishi", "answer": "Inkubatsiya 1–7 kun. O'tkir boshlanadi.\nYengil shakl 5–7 kun, og'iri 3 haftagacha cho'ziladi.\nAsosiy belgilar: isitma + chap yonbosh og'riq + tenezmlar + shilliq-qonli najas.\nOg'ir shakl: infeksion-toksik shok, neyrotoksikoz (ayniqsa bolalarda).\nLaboratoriya: leykotsitoz; najas bakteriologik ekmasida Shigella aniqlanadi."}, {"num": 31, "text": "Surunkali dizenteriya klinikasi", "answer": "3 oydan ortiq davom etadi. Retsidivlovchi yoki uzluksiz kechadi.\nBelgilar: davriy qorin og'riqlari, suyuq najas kuniga 3–5 marta, ishtaha pasayishi, ozish, malabsorbsiya (so'rilishning buzilishi), asteniya (holsizlik).\nRektoromanoskopiyada: ichak shilliq qavatida atrofik o'zgarishlar."}, {"num": 32, "text": "Dizenteriyani davolash va profilaktikasi", "answer": "Davolash:\n- Siprofloksatsin 500 mg kuniga 2 mahal, 5 kun;\n- Regidratatsiya (suyuqlik o'rnini to'ldirish);\n- Parhez №4;\n- Probiotiklar;\n- Spazmolitiklar (og'riqqa qarshi).\nProfilaktika: sanitar nazorat, qo'lni yuvish, dezinfeksiya, kasalni izolyatsiya qilish, suv va oziq-ovqat xavfsizligi."}, {"num": 33, "text": "Vabo etiologiyasi va epidemiologiyasi", "answer": "Qo'zg'atuvchi: Vibrio cholerae O1/O139 (grammanfiy, vergulsimon tayoqcha).\nBiovarlari: klassik va El-Tor.\nManba: kasal yoki vibrion tashuvchi.\nYuqish: fekal-oral (asosan suv orqali).\nInkubatsiya: bir necha soatdan 5 kungacha.\nVabo — o'ta xavfli, karantin infeksiyasi (xalqaro sanitar qoidalar ostida)."}, {"num": 34, "text": "Vabo patogenezi", "answer": "V. cholerae → ingichka ichak → vabo toksini (CT) → GM1 retseptoriga bog'lanadi → adenilatsiklaza faollashadi → hujayrada sAMF oshadi → Cl⁻ va suvning kuchli sekretsiyasi → ko'p miqdordagi (profuz) suvli diareya.\nYallig'lanish yo'q, ichak devori shikastlanmaydi.\nNatija: suvsizlanish → gipokaliemiya, atsidoz → shok → buyrak yetishmovchiligi.\nNajas \"guruch suvi\" (rangsiz, parrakli) ko'rinishida."}, {"num": 35, "text": "Vabo klinikasi. Erta simptomlar", "answer": "Isitmasiz kechadi.\n1) Og'riqsiz suvli diareya (\"guruch suvi\");\n2) Ko'ngil aynishisiz, favvora kabi qusish;\n3) Tez suvsizlanish;\n4) Tirishish (gipokaliemiya tufayli);\n5) Teri quruq, burishgan — \"kir yuvuvchining qo'li\";\n6) Sianoz, anuriya (siydik kelmasligi).\nSuvsizlanish I–IV darajalari (suyuqlik yo'qotish >10% gacha).\nHarorat normal yoki pasaygan."}, {"num": 36, "text": "Vaboning erta qiyosiy diagnostikasi", "answer": "Farqlash kerak:\n- Oziq-ovqat toksikoinfeksiyasi — intoksikatsiya, avval qusish;\n- Salmonellyoz — isitma, yashil najas;\n- Dizenteriya — tenezmlar, qon;\n- Rotavirus — bolalarda, kataral belgilar bilan.\nHal qiluvchi: najas bakteriologik ekmasida V. cholerae, serologiya, PSR."}, {"num": 37, "text": "Vaboni davolash va profilaktikasi", "answer": "Davolash:\n- Regidratatsiya — asosiy chora (I–II darajada og'iz orqali, III–IV da vena ichi, \"Trisol\" eritmasi);\n- Doksitsiklin 300 mg bir martalik yoki siprofloksatsin 1 g.\nProfilaktika: suvni qaynatish, vaksina (Dukoral), sanitar nazorat, karantin chora-tadbirlari; kontaktdagilarga doksitsiklin."}, {"num": 38, "text": "Salmonellyoz etiologiyasi va epidemiologiyasi", "answer": "Qo'zg'atuvchi: Salmonella (typhimurium, enteritidis).\nManba: parranda, tuxum, go'sht (zoonoz).\nYuqish: fekal-oral (asosan oziq-ovqat orqali).\nInkubatsiya: 2–72 soat (o'rtacha 12–24 soat).\nKasallik chala pishgan tuxum, parranda go'shti, sut mahsulotlari orqali yuqadi."}, {"num": 39, "text": "Salmonellyoz klinik tasnifi", "answer": "1) Gastrointestinal shakl (gastrit, gastroenterit, gastroenterokolit) — eng ko'p;\n2) Generalizatsiyalangan shakl (tifsimon, septik);\n3) Subklinik shakl (bakteriya tashuvchanlik).\nOg'irligi bo'yicha: yengil, o'rta, og'ir."}, {"num": 40, "text": "Salmonellyozning gastrointestinal shakli klinikasi", "answer": "Inkubatsiya 12–24 soat. O'tkir boshlanish:\n- Isitma 38–39°C;\n- Ko'ngil aynishi, qusish;\n- Epigastriy (qorin usti) sohasida og'riq;\n- Ko'p miqdorda yashil, badbo'y najas (\"botqoq loyi\");\n- Suvsizlanish I–III daraja;\n- Intoksikatsiya.\nDavomiyligi 3–7 kun."}, {"num": 41, "text": "Salmonellyozning erta qiyosiy diagnostikasi", "answer": "Farqlash kerak:\n- Vabodan (isitma yo'q, \"guruch suvi\");\n- Dizenteriyadan (tenezmlar, qon, chap tomon og'rig'i);\n- Oziq-ovqat toksikoinfeksiyasidan (qisqa inkubatsiya);\n- Qorin tifidan (sekin boshlanish, rozeolalar).\nHal qiluvchi: najas bakteriologik ekmasi, serologiya, PSR."}, {"num": 42, "text": "Salmonellyozning septik shakli klinikasi", "answer": "- Qaltirash bilan yuqori isitma;\n- Kuchli terlash;\n- Ikkilamchi yiringli o'choqlar — osteomiyelit, meningit, endokardit;\n- Gemolitik-uremik sindrom;\n- Jigar va taloq kattalashishi;\n- Anemiya, sariqlik.\nKo'pincha immuniteti zaiflashgan bemorlarda (immunosupressiyada) rivojlanadi."}, {"num": 43, "text": "Salmonellyozni davolash va profilaktikasi", "answer": "Davolash:\n- Regidratatsiya;\n- Og'ir/generalizatsiyalangan shaklda etiotrop — ftorxinolonlar, III avlod sefalosporinlar;\n- Sorbentlar, probiotiklar.\nProfilaktika: tuxum va parranda go'shtini yaxshilab termik ishlash, oziq-ovqatni to'g'ri saqlash, qo'lni yuvish, veterinariya nazorati."}, {"num": 44, "text": "Oziq-ovqat toksikoinfeksiyasi klinikasi", "answer": "Inkubatsiya 1–6 soat (juda qisqa). O'ta o'tkir boshlanadi:\n- Qusish (diareyadan oldin keladi);\n- Tutqanoqsimon qorin og'rig'i;\n- Suyuq najas;\n- Qisqa muddatli isitma;\n- Suvsizlanish.\nGuruhli (bir necha kishi birga) tarzda uchraydi (umumiy ovqatdan).\nO'z-o'zidan 1–3 kunda tuzaladi."}, {"num": 45, "text": "Oziq-ovqat toksikoinfeksiyasining erta qiyosiy diagnostikasi", "answer": "Farqlash kerak:\n- Vabodan (intoksikatsiya yo'q);\n- Salmonellyozdan (uzun inkubatsiya, yashil najas);\n- Dizenteriyadan (tenezmlar, qon);\n- O'tkir appenditsitdan (diareya yo'q, peritoneal belgilar).\nHal qiluvchi: qusuq massasi, najas va ovqat qoldig'ini bakteriologik ekish."}, {"num": 46, "text": "Oziq-ovqat toksikoinfeksiyasini davolash va profilaktikasi", "answer": "Davolash:\n- Oshqozonni yuvish;\n- Regidratatsiya (og'iz orqali yoki vena ichi);\n- Sorbentlar;\n- Antibiotiklar ko'rsatilmagan (faqat asoratlarda — ftorxinolonlar).\nProfilaktika: ovqat tayyorlash texnologiyasiga rioya, saqlash (≤4°C), sanitar normalar, qo'lni yuvish."}, {"num": 47, "text": "Botulizm etiologiyasi va epidemiologiyasi", "answer": "Qo'zg'atuvchi: Clostridium botulinum (grammusbat, spora hosil qiluvchi, anaerob).\nToksinlari: A–G tiplari.\nManba: tuproq, hayvonlar ichagi.\nXavf omillari: uy konservalari, qoqlangan baliq, go'sht.\nInkubatsiya: 12–36 soat.\nSpora qaynatishga chidamli (6 soatgacha), toksin esa 80°C da 30 daqiqada parchalanadi."}, {"num": 48, "text": "Botulizm patogenezi", "answer": "Botulotoksin → me'da-ichak yo'li → qon → periferik nervlar → atsetilxolin ekzotsitozini bloklaydi → neyromushak uzatish to'xtaydi → pastga (nisxodyashiy) yo'nalishdagi falajliklar (avval kalla nervlari → keyin nafas mushaklari).\nSezgi buzilmaydi.\nOng saqlanadi (toksin gematoensefalik bariyerdan o'tmaydi)."}, {"num": 49, "text": "Botulizm klinikasi", "answer": "1) Oftalmoplegiya — ikkilanish (diplopiya), qovoq tushishi (ptoz), qorachiq kengayishi (midriaz);\n2) Disfagiya (yutinish qiyinligi), dizartriya (nutq buzilishi);\n3) Pastga yo'nalgan falaj: bo'yin, tana, oyoq-qo'llar;\n4) Nafas yetishmovchiligi — o'limning asosiy sababi;\n5) Og'iz qurishi;\n6) Qabziyat;\n7) Isitma yo'q;\n8) Ong toza."}, {"num": 50, "text": "Botulizmning erta qiyosiy diagnostikasi", "answer": "Farqlash kerak:\n- Poliomielit (isitma, asimmetrik falaj);\n- Insult (o'choqli belgilar);\n- Myasteniya (AChR antitanalari, to'lqinsimon kechish);\n- Giyen-Barre sindromi (yuqoriga yo'nalgan, likvorda o'zgarish);\n- Difteriya (angina, parda).\nHal qiluvchi: sichqonchada bioproba, toksinga IFA (ELISA)."}, {"num": 51, "text": "Botulizmni davolash tamoyillari", "answer": "1) Reanimatsiya bo'limi (RIB);\n2) Botulizmga qarshi zardob (A+B+E tiplari);\n3) Oshqozonni yuvish;\n4) Nafas yetishmovchiligida sun'iy nafas (IVL);\n5) Penitsillin/metronidazol;\n6) Giperbarik oksigenatsiya;\n7) Dezintoksikatsiya.\nZardobni qancha erta yuborilsa, shuncha samarali."}, {"num": 52, "text": "Botulizmga qarshi zardobni yuborish qoidalari", "answer": "1) Yonida anafilaksiyaga qarshi to'plam tayyor turishi kerak;\n2) Teri sinamasi (1:100 teri ichiga, 20 daqiqa kutiladi);\n3) Salbiy bo'lsa — to'liq zardob mushak ichiga yoki vena ichiga;\n4) Dozalari: A — 10 000 XB, B — 5 000 XB, E — 10 000 XB (har biridan);\n5) Qancha erta yuborilsa, shuncha samarali."}, {"num": 53, "text": "Gripp klinik tasnifi", "answer": "Og'irligi bo'yicha: yengil (<38°C), o'rta (38–39°C), og'ir (>39°C), gipertoksik.\nKechishi bo'yicha: asoratsiz; asoratli (pnevmoniya, o'tkir respirator distress-sindrom, ensefalit).\nSerotiplar: A (pandemik), B (mavsumiy), C (yengil)."}, {"num": 54, "text": "Asoratsiz gripp klinikasi", "answer": "Inkubatsiya 1–3 kun. O'ta o'tkir boshlanish:\n- Isitma 39–40°C;\n- Kuchli intoksikatsiya — bosh og'rig'i (chakka, ko'z ortida), mushak og'riqlari (miyalgiya), holsizlik;\n- Mo''tadil kataral belgilar — quruqlik, tomoq achishishi, burun bitishi;\n- Burun qonashi (gemorragiya);\n- Ko'z yoshlanishi, yorug'likdan qo'rqish.\nGrippda intoksikatsiya kataral belgilardan ustun turadi."}, {"num": 55, "text": "Gripping erta qiyosiy diagnostikasi", "answer": "Farqlash kerak:\n- ORVI dan (intoksikatsiya kamroq, kataral belgilar ko'proq);\n- Meningokokk infeksiyasidan (toshma, qusish);\n- Qorin tifidan (sekin boshlanish);\n- Bezgakdan (xurujlar);\n- Leptospirozdan.\nHal qiluvchi: burun-halqumdan surtmaning PSR (PCR) tahlili, tezkor test (IFA)."}, {"num": 56, "text": "Yuzaki yallig'lanish (qizil shamol) klinikasi va davolash", "answer": "Aniq chegarali qizarish (\"qizil shamol vali\"), achishish, og'riq, shish.\nShakllari: eritematoz, bullyoz, flegmonoz, nekrotik.\nIsitma, intoksikatsiya.\nJoylashuvi: boldir, yuz.\nDavolash: penitsillin 1 mln XB kuniga 6 marta, 10 kun; QYaQV (NSAID); mahalliy antiseptiklar.\nQo'zg'atuvchi — odatda beta-gemolitik streptokokk."}, {"num": 57, "text": "Grippni davolash (asoratsiz va asoratli)", "answer": "Asoratsiz:\n- QYaQV (paratsetamol);\n- Oseltamivir 75 mg kuniga 2 mahal, 5 kun — og'ir kechishda yoki xavf guruhida;\n- Ko'p suyuqlik, yotoq tartibi.\nAsoratli (pnevmoniya):\n- Antibiotiklar (amoksiklav, azitromitsin);\n- O'tkir distress-sindromda sun'iy nafas (IVL);\n- Statsionarga yotqizish."}, {"num": 58, "text": "Meningokokk infeksiyasi etiologiyasi va patogenezi", "answer": "Qo'zg'atuvchi: Neisseria meningitidis (grammanfiy diplokokk).\nSeroguruhlari: A, B, C, W, Y.\nYuqish: havo-tomchi yo'li bilan.\nPatogenez: tashuvchanlik → nazofaringit → bakteriemiya → gematoensefalik bariyerdan o'tish → meningit.\nEndotoksin → DVS-sindrom, infeksion-toksik shok (Uoterxaus-Fridrixsen sindromi)."}, {"num": 59, "text": "Meningokokk infeksiyasi tasnifi", "answer": "1) Mahalliy (lokalizatsiyalangan) shakllar: tashuvchanlik, nazofaringit;\n2) Generalizatsiyalangan shakllar: meningokokkemiya, meningit, meningoensefalit, aralash shakl;\n3) Noyob shakllar: endokardit, artrit.\nOg'irligi bo'yicha: yengil, o'rta, og'ir, chaqmoqsimon (fulminant)."}, {"num": 60, "text": "Meningokokk infeksiyasi klinik belgilari", "answer": "Nazofaringit: kataral belgilar, subfebril harorat.\nMeningokokkemiya: o'ta o'tkir boshlanish, isitma, gemorragik toshma (yulduzchasimon).\nMeningit: bo'yin rigidligi, Kerneg, Brudzinskiy belgilari.\nChaqmoqsimon shakl: infeksion-toksik shok + DVS-sindrom, o'lim ko'rsatkichi 50–80%."}, {"num": 61, "text": "Meningokokkemiya klinik simptomlari", "answer": "1) O'ta o'tkir boshlanish;\n2) Isitma >40°C;\n3) Gemorragik yulduzchasimon toshma — soatlar ichida kuchayadi;\n4) Toshma bosganda yo'qolmaydi (gemorragik);\n5) Gipotoniya (qon bosimi pastligi);\n6) Rangparlik, sianoz;\n7) DVS-sindrom;\n8) Infeksion-toksik shok → ko'p a'zoli yetishmovchilik."}, {"num": 62, "text": "Meningit sindromli infeksiyalar qiyosiy diagnostikasi", "answer": "Likvor tahliliga ko'ra farqlanadi:\n- Yiringli bakterial: neytrofillar ustun, glyukoza keskin pasaygan, loyqa likvor;\n- Seroz virusli: limfotsitlar, glyukoza normal, tiniq likvor;\n- Sil meningiti: limfotsitlar, glyukoza pasaygan, fibrin to'ri, xlorid pasaygan;\n- Zamburug'li: immunitet zaifligi, India Ink musbat;\n- Subaraxnoidal qon quyilish: ksantoxromiya, eritrotsitlar."}, {"num": 63, "text": "Seroz va yiringli meningit qiyosiy diagnostikasi", "answer": "Yiringli meningit:\n- Neytrofil pleotsitoz >1000;\n- Likvor loyqa;\n- Glyukoza <2.2 mmol/l;\n- Oqsil keskin oshgan;\n- Bakteriyalar topiladi.\nSeroz meningit:\n- Limfotsitar pleotsitoz <500;\n- Likvor tiniq;\n- Glyukoza normal;\n- Oqsil mo''tadil oshgan.\nKlinik jihatdan yiringlisi og'irroq; meningokokkda toshma bo'ladi."}, {"num": 64, "text": "Uoterxaus-Fridrixsen sindromi klinikasi", "answer": "Chaqmoqsimon meningokokkemiya + buyrak usti beziga qon quyilish.\nKlinika:\n- Infeksion-toksik shok — gipotenziya, taxikardiya;\n- Kuchayib boruvchi gemorragik toshma;\n- O'tkir buyrak usti bezi yetishmovchiligi — kollaps, anuriya;\n- DVS-sindrom;\n- Koma.\nO'lim ko'rsatkichi >50%. Bu — hayot uchun o'ta xavfli holat."}, {"num": 65, "text": "Bezgak etiologiyasi va patogenezi", "answer": "Qo'zg'atuvchi: Plasmodium (falciparum, vivax, malariae, ovale).\nTashuvchisi: Anopheles chivini.\nPatogenez: to'qima shizogoniyasi (jigarda) → merozoitlar → eritrotsitlarga kiradi → eritrotsitlar parchalanishi (gemoliz) → xurujlar (paroksizmlar).\nP. vivax/ovale — jigarda gipnozoitlar qoladi (retsidiv beradi).\nP. falciparum — serebral (miyaviy) shakl, eng xavfli."}, {"num": 66, "text": "Meningokokk infeksiyasini davolash va profilaktikasi", "answer": "Davolash:\n- Penitsillin 0.3 mln XB/kg/kun yoki seftriakson 2 g kuniga 2 mahal;\n- Deksametazon;\n- Infeksion-toksik shokda — infuziya, noradrenalin;\n- DVS-sindromda — yangi muzlatilgan plazma.\nProfilaktika: vaksinatsiya (A, C, W, Y, B); kontaktdagilarga rifampitsin 600 mg kuniga 2 mahal, 2 kun."}, {"num": 67, "text": "Bezgak klinikasi", "answer": "Xuruj (paroksizm) triadasi:\n1) Qaltirash 30–60 daqiqa;\n2) Issiqlik (jar) 39–41°C;\n3) Ko'p terlash.\nXurujlar oralig'i: vivax/ovale — 48 soat; malariae — 72 soat; falciparum — notekis.\nJigar va taloq kattalashishi, anemiya.\nP. falciparum og'ir asoratlar beradi: koma, o'tkir distress-sindrom, gemolitik-uremik sindrom, buyrak yetishmovchiligi."}, {"num": 68, "text": "Bezgakni davolash va profilaktikasi", "answer": "Davolash:\n- Vivax/ovale: xloroxin + primaxin 14 kun (gipnozoitlarni yo'qotish uchun);\n- Falciparum: artemizinin asosidagi kombinatsiya (artemizinin + lyumefantrin); og'irida — vena ichi artesunat.\nProfilaktika: atovaxon/proguanil, mefloxin, doksitsiklin; chivinlardan himoyalanish (to'r, repellentlar)."}, {"num": 69, "text": "Brutsellyoz patogenezi", "answer": "Brucella → teri/shilliq qavat → limfa tugunlari → qon (bakteriemiya) → retikuloendotelial tizim → makrofaglar ichida ko'payadi → granulomalar hosil bo'ladi → takroriy bakteriemiyalar → allergik reaksiyalar → tayanch-harakat tizimi, markaziy nerv tizimi va jinsiy a'zolar zararlanadi.\nSurunkalanishga moyil — hujayra ichida saqlanishi tufayli."}, {"num": 70, "text": "Brutsellyoz tasnifi", "answer": "Kechishi bo'yicha:\n- O'tkir (<3 oy);\n- O'rtacha o'tkir (3–6 oy);\n- Surunkali (>6 oy) — kompensatsiyalangan, subkompensatsiyalangan, dekompensatsiyalangan;\n- Rezidual (qoldiq).\nSindrom bo'yicha: suyak-bo'g'im, nerv, urogenital shakllar.\nOg'irligi bo'yicha: yengil, o'rta, og'ir."}, {"num": 71, "text": "O'tkir septik brutsellyoz simptomlari", "answer": "1) To'lqinsimon (undulyatsiyalovchi) isitma;\n2) Nisbiy bradikardiya;\n3) Qaltirash — ko'p terlash (ayniqsa kechasi);\n4) Polilimfadenopatiya (ko'p limfa tugunlari kattalashishi);\n5) Jigar va taloq kattalashishi;\n6) Artralgiyalar (bo'g'im og'riqlari);\n7) Tsellyulit va fibrozitlar;\n8) Erkaklarda orxoepididimit."}, {"num": 72, "text": "Brutsellyozning o'rtacha o'tkir va surunkali shakli klinikasi", "answer": "O'rtacha o'tkir: a'zolar zararlanishi kuchayib boradi.\nSurunkali shakl:\n1) Osteoartrit — sakroileit (xarakterli belgi), spondilit;\n2) Orxoepididimit;\n3) Neyrobrutsellyoz;\n4) Surunkali gepatit;\n5) Endokardit.\nIsitma odatda subfebril (past darajada).\nKasallik uzoq cho'ziladi, mehnat qobiliyatini pasaytiradi."}]}, {"id": "neuro", "name": "Nevrologiya", "icon": "🧠", "count": 81, "questions": [{"num": 1, "text": "Ishemik insult klinikasi", "answer": "Fokal belgilar arteriaga bog'liq: O'rta miya — kontralateral gemiplegiya, afaziya (chap); Ichki uyqu — amaurosis fugax, afaziya, gemiplegiya; Vertebrobazilyar — ataksiya, dizartriya, diplopia, Horner; Old miya — oyoq ko'proq, paraparez."}, {"num": 2, "text": "O'tkir radikulitni davosi", "answer": "1) Dam olish; 2) NSAIDs (diklofenak, meloksikam); 3) Miorelaksantlar (tizanidin); 4) B1, B6, B12 vitaminlari; 5) Blokada (novokain + kortikosteroid); 6) Kortikosteroidlar — og'ir; 7) Fizioterapiya; 8) Masaj va LFK — o'tkir o'tgach; 9) Traktsiya; 10) Jarrohlik — qo'pol defisitda."}, {"num": 3, "text": "Markaziy va periferik falajlanish belgilari", "answer": "Markaziy (yuqori motor neyron): gipertoniya (spastik), giperrfleksiya, Babinski, klonus, atrofiya kam. Periferik (quyi motor neyron): gipotoniya, atrofiya yaqqol, arefleksiya, fassikulyatsiya, EMG o'zgarish."}, {"num": 4, "text": "Ichki kapsula zararlansa harakat qanday buziladi", "answer": "Kontralateral: spastik gemiplegiya, gemigipoesteziya, gomоnim gemianopsiya; ko'z deviyatsiyasi o'sma tomonga. 'Uchlik formulasi': falaj + sezgi + ko'ruv."}, {"num": 5, "text": "Insultlarni klassifikatsiyasi", "answer": "1) Ishemik (80–85%): trombotik, embolik, gemodianamik, lakunar; 2) Gemorragik (15–20%): intraserebral qon quyilish, subaraxnoidal (SAQ), ventrikulyar; 3) TIA — belgilar 24 soatda o'tadi."}, {"num": 6, "text": "Gemorragik insult klinikasi", "answer": "Keskin: 1) Kuchli bosh og'rig'i; 2) Ko'ngil aynishi, qusish; 3) Ong buzilishi; 4) Kontralateral gemiplegiya, afaziya; 5) Qon bosimi ↑; 6) Cheyne-Stokes nafas; 7) Meningeal belgilar; 8) Epileptik xurujlar. Likvorda qon."}, {"num": 7, "text": "Gemorragik insult davosi", "answer": "1) Qon bosimi 140–160/90 ga tushirish; 2) Mannitol/glitserol — ICP kamaytirish; 3) Traneksamik kislota — gemostaz; 4) Antikonvulsant; 5) Parvarish. Jarrohlik: gematoma olib tashlash (>30 ml), ventrikulostomiya."}, {"num": 8, "text": "Monoplegiya, paraplegiya, tetraplegiya, gemiplegiya", "answer": "Monoplegiya — 1 oyoq/qo'l. Gemiplegiya — bir tomona. Paraplegiya — ikkala oyoq. Tetraplegiya — to'rtta oyoq (yuqori servikal). Plegiya — to'liq falaj; parezda qisman kuch saqlanadi."}, {"num": 9, "text": "N. radialis zararlanishi", "answer": "Bilak pastga osilib ('osilib turuvchi qo'l', wrist drop); barmoq yozilmaydi; 1–3 barmoq dorsal sezgi yo'qolishi. Sabab: elka sinishi, turnikе, noto'g'ri holat."}, {"num": 10, "text": "N. ulnaris zararlanishi", "answer": "4–5 barmoqlar bukilgan ('tirnoq qo'l'); 5–4 barmoq medial sezgi yo'qolishi; gipotenаr atrofiyasi; barmoq yoyilmaydi; Froment belgisi+. Zararlash: tirsak kanali."}, {"num": 11, "text": "Poliomielitda harakat buziladi", "answer": "Virus oldingi shox → periferik (flaksid) falaj: mushaк atrofiyasi, atoniya, arefleksiya, fassikulyatsiya, sezgi saqlanadi. Asimmetrik. Ko'pincha oyoqlar. Bulbar: nafas, yutinish buzilishi."}, {"num": 12, "text": "N. peroneus zararlanishi", "answer": "Oyoq pastga osilib ('foot drop'); ko'tarish imkonsiz; 1–5 barmoq dorsal sezgi yo'qolishi. Yurish: 'xo'roz yurishi' (steppage). Sabab: fibula boshi bosimi, oyoqni chalishtirib o'tirish."}, {"num": 13, "text": "N. facialis davosi", "answer": "1) Prednizolon 1 mg/kg (48 soat ichida — samarali); 2) Asiklovir (Herpes Zoster da); 3) Ko'z tomchisi + bantik; 4) Fizioterapiya; 5) B vitaminlari; 6) LFK; 7) Jarrohlik — neyroliz (og'ir surunkali)."}, {"num": 14, "text": "Epilepsiyani davosi", "answer": "GTKT: valproat (1-tanlov), karbamazepin, lamotrijin. Absans: etosuksimid, valproat. Fokal: karbamazepin, okskarbazepin. Epistatusda: diazepam IV → fenitoyin/valproat IV → narkoz. Tamoyil: monoterapiya, davodan to'xtatmaslik."}, {"num": 15, "text": "Partsial talvasalar haqida tushuncha", "answer": "Fokal — bir yarim shardan. 1) Oddiy fokal (ong saqlanadi): motorik (Jackson), sezgi, vegetativ; 2) Kompleks fokal (ong buziladi): avtomatizm; 3) Ikkilamchi generalizovanniy. EEG da fokal discharge. Sabab: shikastlanish, o'sma."}, {"num": 16, "text": "Epistatusda birinchi yordam", "answer": "1) Xavfsiz holat, yostiq; 2) Nafas yo'li; 3) O2; 4) Vena yo'li; 5) Diazepam 10 mg IV; 6) Javob yo'q: lorazepam 4 mg IV; 7) 2-liniya: valproat 15–45 mg/kg IV; 8) 3-liniya: propofol, midazolam — ICU; 9) EEG monitoring."}, {"num": 17, "text": "Djekson talvasalar", "answer": "Fokal motorik talvasalar. Bitta joydan (barmoq) boshlanadi → bir tomonga tarqaladi ('march'). Ong saqlanadi. Kontralateral motor korteks ketma-ket qo'zg'alishi. Todds falaji — talvazadan keyin qisqa vaqtli falaj. Sabab: o'sma, ensefalit."}, {"num": 18, "text": "Epileptik xurujning fazalari", "answer": "1) Aura — predor (ba'zan); 2) Tonik faza (15–30 s): barcha mushaklar qisqarishi, sianoz; 3) Klonik faza (1–2 daq): ritmik qisqarish, tilni tishlash; 4) Postiktal: charchoq, dezorientatsiya, uyqu, Todds falaji."}, {"num": 19, "text": "Epilepsiyada EEG o'zgarishlar", "answer": "Interiktal: uchqunlar (spikes), uchqun-to'lqin komplekslari, o'tkir to'lqinlar. Iktal: 3 Hz uchqun-to'lqin — absanslar; fokal uchqunlar; yuqori amplitudali ritmik to'lqinlar. Video-EEG — eng aniq."}, {"num": 20, "text": "Ventrikulyar qon quyilish", "answer": "Qorinchalar ichiga qon. Sabab: gipertenziya, AVM, ichki qon quyilish yorilishi. Klinika: keskin bosh og'rig'i, tez ong buzilishi, gipertermiya, bradikardiya, qo'l/oyoq qotishi. KT: qorinchalar ichida giperdens. Gidrosefal xavfi."}, {"num": 21, "text": "Subaraxnoidal qon quyilish", "answer": "Sabab: anevrizm (80%), AVM. Klinika: 'hayotda eng kuchli bosh og'rig'i' — keskin; meningeal belgilar; ko'ngil aynishi; fotofobiya; qon bosim ↑. KT: subaraxnoidal qon. Lyumbal punksiya: xanthochromia. Angiografiya — anevrizm."}, {"num": 22, "text": "Miya ustuniga qon quyilish", "answer": "Tez koma; de-serebrat rigidlik; Cheyne-Stokes/apnoe; alternatsiyalovchi sindromlar; bradikardiya, gipertermiya; ikki tomonli Babinski; ko'z harakatlar buzilishi. Prognoz og'ir."}, {"num": 23, "text": "Meningeal belgilar, qaysi kasalliklarda", "answer": "Belgilar: bo'yin qattiqligi, Kernig, Brudzinskiy, fotofobiya. Kasalliklar: 1) Bakterial meningit; 2) SAQ; 3) Viral ensefalit; 4) TBM; 5) Kriptokokkoz; 6) Travma; 7) Qon quyilish."}, {"num": 24, "text": "Tuberkulyoz meningitda likvor tahlili", "answer": "Bosim ↑; rang — opa-rang/sariq; oqsil ↑ (1–10 g/l); glyukoza ↓ (<2.2 mmol/l); xlorid ↓; limfotsitar pleotsioz 100–500; fibrin to'ri; BK kam; PCR MTB — aniqroq."}, {"num": 25, "text": "Miya pardalari va bo'shliqlar", "answer": "Pardalar: dura mater (epidural bo'shliq), arachnoidea (subdural), pia mater (subaraxnoidal — BOS). Qorinchalar: 1–2 lateral, 3-qorincha (diensefalon), Silviy darvozasi, 4-qorincha. BOS: choroid pleksus → qorinchalar → SA bo'shliq → rezorbsiya."}, {"num": 26, "text": "Meningit klinikasi", "answer": "Uchlik: bosh og'rig'i + isitma + meningeal belgilar; ko'ngil aynishi, qusish; fotofobiya; ong buzilishi; toshma (meningokokkda); kranial nerv falajligi; likvor bosim ↑."}, {"num": 27, "text": "Meningitlarni davosi", "answer": "Bakterial: seftriakson 2 g x2 IV + deksametazon; septik shok — vazopressorlar. Viral: simptomatik; gerpes — asiklovir. TBM: HRZE (izoniazid, rifampin, pirazinamid, etambutol) + steroid."}, {"num": 28, "text": "Kana entsefali klinikasi", "answer": "Inkubasiya 1–4 hafta. 1) Preparitik: isitma, bosh og'rig'i, miyalgia; 2) Ensefalit: ong buzilishi, meningeal belgilar; 3) Flaksid falaj — bo'yin, yelka; 4) Bulbar — dysfagia, dizartriya; 5) Ikki to'lqinli kurs. Limfotsitar pleotsioz."}, {"num": 29, "text": "Bosh og'rig'ini differentsial diagnostikasi", "answer": "1) Migren — unilateral, pulsirlovchi, aura; 2) Zo'riqish — ikki tomonlama, bosuvchi; 3) Klaster — periorbital, 15–180 daq, avtonomik; 4) SAQ — keskin 'hayotda eng kuchli'; 5) Meningit — isitma + meningeal; 6) AH; 7) O'sma — ertalab kuchli, progressiv; 8) Trigeminal nevralgiya — elektr zarba."}, {"num": 30, "text": "Bel og'rig'i differentsial diagnostikasi", "answer": "1) Osteokondroz/disk — radikular, Laseque+; 2) Spondiloartrit — ertalab qotish; 3) O'sma — progressiv; 4) Buyrak — Pasternatskiy+; 5) Pankreas — 'kamar' og'rig'i; 6) Osteoporoz; 7) Infeksion spondilit."}, {"num": 31, "text": "Gipo- va giperglikemik koma", "answer": "Gipoglekimik: keskin, terlaş, titrash, yumshoq teri, glyukoza <2.8. Davolash: 40% glyukoza 40–60 ml IV. Giperglikemik: sekin, quruq teri, DKA — aceton hidi, ketonlar+, insulin+infuziya; GNKG — glyukoza >33, gidratatsiya."}, {"num": 32, "text": "Ensefalitlar klinikasi (Ekonomo)", "answer": "Uyqu kasalligi: 1) Isitma, letargiya (patologik uyqu); 2) Okulomotor parezi, giperkinezlar; 3) Kech: postensefalitik parkinsonizm. Umumiy ensefalit: isitma, ong buzilishi, fokal belgilar, meningeal belgilar, xurujlar."}, {"num": 33, "text": "Mielit klinikasi", "answer": "1) Zararlanish pastida motor/sezgi buzilishi; 2) Paraplegiya/tetraplegiya; 3) Sensori level — keskin chegara; 4) Sfinkter buzilishi; 5) Avtonom buzilish; 6) Orqa miya og'rig'i."}, {"num": 34, "text": "YoAS etiopatogenezi", "answer": "Etiologiya: 90% sporadic; 10% oilaviy (SOD1, C9orf72 mutatsiyalari). Patogenez: oksidativ stress, glutamat ekssitotoksiklik, protein agregatsiya → yuqori va quyi motor neyron degeneratsiya → falaj. Riluzol — 2–3 oy uzaytiradi."}, {"num": 35, "text": "Siringomieliya etiopatogenezi", "answer": "Orqa miyada sirinx (bo'shliq). Sabab: Chiari malformatsiyasi (eng keng), travma, infeksiya, idiopatik. Patogenez: BOS oqimi buzilishi → bo'shliq → markaziy kulrang modda siqilishi → 'mandarin' analgeziya."}, {"num": 36, "text": "Tarqoq skleroz etiopatogenezi", "answer": "Autoimmun demyelinizatsiya. Etiologiya: HLA-DR2 + EBV, D vitamini kamligi, chekish. Patogenez: T-limfotsitlar mielin basiy proteiniga hujum → demyelinizatsiya plaqlari. Relaps-remittiruyuschiy (85%). Lezyonlar: periventricular, optik nerv, miya ustuni."}, {"num": 37, "text": "Parkinson kasalligi klinikasi", "answer": "To'rt belgi: 1) Tremor tinchlikda ('non yoqish', 4–6 Hz); 2) Rigidlik ('tishli g'ildirak'); 3) Bradikinezia; 4) Postural beqarorlik. Qo'shimcha: mikrografiya, gipomimiya, kichik qadamlar, gipofoniя."}, {"num": 38, "text": "Parkinson kasalligi etiopatogenezi", "answer": "Etiologiya: LRRK2, PINK1, SNCA mutatsiyalari + pestitsidlar. Patogenez: Substantia nigra dopaminergik neyron degeneratsiyasi → striatum dopamin ↓ → harakatning inhibisiyasi. Lewy tanachalari (alfa-sinuklein) — patologik belgi."}, {"num": 39, "text": "Miasteniya etiopatogenezi", "answer": "Autoimmun. AChR antitanalari (85%) → neyromushak sinaps postsinaptik membrana buzilishi → impuls blokada → mushaк charchashi. MuSK antikor (10%). Timus rol o'ynaydi."}, {"num": 40, "text": "Mielitni davosi", "answer": "1) Metilprednizolon 1 g/kun 3–5 kun IV; 2) Plazmaferez — og'ir; 3) IVIG; 4) Etiologik: antibiotik/antiviral; 5) Kateterizatsiya; 6) Tromboprofilaktika; 7) Rehabilitatsiya."}, {"num": 41, "text": "Absanslar haqida tushuncha", "answer": "5–30 s ong yo'qolishi, ko'z qotishi, harakatsizlik — birdan to'xtaydi, amneziya. Kompleks: avtomatizm. EEG: 3 Hz generalizovanniy uchqun-to'lqin. Giperventilyatsiya provokatsiya. 4–10 yosh. Etosuksimid, valproat."}, {"num": 42, "text": "Mielopatiya haqida tushuncha", "answer": "Orqa miya surunkali zararlanishi (yallig'lanmasiz). Turlari: servikal spondilogenniy, vaskulyar, kompressiv, toksik (B12 ↓), radiatsion. Klinika: sekin spastik falaj, sezgi, sfinkter buzilishi. Og'riq bo'lmasligi mumkin."}, {"num": 43, "text": "Migren etiopatogenezi", "answer": "Genetik (CACNA1A). Provokatsiya: stress, hormonal, ovqat (vino, pishloq), ob-havo. Patogenez: 1) Kortikаl tarqaluvchi depressiya — aura; 2) Trigeminal aktivatsiya; 3) Qon tomirlari kengayishi; 4) Serotonin o'zgarishi."}, {"num": 44, "text": "Elka pleksiti klinikasi", "answer": "Yuqori (Erb-Dyushen, C5–C6): abduktorlar, tashqi rotatorlar falaji — 'vaiter holati'. Quyi (Klumpke, C8–T1): bilak/qo'l mushaklari, Horner, 4–5 barmoq sezgi ↓. Sabab: tarqalish, Panko'st o'smasi."}, {"num": 45, "text": "Lyumbago haqida tushuncha", "answer": "Bel sohasida o'tkir og'riq. Sabab: disk yadro chiqishi, faset blokada, mushak spazmi. Klinika: keskin harakatdan keyin bel og'rig'i, harakat cheklanganligi, antalgik holat, lordoz tekislanishi. Davolash: dam olish, NSAIDs, miorelaksantlar."}, {"num": 46, "text": "Bulbar sindrom haqida tushuncha", "answer": "IX, X, XII nervlar periferik zararlash. Klinika: disfoniya, dizartriya, dysfagia; til atrofiyasi, fassikulyatsiya; yumshoq tanglay osilib qoladi; yo'tal refleksi ↓. Sabab: ALS, poliomielit, Giyena-Bare."}, {"num": 47, "text": "Psevdobulbar sindrom haqida tushuncha", "answer": "Kortikonuklеar yo'llar ikki tomonga zararlash. Xuddi bulbar, LEKIN: til atrofiyasi YO'Q; reflekslar oshgan; patologik kulgu/yig'lash; mandibulyar refleks ↑; xobot refleksi. Sabab: ikki tomonlama insult, demyelinizatsiya."}, {"num": 48, "text": "Miyacha insulti klinikasi", "answer": "1) Kuchli vertigo; 2) Ko'ngil aynishi, qusish; 3) Ataksiya — keng oyoqlab yurish; 4) Dismetriya; 5) Nistagm; 6) Inteksiyaviy tremor; 7) Dizartriya (skanirlovchi); 8) Ong saqlanadi. Markaziy insultdan farqi."}, {"num": 49, "text": "N. abducens neyropatiyasi klinikasi", "answer": "Lateral rektus falaji. Ko'zni tashqariga qarata olmaslik; ko'z o'rtaga burilgan (esotropiya); gorizontal diplopia (uzoqqa); kompensator bosh burilishi. Sabab: AH, diabet, ICP ↑, o'sma, MS."}, {"num": 50, "text": "N. oculomotorius neyropatiyasi klinikasi", "answer": "1) Ptoz; 2) Ko'z pastga-tashqariga; 3) Ko'z harakatlari cheklangani; 4) Midriyaz — anevrizm belgisi; 5) Akkommodatsiya buzilishi. Sabab: posterior kommunikant anevrizm, diabet (pupil tutilmaydi), herniyatsiya."}, {"num": 51, "text": "Yuz nervi nevropatiyasi klinikasi", "answer": "Periferik: 1) Yuz bir tomonga falaj (yuqori va pastki); 2) Ko'zni yopa olmaslik (lagoftalm); 3) Lab burilishi; 4) Peshona ajini ↓; 5) Giperakuziya; 6) Ta'm buzilishi; 7) Ko'z yoshi/so'lak buzilishi. Bell palsi; Ramsey-Hunt; o'rta quloq."}, {"num": 52, "text": "Uch shoxli nerv nevralgiyasi klinikasi", "answer": "Yuz sohasida 'elektr zarba' kabi qisqa og'riq. V2/V3 sohasi. Trigger: og'iz yuvish, yeyish, shamol. Bir tomonlama. Nevrologik defisit yo'q (klassik). 50 yosh+. Sabab: qon tomiri kompressiyasi (SICA)."}, {"num": 53, "text": "Yon amiotrofik skleroz klinikasi", "answer": "Yuqori motor neyron: spastik, giperrfleksiya, Babinski. Quyi motor: atrofiya, fassikulyatsiya, atoniya. Bulbar: disfoniya, dysfagia. Nafas buzilishi. Sezgi saqlanadi. Progressiv, 3–5 yil."}, {"num": 54, "text": "Vegeto-qon tomir distoniyasi klinikasi", "answer": "Simpatikotonik: tashvish, taxikardiya, gipertenziya, ter, quruq og'iz. Parasimpatikotonik: bradikardiya, gipotenziya, ko'ngil aynishi, terlaş. Vagal sinкop. Davolash: psixoterapiya, sedativlar, fizioterapiya."}, {"num": 55, "text": "Distsirkulyator entsefalopatiya klinikasi", "answer": "I: bosh og'rig'i, bosh aylanishi, xotira ↓, labillik. II: fokal belgilar, psevdobulbar, yurish buzilishi. III: demensiya, jiddiy kognitiv buzilish. KT/MRT: leukoaraioz, lakunar infarktlar."}, {"num": 56, "text": "Dyushen miopatiyasi klinikasi", "answer": "X-bog'liq, DMD geni. Faqat o'g'il bolalar. 2–5 yosh: qalqib turish qiyinligi. Gowers belgisi. Boldir psevdogipetrofiyasi. Lordoz ↑. 12 yoshda nogironlik. KMP, nafas ↓ — o'lim. CK ↑↑."}, {"num": 57, "text": "Siringomieliya klinikasi", "answer": "1) Dissossiatsiyalangan sezgi — og'riq/harorat ↓, teginish saqlanadi; 2) 'Mandarin jacket' — bo'yin, yelka, qo'l; 3) Qo'l atrofiyasi; 4) Pastda spastik paraparez; 5) Neyrogen artrоpatiya (Charcot); 6) Qorin reflekslari ↓."}, {"num": 58, "text": "Polineyropatiya klinikasi", "answer": "'Paypoq/qo'lqop' sezgi buzilishi; distal atrofiya; arefleksiya (Achilles); avtonom (ortostatik gipotenziya, terlash ↓); neyropatik og'riq — kechasi yonish, sanchish. Sabab: diabet, alkogol, B12 ↓, Giyena-Bare."}, {"num": 59, "text": "Subaraxnoidal qon quyilish davolash", "answer": "1) ICU; 2) Anevrizm kliplash yoki embolizatsiya; 3) Nimodipin — vazospazm profilaktikasi; 4) Ventrikulostomiya — gidrosefal; 5) Normovolemi; 6) Analgetiklar; 7) Antiepileptik; 8) Qon bosim nazorat."}, {"num": 60, "text": "Poliomielit klinikasi", "answer": "Preparitik: isitma, bosh og'rig'i, ko'ngil aynishi. Preparalitik: mushak og'rig'i, spazm. Paralitik: keskin asimmetrik flaksid falaj (72–96 soat). Tiklanish: oylar–yillar. Postpolio: yillar keyin kuchsizlik qaytadi."}, {"num": 61, "text": "Bel-quymich radikuliti klinikasi", "answer": "Bel og'rig'i oyoqqa irradiyatsiya — quymich, son, boldir, tovon. Laseque+ (oyoq ko'targanda og'riq). Paresteziya. Reflex ↓ (Achilles — S1, tiz — L4). Mushak ↓ xavf bo'lsa. Zo'riqish/ko'tarishdan kuchayadi."}, {"num": 62, "text": "Epilepsiyaning bosqichlari", "answer": "1) Prodromal — soatlar/kunlar oldin kayfiyat o'zgarishi; 2) Aura — fokal qo'zg'alish (ong saqlanadi); 3) Iktal — xuruj o'zi; 4) Postiktal — charchoq, amneziya, Todds falaji; 5) Interictal — xurujlar orasida."}, {"num": 63, "text": "Epistatusni davosi", "answer": "0–5 daq: diazepam 10 mg IV, lorazepam 4 mg, midazolam IN. 5–20 daq: valproat 40 mg/kg IV, levetiratsetam 60 mg/kg IV. >20 daq: propofol/midazolam infuziya — ICU, EEG monitoring."}, {"num": 64, "text": "Serozli meningit klinikasi", "answer": "Ko'pincha viral. Klinika: isitma 38–39°C, bosh og'rig'i, meningeal belgilar (o'rtacha), ong saqlanadi, toshma yo'q. Likvor: shаffof, limfotsitar pleotsioz, oqsil sal ↑, glyukoza norma."}, {"num": 65, "text": "Uch shoxli nerv nevralgiyasi davosi", "answer": "1) Karbamazepin (1-tanlov) 200–400 mg x3; 2) Okskarbazepin; 3) Gabapentin, pregabalin; 4) Baklofan; 5) Lamotrijin. Jarrohlik: Jannetta (mikrovaskular dekompressiya) — eng samarali; radiofrequency rizotomiya; gamma-knife."}, {"num": 66, "text": "Yuz nervi neyropatiyasi davosi", "answer": "1) Prednizolon 1 mg/kg 10 kun (48 soat ichida); 2) Herpes Zoster: asiklovir + steroid; 3) Ko'z tomchisi + bantik; 4) Fizioterapiya; 5) B vitaminlari; 6) LFK; 7) Jarrohlik — neyroliz (og'ir)."}, {"num": 67, "text": "Miopatiyada harakat buzilish sindromi", "answer": "Simmetrik proksimal zararlash (son, dumba, yelka kamari). Gowers belgisi. Ko'runadigan atrofiya. Psevdogipetrofiya. Miopatik yurish ('o'rdak'). Periferik tip falaj. Reflekslar ↓."}, {"num": 68, "text": "Klaster bosh og'rig'i klinikasi", "answer": "Unilateral periorbital, juda kuchli. 15–180 daq. Kuniga 1–8 marta, haftalar/oylar. Ipsilateral avtonomik: ko'z yoshi, burun oqishi, ptoz, mioz. Bemor harakatlanadi. Davolash: O2 100%, sumatritan."}, {"num": 69, "text": "Abuzis bosh og'rig'i klinikasi", "answer": "Kundalik surunkali bosh og'rig'i (≥15 kun/oy). Analgetik ≥3 oy. Dori olganda yaxshilanadi. Ertalab kuchli. Davolash: analgetikni sekin to'xtatish + profilaktik dorilar."}, {"num": 70, "text": "Bosh aylanish sindromi", "answer": "Periferik: BPPV (Dix-Hallpike+), Menyera (quloq+eshitish ↓+vertigo), labirintit. Markaziy: miya ustuni/miyacha — nerologik belgilar. Presinkopal: gipotenziya. Psixogen. Diagnostika: Dix-Hallpike, MRT."}, {"num": 71, "text": "Landuzi-Djerin miopatiyasi klinikasi", "answer": "Fasioskapolohumerаl (FSHD). Autosomal dominant. Yuz mushaklari (ko'z yopa olmaslik); yelka kamari (qanot skapula); boldir/yelka. Asimmetrik. Sekin progressiv. 20–30 yosh."}, {"num": 72, "text": "Shtryumpel kasalligi", "answer": "Oilaviy spastik paraplegiya (SPG4, spastin). Klinika: sekin progressiv oyoq spastik kuchsizligi; spastik yurish; giperrfleksiya, Babinski; sezgi sal ↓; sfinkter — kech. Davolash: baklofan, fizioterapiya."}, {"num": 73, "text": "Insultlarda nodifferentsial davo", "answer": "1) Hayot ko'rsatkichlari; 2) O2; 3) Glyukoza normalizatsiya; 4) Isitmani pasaytirish; 5) UTI davolash; 6) Tromboprofilaktika; 7) Ovqatlanish; 8) Erta rehabilitatsiya."}, {"num": 74, "text": "Giyena-Bare poliradikuloneyropatiya klinikasi", "answer": "Ko'tarilib boruvchi simmetrik flaksid falaj (oyoqdan). Arefleksiya. Paresteziya. Og'riq erta. Yuz nervi bilateral. Avtonom: AV blok, gipotenziya. Nafas falaji (20%) — ICU. 4 hafta. Likvor: albuminositologik dissossiyatsiya."}, {"num": 75, "text": "Meningokokkli meningit klinikasi", "answer": "O'ta o'tkir. Isitma 39–40°C. Kuchli bosh og'rig'i. Gemorragik toshma (petехii → purpura → nekroz). Ong buzilishi. Vaterxauz-Fridrixsen — buyrak usti qon quyilish, septik shok."}, {"num": 76, "text": "Meningokokkli meningit davosi", "answer": "1) Seftriakson 2 g x2 IV darhol; 2) Deksametazon 0.15 mg/kg x4; 3) Septik shok: infuziya, noradrenalin; 4) ИВЛ; 5) Kontaktlar: rifampin 600 mg x2, 2 kun; 6) Vaksinatsiya."}, {"num": 77, "text": "Zo'riqishdagi bosh og'rig'i klinikasi", "answer": "Ikki tomonlama. Bosuvchi/zichlovchi ('halqa'). O'rtacha intensivlik. 30 daq–7 kun. Jismoniy faollik kuchaytirmaydi. Ko'ngil aynishi — yo'q. Fotofobiya yoki fonofobiya — bittasi (ikkisi — migren)."}, {"num": 78, "text": "Zo'riqishdagi bosh og'rig'i davolash", "answer": "O'tkir: paratsetamol 1 g; ibuprofen 400–600 mg; aspirin 1000 mg. Profilaktik (≥15 kun/oy): amitriptilin 10–75 mg (1-tanlov); stress menejment; fizioterapiya; psixoterapiya."}, {"num": 79, "text": "Gantington xoreyasi klinikasi", "answer": "Autosomal dominant, HTT geni (CAG >36). 1) Xoreya — ixtiyorsiz harakatlar; 2) Ataksiya; 3) Ko'z saccade sekinligi; 4) Demensiya; 5) Depressiya, psixoz; 6) Dysfagia. Boshlanish: 30–50 yosh."}, {"num": 80, "text": "Tranzitor ishemik ataka klinikasi", "answer": "<24 soat (<1 soat) fokal defisit. Karotid: gemiparesteziya, afaziya, monookulyar amavroz. Vertebrobazilyar: diplopia, ataksiya, bilateral ko'ruv. ABCD2 skali. Antiaggregantlar, statin — darhol."}, {"num": 81, "text": "Erba-Rota miopatiyasi klinikasi", "answer": "LGMD. Autosomal retsessiv. Son/dumba mushaklari, Gowers belgisi. Yelka kamari, qanot skapula. Boldirlar psevdogipetrofiyasi. O'rdak yurishi. CK ↑. Bolalik–voyaga yetish."}]}]};

let doneSet = new Set();
let openCards = new Set();
let currentCh = null;
let storageReady = false;

const STORAGE_KEY = 'medques_done';

async function loadDone(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if(result && result.value){
      doneSet = new Set(JSON.parse(result.value));
    }
  }catch(e){
    doneSet = new Set();
  }
  storageReady = true;
  renderChapters();
}

async function saveDone(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify([...doneSet]), false);
  }catch(e){
    console.error('Saqlashda xatolik:', e);
  }
}

function getKey(c,n){return c+'_'+n}

function updateStats(){
  document.getElementById('totalDone').textContent=doneSet.size;
  document.getElementById('totalFill').style.width=Math.min(doneSet.size/315*100,100)+'%';
}

function renderChapters(){
  document.getElementById('chaptersList').innerHTML=APP_DATA.chapters.map(ch=>{
    const done=ch.questions.filter(q=>doneSet.has(getKey(ch.id,q.num))).length;
    const pct=ch.count?done/ch.count*100:0;
    return `<div class="chapter-card ${ch.id}" onclick="showQuestions('${ch.id}')">
<div class="chapter-top"><div class="chapter-info">
<div class="chapter-icon">${ch.icon}</div>
<div><div class="chapter-name">${ch.name}</div>
<div class="chapter-count">📋 ${ch.count} ta bilet</div></div></div>
<div class="chapter-arrow">›</div></div>
<div class="chapter-progress"><div class="progress-numbers">
<span><strong>${done}</strong>/${ch.count} o'rganildi</span>
<span style="color:#34d399;font-weight:600">${Math.round(pct)}%</span></div>
<div class="progress-bar-chapter"><div class="progress-fill-chapter" style="width:${pct}%"></div></div></div></div>`;
  }).join('');
  updateStats();
}

function showQuestions(chId){
  currentCh=chId;
  const ch=APP_DATA.chapters.find(c=>c.id===chId);
  if(!ch)return;
  document.getElementById('chaptersView').classList.add('hidden');
  document.getElementById('questionsView').classList.add('active');
  document.getElementById('questionsTitle').textContent=ch.name;
  document.getElementById('searchBox').value='';
  openCards.clear();
  renderQuestions(ch.questions);
}

function renderQuestions(questions){
  document.getElementById('questionsList').innerHTML=questions.length?questions.map(q=>{
    const key=getKey(currentCh,q.num);
    const isDone=doneSet.has(key);
    return `<div class="question-card ${isDone?'done':''}" id="q-${key}">
<div class="question-header" onclick="toggleQuestion('${key}')">
<div class="question-meta"><div class="question-num">Bilet №${q.num}</div>
<div class="question-text">${escapeHtml(q.text)}</div></div>
<div class="question-toggle" id="toggle-${key}">▼</div></div>
<div class="question-body" id="body-${key}">
<div class="answer-title">✓ Javob</div>
<div class="answer-text">${escapeHtml(q.answer)}</div>
<div class="question-done"><button class="btn-done ${isDone?'active':''}" onclick="toggleDone(event,'${key}')">
${isDone?"✅ O'rganildi":"⬜ O'rgandim"}</button></div></div></div>`;
  }).join(''):'<div class="empty">Hech narsa topilmadi</div>';
}

function filterQuestions(){
  const ch=APP_DATA.chapters.find(c=>c.id===currentCh);
  if(!ch)return;
  const q=document.getElementById('searchBox').value.toLowerCase();
  const filtered=q?ch.questions.filter(item=>item.text.toLowerCase().includes(q)||item.answer.toLowerCase().includes(q)):ch.questions;
  openCards.clear();
  renderQuestions(filtered);
}

function showChapters(){
  document.getElementById('questionsView').classList.remove('active');
  document.getElementById('chaptersView').classList.remove('hidden');
  openCards.clear();
  renderChapters();
}

function toggleQuestion(key){
  if(openCards.has(key))openCards.delete(key);else openCards.add(key);
  const b=document.getElementById('body-'+key);
  const t=document.getElementById('toggle-'+key);
  if(b)b.classList.toggle('open',openCards.has(key));
  if(t)t.textContent=openCards.has(key)?'▲':'▼';
}

function toggleDone(e,key){
  e.stopPropagation();
  if(doneSet.has(key))doneSet.delete(key);else doneSet.add(key);
  saveDone();
  const btn=e.target;
  const isDone=doneSet.has(key);
  btn.classList.toggle('active',isDone);
  btn.textContent=isDone?"✅ O'rganildi":"⬜ O'rgandim";
  const card=document.getElementById('q-'+key);
  if(card)card.classList.toggle('done',isDone);
  updateStats();
}

function escapeHtml(t){
  const d=document.createElement('div');
  d.textContent=t;
  return d.innerHTML;
}

loadDone();
</script>
