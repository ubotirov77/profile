<style>
:root{--bg:#f5f5f5;--card:#fff;--border:#e0e0e0;--text:#212121;--muted:#757575;--accent:#5b7fff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--card);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.1);position:sticky;top:0;z-index:100}
.header-title{font-size:20px;font-weight:700;margin-bottom:8px}
.header-subtitle{font-size:13px;color:var(--muted)}
.progress-section{background:var(--card);padding:16px;margin:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);border-radius:12px}
.progress-stat{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stat-label{font-size:14px;color:var(--muted)}
.stat-value{font-weight:700;color:var(--accent);font-size:16px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.content-wrapper{flex:1;overflow-y:auto}
.chapters-section{padding:16px}
.chapters-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.chapter-card{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;border-top:4px solid}
.chapter-card.onko{border-top-color:#ff6b9d}.chapter-card.endo{border-top-color:#34d399}
.chapter-card.inf{border-top-color:#38bdf8}.chapter-card.neuro{border-top-color:#f59e0b}
.chapter-top{padding:16px;display:flex;align-items:center;justify-content:space-between}
.chapter-info{display:flex;align-items:center;gap:12px;flex:1}
.chapter-icon{font-size:32px}.chapter-name{font-size:16px;font-weight:600}
.chapter-count{font-size:13px;color:var(--muted);margin-top:2px}
.chapter-arrow{color:var(--muted);font-size:20px}
.chapter-progress{padding:0 16px 12px}
.progress-numbers{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-numbers strong{color:var(--text)}
.progress-bar-chapter{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill-chapter{height:100%;background:#34d399;border-radius:3px}
.questions-view{display:none;padding:16px;padding-bottom:20px}
.questions-view.active{display:block}
.questions-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.back-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--accent);padding:4px;font-weight:600}
.questions-title{font-size:18px;font-weight:700}
.search-box{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:14px;outline:none}
.search-box:focus{border-color:var(--accent)}
.question-card{background:var(--card);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:4px solid var(--accent)}
.question-card.done{border-left-color:#34d399}
.question-header{padding:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.question-meta{flex:1}
.question-num{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.question-text{font-size:14px;font-weight:500;line-height:1.5}
.question-toggle{color:var(--muted);font-size:18px;flex-shrink:0}
.question-body{border-top:1px solid var(--border);padding:14px;background:#fafafa;display:none}
.question-body.open{display:block}
.answer-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.answer-text{font-size:13.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
.question-done{margin-top:12px}
.btn-done{width:100%;padding:10px 12px;border:1.5px solid #34d399;background:rgba(52,211,153,.08);color:#34d399;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-done.active{background:#34d399;color:#fff}
.footer{background:var(--card);border-top:1px solid var(--border);padding:16px;text-align:center;margin-top:auto;font-size:12px;color:var(--muted)}
.footer strong{color:var(--accent);font-weight:700}
.chapters-view.hidden{display:none}
.empty{text-align:center;padding:40px;color:var(--muted)}
</style>

<script>
const APP_DATA={"chapters": [{"id": "onko", "name": "Onkologiya", "icon": "🔬", "count": 72, "questions": [{"num": 1, "text": "O'pka rakining atipik formalari", "answer": "Atipik (klassik bo'lmagan) formalarda kasallik birinchi navbatda boshqa a'zo yoki tizim belgilari bilan namoyon bo'ladi, birlamchi o'pka o'chog'i esa kech aniqlanadi:\n1) Pnevmoniyasimon forma — infiltrativ o'sish, isitma, yo'tal; antibiotiklarga javob bermaydigan \"pnevmoniya\" sifatida kechadi.\n2) Mediastinal forma — o'sma yoki metastatik limfa tugunlari mediastinani bosadi, yuqori kovak vena sindromi beradi (yuz va bo'yin shishi, bo'yin venalari kengayishi).\n3) Miya (serebral) formasi — birinchi belgi miya metastazi: bosh og'rig'i, falaj, tutqanoq.\n4) Suyak formasi — patologik sinish, suyak og'rig'i bilan boshlanadi.\n5) Plevral forma — eksudativ, ko'pincha qonli plevrit.\n6) Yurak/perikard formasi — perikardit yoki tamponada bilan namoyon bo'ladi."}, {"num": 2, "text": "O'pka rakining qaysi shaklida klinik simptomlar kech boshlanadi", "answer": "Periferik shaklda simptomlar kech paydo bo'ladi. Sababi: o'sma mayda bronxlar, bronxiolalar va alveolalarda — o'pka parenximasining chetida joylashadi. Parenximada og'riq retseptorlari kam va yirik bronx o'tkazuvchanligi uzoq saqlanadi, shuning uchun o'sma ancha kattalashguncha shikoyat bermaydi (\"sokin zona\"). Belgilar faqat o'sma plevra, ko'krak devori yoki yirik bronxga yetib borgach paydo bo'ladi: ko'krak og'rig'i, nafas qisishi, yo'tal. Markaziy shaklda esa o'sma yirik bronxda joylashib uni erta toraytiradi → yo'tal, qon tupurish, nafas qisishi erta boshlanadi. Aynan shuning uchun periferik rak ko'pincha tasodifan, profilaktik tekshiruvda (flyuorografiya/KT) topiladi."}, {"num": 3, "text": "O'pka rakining periferik shaklida qaysi qismlar zararlanadi", "answer": "Periferik rak segmentar va undan mayda bronxlar, bronxiolalar hamda alveolalardan o'sadi (o'pka parenximasi cheti). Tarqalish yo'nalishi: plevra (og'riq, plevrit), ko'krak devori (qovurg'a destruksiyasi), diafragma.\nAlohida tur — Penkost (Pancoast) o'smasi: o'pka cho'qqisida joylashadi va yaqin tuzilmalarni bosadi → plexus brachialis (qo'lda og'riq, kuchsizlik), bo'yin simpatik tuguni (Horner sindromi: ptoz, mioz, enoftalm, terlamaslik), qovurg'alar va umurtqa pog'onasi. Periferik o'sma kavernalashishi (parchalanish) ham mumkin."}, {"num": 4, "text": "O'pka rakining markaziy shaklida qaysi qismlar zararlanadi", "answer": "Markaziy rak bosh (asosiy), bo'lak va segment bronxlaridan boshlanadi. O'sma bronx lumeniga o'sib uni toraytiradi yoki butkul bekitadi → avval gipoventilyatsiya, so'ng atelektaz, obstruksion pnevmoniya, abssess yoki bronxoektaz rivojlanadi.\nErta belgilar: quruq yoki balgʻamli yo'tal, qon tupurish (gemoptoe), nafas qisishi, takroriy \"pnevmoniyalar\". Markaziy o'sma bronxoskopiyada ko'rinadi va to'g'ridan-to'g'ri biopsiya qilinadi, shuning uchun erta tashxislanadi."}, {"num": 5, "text": "O'pka saratoni profilaktikasi", "answer": "Birlamchi profilaktika (kanserogen ta'sirni yo'qotish):\n1) Chekishni butunlay tashlash — eng muhim chora; passiv chekishdan ham himoyalanish.\n2) Kasbiy zararlardan himoya: asbest, radon, og'ir metallar, mishyak, ko'mir changi.\n3) Atmosfera va maishiy havo ifloslanishini kamaytirish.\n4) Sabzavot-mevaga boy, muvozanatli ovqatlanish.\nIkkilamchi (erta aniqlash): xavf guruhida past dozali ko'krak KT-skrining, flyuorografiya, balgʻam sitologiyasi.\nUchlamchi: davolangan bemorlarda retsidiv/asorat profilaktikasi va reabilitatsiya."}, {"num": 6, "text": "O'pka saratonining davolash turlari", "answer": "1) Jarrohlik (rezektabel nomayda hujayrali rak — I–II, ayrim IIIA bosqichlar): lobektomiya, bilobektomiya, pulmonektomiya yoki sublobar rezeksiya; limfa tugunlari disseksiyasi bilan.\n2) Nur terapiyasi — operatsiya mumkin bo'lmaganda; stereotaktik nur (SBRT) kichik o'choqlarda.\n3) Ximioterapiya — mayda hujayrali rakda asosiy usul, platina asosida (sisplatin/karboplatin + etoposid).\n4) Immunoterapiya — PD-1/PD-L1 ingibitorlari (pembrolizumab, atezolizumab).\n5) Maqsadli terapiya — EGFR (osimertinib), ALK, ROS1 mutatsiyalarida.\n6) Kombinatsiyalangan yoki palliativ davo.\nTanlov gistologik turga, bosqichga, molekulyar profilga va bemor umumiy holatiga bog'liq."}, {"num": 7, "text": "O'pka raki diagnostikasida instrumental tekshirish usullari", "answer": "1) Ko'krak rentgenografiyasi 2 proyeksiyada — boshlang'ich, skrining usul.\n2) Ko'krak KT (kontrast bilan) — asosiy usul; o'sma o'lchami, joylashuvi, LT baholanadi.\n3) Bronxoskopiya + biopsiya/yuvindi — markaziy rakda.\n4) Transtorakal igna biopsiyasi (KT nazoratida) — periferik o'choqda.\n5) Mediastinoskopiya, torakoskopiya, EBUS — mediastinal LT va plevra holatini aniqlash.\n6) PET-KT — uzoq metastazlarni topish va aniq bosqichlash.\n7) Bosh miya MRT — miya metastazi.\n8) Balgʻam sitologiyasi, plevra suyuqligini tahlil qilish."}, {"num": 8, "text": "Sut bezi saratoni TNM bo'yicha klassifikatsiyasi", "answer": "T — o'sma o'lchami: T1 ≤2 sm; T2 >2–5 sm; T3 >5 sm; T4 — ko'krak devori yoki teriga o'sgan (yara, \"apelsin po'sti\", yallig'lanishli rak).\nN — regional limfa tugunlari: N0 — yo'q; N1 — qo'ltiq osti harakatchan tugunlar; N2 — qo'ltiq osti tugunlari bir-biriga/to'qimaga qotgan yoki ichki ko'krak LT; N3 — o'mrov osti/usti tugunlari yoki ichki ko'krak + qo'ltiq birgalikda.\nM — uzoq metastaz: M0 — yo'q; M1 — bor.\nShular asosida 0–IV bosqichlar aniqlanadi."}, {"num": 9, "text": "Sut bezi saratoni gormonal davolash haqida tushuncha", "answer": "Gormonal davo faqat gormon-retseptor musbat (ER+/PR+) o'smalarda samarali — estrogen ta'sirini to'sishga qaratilgan.\n1) Tamoksifen (SERM) — har qanday yoshda, ayniqsa premenopauzal ayollarda; 5–10 yil.\n2) Aromataza ingibitorlari (letrozol, anastrozol, eksemestan) — postmenopauzal ayollarda.\n3) Tuxumdon funksiyasini bostirish — GnRH analoglari (goserelin) yoki ovariektomiya; yosh bemorlarda.\n4) Fulvestrant (estrogen retseptor degradatori) — metastatik holatda.\n5) CDK4/6 ingibitorlari (palbosiklib, ribosiklib) bilan birgalikda — samaradorlikni oshiradi."}, {"num": 10, "text": "Sut bezi saratoniga olib keluvchi kanserogen omillar", "answer": "1) Yosh >50; ayol jinsi.\n2) Genetik: BRCA1/BRCA2 mutatsiyasi, oilaviy anamnez.\n3) Reproduktiv: erta menarxe (<12), kech menopauza (>55), birinchi tug'ruq kechligi (>30), farzandsizlik, emizmaslik.\n4) Gormonal: uzoq muddat gormon o'rnini bosuvchi terapiya (HRT), kombinatsiyalangan og'iz kontratseptivlari.\n5) Turmush tarzi: semizlik (ayniqsa postmenopauzada), alkogol, kam jismoniy faollik.\n6) Nurlanish: yoshlikda ko'krak sohasiga nur ta'siri.\n7) Avvalgi proliferativ mastopatiya, atipik giperplaziya."}, {"num": 11, "text": "Sut bezi saratoniga olib keluvchi kanserogen omillar (qo'shimcha)", "answer": "Xavf omillarini guruhlarga ajratamiz:\n- Reproduktiv: erta menarxe, kech menopauza, kech tug'ish yoki farzandsizlik, qisqa emizish — bularning hammasi umrbod estrogen ta'sirini oshiradi.\n- Genetik: BRCA1/2 (umrbod xavf ~66–87% gacha), oilada erta yoshda rak holatlari.\n- Gormonal: uzoq HRT, ba'zi og'iz kontratseptivlari.\n- Tashqi: ionlovchi nurlanish (ko'krak sohasi).\n- Turmush tarzi: semizlik, alkogol iste'moli, kam harakat.\nProgesteron va estrogen disbalansi hujayra proliferatsiyasini kuchaytirib o'smani rivojlantiradi."}, {"num": 12, "text": "Sut bezi saratonida operativ davolash usullari", "answer": "1) Radikal mastektomiya (Halsted) — bez, ikkala ko'krak mushagi va qo'ltiq osti LT bilan (hozir kam qo'llaniladi).\n2) Modifikatsiyalangan radikal mastektomiya (Madden/Patey) — mushaklar (yoki katta ko'krak mushagi) saqlanadi.\n3) Oddiy mastektomiya — faqat bez olib tashlanadi.\n4) Bezni saqlovchi operatsiyalar: kvadrantektomiya, lumpektomiya (tumorektomiya) + qo'ltiq osti LT disseksiyasi — nur terapiyasi bilan birga.\n5) \"Qorovul\" (sentinel) limfa tuguni biopsiyasi — qo'ltiq LT holatini aniqlash uchun.\n6) Rekonstruktiv (plastik) operatsiyalar."}, {"num": 13, "text": "Sut bezi saratonida uchraydigan patologik simptomlar", "answer": "1) Og'riqsiz, zich, harakatsiz tugun (eng tipik belgi).\n2) \"Apelsin po'sti\" simptomi — teri limfostazidan donador ko'rinish.\n3) Teri qizarishi, mahalliy isish (yallig'lanishli formada).\n4) So'rg'ich (nipel) ichkariga tortilishi (retraksiya).\n5) So'rg'ichdan qonli yoki seroz ajralma.\n6) Paget kasalligi — so'rg'ich va atrofidagi ekzemasimon o'zgarish.\n7) Qo'ltiq osti limfa tugunlari kattalashishi.\n8) Bez deformatsiyasi, terining tortilishi (\"chuqurcha\" simptomi)."}, {"num": 14, "text": "Sut bezi saratoni rak oldi kasalliklari", "answer": "1) Fibroadenoma (xavfsiz, ammo kuzatuv talab etadi).\n2) Proliferativ mastopatiya, ayniqsa atipik (duktal/lobular) giperplaziya — eng xavfli holat.\n3) Sut yo'li ichi papillomasi.\n4) LCIS — lobular karsinoma in situ (xavf belgisi).\n5) DCIS — duktal karsinoma in situ (haqiqiy rak oldi, invaziv rakka o'tishi mumkin).\n6) Sklerozlovchi adenoz.\n7) Murakkab (proliferativ) kista.\nUmumiy printsip: atipik giperplaziya bo'lgan ayollarda rak xavfi sezilarli oshadi."}, {"num": 15, "text": "Sut bezi saratoni profilaktikasi", "answer": "Birlamchi: sog'lom ovqatlanish, muntazam jismoniy faollik, optimal vaznni saqlash, tug'ish va emizish, alkogolni cheklash.\nIkkilamchi (erta aniqlash): 40–74 yoshda mammografiya har 1–2 yilda; o'z-o'zini tekshirish; xavf guruhida UST va MRT.\nKimyoviy profilaktika: yuqori xavfli ayollarda tamoksifen yoki aromataza ingibitorlari.\nJarrohlik profilaktikasi: BRCA1/2 tashuvchilarda profilaktik mastektomiya va/yoki ovariektomiya."}, {"num": 16, "text": "Sut bezi saratonida radikal operatsiyalar", "answer": "Radikal operatsiyalar o'sma bilan birga regional limfa kollektorlarini ham olib tashlashga qaratilgan:\n1) Radikal mastektomiya (Halsted) — bez, katta va kichik ko'krak mushaklari, qo'ltiq osti kletchatka va LT bilan.\n2) Kengaytirilgan radikal mastektomiya — qo'shimcha ichki ko'krak (parasternal) LT bilan.\n3) Modifikatsiyalangan radikal mastektomiya (Madden) — mushaklar saqlanadi.\n4) Bezni saqlovchi radikal operatsiya (kvadrantektomiya/lumpektomiya) + qo'ltiq disseksiyasi + nur terapiyasi.\n5) Sentinel LT biopsiyasi — keraksiz keng disseksiyadan saqlaydi."}, {"num": 17, "text": "Sut bezi saratonining klinikasi va diagnostikasi", "answer": "Klinika: og'riqsiz zich tugun, teri o'zgarishlari (\"apelsin po'sti\", chuqurcha), so'rg'ich retraksiyasi yoki ajralmasi, qo'ltiq LT kattalashishi.\nDiagnostika:\n1) Mammografiya — \"oltin standart\" skrining.\n2) UST — zich bezda va yosh ayollarda.\n3) MRT — implant, ko'p o'choqli holat, BRCA tashuvchilar.\n4) Ingichka igna aspiratsion biopsiyasi (sitologiya).\n5) Trepan-biopsiya (gistologiya) — asosiy tasdiqlash.\n6) Immunogistokimyo: ER, PR, HER2, Ki-67 — davo tanlash uchun."}, {"num": 18, "text": "Qalqonsimon bez saratoni klinikasi", "answer": "Erta bosqich: bo'yinda og'riqsiz, qattiq, harakatsiz tugun; sekin kattalashadi.\nKech bosqich (qo'shni tuzilmalar bosilganda):\n- Ovoz xirillashi — qaytuvchi (rekurrent) nerv zararlanishi.\n- Nafas qisishi, stridor — traxeya bosilishi.\n- Yutinishning qiyinlashuvi (disfagiya) — qizilo'ngach bosilishi.\nMetastazlar: avval bo'yin (servikal) limfa tugunlari; uzoqqa — o'pka, suyak, miya. Medullyar rakda kalsitonin ko'p chiqib, diareya va yuzning qizarishi kuzatilishi mumkin."}, {"num": 19, "text": "Qalqonsimon bez saratoni gistologik turlari", "answer": "1) Papillyar rak (60–70%) — eng ko'p; prognoz yaxshi; limfogen yo'l bilan tarqaladi.\n2) Follikulyar rak (15–20%) — gematogen (qon orqali) metastaz beradi (o'pka, suyak).\n3) Medullyar rak (5–10%) — parafollikulyar C-hujayralardan; kalsitonin ishlab chiqaradi; MEN-2 sindromi bilan bog'liq.\n4) Anaplastik (differensiatsiyalanmagan) rak (<5%) — eng agressiv, tez o'sadi, prognoz juda yomon.\n5) Limfoma — kam uchraydi (ko'pincha Hashimoto fonida)."}, {"num": 20, "text": "Qalqonsimon bez saratoni TNM klassifikatsiyasi", "answer": "T — o'sma o'lchami va tarqalishi: T1 ≤2 sm; T2 >2–4 sm; T3 >4 sm yoki bezdan tashqariga minimal o'sgan; T4a — teri, qizilo'ngach, traxeya, qaytuvchi nervga; T4b — umurtqaoldi fastsiya yoki uyqu arteriyasiga.\nN — regional LT: N0 — yo'q; N1a — pretraxeal/paratraxeal (VI guruh); N1b — boshqa servikal yoki yuqori mediastinal.\nM — M0/M1.\nMuhim: papillyar va follikulyar rakda bosqichlash bemor yoshiga (55 yosh chegarasi) ham bog'liq."}, {"num": 21, "text": "Qalqonsimon bez saratoni diagnostikasi", "answer": "1) UST + elastografiya — tugun tuzilishi, mikrokalsinatlar, chegaralarni baholaydi.\n2) Ingichka igna aspiratsion biopsiyasi (IIAB) — asosiy usul, Bethesda tizimi bo'yicha baholanadi.\n3) Gormonlar: TTG, T3, T4 — funksiyani aniqlash.\n4) Kalsitonin — medullyar rak markeri.\n5) Tireoglobulin — operatsiyadan keyin papillyar/follikulyar rak monitoringi.\n6) KT/MRT — yirik yoki tarqalgan o'smada.\n7) Radioyod (131I) ssintigrafiyasi — \"sovuq\" tugunlar va metastazlarni aniqlash.\n8) PET-KT — differensiatsiyasi past o'smalar."}, {"num": 22, "text": "Qalqonsimon bez rak oldi kasalliklari", "answer": "To'g'ridan-to'g'ri rak oldi holatlar kam, biroq xavfni oshiruvchilar:\n1) Follikulyar adenoma.\n2) Nodozli (ko'p tugunli) zob.\n3) Hashimoto tiroiditi (ayniqsa limfoma xavfi).\n4) Diffuz toksik zob.\n5) Boshqa sababli (ayniqsa bolalik davridagi) bo'yin nurlanishi anamnezi.\n6) MEN-2 sindromi (medullyar rak xavfi).\n7) UST da 1 sm dan katta, shubhali \"sovuq\" tugunlar (mikrokalsinatlar, notekis chegara)."}, {"num": 23, "text": "Qalqonsimon bez saratoni etiopatogenezi", "answer": "Etiologiya: ionlovchi nurlanish (eng muhim, ayniqsa bolalikda), yod yetishmovchiligi yoki ortiqchaligi, irsiyat (MEN-2, oilaviy medullyar rak), surunkali avtoimmun tiroidit (Hashimoto), gormonal disbalans.\nPatogenez: RET (medullyar va papillyarda), BRAF (papillyarda), RAS, PAX8-PPARγ genlarining mutatsiyasi → hujayra bo'linishi ustidan nazorat yo'qoladi → tartibsiz proliferatsiya → kapsuladan o'tib invaziya va metastaz. Yod yetishmasligida TTG surunkali oshib bezni rag'batlantiradi va o'sma rivojini osonlashtiradi."}, {"num": 24, "text": "Qalqonsimon bez yomon sifatli o'smalarini davolash", "answer": "1) Jarrohlik — asosiy usul: total yoki subtotal tireoidektomiya + (ko'rsatma bo'lsa) bo'yin limfa disseksiyasi.\n2) Radioyod terapiyasi (131I) — papillyar va follikulyar rakda qoldiq to'qima va metastazlarni yo'qotish uchun.\n3) Suppressiv L-tiroksin terapiyasi — TTG ni bostirib o'sma rag'batini kamaytiradi va o'rin bosadi.\n4) Tashqi nur terapiyasi — anaplastik va ayrim medullyar raklarda.\n5) Ximioterapiya — anaplastik rakda.\n6) Maqsadli terapiya — sorafenib, lenvatinib (radioyodga rezistent), vandetanib (medullyar)."}, {"num": 25, "text": "Buyrak saratoni klinikasi", "answer": "Klassik triada (kech va kam uchraydi): 1) og'riqsiz gematuriya; 2) bel/yon og'rig'i; 3) paypaslanadigan o'sma.\nKo'pincha kasallik simptomsiz kechib, tasodifan UST/KT da topiladi.\nParaneoplastik belgilar: sababsiz isitma, polisitemiya (eritropoetin), giperkalsiemiya (PTHrP), arterial gipertenziya (renin), gepatik disfunksiya (Shtauffer sindromi).\nMetastazlar: o'pka (eng ko'p), suyak, jigar, miya. Erkaklarda chap tomonda paydo bo'lgan varikotsele buyrak venasi/v.cava bosilishidan dalolat berishi mumkin."}, {"num": 26, "text": "Buyrak saratoni gistologik turlari", "answer": "1) Yorug' hujayrali (clear cell) rak — 75–80%, eng ko'p; VHL gen bilan bog'liq.\n2) Papillyar rak — 10–15%.\n3) Xromofob rak — ~5%, prognozi nisbatan yaxshi.\n4) Bellini yig'uvchi naychasi karsinomasi — kam, juda agressiv.\n5) Wilms o'smasi (nefroblastoma) — bolalarda.\nXavfsiz o'smalar: angiomiolipoma, onkotsitoma. Ular ham buyrakda uchraydi, ammo malign emas."}, {"num": 27, "text": "Buyrak saratoni TNM klassifikatsiyasi", "answer": "T — o'sma o'lchami va tarqalishi: T1a ≤4 sm; T1b >4–7 sm; T2a >7–10 sm; T2b >10 sm (buyrak ichida); T3a — buyrak venasi yoki paranefral yog'ga; T3b — diafragma ostidagi pastki kovak venaga; T3c — diafragma ustidagi v.cava yoki uning devoriga; T4 — Gerota fastsiyasidan tashqariga (jumladan buyrak usti beziga).\nN — N0 (yo'q) / N1 (regional LT bor).\nM — M0 / M1 (uzoq metastaz)."}, {"num": 28, "text": "Buyrak saratoni kliniko-anatomik klassifikatsiyasi", "answer": "Joylashuvi bo'yicha: yuqori yoki quyi qutb, o'rta qism; intrarenal (bez ichida) yoki ekstrarenal (kapsuladan tashqariga o'sgan).\nTarqalish bosqichlari (soddalashtirilgan):\nI — o'sma buyrak ichida, kapsula buzilmagan;\nII — Gerota fastsiyasi ichida tarqalgan, ammo undan o'tmagan;\nIII — buyrak venasi/v.cava yoki regional LT zararlangan;\nIV — qo'shni a'zolar yoki uzoq metastazlar."}, {"num": 29, "text": "Buyrak saratoni rak oldi kasalliklari", "answer": "Aniq \"rak oldi\" holati kam, lekin xavfni oshiruvchi omillar va sindromlar:\n1) Von Hippel-Lindau sindromi (ko'p o'choqli, ikki tomonlama rak).\n2) Irsiy papillyar buyrak karsinomasi.\n3) Birt-Hogg-Dubé sindromi.\n4) Tuberoz skleroz (angiomiolipoma fonida).\n5) Surunkali buyrak yetishmovchiligi va uzoq dializ → orttirilgan kistalar kasalligi.\nQo'shimcha xavf: chekish, semizlik, gipertenziya, analgetiklarni suiiste'mol qilish."}, {"num": 30, "text": "Buyrak saratoni diagnostikasi", "answer": "1) UST — birinchi, qo'lda qulay usul (qattiq massa/kistadan farqlash).\n2) Kontrastli KT — asosiy usul; o'sma, tomir invaziyasi, LT baholanadi.\n3) MRT — venoz tromb va kontrastga allergiyada.\n4) Ko'krak rentgen/KT — o'pka metastazi.\n5) Suyak ssintigrafiyasi — suyak metastazi shubhasida.\n6) Igna biopsiyasi — noaniq hollarda (ko'pincha kerak emas).\n7) Umumiy siydik tahlili — gematuriya; qon — anemiya/polisitemiya, kalsiy."}, {"num": 31, "text": "Buyrak saratoni profilaktikasi", "answer": "1) Chekishni tashlash (asosiy o'zgartiriladigan omil).\n2) Arterial gipertenziyani nazorat qilish.\n3) Optimal vaznni saqlash (semizlikni kamaytirish).\n4) Analgetiklar (ayniqsa fenatsetin) suiiste'molidan saqlanish.\n5) Kasbiy zararlardan himoya (kadmiy, asbest, neft mahsulotlari).\n6) Irsiy sindromlarda genetik maslahat va kuzatuv.\n7) Xavf guruhida UST skrining."}, {"num": 32, "text": "Moyak saratoni diagnostikasi", "answer": "1) Skrotum UST — birinchi va asosiy usul (qattiq intratestikulyar o'choq).\n2) O'sma markerlari: AFP (noseminomada oshadi), beta-hCG (seminoma va noseminomada), LDH (o'sma massasi/prognoz).\n3) Ko'krak, qorin va tos KT — retroperitoneal LT va uzoq metastazlar.\n4) Bosh miya MRT — neyrologik belgilarda.\n5) Inguinal (chov) orxiektomiya — gistologik tasdiq (skrotal biopsiya qilinmaydi!).\n6) PET-KT — qoldiq massalarni baholash, ayniqsa seminomada."}, {"num": 33, "text": "Moyak saratoni klinikasi", "answer": "Erta belgilar: moyakda og'riqsiz, zich tugun yoki kattalashish; skrotumda og'irlik hissi.\nKech belgilar: retroperitoneal limfa tugunlari kattalashganda bel og'rig'i; o'pka metastazida nafas qisishi va yo'tal; beta-hCG ta'sirida ginekomastiya.\nAsosan 15–35 yoshli erkaklarda uchraydi. Xavf omillari: kriptorxizm (tushmagan moyak), oilaviy anamnez, oldingi moyak raki."}, {"num": 34, "text": "Prostata bezi saratoni klinikasi", "answer": "Erta bosqich ko'pincha simptomsiz — PSA tekshiruvida yoki rektal palpatsiyada aniqlanadi.\nMahalliy simptomlar (bez kattalashganda): siydik chiqishining qiyinlashuvi, oqimning kuchsizlanishi, tez-tez va tunda siyish, qoldiq siydik hissi (BPG belgilariga o'xshash).\nKech/metastatik bosqich: suyak og'rig'i (umurtqa, tos suyaklari — osteoblastik metastaz), anemiya, patologik sinishlar, siydik yo'li obstruksiyasi va buyrak yetishmovchiligi."}, {"num": 35, "text": "Prostata bezi saratoni rak oldi kasalliklari", "answer": "1) Yuqori darajali prostatik intraepitelial neoplaziya (HGPIN) — eng muhim, bevosita rak oldi holati.\n2) Atipik mayda atsinar proliferatsiya (ASAP) — biopsiyada topilsa, qayta biopsiya talab etadi.\n3) Xavfsiz prostata giperplaziyasi (BPG) — bevosita rak oldi emas, ammo tashxisni qiyinlashtiradi va simptomlar berib aralashadi.\n4) Surunkali prostatit — yallig'lanish PSA ni oshirib chalg'itishi mumkin."}, {"num": 36, "text": "Prostata bezi saratoni davolash usullari", "answer": "Mahalliy (lokalizatsiyalangan) rak:\n1) Radikal prostatektomiya (ko'pincha robot/laparoskopik).\n2) Nur terapiyasi — tashqi nur + brakiterapiya.\n3) Faol kuzatuv — past xavfli o'smalarda.\nTarqalgan/metastatik rak:\n4) Androgen-deprivatsion terapiya (ADT): GnRH analoglari, antiandrogenlar.\n5) Ximioterapiya: dotsetaksel, kabazitaksel.\n6) Yangi gormonal vositalar: abirateron, enzalutamid.\n7) Radium-223 — simptomatik suyak metastazlarida."}, {"num": 37, "text": "Siydik pufagi saratoni etiopatogenezi", "answer": "Etiologiya:\n1) Chekish — eng asosiy omil (taxminan yarmi).\n2) Sanoat kanserogenlari: anilin bo'yoqlari, aromatik aminlar (rezina, charm, bo'yoq sanoati).\n3) Schistosoma haematobium infeksiyasi → yassi hujayrali rak (Afrika, Yaqin Sharq).\n4) Siklofosfamid, tos sohasi nurlanishi.\nPatogenez: FGFR3, TP53 va boshqa genlar mutatsiyasi → urotelial giperplaziya → displaziya → karsinoma in situ → invaziv (mushak qatlamiga o'suvchi) rak. Ko'pchiligi o'tuvchi hujayrali (urotelial) rak."}, {"num": 38, "text": "Siydik pufagi rak oldi kasalliklarini davolash", "answer": "1) Karsinoma in situ (CIS): transuretral rezeksiya (TUR) + intravezikal BCG immunoterapiyasi — birinchi tanlov.\n2) Yuzaki past darajali o'smalar (Ta–T1): TUR + intravezikal ximioterapiya (mitomitsin).\n3) Yuqori darajali T1: TUR + BCG; progressiyada radikal sistektomiya.\n4) Papilloma/giperplaziya: TUR va keyin muntazam sistoskopik kuzatuv (har 3–6 oyda).\nMaqsad — invaziv rakka o'tishning oldini olish va retsidivni nazorat qilish."}, {"num": 39, "text": "Siydik pufagi rak oldi kasalliklari", "answer": "1) Papilloma (urotelial).\n2) Urotelial giperplaziya.\n3) Yassi (flat) displaziya.\n4) Karsinoma in situ (CIS) — eng xavfli rak oldi holat; davolanmasa katta qismi invaziv rakka o'tadi.\n5) Teskari (inverted) papilloma.\n6) Leykoplakiya, urotelial metaplaziya (surunkali ta'sirlanish fonida)."}, {"num": 40, "text": "Siydik pufagi rakini diagnostikasi", "answer": "1) Umumiy siydik tahlili — og'riqsiz gematuriya (asosiy belgi).\n2) Siydik sitologiyasi — atipik hujayralar.\n3) Sistoskopiya + biopsiya — asosiy usul; o'smani ko'rib, namuna olinadi.\n4) Fluoressent (ko'k-nur) sistoskopiya — kichik o'choqlar va CIS ni yaxshi ko'rsatadi.\n5) UST, KT-urografiya, MRT — tarqalish va yuqori siydik yo'llarini baholash.\n6) TUR-biopsiya — invaziya chuqurligini aniqlash.\n7) PET-KT — metastaz."}, {"num": 41, "text": "Tuxumdon rakida operatsiya turlari", "answer": "1) Bir tomonlama salpingo-ooforektomiya — erta bosqich, fertillikni saqlash zarur bo'lganda.\n2) Total abdominal gisterektomiya + ikki tomonlama salpingo-ooforektomiya (TAH-BSO) — standart radikal hajm.\n3) Sitoreduktiv (debulking) operatsiya — ko'rinadigan o'sma to'qimasini maksimal olib tashlash.\n4) Interval debulking — neoadyuvant ximioterapiyadan keyin.\n5) Bosqichlash laparotomiyasi: peritoneal yuvindi/biopsiyalar, omentektomiya, regional LT olish."}, {"num": 42, "text": "Tuxumdon rakini davolash", "answer": "1) Jarrohlik — sitoreduktiv operatsiya + bosqichlash (asosiy).\n2) Ximioterapiya — karboplatin + paklitaksel (standart kombinatsiya).\n3) Bevatsizumab (anti-VEGF) — ximioterapiyaga qo'shimcha.\n4) PARP ingibitorlari (olaparib) — BRCA mutatsiyasi yoki gomologik rekombinatsiya yetishmovchiligida (saqlovchi terapiya).\n5) Gormonal terapiya — ayrim stromal va past darajali o'smalarda.\nDavo bosqich, gistologiya va molekulyar profilga moslab tanlanadi."}, {"num": 43, "text": "Tuxumdon raki differentsial diagnostikasi", "answer": "Tuxumdon o'smasini quyidagilardan farqlash kerak:\n1) Funksional kistalar (follikulyar, sariq tana kistasi).\n2) Endometrioma.\n3) Dermoid kista (yetuk teratoma).\n4) Fibroma, tekoma.\n5) Tuxum yo'li (Fallopiy) kasalliklari, gidrosalpinks.\n6) Retroperitoneal o'smalar.\n7) Peritoneal karsinomatoz.\n8) Krukenberg metastazi (oshqozon yoki yo'g'on ichak rakidan tuxumdonga). Markerlar va vizualizatsiya farqlashga yordam beradi."}, {"num": 44, "text": "Tuxumdon raki diagnostikasi", "answer": "1) Transvaginal UST — o'choq tuzilishi (qattiq qism, septalar, qon oqimi).\n2) O'sma markerlari: CA-125 (epitelial), AFP, beta-hCG (german hujayrali), ingibin (granulyozali).\n3) Qorin va tos KT — tarqalish, assit, omentum.\n4) MRT — noaniq massalarni aniqlashtirish.\n5) PET-KT — uzoq metastaz.\n6) Laparoskopiya/laparotomiya + biopsiya — yakuniy tashxis va bosqichlash.\n7) BRCA genetik tekshiruvi."}, {"num": 45, "text": "Tuxumdon raki klinikasi", "answer": "Erta bosqich ko'pincha simptomsiz yoki noaniq: qorinda noqulaylik, dam bo'lish, og'riq, tez to'yish hissi.\nKech bosqich: qorin kattalashishi (assit), vazn yo'qolishi, charchoq, dispepsiya, siyish va defekatsiya o'zgarishlari.\nKasallik ko'pincha kech (III–IV bosqich) aniqlanadi — shu sababli \"jim qotil\" deyiladi.\nMeygs sindromi: tuxumdon fibromasi + assit + gidrotoraks (o'sma olib tashlangach yo'qoladi)."}, {"num": 46, "text": "Tuxumdonlar saratoni profilaktikasi", "answer": "1) Kombinatsiyalangan og'iz kontratseptivlari — uzoq qabulda xavfni sezilarli kamaytiradi.\n2) Ko'p tug'ish va emizish.\n3) BRCA genetik tekshiruvi (oilaviy anamnezda).\n4) Profilaktik ikki tomonlama salpingo-ooforektomiya — BRCA1/2 tashuvchilarda (odatda 35–40 yoshdan keyin, farzandsizlik tugagach).\n5) Naychalarni bog'lash/olib tashlash (salpingektomiya) — xavfni kamaytiradi.\n6) Yuqori xavf guruhida UST + CA-125 kuzatuvi."}, {"num": 47, "text": "Bachadon bo'yni rak oldi kasalliklari, klinikasi, diagnostikasi va davolash", "answer": "Rak oldi: servikal intraepitelial neoplaziya CIN I–III va karsinoma in situ. Asosiy sabab — yuqori onkogen HPV (16, 18 turlari).\nKlinika: ko'pincha simptomsiz; jinsiy aloqadan keyin qon ketishi, patologik ajralma.\nDiagnostika: Pap-smear (sitologiya), kolposkopiya, nishonli biopsiya, HPV-tiplash.\nDavolash: CIN I — ko'pincha kuzatuv (o'z-o'zidan regress bo'lishi mumkin); CIN II/III — LEEP (elektroeksiziya), konizatsiya, krio- yoki lazer destruksiya; karsinoma in situ — konizatsiya yoki gisterektomiya."}, {"num": 48, "text": "Bachadon bo'yni rakida operatsiyadan keyingi asoratlar", "answer": "1) Siydik nayi (ureter) yoki qovuq jarohati → gidronefroz, siydik fistulasi (stent, nefrostoma yoki tiklash kerak).\n2) To'g'ri ichak yaralanishi → rektovaginal fistula.\n3) Tos limfostazi (limfoedema) — kompressiya, fizioterapiya.\n4) Vezikovaginal/rektovaginal fistulalar — jarrohlik tuzatish.\n5) Tuxumdon funksiyasi yo'qolishi → erta menopauza (gormon o'rnini bosuvchi terapiya).\n6) Qin stenozi — dilatatsiya. Qo'shimcha: qon ketish, infeksiya, tromboz."}, {"num": 49, "text": "Bachadon bo'yni rakini davolash", "answer": "IA1: konizatsiya yoki oddiy gisterektomiya.\nIA2–IIA: radikal gisterektomiya (Wertheim) + tos LT disseksiyasi yoki ximionur terapiyasi.\nIIB–IVA: bir vaqtning o'zida ximionur terapiya — sisplatin + tashqi nur + brakiterapiya.\nIVB (uzoq metastaz): palliativ ximioterapiya ± immunoterapiya.\nProfilaktika: HPV vaksinasi (masalan, Gardasil) va muntazam skrining."}, {"num": 50, "text": "Ayollar jinsiy a'zolari xavfli o'smalari diagnostikasi", "answer": "1) Bimanual (qo'l bilan) tekshiruv.\n2) Kolposkopiya + biopsiya — bachadon bo'yni.\n3) Transvaginal UST — bachadon va tuxumdonlar.\n4) Tos KT/MRT — tarqalishni baholash.\n5) O'sma markerlari: CA-125, CA-19-9, CEA, AFP, beta-hCG.\n6) Fraksion diagnostik kюretaj (bachadon shilliq qavati).\n7) Gisteroskopiya.\n8) Laparoskopiya.\n9) PET-KT — uzoq metastaz va retsidiv."}, {"num": 51, "text": "Oshqozon raki etiopatogenezi", "answer": "Etiologiya: Helicobacter pylori (I darajali kanserogen), tuzlangan/dudlangan/quritilgan ovqatlar, chekish, alkogol, surunkali atrofik gastrit, pernisioz anemiya, Menetrier kasalligi, irsiyat.\nPatogenez (Correa kaskadi): normal shilliq qavat → surunkali (atrofik) gastrit → ichak metaplaziyasi → displaziya → karsinoma. Irsiy diffuz rakda CDH1 (E-kadgerin) gen mutatsiyasi rol o'ynaydi. H.pylori surunkali yallig'lanish va shilliq atrofiyasini keltirib chiqarib bu jarayonni boshlaydi."}, {"num": 52, "text": "Oshqozon rakining rentgenologik belgilari", "answer": "Bariy bilan kontrast tekshiruvda:\n1) To'ldirish nuqsoni (defekt) — ekzofit (lumenga o'suvchi) o'sma.\n2) \"Nisha\" (depoo) — yarali (ulserativ) forma.\n3) Nishaning notekis, atipik shakli.\n4) Devor rigidligi va peristaltika yo'qolishi — diffuz infiltratsiya (\"charm shisha\", linitis plastica).\n5) Kardia yoki pilorus sohasida torayish.\n6) Oshqozon hajmining kichrayishi va deformatsiyasi."}, {"num": 53, "text": "Oshqozon rakida limfogen metastazlar", "answer": "Regional: kichik va katta egrilik bo'ylab, prepilorik, jigar darvozasi limfa tugunlari.\nUzoq (klassik, nomli) metastazlar:\n- Virxov tuguni — chap o'mrov usti sohasidagi LT.\n- Krukenberg metastazi — tuxumdon(lar)ga.\n- Mariya Iosif opa (Sister Mary Joseph) tugunchasi — kindik atrofiga.\n- Schnitzler metastazi — to'g'ri ichak-qovuq (Duglas) chuqurchasiga (rektal tekshiruvda paypaslanadi)."}, {"num": 54, "text": "Oshqozonning rak oldi kasalliklari klinikasi", "answer": "1) Surunkali atrofik gastrit — epigastriyda og'irlik, ishtaha pasayishi.\n2) Oshqozon yarasi (xususan kallezli) — ovqatdan keyin og'riq.\n3) Adenomatoz polip — ko'pincha simptomsiz, tasodifan topiladi.\n4) Menetrier kasalligi — og'riq, oqsil yo'qolishi (gipoproteinemiya), shishlar.\n5) Pernisioz (B12-tanqis) anemiya — charchoq, glossit, neyrologik belgilar.\n6) Oshqozon rezeksiyasidan keyingi kult — kech rak xavfi."}, {"num": 55, "text": "Oshqozonning rak oldi kasalliklari diagnostikasi", "answer": "1) FEGDS (fibrogastroskopiya) + biopsiya — asosiy usul.\n2) H. pylori testi (nafas testi, tezkor urease, gistologiya).\n3) Bariy bilan rentgen.\n4) Endoskopik UST (EUS) — devor qatlamlari va polip asosini baholash.\n5) Kontrastli KT.\n6) Gistologik tekshiruv — displaziya darajasi.\n7) Qon: B12 darajasi, parietal hujayralarga qarshi antitanalar (atrofik gastritda)."}, {"num": 56, "text": "Oshqozonning xavfsiz o'smalari", "answer": "1) Adenoma (polip) — eng muhim, malignlanishi mumkin.\n2) Leyomioma.\n3) Fibroma.\n4) Lipoma.\n5) Nevrinoma.\n6) Gemangioma.\n7) Karsinoid (neyroendokrin) o'sma.\n8) GIST (oshqozon-ichak stromal o'smasi) — potensial malign, xavf darajasi o'lcham va mitoz soniga bog'liq.\nDiagnostika: FEGDS + biopsiya, EUS (asosini va qatlamini aniqlash uchun)."}, {"num": 57, "text": "Oshqozonning rak oldi kasalliklarini davolash", "answer": "1) H. pylori eradikatsiyasi — uch komponentli sxema (PPI + ikki antibiotik).\n2) Adenomatoz poliplar — endoskopik rezeksiya (polipektomiya, EMR).\n3) Yuqori darajali displaziya — endoskopik mukozal/submukozal rezeksiya (EMR/ESD) yoki subtotal gastrektomiya.\n4) Yara — konservativ davo (PPI); samarasiz bo'lsa va malignlik shubhasida — jarrohlik.\n5) Muntazam endoskopik kuzatuv (har 6–12 oyda)."}, {"num": 58, "text": "Oshqozon rakini davolash", "answer": "I–II bosqich: gastrektomiya (subtotal yoki total) + D2 limfa disseksiyasi.\nIII bosqich: perioperativ ximioterapiya (FLOT: 5-FU, leykovorin, oksaliplatin, dotsetaksel) + jarrohlik.\nIV bosqich: palliativ ximioterapiya; HER2 musbat o'smalarda trastuzumab qo'shiladi.\nNur terapiyasi — ayrim hollarda adyuvant rejimda.\nDavo bosqich, gistologiya va molekulyar belgilarga moslanadi."}, {"num": 59, "text": "Oshqozon rakida adjuvant ximioterapiya", "answer": "Maqsad — operatsiyadan keyin qolgan mikrometastazlarni yo'qotish va retsidiv xavfini kamaytirish.\n- Perioperativ FLOT (4 kurs operatsiyagacha + 4 kurs keyin) — mahalliy tarqalgan (III) rakda standart.\n- Adyuvant XELOX/CAPOX (kapesitabin + oksaliplatin) — rezeksiyadan keyin.\n- S-1 asosidagi sxemalar (asosan Sharqiy Osiyoda).\n- HER2 musbat metastatik rakda birinchi qatorda trastuzumab + ximioterapiya."}, {"num": 60, "text": "Oshqozon raki klinikasi", "answer": "Erta bosqich (\"kichik belgilar\"): ishtaha pasayishi, go'sht ovqatdan ko'ngil qolishi, epigastriyda og'irlik, tez to'yish hissi, holsizlik.\nKech bosqich: doimiy og'riq, qon ketish (qora najas — melena, qon qusish — gematemez), pilorus torayganda qusish, kardia rakida disfagiya (yutinish qiyinligi), ozish va kaxeksiya. Belgilar o'sma joylashuviga bog'liq."}, {"num": 61, "text": "Oshqozon raki diagnostikasi", "answer": "1) FEGDS + ko'p nuqtali biopsiya — asosiy va eng aniq usul.\n2) Bariy bilan rentgen — to'ldirish nuqsoni, rigidlik.\n3) Endoskopik UST (EUS) — invaziya chuqurligi (T) va yaqin LT.\n4) Kontrastli KT — tarqalish va metastaz.\n5) PET-KT — uzoq metastaz.\n6) Diagnostik laparoskopiya — peritoneal tarqalishni aniqlash.\n7) Markerlar: CEA, CA 19-9.\n8) HER2 testi.\n9) Suyak ssintigrafiyasi (ko'rsatma bo'lsa)."}, {"num": 62, "text": "Oshqozon raki differentsial diagnostikasi", "answer": "Oshqozon rakini quyidagilardan farqlash kerak:\n1) Xavfsiz (kallezli) yara — biopsiya hal qiladi.\n2) Oshqozon limfomasi (MALT).\n3) GIST.\n4) Surunkali gastrit, pankreatit.\n5) Boshqa a'zolardan metastaz.\n6) Karsinoid o'sma.\n7) Leyomiosarkoma.\n8) Menetrier kasalligi.\nFarqlash uchun endoskopiya + gistologiya, EUS va KT asosiy o'rin tutadi."}, {"num": 63, "text": "Oshqozonning qaysi qismida rak ko'p rivojlanadi", "answer": "Eng ko'p — antrum va pilorik qism (taxminan 50–60%).\nKeyingi o'rinda — kichik egrilik (20–25%).\nKardia (qizilo'ngachga o'tish joyi) raki dunyoda ortib bormoqda.\nFundus va katta egrilikda kamroq (5–10%).\nDiffuz forma (linitis plastica) butun oshqozonni egallashi mumkin. Joylashuv davo hajmini (subtotal yoki total rezeksiya) belgilaydi."}, {"num": 64, "text": "Oshqozon rakida operatsiya turlari", "answer": "Radikal operatsiyalar:\n- Subtotal distal gastrektomiya — antrum/pilorik rakda.\n- Total gastrektomiya — tana yoki kardia rakida.\n- Hammasi D2 limfa disseksiyasi bilan bajariladi.\nPalliativ operatsiyalar (simptomni yengillashtirish): gastroenteroanastomoz, gastrostomiya, eyunostomiya, shuntlash.\nEndoskopik (erta rakda): EMR, ESD — shilliq qavatda chegaralangan o'smalarda."}, {"num": 65, "text": "Oshqozon rakida operatsiyadan keyingi asoratlar", "answer": "1) Anastomoz yetishmovchiligi — drenajlash, qayta operatsiya.\n2) Qon ketish — endoskopik gemostaz.\n3) Anastomoz torayishi — bujlash (dilatatsiya).\n4) Demping-sindrom — kichik-kichik, ko'p marta ovqatlanish; somatostatin.\n5) Gastrektomiyadan keyingi anemiya — B12 va temir o'rnini to'ldirish.\n6) Vazn yo'qolishi va ozish — nutritiv qo'llab-quvvatlash.\n7) Infeksiya, tromboz."}, {"num": 66, "text": "Oshqozon rakida palliativ davolash", "answer": "Maqsad — radikal davo mumkin bo'lmaganda simptomlarni yengillatish va hayot sifatini saqlash:\n1) Gastroenteroanastomoz — pilorus obstruksiyasida o'tkazgich yo'l.\n2) Endoskopik stent — torayishni kengaytirish.\n3) Gastrostomiya yoki eyunostomiya — ovqatlantirish yo'li.\n4) Lazer/argon ablatsiya — o'sma va qon ketishni nazorat qilish.\n5) Palliativ ximioterapiya — o'sishni sekinlashtirish va og'riqni kamaytirish."}, {"num": 67, "text": "Savitskiy kichik simptomlar sindromi", "answer": "A. V. Savitskiy taklif etgan oshqozon rakining erta (\"kichik\") belgilari majmui:\n1) Umumiy holsizlik, charchoq.\n2) Ishtahaning pasayishi.\n3) Go'sht taomlaridan ko'ngil qolishi (nafratlanish).\n4) Epigastriyda doimiy og'irlik va noqulaylik.\n5) Sababsiz ozish.\n6) Ruhiy tushkunlik, ishga layoqatning pasayishi.\nBu belgilar bir necha hafta-oy davom etsa, albatta onkologik yo'nalishda (FEGDS) tekshirish lozim."}, {"num": 68, "text": "Savitskiy katta simptomlar sindromi", "answer": "Oshqozon rakining kech (\"katta\") belgilari — kasallik avj olganini ko'rsatadi:\n1) Doimiy, kuchli og'riq.\n2) Qon ketish — melena (qora najas), gematemez (qon qusish).\n3) Obstruksiya belgilari — qusish (pilorus), disfagiya (kardia).\n4) Ko'rinadigan yoki paypaslanadigan o'sma.\n5) Metastaz belgilari — sariqlik, assit, Virxov tuguni.\n6) Og'ir kaxeksiya (charchash)."}, {"num": 69, "text": "Oshqozon saratoni TNM klassifikatsiyasi", "answer": "T — devorga invaziya chuqurligi: Tis — in situ; T1a — lamina propria/mushak plastinka; T1b — submukoza; T2 — mushak qavati; T3 — subseroza; T4a — seroza (visseral pardadan o'tgan); T4b — qo'shni a'zolar.\nN — zararlangan regional LT soni: N0; N1 — 1–2; N2 — 3–6; N3a — 7–15; N3b — ≥16.\nM — uzoq metastaz: M0 / M1."}, {"num": 70, "text": "Yo'g'on ichak saratoni gistologik turlari", "answer": "1) Adenokarsinoma (90–95%) — eng ko'p tarqalgan tur.\n2) Shilliqli (mutsinoz) karsinoma — ko'p miqdorda shilimshiq ishlab chiqaradi.\n3) Uzuksimon (signet-ring) hujayrali rak — yomon prognoz.\n4) Medullyar rak — ko'pincha MSI-H (mikrosatellit beqaror).\n5) Neyroendokrin karsinoma.\n6) Yassi hujayrali rak (kam, asosan anorektal sohada)."}, {"num": 71, "text": "To'g'ri ichak saratoni TNM klassifikatsiyasi", "answer": "T — devorga invaziya: T1 — submukoza; T2 — mushak qavati; T3 — perirektal to'qima; T4a — visseral peritoneum; T4b — qo'shni a'zolar.\nN — regional LT: N0; N1a — 1 ta LT; N1b — 2–3 ta; N1c — \"tumor deposits\" (LTsiz o'sma o'choqlari); N2a — 4–6 ta; N2b — ≥7 ta.\nM — uzoq metastaz: M1a — bitta a'zo; M1b — bir nechta a'zo; M1c — peritoneal tarqalish."}, {"num": 72, "text": "To'g'ri ichak saratoni klinikasi", "answer": "1) To'g'ri ichakdan qon ketishi (najasda qizil qon) — ko'pincha birinchi belgi.\n2) Ich kelishi xarakterining o'zgarishi (qabziyat/diareya almashinuvi).\n3) Tenezmlar — yolg'on, og'riqli ichak bo'shatish istagi.\n4) To'liq bo'shamaganlik hissi.\n5) Og'riq — anal, chot yoki dumg'aza sohasida.\n6) Shilliq va qon aralash ajralma.\n7) Obstruksiya — kech bosqichda.\n8) Metastazlar: jigar, o'pka, peritoneum."}]}, {"id": "endo", "name": "Endokrinologiya", "icon": "🧬", "count": 90, "questions": [{"num": 1, "text": "Gipofiz qayerda joylashgan va u qanday qismlardan iborat", "answer": "Gipofiz miyaning asosida, ponasimon suyakdagi turk egari (sella turcica) chuqurchasida joylashgan; gipotalamus bilan oyoqcha (voronka) orqali bog'langan.\nIkki asosiy qismdan iborat:\n1) Adenogipofiz (oldingi bo'lak) — STG (o'sish gormoni), TTG, AKTG, FSH, LG, prolaktin, MSG ishlab chiqaradi;\n2) Neyrogipofiz (orqa bo'lak) — gipotalamusda sintezlangan ADG (vazopressin) va oksitotsinni to'playdi va ajratadi.\nAdenogipofiz gipotalamus bilan portal qon tomir tizimi orqali, neyrogipofiz esa nerv tolalari orqali bog'lanadi."}, {"num": 2, "text": "Oldingi gipofiz gormonlari", "answer": "Adenogipofiz (oldingi bo'lak) gormonlari va nishon a'zolari:\n1) STG (somatotrop gormon) — o'sish, to'qimalar rivoji;\n2) TTG — qalqonsimon bezni rag'batlantiradi;\n3) AKTG — buyrak usti bezi po'stlog'ini rag'batlantiradi;\n4) FSH (follikulostimullovchi) — follikul yetilishi, spermatogenez;\n5) LG (lyuteinlovchi) — ovulyatsiya, sariq tana, testosteron;\n6) Prolaktin — sut bezi va laktatsiya;\n7) MSG (melanotsitstimullovchi) — melanin sintezi.\nUlar gipotalamik liberin va statinlar nazorati ostida ishlaydi."}, {"num": 3, "text": "AKTG funksiyalari", "answer": "AKTG (adrenokortikotrop gormon) adenogipofizda gipotalamik KRG (kortikoliberin) ta'sirida ishlab chiqariladi.\nVazifalari:\n- Buyrak usti bezi po'stloq qatlamini rag'batlantirib, kortizol sintezini oshiradi;\n- Androgenlar ishlab chiqarilishini kuchaytiradi;\n- Melanin sintezini stimullaydi (ko'p bo'lsa terining qorayishi).\nSutkalik (diurnal) ritmga ega — ertalab eng yuqori.\nManfiy teskari aloqa: kortizol oshganda AKTG va KRG kamayadi."}, {"num": 4, "text": "TTG (TSH) funksiyalari", "answer": "TTG (tireotrop gormon) adenogipofizda gipotalamik TRG (tireoliberin) ta'sirida ishlab chiqariladi.\nVazifalari:\n1) Qalqonsimon bezning o'sishi va qon ta'minoti;\n2) T3 va T4 sintezi va sekretsiyasini oshirish;\n3) Yodning bez tomonidan tutilishini kuchaytirish;\n4) Tireoglobulin sintezini oshirish.\nManfiy teskari aloqa: qonda T3/T4 oshganda TTG pasayadi (gipotireozda esa TTG oshadi)."}, {"num": 5, "text": "STG ning biologik ta'sirlari", "answer": "STG (somatotrop, o'sish gormoni) ta'siri asosan jigarda hosil bo'ladigan IGF-1 orqali amalga oshadi.\nTa'sirlari:\n1) Suyak va tog'ay o'sishi (epifizar plastinkalar orqali) → bo'y o'sishi;\n2) Oqsil sintezini kuchaytirish (anabolik);\n3) Lipolizni oshirish (yog' parchalanishi);\n4) Glyukozadan foydalanishni kamaytirish (diabetogen, qonda glyukozani oshiradi);\n5) Suv-elektrolit balansiga ta'sir;\n6) Immunitetni qo'llab-quvvatlash.\nUyqu paytida eng ko'p ajraladi."}, {"num": 6, "text": "Gipotalamus gormonlari va vazifalari", "answer": "Gipotalamus gipofizni boshqaruvchi gormonlar ishlab chiqaradi:\nLiberinlar (rag'batlantiruvchi):\n- GnRG → FSH/LG;\n- TRG → TTG va prolaktin;\n- KRG → AKTG;\n- GRRG → STG.\nStatinlar (tormozlovchi):\n- Somatostatin → STG va TTG ni kamaytiradi;\n- Dofamin → prolaktinni kamaytiradi.\nNeyrogipofizga yuboriladigan gormonlar:\n- ADG (vazopressin) — suv balansi;\n- Oksitotsin — bachadon qisqarishi, sut ajralishi."}, {"num": 7, "text": "Endokrin tizimda teskari aloqa mexanizmi", "answer": "Teskari aloqa (feed-back) gormon darajasini barqaror saqlaydi.\nManfiy teskari aloqa (asosiy, eng keng tarqalgan): periferik gormon oshganda gipofiz va gipotalamus gormonlari kamayadi. Masalan, kortizol ↑ → AKTG ↓, KRG ↓.\nMusbat teskari aloqa (kam): estrogen huzuri LG chiqishini kuchaytiradi → ovulyatsiya.\nQisqa halqa: gipofiz gormoni gipotalamusga ta'sir qiladi.\nUzun halqa: periferik gormon gipotalamus va gipofizga ta'sir qiladi."}, {"num": 8, "text": "Voyaga yetganda ortiqcha STG — qaysi kasalliklar", "answer": "Ortiqcha STG keltirib chiqaradigan kasallik bemorning suyak yetilish holatiga bog'liq:\n- Epifizar plastinkalar yopilgandan keyin (voyaga yetganlar) → akromegaliya: qo'l, oyoq panjalari va yuz suyaklari kattalashadi, bo'y o'smaydi;\n- Epifizar plastinkalar ochiq bo'lsa (bolalar) → gigantizm: bo'y juda o'sadi.\nIkkalasining ham asosiy sababi — adenogipofizning STG ishlab chiqaruvchi adenomasi."}, {"num": 9, "text": "Gigantizm va akromegaliya farqi", "answer": "Gigantizm: bolalarda, epifizar plastinkalar hali ochiqligida → bo'y >2 m, tana proporsional o'sadi.\nAkromegaliya: kattalarda, epifizlar yopilgandan keyin → faqat akral (chekka) qismlar — qo'l, oyoq panjalari, pastki jag', burun, qosh ravog'i kattalashadi; bo'y o'zgarmaydi.\nUmumiy belgilar: STG va IGF-1 oshgan; glyukoza yuklamasi (OGTT) STG ni bostirmaydi; MRT da gipofiz adenomasi topiladi."}, {"num": 10, "text": "Gipofiz nanizmi — sabablari", "answer": "Gipofizar nanizm (mittilik) — STG tanqisligi natijasi.\nBelgilari: past bo'y (yosh me'yoridan −2 SD past), proporsional gavda, bolalarcha yuz, jinsiy rivojlanish kechikishi (lekin aql normal).\nSabablari:\n- Idiopatik (noma'lum);\n- Gipofiz o'smasi (adenoma, kraniofaringioma);\n- Travma, nurlanish, infeksiya;\n- Irsiy (GH1 va boshqa genlar mutatsiyasi);\n- Tug'ma gipofiz rivojlanmasligi."}, {"num": 11, "text": "Akromegaliya: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: gipofizning STG ishlab chiqaruvchi adenomasi (99%).\nPatogenez: STG ↑ → IGF-1 ↑ → yumshoq to'qima va suyak gipertrofiyasi.\nKlinika: qo'l-oyoq panjalari va yuzning kattalashishi, terlash, bosh og'rig'i, ko'rish maydoni torayishi (xiazma bosilishi), qandli diabet, arterial gipertenziya, bo'g'im og'riqlari.\nDiagnostika: IGF-1 ↑, OGTT da STG bostirilmaydi, gipofiz MRT.\nDavolash: transsfenoidal adenomektomiya (asosiy), oktreotid/lanreotid, kabergolin, pegvisomant."}, {"num": 12, "text": "Akromegaliya diagnostikasi", "answer": "1) IGF-1 darajasi — skrining uchun eng ishonchli ko'rsatkich;\n2) STG ni glyukoza yuklamasi bilan baholash (OGTT, 75 g) — normada STG <1 ng/ml gacha pasayadi, akromegaliyada pasaymaydi;\n3) Gipofiz MRT — adenomani aniqlash;\n4) Ko'rish maydonini tekshirish (perimetriya);\n5) EKG, exokardiografiya — yurak asoratlari;\n6) Kolonoskopiya (polip/rak xavfi);\n7) Uyqu polisomnografiyasi (apnoe)."}, {"num": 13, "text": "Akromegaliyani zamonaviy davolash", "answer": "1) Transsfenoidal adenomektomiya — birinchi tanlov, o'smani olib tashlash;\n2) Somatostatin analoglari — oktreotid LAR, lanreotid (STG sekretsiyasini bostiradi);\n3) Dofamin agonisti — kabergolin (ayniqsa prolaktin ham yuqori bo'lsa);\n4) Pegvisomant — GH retseptori antagonisti;\n5) Gamma-pichoq (radioxirurgiya) — qoldiq o'smada.\nMaqsad: IGF-1 ni me'yorlashtirish va STG <1 ng/ml ga tushirish."}, {"num": 14, "text": "Jismoniy rivojlanishni persentil jadvallar bo'yicha baholash", "answer": "Bola bo'yi, vazni va bosh aylanasi yoshga mos persentil jadvalga solinadi.\n- 3–97 persentil oralig'i — me'yor;\n- <3 persentil — past bo'y (taxminan −2 SD dan past);\n- >97 persentil — baland bo'y.\nSDS (standart og'ish koeffitsienti) = (bemor bo'yi − o'rtacha bo'y) / standart og'ish.\nBu usul o'sish dinamikasini kuzatishga va patologiyani erta aniqlashga yordam beradi."}, {"num": 15, "text": "Shixan sindromi: etiologiya, patogenez, klinika, diagnostika", "answer": "Etiologiya: tug'ruq paytidagi kuchli qon ketishi → gipofizning ishemik nekrozi.\nPatogenez: homiladorlikda kattalashgan gipofiz qon yo'qotishga sezgir bo'ladi → infarkt → gipofiz gormonlari yetishmovchiligi (gipopituitarizm).\nKlinika: tug'ruqdan keyin sut kelmasligi (laktatsiya yo'q), amenoreya, gipotireoz belgilari, gipokortisizm, jinsiy belgilarning so'lishi, holsizlik.\nDiagnostika: gipofiz gormonlari va nishon bez gormonlari pasaygan; MRT da bo'sh turk egari."}, {"num": 16, "text": "Gigantizm: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: bolada (epifizlar ochiqligida) gipofizning STG-adenomasi; ba'zan MEN-1 sindromi.\nPatogenez: STG ↑ → IGF-1 ↑ → epifizar o'sish kuchayadi.\nKlinika: bo'y juda tez o'sadi (>2 m), bosh og'rig'i, ko'rish buzilishi, ko'p terlash, qandli diabet.\nDiagnostika: STG ↑, IGF-1 ↑, gipofiz MRT, suyak yoshi rentgeni.\nDavolash: transsfenoidal operatsiya, oktreotid, radioxirurgiya."}, {"num": 17, "text": "Qandsiz diabet: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Markaziy (gipotalamik): ADG yetishmovchiligi (kraniofaringioma, travma, operatsiya).\nNefrogen: buyraklar ADG ga javob bermaydi (litiy, giperkalsemiya, irsiy).\nPatogenez: ADG bo'lmasa yoki ta'sir qilmasa — buyrak suvni qaytar so'rmaydi.\nKlinika: ko'p siyish (poliuriya >3 l/kun), ko'p suv ichish (polidipsiya), siydik zichligi past (<1005).\nDiagnostika: quruq diyeta (suvsizlanish) sinamasi + ADG analogiga javob.\nDavolash: markaziy — desmopressin; nefrogen — gidroxlortiazid, parhez."}, {"num": 18, "text": "Quruq ovqatlanish (suvsizlanish) sinamasi", "answer": "Maqsad — qandsiz diabet turini aniqlash.\nO'tkazilishi: bemorga 8 soat suv berilmaydi, har soatda siydik osmolyarligi va vazni o'lchanadi.\nTalqin:\n- Normada siydik osmolyarligi >700 mOsm/kg gacha oshadi;\n- Qandsiz diabetda <300 (suvsizlanishga qaramay konsentratsiyalanmaydi).\nKeyin ADG analogi (desmopressin) yuboriladi:\n- Markaziy turda siydik osmolyarligi oshadi;\n- Nefrogen turda o'zgarmaydi.\nPsixogen polidipsiyada osmolyarlik normal oshadi."}, {"num": 19, "text": "Markaziy qandsiz diabetni davolash", "answer": "1) Desmopressin (ADG sintetik analogi) — burun, til osti yoki in'eksiya shaklida; asosiy davo;\n2) Gidroxlortiazid — qoldiq diurezni kamaytiradi;\n3) Karbamazepin — ADG sekretsiyasini biroz rag'batlantiradi;\n4) Sababiy davo — qandsiz diabetni keltirib chiqargan o'sma yoki kasallikni davolash.\nSuv rejimini nazorat qilish va elektrolitlarni kuzatish ham muhim."}, {"num": 20, "text": "Itsenko-Kushing kasalligi etiologiyasi va klinikasi", "answer": "Etiologiya: gipofizning AKTG ishlab chiqaruvchi adenomasi → ortiqcha kortizol.\nKlinika (giperkortisizm):\n- \"Oysimon\" yuz;\n- Markaziy (qorin) semizlik, bo'yin orqasida yog' (\"bizon o'rkachi\");\n- Qizg'ish-binafsha striyalar (chiziqlar);\n- Teri yupqalashishi, ko'karishlar;\n- Arterial gipertenziya;\n- Osteoporoz;\n- Steroidli diabet;\n- Ayollarda girsutizm;\n- Ruhiy o'zgarishlar (depressiya, psixoz)."}, {"num": 21, "text": "Semizlik: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: irsiyat, ortiqcha kaloriya iste'moli, kam harakat; ikkilamchi — gipotireoz, Kushing, polikistoz tuxumdon, dorilar.\nPatogenez: energiya kirimi sarfdan ko'p → ortiqcha yog' to'planishi.\nKlinika: tana vaznining oshishi, nafas qisishi, bo'g'im og'riqlari, metabolik asoratlar.\nDiagnostika: TVI ≥30, bel aylanasini o'lchash.\nDavolash: parhez + jismoniy faollik; orlistat; semaglutid (GPP-1 analogi); og'ir holatda bariatrik jarrohlik (TVI≥40)."}, {"num": 22, "text": "TVI (tana vazni indeksi) nima va uni hisoblash", "answer": "TVI = vazn (kg) / bo'y² (m²).\nBaholash:\n- <18.5 — vazn tanqisligi;\n- 18.5–24.9 — me'yor;\n- 25–29.9 — ortiqcha vazn;\n- 30–34.9 — I daraja semizlik;\n- 35–39.9 — II daraja;\n- ≥40 — III daraja (morbid).\nBel aylanasi ham muhim: erkaklarda >94 sm, ayollarda >80 sm — qorin (visseral) semizligini va metabolik xavfni ko'rsatadi."}, {"num": 23, "text": "Metabolik sindrom: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: irsiyat + noto'g'ri ovqatlanish + kam harakat.\nPatogenez: insulinrezistentlik → giperinsulinemiya → arterial gipertenziya, dislipidemiya, giperglikemiya.\nKlinika: qorin semizligi, qon bosimi yuqoriligi, charchoq.\nDiagnostika (IDF): qorin semizligi (bel >94/80) + quyidagilardan yana 2 tasi — TG ↑, YuZLP ↓, qon bosimi ↑, glyukoza ↑.\nDavolash: turmush tarzini o'zgartirish, metformin, statinlar, qon bosimini nazorat qilish."}, {"num": 24, "text": "Semizlikni davolash usullari", "answer": "1) Parhez (kuniga 500–1000 kkal taqchillik) + jismoniy faollik (haftasiga ≥150 daqiqa);\n2) Orlistat — ichakda yog' so'rilishini kamaytiradi (lipaza ingibitori);\n3) Semaglutid/liraglutid — GPP-1 analoglari, ishtahani kamaytiradi va vaznni tushiradi;\n4) Intragastrik ballon;\n5) Bariatrik jarrohlik (oshqozonni qisqartirish/shuntlash) — TVI≥40 yoki ≥35 + qo'shimcha kasallik bo'lganda.\nDavoning asosi — barqaror turmush tarzi o'zgarishi."}, {"num": 25, "text": "Qandli diabet tasnifi va ta'rifi", "answer": "Qandli diabet — insulin sekretsiyasi yoki ta'sirining yetishmovchiligi tufayli surunkali giperglikemiya bilan kechadigan kasallik.\nTurlari:\n1) 1-tur — autoimmun, β-hujayralar nobud bo'ladi, insulin mutlaqo yetishmaydi;\n2) 2-tur — insulinrezistentlik + nisbiy insulin yetishmovchiligi;\n3) Gestatsion (homiladorlik) diabeti;\n4) Boshqa maxsus turlar — MODY, pankreatogen, dorilarga bog'liq.\nTashxis: nahorda glyukoza ≥7.0 mmol/l yoki HbA1c ≥6.5%."}, {"num": 26, "text": "1-tur QD: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: autoimmun jarayon (T-hujayralar β-hujayralarni yo'q qiladi); HLA-DR3/DR4, virus omillari.\nPatogenez: insulin ishlab chiqarilmaydi → giperglikemiya, lipoliz, ketogenez.\nKlinika: yoshlarda, o'tkir boshlanish, poliuriya, polidipsiya, ozish, ketoatsidoz.\nDiagnostika: glyukoza ↑, C-peptid ↓, GAD va ICA antitanalari musbat.\nDavolash: insulin — umrbod, bazis-bolus rejimi; glyukozani o'z-o'zini nazorat qilish."}, {"num": 27, "text": "2-tur QD: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: irsiyat + semizlik + yosh + kam harakat.\nPatogenez: insulinrezistentlik + asta-sekin β-hujayra yetishmovchiligi.\nKlinika: 40 yoshdan keyin, sekin boshlanish, ko'pincha simptomsiz, tasodifan aniqlanadi.\nDiagnostika: nahorda glyukoza ≥7.0 mmol/l, HbA1c ≥6.5%.\nDavolash: turmush tarzi + metformin (birinchi tanlov) → SGLT2 ingibitorlari, GPP-1 analoglari → kerak bo'lsa insulin."}, {"num": 28, "text": "1 va 2-tur QD klinik simptomlari farqi", "answer": "1-tur: yosh bemor, ozg'in, o'tkir boshlanish, ketoatsidoz xavfi yuqori, insulinga mutlaq bog'liq.\n2-tur: kattaroq yosh, ko'pincha semiz, sekin boshlanish, ketoatsidoz kam.\nAsosiy farqlovchi belgilar:\n- C-peptid: 1-turda pasaygan, 2-turda normal yoki oshgan;\n- Autoantitanalar (GAD, ICA): 1-turda bor, 2-turda yo'q;\n- Insulin ehtiyoji: 1-turda darhol va doimiy."}, {"num": 29, "text": "1 va 2-tur QD qiyosiy diagnostikasi", "answer": "Belgi — 1-tur / 2-tur:\n- Yosh: 40 gacha / 40+;\n- Boshlanish: o'tkir / sekin;\n- Tana vazni: ozg'in / semiz;\n- Ketoatsidoz: tez-tez / kam;\n- C-peptid: <0.2 / normal yoki ↑ nmol/l;\n- GAD antitanalari: musbat / manfiy.\nAlohida: LADA — kattalarda sekin boshlanadigan, ammo autoimmun (1-turga yaqin) diabet shakli."}, {"num": 30, "text": "Qandli diabet diagnostikasi mezonlari", "answer": "Tashxis mezonlari (har biri yetarli):\n1) Nahorda glyukoza ≥7.0 mmol/l;\n2) OGTT 2 soatdan keyin glyukoza ≥11.1 mmol/l;\n3) HbA1c ≥6.5%;\n4) Diabet simptomlari + istalgan vaqtdagi glyukoza ≥11.1 mmol/l.\nSimptom bo'lmasa — natija ikki marta tasdiqlanishi kerak.\nPrediabet: nahorda 5.6–6.9, yoki OGTT 7.8–11.0, yoki HbA1c 5.7–6.4%."}, {"num": 31, "text": "Glikatlangan gemoglobin (HbA1c) va diagnostikadagi ahamiyati", "answer": "HbA1c — so'nggi 2–3 oydagi o'rtacha glikemiyani aks ettiradi (eritrotsit umri bilan bog'liq).\nMezonlar:\n- <5.7% — me'yor;\n- 5.7–6.4% — prediabet;\n- ≥6.5% — qandli diabet.\nDavolash maqsadi: odatda <7.0%; yoshlarda 6.5%; keksa/asoratli bemorlarda 8.0%.\nCheklov: anemiya, gemoglobinopatiyalar, surunkali buyrak kasalligida natija noto'g'ri bo'lishi mumkin."}, {"num": 32, "text": "Prediabet tushunchasi, diagnostikasi, davolash", "answer": "Prediabet — diabetdan oldingi oraliq holat:\n- IFG (nahorda buzilgan glyukoza): 5.6–6.9 mmol/l;\n- IGT (glyukozaga buzilgan tolerantlik): OGTT 7.8–11.0;\n- HbA1c: 5.7–6.4%.\nQandli diabetga o'tish xavfi 5–10 yilda 15–30%.\nDavolash: turmush tarzini o'zgartirish (vaznni kamaytirish diabet xavfini ~58% pasaytiradi); yuqori xavfli guruhda metformin."}, {"num": 33, "text": "OGTT o'tkazish ko'rsatmalari va usuli", "answer": "Ko'rsatmalar: prediabet shubhasi, gestatsion diabet skriningi (24–28-hafta), xavf omillari mavjudligi.\nO'tkazilishi:\n- 3 kun oddiy ovqatlanish;\n- 8–14 soat och qolish;\n- Nahorda qon olish;\n- 75 g glyukozani suvda ichish;\n- 2 soatdan keyin qayta qon olish.\nSinama paytida jismoniy faollik va chekishdan saqlanish kerak (natijaga ta'sir qiladi)."}, {"num": 34, "text": "OGTT natijalarini talqin qilish", "answer": "Nahorda / 2 soatdan keyin (mmol/l):\n- Me'yor: <5.6 va <7.8;\n- IGT: <7.0 va 7.8–11.0;\n- IFG: 5.6–6.9 va <7.8;\n- Qandli diabet: ≥7.0 yoki ≥11.1.\nGestatsion diabet (IADPSG mezonlari, bittasi yetarli): nahorda ≥5.1; 1 soatdan keyin ≥10.0; 2 soatdan keyin ≥8.5 mmol/l."}, {"num": 35, "text": "Qandli diabet uchun parhez (dietoterapiya)", "answer": "- Kaloriya: semizlikda kuniga ~500 kkal taqchillik;\n- Uglevodlar: umumiy energiyaning 45–60%, past glikemik indeksli;\n- Tola (kletchatka): ≥25 g/kun;\n- Yog': <35%, to'yinmagan yog'lar afzal;\n- Shirin ichimliklar va oddiy shakarni cheklash;\n- Ovqat vaqti bir xil, kichik porsiyalarda;\n- Tuz <2.3 g/kun (gipertenziyada).\nMaqsad — glikemiyani barqarorlashtirish va vaznni nazorat qilish."}, {"num": 36, "text": "Glyukoza tushiruvchi (gipoglikemik) dorilar tasnifi", "answer": "1) Biguanidlar (metformin) — insulinrezistentlikni kamaytiradi;\n2) Sulfanilmochevina hosilalari — insulin sekretsiyasini kuchaytiradi;\n3) Glinidlar — qisqa ta'sirli sekretagoglar;\n4) DPP-4 ingibitorlari (sitagliptin);\n5) GPP-1 agonistlari (semaglutid);\n6) SGLT2 ingibitorlari (empagliflozin);\n7) Alfa-glyukozidaza ingibitori (akarboza);\n8) Tiazolidindionlar (pioglitazon)."}, {"num": 37, "text": "Metformin (biguanid) — ko'rsatma, mexanizm, nojo'ya ta'siri", "answer": "Ko'rsatma: 2-tur diabetda birinchi tanlov dori, prediabet.\nMexanizm: jigarda glyukoneogenezni kamaytiradi (asosiy), insulin sezgirligini oshiradi; vaznni oshirmaydi, gipoglikemiya bermaydi.\nNojo'ya ta'sirlar: oshqozon-ichak (ko'ngil aynishi, diareya), B12 so'rilishi kamayishi, kam hollarda laktatatsidoz (buyrak yetishmovchiligida).\nQarshi ko'rsatma: og'ir buyrak/jigar yetishmovchiligi, kontrast tekshiruv oldidan."}, {"num": 38, "text": "Sulfanilmochevina — ko'rsatma, mexanizm, nojo'ya ta'siri", "answer": "Ko'rsatma: 2-tur diabet (β-hujayra funksiyasi saqlangan bemorlarda).\nVakillari: glibenklamid, glipizid, gliklazid.\nMexanizm: β-hujayradagi K-ATF kanalini yopadi → depolyarizatsiya → insulin sekretsiyasi oshadi.\nNojo'ya ta'sir: gipoglikemiya (asosiy xavf!), vazn ortishi.\nQarshi ko'rsatma: 1-tur diabet, og'ir buyrak/jigar yetishmovchiligi, homiladorlik."}, {"num": 39, "text": "DPP-4 ingibitorlari — ko'rsatma, mexanizm, nojo'ya ta'siri", "answer": "Vakillari: sitagliptin, linagliptin, vildagliptin.\nKo'rsatma: 2-tur diabet, ayniqsa gipoglikemiya xavfi yuqori bo'lganda.\nMexanizm: DPP-4 fermentini bloklaydi → GPP-1 va GIP inkretinlari oshadi → glyukozaga bog'liq insulin sekretsiyasi ↑, glyukagon ↓.\nNojo'ya ta'sir: nazofaringit, kam hollarda pankreatit.\nVaznga ta'siri neytral, gipoglikemiya xavfi past."}, {"num": 40, "text": "GPP-1 analoglari — ko'rsatma, mexanizm, nojo'ya ta'siri", "answer": "Vakillari: semaglutid (haftalik), liraglutid (kunlik).\nKo'rsatma: 2-tur diabet, yurak-qon tomir xavfi yuqori bo'lganlar, semizlik.\nMexanizm: GPP-1 retseptorini faollashtiradi → glyukozaga bog'liq insulin ↑, glyukagon ↓, oshqozon bo'shashi sekinlashadi, ishtaha kamayadi.\nNojo'ya ta'sir: ko'ngil aynishi, qusish (boshida).\nAfzalligi: vaznni kamaytiradi, kardioprotektiv ta'sir."}, {"num": 41, "text": "SGLT2 ingibitorlari — ko'rsatma, mexanizm, nojo'ya ta'siri", "answer": "Vakillari: empagliflozin, dapagliflozin.\nKo'rsatma: 2-tur diabet, yurak yetishmovchiligi, surunkali buyrak kasalligi.\nMexanizm: buyrak proksimal naychasida glyukoza qayta so'rilishini kamaytiradi → glyukozuriya → glyukoza ↓, qon bosimi ↓, vazn ↓.\nNojo'ya ta'sir: urogenital zamburug'li infeksiya, kam hollarda ketoatsidoz, suvsizlanish.\nAfzalligi: kardiorenal himoya (yurak va buyrakni saqlaydi)."}, {"num": 42, "text": "Insulin terapiyasini tayinlash ko'rsatmalari", "answer": "Mutlaq ko'rsatmalar: 1-tur diabet, diabetik ketoatsidoz, giperosmolyar koma.\n2-tur diabetda nisbiy ko'rsatmalar:\n- HbA1c >9–10% va tabletkalar samarasizligi;\n- Jarrohlik, og'ir o'tkir infeksiya;\n- Miokard infarkti, insult;\n- Og'ir jigar yoki buyrak yetishmovchiligi;\n- Homiladorlik va laktatsiya."}, {"num": 43, "text": "Insulinlarning ta'sir muddati bo'yicha tasnifi", "answer": "1) Ultra-qisqa (analoglar) — lispro, aspart: boshlanishi 10–15 daq, cho'qqi 1–2 soat, davomiyligi 3–5 soat;\n2) Qisqa (oddiy) insulin: 30–60 daq, 2–3 soat, 5–8 soat;\n3) O'rta (NPH): 2–4 soat, 4–10 soat, 10–16 soat;\n4) Uzoq ta'sirli (analoglar) — glargin, degludek: cho'qqisiz, bir tekis, 20–42 soat.\nBazal + bolus rejimida turli xil insulinlar birga ishlatiladi."}, {"num": 44, "text": "1-tur QD uchun insulin dozasini hisoblash", "answer": "Kunlik umumiy doza (TDD): odatda 0.5–1 XB/kg/kun.\nTaqsimlash: ~50% bazal + ~50% bolus (ovqat oldidan).\n- Bolus: taxminan 1 XB har 10–15 g uglevodga;\n- Korreksiya dozasi: 1 XB glyukozani ~2.5–3 mmol/l ga tushiradi (\"1800 qoidasi\": 1800/TDD).\nDozalar glikemiya o'z-o'zini nazorat natijalariga qarab moslab boriladi."}, {"num": 45, "text": "Bazis-bolus insulin terapiyasi nima", "answer": "Bu — me'da osti bezining tabiiy insulin ajralishini taqlid qiluvchi rejim.\n- Bazal insulin (glargin/degludek, odatda kechqurun) — kun bo'yi asosiy darajani ta'minlaydi;\n- Bolus insulin (lispro/aspart, har ovqat oldidan) — ovqatdan keyingi glikemiya cho'qqisini bostiradi.\nAfzalligi: moslashuvchan ovqatlanish jadvali, glikemiyani yaxshiroq nazorat qilish, gipoglikemiya kamroq."}, {"num": 46, "text": "Diabetik ketoatsidoz klinikasi va davolash", "answer": "Klinika: ko'ngil aynishi, qusish, qorin og'rig'i, chuqur shovqinli nafas (Kussmaul), og'izdan atseton hidi, poliuriya, ong xiralashuvi.\nLaboratoriya: glyukoza >14 mmol/l, qonda va siydikda ketonlar (+++), pH <7.3, bikarbonat pasaygan.\nDavolash:\n1) Infuzion terapiya (0.9% NaCl) — suvsizlanishni bartaraf etish;\n2) Qisqa insulin 0.1 XB/kg/soat vena ichiga (uzluksiz);\n3) Kaliyni nazorat qilish va o'rnini to'ldirish;\n4) Sababiy omilni (infeksiya) davolash."}, {"num": 47, "text": "Gipoglikemik koma klinikasi va davolash", "answer": "Glyukoza <3.9 mmol/l (og'iri <2.8).\nKlinika:\n- Adrenergik bosqich: terlash, titrash, taxikardiya, ochlik, bezovtalik;\n- Neyroglyukopenik bosqich: ong xiralashuvi, xulq o'zgarishi, tirishish, koma.\nDavolash:\n- Ong saqlangan bo'lsa — 15–20 g tez uglevod (shakar, sharbat);\n- Ong yo'q bo'lsa — 40% glyukoza 40–60 ml vena ichiga yoki glyukagon 1 mg mushak ichiga.\nGlyukoza tezda berilishi miya zararlanishining oldini oladi."}, {"num": 48, "text": "Diabetik nefropatiya: etiologiya, patogenez, klinika, davolash", "answer": "Patogenez: surunkali giperglikemiya → oksidativ stress, bazal membrana qalinlashishi → glomeruloskleroz.\nBosqichlari: giperfiltratsiya → normoalbuminuriya → mikroalbuminuriya (30–299 mg/sutka) → makroalbuminuriya (≥300 mg) → surunkali buyrak yetishmovchiligi.\nKlinika: dastlab simptomsiz; keyin shish, gipertenziya, oqsil yo'qotishi.\nDavolash: glikemiya nazorati, AAF ingibitorlari/ARB, SGLT2 ingibitorlari, qon bosimi <130/80, tuzni cheklash."}, {"num": 49, "text": "Diabetik retinopatiya: tasnif, klinika, davolash", "answer": "Proliferativ bo'lmagan (NPDR): mikroanevrizmlar, nuqtali qon quyilishlar, qattiq ekssudatlar; yengil, o'rta, og'ir darajalari.\nProliferativ (PDR): yangi tomirlar o'sishi (neovaskulyarizatsiya), shishasimon tana ichiga qon quyilish, to'r parda ajralishi.\nKlinika: ko'rishning asta yoki to'satdan pasayishi.\nDavolash: lazerli fotokoagulyatsiya; anti-VEGF in'eksiyalari (bevatsizumab, ranibizumab); vitrektomiya; glikemiya va qon bosimini nazorat qilish."}, {"num": 50, "text": "Diabetik neyropatiya: etiologiya, patogenez, klinika, davolash", "answer": "Patogenez: aldoza reduktaza yo'li (sorbitol to'planishi), AGE mahsulotlari, nervlarning qon ta'minoti buzilishi.\nKlinika:\n- Distal simmetrik polineyropatiya — \"paypoq-qo'lqop\" tipida sezgi buzilishi, kechasi kuchayadigan yonish/og'riq;\n- Avtonom neyropatiya — taxikardiya, gastroparez, ortostatik gipotenziya.\nDavolash: glikemiya nazorati (asosiy); og'riqqa pregabalin, gabapentin, duloksetin; alfa-lipoy kislotasi."}, {"num": 51, "text": "Diabetik oyoq (to'piq) sindromi: etiologiya, patogenez, klinika, davolash", "answer": "Patogenez: neyropatiya + angiopatiya + infeksiya birgalikda.\nDarajalanishi: Wagner bo'yicha 0–5.\nKlinika: oyoqda yara, qizarish, shish, deformatsiya (Sharko bo'g'imi), sezgi yo'qolishi.\nDavolash:\n- Yarani tozalash (debridment);\n- Bosimni kamaytirish (offloading, maxsus poyabzal);\n- Antibiotiklar (infeksiyada);\n- Qon oqimini tiklash (revaskulyarizatsiya);\n- Og'ir holatda amputatsiya.\nProfilaktika va oyoq parvarishi juda muhim."}, {"num": 52, "text": "Qalqonsimon bez anatomiyasi, fiziologiyasi, gormonlar biosintezi", "answer": "Joylashuvi: bo'yinning oldingi qismida, traxeya oldida; vazni 25–30 g.\nTuzilishi: follikullar (T3, T4 ishlab chiqaradi) va parafollikulyar C-hujayralar (kalsitonin).\nGormon biosintezi: yod tutilishi → organifikatsiya (tireoperoksidaza fermenti) → MIT va DIT hosil bo'lishi → birikishi: T3 (MIT+DIT), T4 (DIT+DIT).\nT4 periferik to'qimalarda deyodinaza yordamida faolroq T3 ga aylanadi."}, {"num": 53, "text": "T4 va T3 ning biologik ta'siri", "answer": "Qalqonsimon bez gormonlari deyarli barcha to'qimalarga ta'sir qiladi:\n1) Bazal metabolizmni oshiradi (kislorod sarfi, issiqlik);\n2) Yurakka — taxikardiya, qisqarish kuchi;\n3) Miya rivojlanishi (ayniqsa bolalarda hayotiy);\n4) Oqsil sintezi (anabolik) ↑;\n5) Lipoliz va glyukoneogenez ↑;\n6) Me'da-ichak harakatchanligi ↑;\n7) β-adrenoretseptorlar ifodasini oshiradi.\nT3 — faol shakl, T4 esa asosan prohormon."}, {"num": 54, "text": "Endemik bo'qoq: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: oziq-ovqat va suvda yod yetishmovchiligi.\nPatogenez: yod ↓ → T3/T4 ↓ → teskari aloqa orqali TTG ↑ → bezning kompensator kattalashishi (gipertrofiya/giperplaziya).\nKlinika: bo'yinda bez kattalashishi, bosib qo'yish belgilari (yutinish, nafas qisilishi).\nDiagnostika: UST, TTG, T4, siydikda yod miqdori.\nDavolash: kaliy yodid, L-tiroksin; yirik yoki bosuvchi bo'qoqda — jarrohlik."}, {"num": 55, "text": "Endemik bo'qoq profilaktikasi", "answer": "1) Yodlangan tuzdan foydalanish (20–40 mkg/g) — eng samarali ommaviy chora;\n2) Homiladorlar, emizuvchi ayollar va bolalarga kaliy yodid qo'shimcha berish;\n3) Oziq-ovqat rang-barangligi (dengiz mahsulotlari);\n4) Aholini UST bilan skrining qilish;\n5) JSST mezoni: siydikda yod >100 mkg/l — yetarli yod ta'minoti ko'rsatkichi."}, {"num": 56, "text": "JSST va Nikolaev bo'yicha qalqonsimon bez kattalashish darajasi", "answer": "Nikolaev tasnifi:\n0 — bez kattalashmagan;\nI — paypaslanadi;\nII — paypaslanadi va yutinganda ko'rinadi;\nIII — bo'yin konturini o'zgartiradi (\"yo'g'on bo'yin\");\nIV — yaqqol deformatsiya;\nV — juda katta, qo'shni a'zolarni bosadi.\nJSST tasnifi (soddalashtirilgan):\n0 — bo'qoq yo'q;\n1 — paypaslanadi, ammo ko'rinmaydi;\n2 — bo'yin normal holatida ko'rinadi."}, {"num": 57, "text": "Gipotireoz: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: Hashimoto tiroiditi (eng ko'p), yod yetishmovchiligi, tireoidektomiya, radioyod, dorilar.\nPatogenez: T3/T4 ↓ → metabolizm sekinlashadi.\nKlinika: charchoq, vazn ortishi, sovuqqa chidamsizlik, quruq teri, bradikardiya, ich qotishi, miksedema (zich shish), depressiya, bo'g'iq ovoz.\nDiagnostika: TTG ↑, erkin T4 ↓; Hashimotoda anti-TPO ↑.\nDavolash: L-tiroksin o'rnini bosuvchi terapiya; maqsad TTG 0.5–2.5."}, {"num": 58, "text": "Tug'ma gipotireoz: etiologiya, klinika, diagnostika", "answer": "Etiologiya: bez aplaziyasi/disgeneziyasi, gormon biosintezi nuqsoni, onaning antitanalari, yod tanqisligi.\nKlinika (yangi tug'ilganda): cho'zilgan sariqlik, gipotermiya, katta til (makroglossiya), kindik churrasi, bo'shashgan mushaklar, qabziyat, kam faollik.\nKechiktirilsa — kretinizm (aqliy va jismoniy rivojlanish ortda qolishi).\nDiagnostika: yangi tug'ilganlarni TTG ga skrining qilish.\nDavolash: darhol L-tiroksin (miya zararlanishining oldini olish uchun)."}, {"num": 59, "text": "Diffuz toksik bo'qoq (Bazedov): etiologiya, klinika, davolash", "answer": "Etiologiya: autoimmun; TTG retseptoriga qarshi rag'batlantiruvchi antitanalar (TRAb/TSI).\nKlinika: taxikardiya, issiqqa chidamsizlik, terlash, qo'l titrashi, ozish, asabiylik.\nBazedov triadasi: bo'qoq + ko'z chiqishi (oftalmopatiya) + pretibial miksedema.\nDiagnostika: TTG ↓, erkin T4 ↑, TRAb musbat; UST va ssintigrafiya.\nDavolash: tireostatiklar (tiamazol), radioyod terapiyasi, tireoidektomiya; β-blokator simptomlarga."}, {"num": 60, "text": "Gipotireozda gormonal profil", "answer": "Birlamchi gipotireoz (bezning o'zi zararlangan): TTG ↑, erkin T4 ↓.\nIkkilamchi/markaziy (gipofiz yoki gipotalamus): TTG past yoki normal, erkin T4 ↓.\nSubklinik gipotireoz: TTG ↑, erkin T4 normal.\nHashimoto tiroiditida: anti-TPO va anti-TG antitanalari oshgan.\nDarajani aniqlash uchun avval TTG, so'ng erkin T4 tekshiriladi."}, {"num": 61, "text": "Diffuz toksik bo'qoqda gormonal profil", "answer": "- TTG keskin pasaygan (↓↓);\n- Erkin T4 oshgan;\n- Erkin T3 oshgan;\n- TRAb (TTG retseptoriga antitanalar) musbat — Bazedov uchun spetsifik.\nTekshirish tartibi: avval TTG (pasaygan bo'ladi) → erkin T4/T3 → tireotoksikoz tasdiqlansa → TRAb va UST/ssintigrafiya bilan sababini aniqlash."}, {"num": 62, "text": "Tireotoksikoz va gipotireoz qiyosiy diagnostikasi", "answer": "Tireotoksikoz: taxikardiya, issiq va nam teri, ozish, diareya, qo'l titrashi, asabiylik, reflekslar kuchaygan, ko'z chiqishi.\nGipotireoz: bradikardiya, quruq va sovuq teri, vazn ortishi, ich qotishi, ruhiy-harakat sekinligi, miksedema, uyquchanlik.\nLaboratoriya: tireotoksikozda TTG ↓ (erkin T4 ↑); gipotireozda TTG ↑ (erkin T4 ↓).\nTTG — birinchi va asosiy farqlovchi tekshiruv."}, {"num": 63, "text": "Tireotoksik kriz belgilari va shoshilinch yordam", "answer": "Kriz — hayot uchun xavfli og'ir tireotoksikoz.\nBelgilari: isitma >40°C, taxikardiya >150 (yoki aritmiya), qusish, ajitatsiya, ong buzilishi, koma.\nTriggerlar: jarrohlik, infeksiya, travma, radioyod.\nShoshilinch yordam:\n1) Propiltiouratsil (PTU) 600 mg;\n2) Lugol eritmasi (PTU dan keyin);\n3) Propranolol (β-blokator);\n4) Gidrokortizon;\n5) Tana haroratini pasaytirish;\n6) RIB sharoitida kuzatuv."}, {"num": 64, "text": "Tiroiditlarning tasnifi", "answer": "1) O'tkir tiroidit — bakterial (yiringli);\n2) O'rtacha o'tkir (De Kerven) — virusli;\n3) Surunkali tiroiditlar:\n- Hashimoto (autoimmun);\n- Ridel (fibrozli);\n- Nurlanishdan keyingi;\n- Dorilarga bog'liq (amiodaron);\n4) Postpartum (tug'ruqdan keyingi) tiroidit.\nHar biri funksiya bo'yicha tireotoksikoz yoki gipotireoz fazasi bilan kechishi mumkin."}, {"num": 65, "text": "Tiroiditlar: etiologiya, klinika, davolash", "answer": "O'tkir (bakterial): stafilokokk/streptokokk → abssess, kuchli og'riq, isitma → antibiotik + drenaj.\nDe Kerven (virusli): virus infeksiyasidan keyin → bo'yin og'rig'i + tireotoksikoz fazasi → QYaQV, og'irida steroid.\nHashimoto (autoimmun): anti-TPO antitanalari → asta-sekin gipotireoz → L-tiroksin.\nDavo tiroidit turiga va funksiyaga moslab tanlanadi."}, {"num": 66, "text": "O'rtacha o'tkir tiroidit (De Kerven) belgilari", "answer": "Virusli infeksiyadan 2–3 hafta keyin boshlanadi.\nBelgilari:\n- Bo'yinda og'riq (quloq va jag'ga tarqaladi);\n- Isitma 38–39°C;\n- Avval tireotoksikoz fazasi → keyin gipotireoz fazasi → ko'pincha to'liq tiklanish;\n- EChT (SOE) yuqori (>50 mm/soat);\n- TTG avval pasayadi, keyin oshadi;\n- Radioyod tutilishi kamaygan.\nDavolash: QYaQV, og'irida glyukokortikoidlar."}, {"num": 67, "text": "O'tkir tiroidit: etiologiya, klinika, davolash", "answer": "Etiologiya: stafilokokk, streptokokk (bakterial infeksiya).\nKlinika: bo'yinda keskin og'riq, isitma, qizarish, shish, yutinishda og'riq, leykotsitoz.\nDiagnostika: UST (abssess bor-yo'qligi), qon tahlili.\nDavolash: antibiotiklar (ampitsillin/sulbaktam, klindamitsin); abssess bo'lsa — drenaj (yoriq qo'yib bo'shatish).\nKam uchraydigan, ammo tez davo talab qiladigan holat."}, {"num": 68, "text": "Hashimoto tiroiditi (surunkali autoimmun)", "answer": "Patogenez: anti-TPO va anti-TG antitanalari → T-hujayralar bezni asta-sekin nobud qiladi → gipotireoz.\nKlinika: ko'pincha simptomsiz yoki gipotireoz belgilari; bez zich va kattalashgan (yoki atrofik).\nDiagnostika: TTG ↑, erkin T4 ↓, anti-TPO ↑; UST da gipoexogen, notekis tuzilma.\nDavolash: L-tiroksin o'rnini bosuvchi terapiya.\nLimfoma xavfi biroz oshgan — bu sababli kuzatuv muhim."}, {"num": 69, "text": "Qalqon oldi bezlarining vazifasi", "answer": "Qalqon oldi (paratireoid) bezlari paratgormon (PTG) ishlab chiqaradi.\nVazifalari (qonda kalsiyni oshirishga qaratilgan):\n1) Suyakdan kalsiyni ajratadi (osteoklastlar orqali);\n2) Buyrakda kalsiy qayta so'rilishini oshiradi, fosfat chiqarilishini kuchaytiradi;\n3) Buyrakda faol D vitamini (kalsitriol) sintezini rag'batlantiradi → ichakda kalsiy so'rilishini oshiradi.\nNatija — qonda kalsiy ↑, fosfat ↓."}, {"num": 70, "text": "PTG ning kalsiy va fosfor almashinuvidagi roli", "answer": "PTG (paratgormon) qonda kalsiyni oshiradi:\n- Suyakda osteoklastlarni faollashtiradi → Ca²⁺ va fosfat qonga chiqadi;\n- Buyrakda Ca²⁺ qayta so'rilishini oshiradi, fosfat ekskresiyasini kuchaytiradi;\n- 1,25(OH)₂D3 (kalsitriol) sintezini faollashtiradi → ichakda Ca²⁺ so'rilishi ortadi.\nYakuniy natija: qonda kalsiy oshadi, fosfat esa pasayadi (buyrak orqali chiqarilgani uchun)."}, {"num": 71, "text": "Gipoparatireoz: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: tireoidektomiyadan keyin (paratireoid bezlari shikastlanishi), autoimmun, DiGeorge sindromi.\nPatogenez: PTG ↓ → qonda Ca²⁺ ↓, fosfat ↑.\nKlinika: tetaniya (mushak tirishishi), Xvostek va Trusso belgilari, tutqanoq, QT cho'zilishi, paresteziyalar.\nDiagnostika: Ca²⁺ ↓, fosfat ↑, PTG ↓.\nDavolash: o'tkir holatda kalsiy glyukonat vena ichiga; surunkali — kalsiy + D vitamini preparatlari."}, {"num": 72, "text": "Giperparatireoz: etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: paratireoid bezi adenomasi (~80%), giperplaziya, rak.\nPatogenez: PTG ↑ → Ca²⁺ ↑, fosfat ↓.\nKlinika (mnemonika): \"toshlar, suyaklar, qorin va ruhiyat\" — buyrak toshlari, osteoporoz, oshqozon yarasi/pankreatit, depressiya, charchoq.\nDiagnostika: Ca²⁺ ↑, PTG ↑, DEXA (suyak zichligi); UST/sestamibi ssintigrafiya — adenomani topish.\nDavolash: paratireoidektomiya (zararlangan bezni olib tashlash)."}, {"num": 73, "text": "Giperparatireozning klinik ko'rinishlari", "answer": "1) Suyak: osteoporoz, fibroz osteit, patologik sinishlar;\n2) Buyrak: toshlar, poliuriya, nefrokalsinoz;\n3) Me'da-ichak: oshqozon yarasi, pankreatit, qabziyat;\n4) Neyromuskular: holsizlik, charchoq, depressiya, xotira buzilishi;\n5) Yurak: arterial gipertenziya, QT qisqarishi;\n6) Ko'z: kalsiy cho'kishi (band keratopatiyasi).\nGiperkalsemiya hamma a'zolarga ta'sir qiladi."}, {"num": 74, "text": "Giperparatireoz va gipoparatireoz diagnostikasi", "answer": "Giperparatireoz: Ca²⁺ ↑, fosfat ↓, PTG ↑, ishqoriy fosfataza ↑; UST/sestamibi ssintigrafiyada adenoma.\nGipoparatireoz: Ca²⁺ ↓, fosfat ↑, PTG ↓, EKG da QT cho'zilishi.\nPsevdogipoparatireoz: Ca²⁺ ↓, ammo PTG ↑ (a'zolar gormonga javob bermaydi — retseptor nuqsoni).\nKalsiy, fosfat va PTG ni birga baholash tashxisni aniqlaydi."}, {"num": 75, "text": "Buyrak usti bezlarining tuzilishi va gormonlari", "answer": "Po'stloq qatlam (~80%) — uch zonadan iborat:\n- Koptokchasimon (glomerulyar) zona → aldosteron;\n- Tutamsimon (fassikulyar) zona → kortizol;\n- To'rsimon (retikulyar) zona → androgenlar (DHEA).\nMag'iz qatlam (~20%) → adrenalin (~80%) va noradrenalin (~20%).\nBoshqaruv: po'stloqning tutamsimon/to'rsimon zonasi AKTG; koptokchasimon zona renin-angiotenzin tizimi; mag'iz qatlam simpatik nerv tizimi orqali."}, {"num": 76, "text": "Glyukokortikoidlarning biologik ta'siri", "answer": "Kortizolning ta'sirlari:\n1) Uglevod: glyukoneogenez ↑, periferik foydalanish ↓ (qonda glyukoza ↑);\n2) Oqsil: katabolizm ↑ (mushak parchalanishi);\n3) Yog': markaziy semizlik, periferiyada lipoliz;\n4) I
