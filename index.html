<title>MedQuestions</title>
<style>
:root{--bg:#f5f5f5;--card:#fff;--border:#e0e0e0;--text:#212121;--muted:#757575;--accent:#5b7fff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--card);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.1);position:sticky;top:0;z-index:100}
.header-title{font-size:20px;font-weight:700;margin-bottom:8px}
.header-subtitle{font-size:13px;color:var(--muted)}
.progress-section{background:var(--card);padding:16px;margin:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);border-radius:12px}
.progress-stat{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stat-label{font-size:14px;color:var(--muted)}
.stat-value{font-weight:700;color:var(--accent);font-size:16px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.content-wrapper{flex:1;overflow-y:auto}
.chapters-section{padding:16px}
.chapters-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.chapter-card{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;border-top:4px solid}
.chapter-card.onko{border-top-color:#ff6b9d}.chapter-card.endo{border-top-color:#34d399}
.chapter-card.inf{border-top-color:#38bdf8}.chapter-card.neuro{border-top-color:#f59e0b}
.chapter-top{padding:16px;display:flex;align-items:center;justify-content:space-between}
.chapter-info{display:flex;align-items:center;gap:12px;flex:1}
.chapter-icon{font-size:32px}.chapter-name{font-size:16px;font-weight:600}
.chapter-count{font-size:13px;color:var(--muted);margin-top:2px}
.chapter-arrow{color:var(--muted);font-size:20px}
.chapter-progress{padding:0 16px 12px}
.progress-numbers{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-numbers strong{color:var(--text)}
.progress-bar-chapter{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill-chapter{height:100%;background:#34d399;border-radius:3px}
.questions-view{display:none;padding:16px;padding-bottom:20px}
.questions-view.active{display:block}
.questions-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.back-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--accent);padding:4px;font-weight:600}
.questions-title{font-size:18px;font-weight:700}
.search-box{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:14px;outline:none}
.search-box:focus{border-color:var(--accent)}
.question-card{background:var(--card);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:4px solid var(--accent)}
.question-card.done{border-left-color:#34d399}
.question-header{padding:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.question-meta{flex:1}
.question-num{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.question-text{font-size:14px;font-weight:500;line-height:1.5}
.question-toggle{color:var(--muted);font-size:18px;flex-shrink:0}
.question-body{border-top:1px solid var(--border);padding:14px;background:#fafafa;display:none}
.question-body.open{display:block}
.answer-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.answer-text{font-size:13.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
.question-done{margin-top:12px}
.btn-done{width:100%;padding:10px 12px;border:1.5px solid #34d399;background:rgba(52,211,153,.08);color:#34d399;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-done.active{background:#34d399;color:#fff}
.footer{background:var(--card);border-top:1px solid var(--border);padding:16px;text-align:center;margin-top:auto;font-size:12px;color:var(--muted)}
.footer strong{color:var(--accent);font-weight:700}
.chapters-view.hidden{display:none}
.empty{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>

<script>
const APP_DATA={"chapters": [{"id": "onko", "name": "Onkologiya", "icon": "🔬", "count": 72, "questions": [{"num": 1, "text": "O'pka rakining atipik formalari", "answer": "1) Pnevmoniyasimon forma — infiltrativ o'sish, harorat, yo'tal; 2) Mediastinal forma — yuqori kovak vena sindromi; 3) Miya metastazi bilan boshlangan; 4) Suyak metastazi bilan boshlangan; 5) Plevriti bilan boshlangan (ekssudativ plevrit); 6) Yurak metastazi bilan boshlangan."}, {"num": 2, "text": "O'pka rakining qaysi shaklida klinik simptomlar kech boshlanadi", "answer": "Periferik shaklda klinik simptomlar kech paydo bo'ladi, chunki o'sma bronx devorida emas, balki o'pka parenximasida joylashadi va uzoq vaqt simptomsiz o'sadi. Markaziy shaklda esa bronx tutilishi tufayli simptomlar erta boshlanadi."}, {"num": 3, "text": "O'pka rakining periferik shaklida qaysi qismlar zararlanadi", "answer": "Periferik shaklda: kichik bronxlar, bronxiolalar va alveolalar zararlanadi. O'sma plevra, ko'krak devori, diafragmaga tarqalishi mumkin. Panko'st o'smasi — o'pka cho'qqisida joylashib, qo'l-oyoq nerv chigallarini, qovurg'alarni, umurtqa pog'onasini bosadi."}, {"num": 4, "text": "O'pka rakining markaziy shaklida qaysi qismlar zararlanadi", "answer": "Markaziy shaklda: bosh, bo'lak va segment bronxlari zararlanadi. Bronx lumenini toraytiradi → atelektaz, obstruksion pnevmoniya, plevrit kelib chiqadi. Simptomlar erta: yo'tal, qon tupurish, nafas qisishi."}, {"num": 5, "text": "O'pka saratoni profilaktikasi", "answer": "Birlamchi: 1) Chekishni to'xtatish (eng asosiy); 2) Kasbiy xavfli moddalardan (asbest, radon) himoya; 3) Havo ifloslanishini kamaytirish; 4) Sog'lom ovqatlanish. Ikkilamchi: fluorografiya va KT skrining, erta aniqlash."}, {"num": 6, "text": "O'pka saratonining davolash turlari", "answer": "1) Jarrohlik: pnevmonektomiya, lobektomiya, segmentektomiya; 2) Nurlanish terapiyasi — jarrohlik mumkin bo'lmasa; 3) Ximioterapiya — kichik hujayra rakida asosiy; 4) Immunoterapiya (PD-L1 ingibitorlari); 5) Maqsadli terapiya (EGFR, ALK mutatsiyalari); 6) Kombinatsiyalangan davolash."}, {"num": 7, "text": "O'pka raki diagnostikasida instrumental tekshirish usullari", "answer": "1) Rentgenografiya (2 proyeksiya); 2) KT — asosiy usul; 3) Bronxoskopiya + biopsiya — markaziy shakl; 4) Torakoskopiya — periferik shakl; 5) Mediastinoskopiya; 6) PET-KT — metastazlar; 7) Transtoraka punksiya biopsiyasi; 8) Balg'am sitologiyasi."}, {"num": 8, "text": "Sut bezi saratoni TNM bo'yicha klassifikatsiyasi", "answer": "T1 ≤2 sm, T2 2–5 sm, T3 >5 sm, T4 ko'krak devori/teriga. N0 — yo'q, N1 — qo'ltiq osti harakatchan, N2 — qotib qolgan, N3 — o'mrov osti/usti. M0 — yo'q, M1 — bor. Stadiyalar I–IV."}, {"num": 9, "text": "Sut bezi saratoni gormonal davolash haqida tushuncha", "answer": "ER+/PR+ o'smalar: 1) Tamoksifen — premenopauzal (5–10 yil); 2) Aromataza ingibitorlari (letrozol, anastrozol) — postmenopauzal; 3) Ovariektomiya yoki GnRH analoglari — yosh ayollar; 4) Fulvestrant; 5) CDK4/6 ingibitorlari (palbosiklib) bilan kombinatsiya."}, {"num": 10, "text": "Sut bezi saratoniga olib keluvchi kanserogen omillar", "answer": "1) Yosh >50; 2) BRCA1/2 mutatsiya; 3) Erta menarxe (<12), kech menopauza (>55); 4) Farzandsizlik, kech tug'ruq (>30); 5) Emizmaslik; 6) Gormon o'rnini bosuvchi terapiya; 7) Semizlik; 8) Alkogol; 9) Ko'krak sohasiga nurlanish."}, {"num": 11, "text": "Sut bezi saratoniga olib keluvchi kanserogen omillar (11-bilet)", "answer": "Reproduktiv: erta menarxe, kech menopauza, farzandsizlik. Genetik: BRCA1/2 (66–87% xavf). Gormonal: uzoq OAK qabul. Tashqi: ionlovchi nurlanish, HRT. Turmush tarzi: semizlik, alkogol, kam jismoniy faollik."}, {"num": 12, "text": "Sut bezi saratonida operativ davolash usullari", "answer": "1) Radikal mastektomiya (Halsted) — ko'krak mushagi bilan; 2) Modifitsirlangan radikal mastektomiya (Madden) — mushak saqlanadi; 3) Oddiy mastektomiya; 4) Kvadrantektomiya; 5) Tumorektomiya + aksiller disseksiya; 6) Sentinel tugun biopsiyasi; 7) Rekonstruktiv operatsiyalar."}, {"num": 13, "text": "Sut bezi saratonida uchraydigan patologik simptomlar", "answer": "1) Og'riqsiz zich tugun; 2) 'Apelsin po'stlog'i' — teri chekinishi; 3) Teri qizarishi; 4) Nipel retraktsiyasi; 5) Nipeldan qonli/seroz ajralma; 6) Paget kasalligi (nipel ekzeması); 7) Qo'ltiq osti limfa tugunlari kattalashishi; 8) Ko'krak bezini deformatsiya."}, {"num": 14, "text": "Sut bezi saratoni rak oldi kasalliklari", "answer": "1) Fibroadenoma; 2) Proliferativ mastopati (atipik giperplaziya); 3) Sut yo'li papillomasi; 4) LCIS (lobular karsinoma in situ); 5) DCIS (duktal karsinoma in situ); 6) Sklerozan adenoz; 7) Kista (murakkab). Eng xavfli: atipik duktal giperplaziya."}, {"num": 15, "text": "Sut bezi saratoni profilaktikasi", "answer": "Birlamchi: sog'lom ovqat, jismoniy faollik, tug'ish va emizish, alkogolni cheklash. Ikkilamchi: mammografiya 40–74 yosh har 2 yilda. Ximiyoprofilaktika: tamoksifen, aromataza ingibitorlari. Profilaktik mastektomiya — BRCA1/2 tashuvchilarda."}, {"num": 16, "text": "Sut bezi saratonida radikal tashxislar", "answer": "1) Radikal mastektomiya (Halsted) — katta va kichik ko'krak mushagi bilan; 2) Kengaytirilgan radikal — to'sh suyagi bilan; 3) Modifitsirlangan radikal (Madden) — mushaklar saqlanadi; 4) Sut bezini saqluvchi operatsiya + aksiller disseksiya; 5) Sentinel tugun biopsiyasi."}, {"num": 17, "text": "Sut bezi saratonining klinikasi va diagnostikasi", "answer": "Klinika: og'riqsiz tugun, teri o'zgarishi, nipel retraktsiyasi/ajralma, limfadenopatiya. Diagnostika: 1) Mammografiya (oltin standart); 2) UST; 3) MRT; 4) Ingichka igna biopsiyasi; 5) Trepan-biopsiya; 6) Gistologiya; 7) Gormon retseptorlari, HER2, Ki-67 aniqlash."}, {"num": 18, "text": "Qalqonsimon bez saratoni klinikasi", "answer": "Erta: og'riqsiz tugun, yutinishda qiyinlik. Kech: ovoz xiriqlik (qaytuvchi nerv), nafas qisishi (traxeya), yutinish qiyinligi (qizilo'ngach). Metastazlar: servikal limfa tugunlar (erta), o'pka, suyak, miya (uzoq)."}, {"num": 19, "text": "Qalqonsimon bez saratoni gistologik turlari", "answer": "1) Papillar (60–70%) — prognoz yaxshi; 2) Follikuler (15–20%) — qon orqali metastaz; 3) Medullаr (5–10%) — kalsitonin, MEN-2; 4) Anaplastik (<5%) — eng agressiv; 5) Limfoma (kam)."}, {"num": 20, "text": "Qalqonsimon bez saratoni TNM klassifikatsiyasi", "answer": "T1 ≤2 sm; T2 2–4 sm; T3 >4 sm yoki minimal tashqi; T4a — teri, qizilo'ngach, traxeya; T4b — vertebra, uyqu arteriyasi. N0 yo'q; N1a IV LT; N1b boshqa servikal. M0/M1. Papillar/follikuler uchun 55 yosh muhim."}, {"num": 21, "text": "Qalqonsimon bez saratoni diagnostikasi", "answer": "1) UST + elastografiya; 2) IIAB (ingichka igna aspiratsion biopsiya) — asosiy; 3) TTG, T3, T4; 4) Kalsitonin — medullаr; 5) Tireoglobulin — follikuler/papillar; 6) KT, MRT; 7) Radioiod skintigrafiya (131I); 8) PET-KT."}, {"num": 22, "text": "Qalqonsimon bez rak oldi kasalliklari", "answer": "1) Follikuler adenoma; 2) Nodozli zob; 3) Hashimoto tiroiditi; 4) Diffuz toksik zob; 5) Nurlanish anamnezi; 6) MEN-2 sindromi; 7) 1 sm dan katta sovuq tugunlar UST da."}, {"num": 23, "text": "Qalqonsimon bez saratoni etiopatogenezi", "answer": "Etiologiya: ionlovchi nurlanish (eng muhim), yod yetishmovchiligi, irsiyat (MEN-2), Hashimoto, gormon disbalansi. Patogenez: RET, BRAF, RAS, PAX8-PPAR mutatsiyalari → nazorat yo'qolishi → tartibsiz proliferatsiya → invaziya va metastaz."}, {"num": 24, "text": "Qalqonsimon bez yomon sifatli o'smalarini davolash", "answer": "1) Tireoidektomiya (total/subtotal) + limfadenektomiya; 2) Radioiod terapiya (131I) — papillar va follikuler uchun; 3) L-tiroksin suppresiv terapiyasi; 4) Nurlanish — anaplastik, medullаr; 5) Ximioterapiya — anaplastik; 6) Maqsadli terapiya (sorafenib, lenvatinib)."}, {"num": 25, "text": "Buyrak saratoni klinikasi", "answer": "Klassik triad (kech): 1) Gematuria (og'riqsiz); 2) Bel og'rig'i; 3) Paypaslanadigan massa. Erta: paraneo-plastik sindrom (isitma, polisitemiya, giperkalsiemiya, AH). Metastazlar: o'pka, suyak, jigar, miya."}, {"num": 26, "text": "Buyrak saratoni gistologik turlari", "answer": "1) Yorug' hujayra (clear cell) — 75–80%; 2) Papillar — 10–15%; 3) Xromofob — 5%, prognoz yaxshi; 4) Bellini yo'li karsinomasi — nadir, agressiv; 5) Wilms o'smasi — bolalarda; 6) Angiomiolipoma (xavfsiz); 7) Onkositoma (xavfsiz)."}, {"num": 27, "text": "Buyrak saratoni TNM klassifikatsiyasi", "answer": "T1a ≤4 sm; T1b 4–7 sm; T2a 7–10 sm; T2b >10 sm; T3a — buyrak venasi/qorin yog'i; T3b — kovak vena; T3c — diafragma ustida; T4 — Gerota fastsiyasidan o'tgan. N0/N1. M0/M1."}, {"num": 28, "text": "Buyrak saratoni kliniko-anatomik klassifikatsiyasi", "answer": "1) Intrarenal; 2) Ekstrarenal; 3) Markaziy; 4) Quyi/yuqori qutb. Bosqichlar: I — bez ichida; II — Gerota fastsiyasi; III — vena/LT; IV — uzoq metastazlar."}, {"num": 29, "text": "Buyrak saratoni rak oldi kasalliklari", "answer": "To'g'ridan rak oldi yo'q, xavf oshiruvchi: 1) Von Hippel-Lindau sindromi; 2) Hereditar papillar buyrak karsinomasi; 3) Birt-Hogg-Dubé sindromi; 4) Surunkali siydik yo'li kasalliklari; 5) Dializ — auksillar kistali kasallik."}, {"num": 30, "text": "Buyrak saratoni diagnostikasi", "answer": "1) UST — birinchi qadam; 2) KT kontrast bilan — asosiy; 3) MRT — vena trombozi; 4) Angiografiya; 5) Rentgenografiya — o'pka; 6) Suyak ssintigrafiyasi; 7) Igna biopsiyasi; 8) Siydik — gematuria."}, {"num": 31, "text": "Buyrak saratoni profilaktikasi", "answer": "1) Chekishni tashlash; 2) AH nazorat; 3) Semizlikni kamaytirish; 4) Analgetiklar suiiste'molini oldini olish; 5) Kasbiy xavflardan himoya (kadmiy, asbest); 6) Genetik maslahat; 7) UST skrining."}, {"num": 32, "text": "Moyak saratoni diagnostikasi", "answer": "1) Skrotum UST; 2) Qon markerlari: AFP (nonseminoma), beta-hCG (ikkisi ham), LDH (prognoz); 3) KT ko'krak, qorin, tos; 4) MRT miya; 5) Orxiektomiya (inguinal) — gistologiya; 6) PET-KT — seminomada."}, {"num": 33, "text": "Moyak saratoni klinikasi", "answer": "Erta: og'riqsiz moyakda tugun, skrotumda og'irlik. Kech: bel og'rig'i (retroperitoneal LT), nafas qisishi (o'pka), ginekomastiya. 15–35 yosh erkaklar ko'proq kasallanadi."}, {"num": 34, "text": "Prostata bezi saratoni klinikasi", "answer": "Erta: ko'pincha simptomsiz (PSA da topiladi). Simptomlar: siydik chiqishi qiyinlashishi, kuchsiz oqim, tez-tez siydik, to'liq chiqarmaslik. Kech: suyak og'rig'i (umurtqa, tos), anemiya, siydik yo'li tutilishi."}, {"num": 35, "text": "Prostata bezi saratoni rak oldi kasalliklari", "answer": "1) HGPIN (yuqori darajali prostatik intraepitelial neoplaziya) — bevosita rak oldi; 2) ASAP (atipik kichik asinar proliferatsiya); 3) BPG — bevosita aloqasi yo'q, diagnostikani qiyinlashtiradi; 4) Prostatit — surunikali yallig'lanish."}, {"num": 36, "text": "Prostata bezi saratoni davolash usullari", "answer": "Lokal: 1) Radikal prostatektomiya (robot-yordamda); 2) Nurlanish terapiyasi (tashqi + brakiterapiya); 3) Kuzatuv. Metastatik: 4) ADT (GnRH analoglari, antiandrogen); 5) Dosetaksel, kabazitaksel; 6) Abirateron, enzalutamid; 7) Ra-223 — suyak metastazlari."}, {"num": 37, "text": "Siydik pufagi saratoni etiopatogenezi", "answer": "Etiologiya: 1) Chekish (50%); 2) Anilin bo'yoqlari, aromatik aminlar; 3) Schistosoma haematobium; 4) Siklofosfamid. Patogenez: FGFR3, TP53 mutatsiyalari → urotelial giperplaziya → karsinoma in situ → invaziv."}, {"num": 38, "text": "Siydik pufagi rak oldi kasalliklarini davolash", "answer": "1) CIS: BCG immunoterapiya (intravezikаl) — birinchi tanlov; 2) Ta-T1 past daraja: TUR + mitomisin; 3) T1 yuqori daraja: TUR + BCG; progressiyada sistektomiya; 4) Papilloma/giperplaziya: sistoskopiya har 3–6 oyda."}, {"num": 39, "text": "Siydik pufagi rak oldi kasalliklari", "answer": "1) Papilloma; 2) Urotelial giperplaziya; 3) Düz displaziya; 4) CIS — eng xavfli rak oldi (50% gacha invazivga o'tadi); 5) Inverted papilloma; 6) Leykoplakiya."}, {"num": 40, "text": "Siydik pufagi rakini diagnostikasi", "answer": "1) Siydik — gematuria (og'riqsiz); 2) Siydik sitologiyasi; 3) Sistoskopiya — asosiy + biopsiya; 4) Fluoressent sistoskopiya; 5) UST, KT urografiya, MRT; 6) TUR-biopsiya; 7) PET-KT."}, {"num": 41, "text": "Tuxumdon rakida tashxis turlari", "answer": "1) Unilateral salpingo-ooforektomiya (erta); 2) TAH-BSO (total abdominal gisterektomiya + bilateral salpingo-ooforektomiya); 3) Debulking operatsiya; 4) Interval debulking — ximioterapiyadan keyin; 5) Staging laparotomiya: peritoneal biopsiya, omentektomiya, LT."}, {"num": 42, "text": "Tuxumdon rakini davolash", "answer": "1) Jarrohlik — debulking + staging; 2) Karboplatin + paklitaksel — standard; 3) Bevatsizumab + ximioterapiya; 4) PARP ingibitorlari (olaparib) — BRCA mutatsiyasida; 5) Gormonal terapiya — stromаl o'smalar."}, {"num": 43, "text": "Tuxumdon raki differentsial diagnostikasi", "answer": "1) Funksional kistalar; 2) Endometrioma; 3) Dermoid kista; 4) Fibroma; 5) Fallopiy nayi kasalliklari; 6) Retroperitoneal o'smalar; 7) Peritoneal karsinomatoz; 8) Krukenberg metastazi (oshqozon, to'g'ri ichakdan)."}, {"num": 44, "text": "Tuxumdon raki diagnostikasi", "answer": "1) Transvaginal UST; 2) CA-125, AFP, beta-hCG, inhibin; 3) KT qorin va tos; 4) MRT; 5) PET-KT; 6) Laparoskopiya/laparotomiya; 7) Biopsiya; 8) BRCA genetik test."}, {"num": 45, "text": "Tuxumdon raki klinikasi", "answer": "Erta: simptomsiz yoki noaniq — og'riq, qorin dam bo'lishi. Kech: qorin kattalashishi (assit), ozish, charchoq, dispepsiya. 75% — III–IV bosqichda aniqlanadi. Meygs sindromi — assit + gidrotoraks (fibromada)."}, {"num": 46, "text": "Tuxumdonlar saratoni profilaktikasi", "answer": "1) OAK — xavfni 50% kamaytiradi; 2) Ko'p tug'ish va emizish; 3) BRCA genetik test; 4) Profilaktik BSO — BRCA tashuvchilarda (40 yoshdan); 5) UST + CA-125 — yuqori xavfli guruhlarda; 6) Sog'lom ovqat."}, {"num": 47, "text": "Bachadon bo'yni rak oldi kasalliklari, klinikasi, diagnostikasi va davolash", "answer": "Rak oldi: CIN I–III, karsinoma in situ. Sabab: HPV 16, 18. Klinika: ko'pincha simptomsiz, koital qon ketish. Diagnostika: Pap smeari, kolposkopiya, biopsiya, HPV typing. Davolash: CIN I — kuzatuv; CIN II/III — LEEP, konizatsiya, krioterapiya; Karsinoma in situ — gisterektomiya."}, {"num": 48, "text": "Bachadon bo'yni rakida tashxisdan keyingi asoratlar", "answer": "1) Ureter/qovuq jarohatlari — gidronefrozis, fistula → stent, nefrostoma; 2) Rektal yaralanish — reanastomoz; 3) Limfoedema — kompressiya; 4) Veziko/rekto-vaginal fistulalar — jarrohlik; 5) Ovariyal yetishmovchilik — HRT; 6) Qopgich stenozi — dilatatsiya."}, {"num": 49, "text": "Bachadon bo'yni rakini davolash", "answer": "IA1: LEEP/konizatsiya yoki gisterektomiya. IA2–IIA: Wertheim operatsiyasi + LT yoki ximioradioterapiya. IIB–IVA: sisplatin + tashqi nurlanish + brakiterapiya. IVB: palliativ ximioterapiya. HPV vaksinasi (Gardasil) — profilaktika."}, {"num": 50, "text": "Ayollar jinsiy a'zolari xavfli o'smalari diagnostikasi", "answer": "1) Bimanual palpatsiya; 2) Kolposkopiya + biopsiya; 3) Transvaginal UST; 4) KT/MRT tos; 5) CA-125, CA-19-9, CEA, AFP, beta-hCG; 6) Fraksion kuretaj; 7) Gisteroskopiya; 8) Laparoskopiya; 9) PET-KT."}, {"num": 51, "text": "Oshqozon raki etiopatogenezi", "answer": "Etiologiya: H. pylori (IARC I guruh), tuzlangan/quritilgan ovqat, chekish, alkogol, atrofik gastrit, pernisioz anemiya, Menetrier kasalligi, irsiyat. Patogenez: Correa kaskadi — normal → atrofik gastrit → metaplaziya → displaziya → karsinoma. CDH1 mutatsiyasi (diffuz)."}, {"num": 52, "text": "Oshqozon rakining rentgenologik belgilari", "answer": "1) To'ldirish defekti — ekzofitik o'sma; 2) Bariy suzishi — yara krati; 3) Nishning atipik ko'rinishi; 4) Peristaltika yo'qolishi (linitis plastica); 5) Kardia sohasida torayish; 6) Oshqozon hajmi kichrayishi; 7) Pylorus torayish."}, {"num": 53, "text": "Oshqozonning rakida limfogen metastazlar", "answer": "Regional: kichik/katta egrilik LT, prepylorik, jigar darvozasi. Uzoq: Virxov tugun (chap bo'yin ustida), Krukenberg (tuxumdonga), Sister Mary Joseph (kindikka), Schnitzler (rektal chuqurchaga)."}, {"num": 54, "text": "Oshqozonning rak oldi kasalliklari klinikasi", "answer": "1) Atrofik gastrit: og'irlik epigastriyda, ishtaha yo'qolishi; 2) Ulkus: ovqatdan keyin og'riq; 3) Adenomаtoz polip: ko'pincha simptomsiz; 4) Menetrier: og'riq, gipoproteinemiya; 5) Pernisioz anemiya: charchoq, gloссit, neyrologik; 6) Gastroenteroanastomoz."}, {"num": 55, "text": "Oshqozonning rak oldi kasalliklari diagnostikasi", "answer": "1) FEGDS + biopsiya — asosiy; 2) H. pylori testi; 3) Bariy rentgen; 4) EUS; 5) KT kontrast; 6) Gistologik tekshiruv; 7) Qon: B12, parietal hujayralar antitanalari."}, {"num": 56, "text": "Oshqozonning xavfsiz o'smalari", "answer": "1) Adenoma (polip) — xavfga aylanishi mumkin; 2) Leiomioma; 3) Fibroma; 4) Lipoma; 5) Nevrinoma; 6) Gemangioma; 7) Karsinoid; 8) GIST — ba'zan xavfli. Diagnostika: FEGDS + biopsiya, EUS."}, {"num": 57, "text": "Oshqozonning rak oldi kasalliklarini davolash", "answer": "H. pylori eradikatsiyasi (triple terapiya). Adenomalar: endoskopik rezeksiya. Yuqori daraja displaziya: EMR (endoskopik mukosal rezeksiya) yoki subtotal gastrektomiya. Ulkus: konservativ; yaxshilanmasa jarrohlik. Har 6–12 oyda endoskopik kuzatuv."}, {"num": 58, "text": "Oshqozon rakini davolash", "answer": "I–II: D2 limfadenektomiya bilan gastrektomiya. III: perioperativ FLOT (5-FU, oksaliplatin, doksetaksel) + jarrohlik. IV: palliativ ximioterapiya; trastuzumab — HER2+ da. Nurlanish: adjuvant."}, {"num": 59, "text": "Oshqozon rakida adjuvant ximioterapiya", "answer": "Maqsad: mikrometastazlarni yo'q qilish. Perioperativ (FLOT): 4 kurs oldin + 4 kurs keyin — III bosqich. Adjuvant: XELOX (kapesitabin + oksaliplatin); S-1 (Yaponiyada). HER2+ da trastuzumab birinchi liniya."}, {"num": 60, "text": "Oshqozon raki klinikasi", "answer": "Erta (kichik simptomlar): ishtaha yo'qolishi, go'shtdan nafratlanish, epigastriyda og'irlik, tez to'yish. Kech: og'riq, qon ketish (melaena, hematemez), qusish (pylorus), yutinish qiyinligi (kardia), kacheksiya."}, {"num": 61, "text": "Oshqozon raki diagnostikasi", "answer": "1) FEGDS + biopsiya — asosiy; 2) Bariy rentgen; 3) EUS — invaziya chuqurligi; 4) KT kontrast; 5) PET-KT; 6) Diagnostik laparoskopiya; 7) CEA, CA 19-9; 8) HER2 testi; 9) Suyak ssintigrafiyasi."}, {"num": 62, "text": "Oshqozon raki differentsial diagnostikasi", "answer": "1) Benign yarocha — biopsiya; 2) Limfoma; 3) GIST; 4) Gastrit, pankreatit; 5) Boshqa organlar metastazlari; 6) Karsinoid; 7) Leiomiosarkoma; 8) Menetrier kasalligi."}, {"num": 63, "text": "Oshqozonning qaysi qismida rak ko'p rivojlanadi", "answer": "Eng ko'p: antrum va pilorik qism (50–60%). Keyin: kichik egrilik (20–25%). Kardia (ortib bormoqda). Fundus va katta egrilik — kamroq (5–10%). Diffuz forma — butun oshqozon."}, {"num": 64, "text": "Oshqozon rakida tashxis turlari", "answer": "Radikal: subtotal distal gastrektomiya (antrum), total gastrektomiya (tana/kardiya), D2 LT bilan. Palliativ: gastroenteroanastomoz, gastrostomiya, eyunestomiya, shuntlash. Endoskopik: EMR, ESD — erta bosqich."}, {"num": 65, "text": "Oshqozon rakida tashxisdan keyingi asoratlar", "answer": "1) Anastomoz yetishmovchiligi — drenej, relaparotomiya; 2) Qon ketish — endoskopiya; 3) Anastomoz torayishi — bougienage; 4) Dumping sindromi — parhez, somatostatin; 5) Postgastrektomiya anemiyasi — B12, temir; 6) Og'irlik yo'qolishi — nutritiv qo'llab-quvvatlash."}, {"num": 66, "text": "Oshqozon rakida palliativ tashxislar", "answer": "1) Gastroenteroanastomoz — pylorus obstruksiyasi; 2) Stent — torayish; 3) Gastrostomiya/eyunestomiya — ovqatlanish; 4) Lazer ablatsiya; 5) Palliativ ximioterapiya."}, {"num": 67, "text": "Savitskiy kichik simptomlar sindromi", "answer": "Erta belgilar (A.V. Savitskiy): 1) Umumiy holsizlik; 2) Ishtaha yo'qolishi; 3) Go'sht taomlaridan nafratlanish; 4) Epigastriyda og'irlik; 5) Sababsiz ozish; 6) Noqulay dispepsiya. Bir necha oy davomida onkologik tekshirishni talab qiladi."}, {"num": 68, "text": "Savitskiy katta simptomlar sindromi", "answer": "Kech belgilar: 1) Doimiy og'riq; 2) Qon ketish (melaena, hematemez); 3) Obstruksiya — qusish, yutinish qiyinligi; 4) Ko'rinib-paypaslanadigan o'sma; 5) Metastazlar — sariqlik, assit, Virxov tugunlari; 6) Og'ir kacheksiya."}, {"num": 69, "text": "Oshqozon saratoni TNM klassifikatsiyasi", "answer": "T: Tis — in situ; T1a — lamina propria; T1b — submukoza; T2 — muskuloza; T3 — subseroza; T4a — seroza; T4b — qo'shni organlar. N: N0; N1 — 1–2 LT; N2 — 3–6; N3a — 7–15; N3b — ≥16. M0/M1."}, {"num": 70, "text": "Yo'g'on ichak saratoni gistologik turlari", "answer": "1) Adenokarsinoma (90–95%) — eng keng; 2) Mucinous karsinoma; 3) Signet-ring hujayra — yomon prognoz; 4) Medullаr — MSI-H; 5) Neyroendokrin karsinoma; 6) Yassi hujayra karsinomasi."}, {"num": 71, "text": "To'g'ri ichak saratoni TNM klassifikatsiyasi", "answer": "T1 submukoza; T2 muskuloza; T3 perirektаl to'qima; T4a visseral peritoneum; T4b qo'shni organlar. N0; N1a — 1 LT; N1b — 2–3; N1c — tumor deposits; N2a — 4–6; N2b — ≥7. M1a — 1 organ; M1b — bir necha; M1c — peritoneum."}, {"num": 72, "text": "To'g'ri ichak saratoni klinikasi", "answer": "1) Rectal qon ketish — birinchi belgi; 2) Ich o'tishi o'zgarishi; 3) Nejestov — yolg'on majburlash; 4) To'g'ri ichak to'liq bo'shatilmaganlik; 5) Og'riq (anal, chov, dumg'aza); 6) Sekretsiya (shilimshiq, qon); 7) Obstruksiya — kech; 8) Jigar, o'pka, peritoneum metastazlari."}]}, {"id": "endo", "name": "Endokrinologiya", "icon": "🧬", "count": 90, "questions": [{"num": 1, "text": "Gipofiz qayerda joylashgan va u qanday qismlardan iborat", "answer": "Turk egar (sella turcica) da. Qismlar: 1) Adenogipofiz (oldingi): GTG, TSH, AKTG, STG, prolaktin, MSH; 2) Neyrogipofiz (orqa): ADG (vazopressin) va oksitotsin. Gipotalamus bilan portal tizim orqali bog'liq."}, {"num": 2, "text": "Oldingi gipofiz gormonlari", "answer": "1) STG — o'sish; 2) TSH — qalqonsimon bez; 3) AKTG — buyrak usti; 4) FSH — follikul; 5) LG — lyuteinizatsiya; 6) Prolaktin — sut bezi; 7) MSH — melanin."}, {"num": 3, "text": "AKTG funktsiyalari", "answer": "Adenogipofizda (CRH ta'sirida). Buyrak usti bezining qobiq qatlamini stimulyatsiya → kortizol sintezi ↑ → androgen ↑ → melanin. Diurnal ritm — ertalab eng yuqori. Salbiy teskari aloqa: kortizol ↑ → AKTG ↓."}, {"num": 4, "text": "TTG (TSH) funktsiyalari", "answer": "TRH ta'sirida. 1) Qalqonsimon bez o'sishi; 2) T3/T4 sintezi ↑; 3) Yod qabul ↑; 4) Tireoglobulin sintezi ↑. Teskari aloqa: T3/T4 oshganda TTG ↓."}, {"num": 5, "text": "STG ning biologik ta'sirlari", "answer": "1) Suyak/tog'ay o'sishi (IGF-1 orqali); 2) Protein sintezi ↑; 3) Lipoliz ↑; 4) Glyukoza utilizatsiya ↓ (diabetogen); 5) Suv/elektrolit balans; 6) Immunitet ↑. Uyqu paytida eng ko'p."}, {"num": 6, "text": "Gipotalamus gormonlari va vazifalari", "answer": "Liberinlar: GnRH (LG/FSH), TRH (TTG/prolaktin), CRH (AKTG), GHRH (STG). Statinlar: somatostatin (STG ↓). Neyrogipofiz: ADG (suv balans), oksitotsin (bachadon/sut)."}, {"num": 7, "text": "Endokrin tizimda teskari aloqa mexanizmi", "answer": "Salbiy feed-back (keng): kortizol ↑ → AKTG ↓, CRH ↓. Ijobiy (noyob): estrogen ↑ → LG toshishi (ovulyatsiya). Qisqa: gipofiz → gipotalamus. Uzun: periferik gormon → gipotalamus + gipofiz."}, {"num": 8, "text": "Voyaga yetganda ortiqcha STG — qaysi kasalliklar", "answer": "Epifizlar yopilgandan keyin → akromegaliya. Epifizlar ochiq bo'lganda → gigantizm. Akromegaliya: qo'l, oyoq, yuz kattalashadi. Gigantizm: bo'y uzayadi. Sabab: adenogipofiz adenomasi."}, {"num": 9, "text": "Gigantizm va akromegaliya farqi", "answer": "Gigantizm: bolalar (epifizlar ochiq) → bo'y >2 m, proporsional. Akromegaliya: kattalar (yopiq) → akral qismlar (qo'l, oyoq, yuz) kattalashadi. Umumiy: STG ↑, IGF-1 ↑, OGTT da STG bostirmaydi, MRT adenoma."}, {"num": 10, "text": "Gipofiz nanizmi — sabablari", "answer": "STG tanqisligi → past bo'y (<−2 SD), proporsional qomat, bolalar yuzi, jinsiy rivojlanish kechikishi. Sabablar: idiopatik, adenoma, kraniofaringioma, travma, nurlanish, irsiy (GH1 mutatsiya)."}, {"num": 11, "text": "Akromegaliya etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: gipofiz STG adenomasi (99%). Patogenez: STG ↑ → IGF-1 ↑ → gipertrofiya. Klinika: qo'l/oyoq/yuz kattalashishi, terlash, bosh og'rig'i, ko'ruv buzilishi, diabet, AH. Diagnostika: IGF-1 ↑, OGTT, MRT. Davolash: transphenoidal adenomektomiya, oktreotid, kabergolin."}, {"num": 12, "text": "Akromegaliya diagnostikasi", "answer": "1) IGF-1 — skrining; 2) STG OGTT (75 g glyukoza) — norma <1 ng/ml; 3) MRT gipofiz; 4) Ko'ruv maydoni; 5) EKG, exo; 6) Koloskopiya; 7) Uyqu polisomnografiya."}, {"num": 13, "text": "Akromegaliyani zamonaviy davolash", "answer": "1) Transphenoidal adenomektomiya (birinchi); 2) Oktreotid LAR, lanreotid; 3) Kabergolin; 4) Pegvisomant (GH retseptor antagonisti); 5) Gamma-knife; Maqsad: IGF-1 norma, STG <1 ng/ml."}, {"num": 14, "text": "Jismoniy rivojlanishni persentil jadvallar bo'yicha baholash", "answer": "3–97 persentil — norma. <3 — past bo'y (<−2 SD). >97 — baland. SDS = (bemorning bo'yi − o'rtacha bo'y) / SD. Bo'y, vazn, bosh aylanasi jadvalga solinadi."}, {"num": 15, "text": "Shixan sindromi etiologiya, patogenez, klinika, diagnostika", "answer": "Etiologiya: tug'ruq paytida qon ketishi → gipofiz nekrozi. Klinika: laktatsiya yo'qligi, amenoreya, gipotireoz, gipokortisizm, jinsiy belgilar susayishi. Diagnostika: gormonlar (barchasi ↓), MRT — bo'shliq."}, {"num": 16, "text": "Gigantizm etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: bolada gipofiz STG-adenomasi, MEN-1. Klinika: bo'y >2 m, bosh og'rig'i, ko'ruv buzilishi, giperhidroz, diabet. Diagnostika: STG ↑, IGF-1 ↑, MRT, suyak rentgeni. Davolash: transphenoidal, oktreotid, radioxirurgiya."}, {"num": 17, "text": "Qandsiz diabet etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Markaziy: ADG ↓ (kraniofaringioma, travma); Nefrogen: buyraklar ADG ga javob bermaydi (litiy, giperkalsemiya). Klinika: poliyuriya >3 l/kun, polidipsiya, zichlik <1005. Diagnostika: suvsizlanish sinovi + ADG analog. Davolash: Markaziy — desmopressin; Nefrogen — gidroxlortiyazid."}, {"num": 18, "text": "Quruq ovqatlanish sinami (suvsizlanish testi)", "answer": "8 soat suv bermay → soatda siydik osmolallik. Norma: >700 mOsm/kg. QD: <300. ADG analog bersak: Markaziy QD da ↑, nefrogenda oshmaydi. Psixogen polidipsiyada osmolallik oshadi."}, {"num": 19, "text": "Markaziy qandsiz diabetni davolash", "answer": "1) Desmopressin (burun/sublingual/in'eksiya); 2) Gidroxlortiyazid; 3) Karbаmazepin; 4) Sabab bo'lgan o'sma davolash."}, {"num": 20, "text": "Itenko-Kushing kasalligining etiologiyasi va klinikasi", "answer": "Etiologiya: gipofiz AKTG adenomasi. Klinika: oy yuz, qorin semizligi, buffalo hump, qizg'ish striyalar, teri yupqalashishi, AH, osteoporoz, steroid diabet, girs utizm, psixoz."}, {"num": 21, "text": "Semizlik etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: irsiyat, ortiqcha kaloriya, gipotireoz, Kushing, PKOS, dorilar. Patogenez: energiya sarf < kirim → yog'. Diagnostika: IMT ≥30, bel atrof. Davolash: dieta + faollik; orlistat; semaglutid; bariatrik (IMT≥40)."}, {"num": 22, "text": "BMI (tana massasi indeksi) nima va uni hisoblash", "answer": "BMI = vazn (kg) / bo'y² (m²). <18.5 — tanqislik; 18.5–24.9 — norma; 25–29.9 — ortiqcha; 30–34.9 — I daraja; 35–39.9 — II; ≥40 — III (patologik). Bel atrof: erkaklar >94 sm, ayollar >80 sm — qorin semizligi."}, {"num": 23, "text": "Metabolik sindrom etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: irsiyat + noto'g'ri ovqat + kam harakat. Patogenez: insulin rezistentligi → giperinsulinemiya → AH, dislipidemiya, giperglikemiya. Diagnostika IDF: bel >94/80 + yana 2 belgi. Davolash: turmush tarzi, metformin, statinlar."}, {"num": 24, "text": "Semizlikni davolash usullari", "answer": "1) Dieta (500–1000 kkal deficit) + faollik 150 daq/hafta; 2) Orlistat (lipoaza ingibitori); 3) Semaglutid (GPP-1 analog); 4) Intragastrik ballon; 5) Bariatrik jarrohlik (sleeve/gastrik shunt) — IMT≥40 yoki ≥35+kasallik."}, {"num": 25, "text": "Qandli diabet tasnifi va ta'rifi", "answer": "Insulin sekretsiya yoki ta'sir yetishmovchiligi → giperglikemiya. Turlari: 1) QD 1 — autoimmun; 2) QD 2 — IR + nisbiy insulinopenik; 3) Gestatsion; 4) MODY, pankreatogen. Diagnostika: och glyukoza ≥7.0 mmol/l yoki HbA1c ≥6.5%."}, {"num": 26, "text": "QD 1-tur etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: autoimmun (T-hujayralar β-hujayralarni yo'q qiladi), HLA-DR3/DR4, virus. Klinika: yoshlarda, keskin, poliyuriya, ozish, ketoacidoz. Diagnostika: glyukoza ↑, C-peptid ↓, GAD, ICA+. Davolash: insulin — umrbod, bazis-bolus."}, {"num": 27, "text": "QD 2-tur etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: genetik + semizlik + yosh. Patogenez: IR + β-hujayra yetishmovchiligi. Klinika: 40+ yosh, sekin, ko'pincha simptomsiz. Diagnostika: glyukoza ≥7.0, HbA1c ≥6.5%. Davolash: turmush tarzi + metformin → SGLT2, GLP-1, insulin."}, {"num": 28, "text": "QD 1 va 2 tur klinik simptomlar farqi", "answer": "QD 1: yosh, ozg'in, keskin, ketoacidoz xavfi ↑, insulin mutlaq. QD 2: katta yosh, semiz, sekin, ketoacidoz kamroq. Farq: C-peptid (1 — ↓, 2 — ↑), autoantitanalar (1 — bor, 2 — yo'q)."}, {"num": 29, "text": "QD 1 va 2 tur differentsial diagnostikasi", "answer": "QD1 / QD2 — Yosh: 40 gacha / 40+; Boshlanish: o'tkir/sekin; Vazn: ozg'in/semiz; Ketoacidoz: ko'p/kam; C-peptid: <0.2/<0.6 nmol/l; GAD+/−; LADA: kattalar, sekin, ammo autoimmun."}, {"num": 30, "text": "Qandli diabet diagnostikasi mezonlari", "answer": "1) Och glyukoza ≥7.0 mmol/l; 2) GTT 2 soat ≥11.1; 3) HbA1c ≥6.5%; 4) Simptomlar + tasodifiy glyukoza ≥11.1. Simptom yo'qda — 2 marta tasdiqlash. Prediabet: 5.6–6.9 yoki GTT 7.8–11.0 yoki HbA1c 5.7–6.4%."}, {"num": 31, "text": "Glikirli gemoglobin (HbA1c) va diagnostikadagi ahamiyati", "answer": "Oxirgi 2–3 oy o'rtacha glikemiya. Mezonlar: <5.7% norma; 5.7–6.4% prediabet; ≥6.5% QD. Maqsad davolashda: <7.0% (umumiy), 6.5% (yosh), 8.0% (keksa). Kamchilik: anemiya, gemoglobinopatiyalarda noto'g'ri."}, {"num": 32, "text": "Prediabet tushunchasi, diagnostikasi, davolash", "answer": "IFG: och 5.6–6.9; IGT: GTT 7.8–11.0; HbA1c 5.7–6.4%. QD ga o'tish xavfi 15–30% / 5–10 yil. Davolash: turmush tarzi (semizlikni ↓ — QD 58% kamaytiradi); metformin — yuqori xavfli."}, {"num": 33, "text": "GTT o'tkazish ko'rsatmalari va usuli", "answer": "Ko'rsatma: prediabet, gestatsion diabet skrining (24–28 hafta), xavf omillari. Usul: 3 kun oddiy ovqat → 8–14 soat och → och qon → 75 g glyukoza → 2 soat qon. Faollik, chekish ta'siri yo'q bo'lsin."}, {"num": 34, "text": "GTT natijalarini talqin qilish", "answer": "Och / 2 soat: Norma <5.6 va <7.8; IGT <7.0 va 7.8–11.0; IFG 5.6–6.9 va <7.8; QD ≥7.0 yoki ≥11.1. Gestatsion (IADPSG): och ≥5.1, 1 soat ≥10.0, 2 soat ≥8.5 mmol/l."}, {"num": 35, "text": "Qandli diabet uchun dietoterapiya", "answer": "Kaloriya: 500 kkal deficit (semizlikda). Uglevodlar: 45–60%, past GI. Tolalar ≥25 g. Yog' <35%, to'yinmagan afzal. Shirin ichimliklar, oddiy shakar cheklash. Ovqat vaqti: bir xil, kichik porsiya. Tuz <2.3 g/kun."}, {"num": 36, "text": "Gipoglikemik dorilar tasnifi", "answer": "1) Metformin — IR ga; 2) Sulfanilmochevina — sekretagog; 3) Glinidlar — qisqa; 4) DPP-4 ing (sitagliptin); 5) GPP-1 agonist (semaglutid); 6) SGLT2 ing (empagliflozin); 7) Akarboza; 8) Pioglitazon."}, {"num": 37, "text": "Metformin (biguanid) — ko'rsatma, mexanizm, nojo'ya", "answer": "Ko'rsatma: QD 2 birinchi tanlov, prediabet. Mexanizm: jigar glyukoneogenezi ↓ (asosiy), insulin sezgirlik ↑. Nojo'ya: GI (aynishi, diarеya), laktatsidoz (noyob, buyrak ↓da), B12 ↓. Qarshi: SCr >1.5, jigar ↓."}, {"num": 38, "text": "Sulfanilmochevina — ko'rsatma, mexanizm, nojo'ya", "answer": "Ko'rsatma: QD 2. Glibenklamid, glipizid, gliklazid. Mexanizm: β-hujayra K-ATP kanali → depolarizatsiya → insulin ↑. Nojo'ya: gipoglikemiya (xavfli!), vazn ↑. Qarshi: QD 1, buyrak/jigar ↓, homiladorlik."}, {"num": 39, "text": "DPP-4 ingibitorlari — ko'rsatma, mexanizm, nojo'ya", "answer": "Sitagliptin, linagliptin. Ko'rsatma: QD 2, gipoglikemiya xavfi bo'lsa. Mexanizm: DPP-4 bloki → GLP-1/GIP ↑ → insulin ↑, glyukagon ↓. Nojo'ya: nazofaringit, pankreatit (noyob). Vazn neytral."}, {"num": 40, "text": "GPP-1 analoglari — ko'rsatma, mexanizm, nojo'ya", "answer": "Semaglutid (haftalik), liraglutid. Ko'rsatma: QD 2, YuQT xavfi, semizlik. Mexanizm: GLP-1 retseptor → glyukozaga bog'liq insulin ↑, glyukagon ↓, ishtaha ↓. Nojo'ya: aynishi, qusish (boshlanishida). Vazn ↓."}, {"num": 41, "text": "SGLT2 ingibitorlari — ko'rsatma, mexanizm, nojo'ya", "answer": "Empagliflozin, dapagliflozin. Ko'rsatma: QD 2, YuQT ↓, SBK. Mexanizm: proksimal naychada glyukoza reabsorbsiya ↓ → glukozuriya → glyukoza ↓, qon bosim ↓, vazn ↓. Nojo'ya: urogenital kandidoz, DKA (noyob). Kardiorenal himoya."}, {"num": 42, "text": "Insulin terapiyasini tayinlash ko'rsatmalari", "answer": "Mutlaq: QD 1, DKA, koma. Nisbiy QD 2 da: HbA1c >9–10%, og'iz dorilar samarasi ↓, jarrohlik, o'tkir infeksiya, MI, jigar/buyrak ↓, homiladorlik."}, {"num": 43, "text": "Insulinlarning ta'sir muddati bo'yicha tasnifi", "answer": "Tez (analog): lispro, aspart — 10–15 daq, 1–2 soat, 3–5 soat. Qisqa: oddiy insulin — 30–60 daq, 2–3 soat, 5–8 soat. O'rta: NPH — 2–4 soat, 4–10 soat, 10–16 soat. Uzoq (analog): glargin, degludek — cho'qqisiz, 20–42 soat."}, {"num": 44, "text": "1-tur QD uchun insulin doza hisoblash", "answer": "TDD: 0.5–1 U/kg/kun. 50% bazal + 50% bolus. Bolus: 1 U — 10–15 g uglevod. Korreksiya: 1 U — glyukoza 2.5–3 mmol/l pasaytiradi (1800/TDD). Nazorat asosida sozlash."}, {"num": 45, "text": "Bazis-bolus insulin terapiyasi nima", "answer": "Fiziologik sekretsiya taqlidi. Bazal (glargin/degludek — kechasi): sutkalik bazal. Bolus (lispro/aspart — ovqat oldidan): glikemiya cho'qqisini bostiradi. Afzallik: moslashuvchan jadval, gipoglikemiya kamroq."}, {"num": 46, "text": "Diabetik ketoacidoz klinika va davolash", "answer": "Klinika: aynish, qusish, qorin og'rig'i, Kussmaul nafas, aceton hidi, poliyuriya, ong buzilishi. Lab: glyukoza >14, ketonlar+++, pH <7.3. Davolash: infuziya (0.9% NaCl), oddiy insulin 0.1 U/kg/soat, kaliy korreksiyasi."}, {"num": 47, "text": "Gipoglikemik koma klinika va davolash", "answer": "Glyukoza <3.9; og'ir <2.8. Klinika: terlaş, titrash, taxikardiya, ochlik (adrenergik); ong buzilishi, xuruj (neyroglükopenik). Davolash: ong bor — 15–20 g uglevod; ong yo'q — 40% glyukoza 40–60 ml IV, glazkagon 1 mg IM."}, {"num": 48, "text": "Diabetik nefropatiya etiologiya, patogenez, klinika, davolash", "answer": "Giperglikemiya → oksidativ stress → glomeruloskleroz. Bosqichlar: giperfiltration → normoalbuminuriya → mikroalbuminuriya (30–299 mg) → makroalbuminuriya (≥300 mg) → UChS. Davolash: ACE ing/ARB, SGLT2, qon bosim <130/80."}, {"num": 49, "text": "Diabetik retinopatiya tasnif, klinika, davolash", "answer": "NPDR: fon (mikroanevrizm, gemorragiya), o'rtacha, og'ir. PDR: neovaskularizatsiya, vitreoz gemorragiya, retinal ajralish. Davolash: lazer fotokoagulyatsiya; bevatsizumab (anti-VEGF); vitrektomiya."}, {"num": 50, "text": "Diabetik neyropatiya etiologiya, patogenez, klinika, davolash", "answer": "Aldoza reduktaza → sorbitol → AGE → nerv buzilishi. Distal simmetrik: 'paypoq/qo'lqop', kechasi yonish. Avtonom: taxikardiya, gastroparez. Davolash: glikemiya nazorat; pregabalin, gabapentin, duloksetin, alfa-lipoik kislota."}, {"num": 51, "text": "Diabetik to'piq sindromi etiologiya, patogenez, klinika, davolash", "answer": "Neyropatiya + angiopatiya + infeksiya. Wagner 0–5. Klinika: oyoq yarasi, qizillik, shish, Charcot. Davolash: debraidment, offloading, antibiotiklar, revaskulyarizatsiya, amputatsiya."}, {"num": 52, "text": "Qalqonsimon bez anatomiya, fiziologiya, gormonlar biosintezi", "answer": "Bo'yinda, 25–30 g. Follikullar (T3, T4) + C-hujayralar (kalsitonin). Biosintez: yod → organifikatsiya (tireoperoksidaza) → MIT + DIT → T3 (MIT+DIT), T4 (DIT+DIT). T4 atrof-muhitda T3 ga (deiodinaza)."}, {"num": 53, "text": "T4 va T3 ning biologik ta'siri", "answer": "1) Bazal metabolizm ↑; 2) Yurak — taxikardiya; 3) Miya rivojlanishi; 4) Protein sintezi ↑; 5) Lipoliz; 6) Glyukoneogenez; 7) GI motilitet; 8) β-adrenoretseptorlar ekspressiyasi ↑. T3 faolroq, T4 prohormone."}, {"num": 54, "text": "Endemik bo'qoq etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Yod ↓ → T3/T4 ↓ → TTG ↑ → bez gipertrofiya. Klinika: bo'yinda kattalashgan bez, bosim belgilari. Diagnostika: UST, TTG, T4, siydikda yod. Davolash: kaliy yodid, L-tiroksin, og'ir — jarrohlik."}, {"num": 55, "text": "Endemik bo'qoq profilaktikasi", "answer": "1) Yodlangan tuz (20–40 mkg/g — eng samarali); 2) Homiladorlar, emizuvchi, bolalar — kaliy yodid; 3) Oziq-ovqat xilma-xilligi; 4) UST skrining; 5) JSST mezonlari: siydikda yod >100 mkg/l."}, {"num": 56, "text": "JSST va Nikolaev bo'yicha qalqonsimon bez kattalashish darajasi", "answer": "Nikolaev: 0 — yo'q; I — paypaslanadi; II — ko'rinadi va paypaslanadi; III — bo'yin shaklini o'zgartiradi; IV — deformatsiya; V — juda katta. JSST: 0 — yo'q; 1 — paypaslanadi; 2 — ko'rinadi."}, {"num": 57, "text": "Gipotireoz etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: Hashimoto, yod ↓, tireoidektomiya, radioiod. T3/T4 ↓ → metabolizm ↓. Klinika: charchoq, vazn ↑, sovuqdan qo'rqish, quruq teri, bradikardiya, miksedema, depressiya. Diagnostika: TTG ↑, T4 ↓. Davolash: L-tiroksin, maqsad TTG 0.5–2.5."}, {"num": 58, "text": "Tug'ma gipotireoz etiologiya, klinika, diagnostika", "answer": "Etiologiya: aplaziya, biosintez defekti, maternal antitanalar. Klinika: yangi tug'ilganda — sariqlik uzayadi, gipotermiya, katta til, kindik churrasi, bo'sh mushaklar. Kechiksa: kretinizm. Diagnostika: YTT skrining (TTG). Davolash: L-tiroksin darhol."}, {"num": 59, "text": "Diffuz toksik bo'qoq (Bazedov) etiologiya, klinika, davolash", "answer": "TRAb/TSI — stimulyatsiyalovchi antitanalar. Klinika: taxikardiya, issiqdan qo'rqish, terlash, titrash, ozish, tashvish; Bazedov triadasi: bo'qoq + oftalmopatiya + pretibial miksedema. Diagnostika: TTG ↓, fT4 ↑, TRAb+. Davolash: tiamazol, radioiod, tireoidektomiya."}, {"num": 60, "text": "Gipotireozda gormonal profil", "answer": "Birlamchi: TTG ↑, fT4 ↓. Ikkilamchi (gipofiz): TTG ↓/norma, fT4 ↓. Subklinik: TTG ↑, fT4 norma. Hashimoto: anti-TPO ↑, anti-TG ↑."}, {"num": 61, "text": "Diffuz toksik bo'qoqda gormonal profil", "answer": "TTG ↓↓; fT4 ↑; fT3 ↑; TRAb+ (spetsifik). Tekshirish: avval TTG → pasaygan → fT4/fT3 → Bazedov gumohi → TRAb → UST + ssintigrafiya."}, {"num": 62, "text": "Tirotoksikoz va gipotireoz differentsial diagnostikasi", "answer": "Tirotoksikoz: taxikardiya, issiq/nam teri, ozish, diareya, titrash, tashvish, gipetrefleksiya, oftalmopatiya. Gipotireoz: bradikardiya, quruq/sovuq teri, vazn ↑, ich qotishi, psixomotor sekinlik, miksedema. Lab: TTG ↓ (tireotoks), TTG ↑ (gipotireoz)."}, {"num": 63, "text": "Tirotoksik kriz belgilari va shoshilinch yordam", "answer": "Kriz: isitma >40°C, taxikardiya >150, aritmiya, koma. Trigger: jarrohlik, infeksiya. Yordam: 1) PTU 600 mg; 2) Lugol eritmasi; 3) Propranolol; 4) Gidrokortizon; 5) Sovutish; 6) ICU."}, {"num": 64, "text": "Tiroiditlarning tasnifi", "answer": "1) O'tkir — bakterial; 2) Yarim o'tkir (De Quervain) — viral; 3) Surunkali: Hashimoto (autoimmun), Riedel (fibrozli), nurlanish, medikamentoz (amiodarone); 4) Postpartum."}, {"num": 65, "text": "Tiroiditlar etiologiya, klinika, davolash", "answer": "O'tkir: bakterial → abssess, og'riq, isitma → antibiotiklar, drenaj. De Quervain: viral → og'riq + tirotoksikoz → NSAIDs, steroid. Hashimoto: autoimmun → gipotireoz → L-tiroksin."}, {"num": 66, "text": "Yarim o'tkir tiroidit (De Quervain) belgilari", "answer": "Viral infeksiyadan 2–3 hafta keyin. Bo'yin og'rig'i (quloq, jag'ga irradiyatsiya); isitma 38–39°C; tirotoksikoz faza → gipotireoz faza; ESR ↑ (>50 mm/s); TTG avval ↓ keyin ↑; radioiod yutilishi ↓."}, {"num": 67, "text": "O'tkir tiroidit etiologiya, klinika, davolash", "answer": "Stafilokokk, streptokokk. Klinika: keskin og'riq, isitma, qizillik, shish; yutinish og'riq; leykositoz. Diagnostika: UST (abssess), qon. Davolash: ampisilin/sulbaktam, klindamisin; abssess — drenaj."}, {"num": 68, "text": "Hashimoto tiroiditi (surunkali autoimmun)", "answer": "Anti-TPO, anti-TG antitanalari → T-hujayralar destruksiyasi → gipotireoz. Ko'pincha simptomsiz yoki gipotireoz; bez qattiq, katta. Diagnostika: TTG ↑, fT4 ↓, anti-TPO ↑; UST — gipoekoik. Davolash: L-tiroksin."}, {"num": 69, "text": "Qalqon oldi bezlarining vazifasi", "answer": "PTG (paratgormon) ishlab chiqaradi. Funktsiya: 1) Suyakdan Ca²⁺ ajratadi; 2) Buyrakda Ca²⁺ reabsorbsiya ↑, fosfat chiqarish ↑; 3) Kalsitriol aktivatsiya → ichakda Ca²⁺ yutilishi ↑."}, {"num": 70, "text": "PTH ning kaltsiy va fosfor almashinuvidagi roli", "answer": "PTH ↑ ta'sirlari: Suyak — osteoklastlar → Ca²⁺ ↑; Buyrak — Ca²⁺ reabsorbsiya ↑, fosfat ekskresiya ↑; 1,25(OH)₂D3 aktivatsiya → ichakda Ca²⁺ ↑. Natija: qon Ca²⁺ ↑, fosfat ↓."}, {"num": 71, "text": "Gipoparatireoz etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: posoperatsion (tireoidektomiya), autoimmun, DiGeorge. PTH ↓ → Ca²⁺ ↓, fosfat ↑. Klinika: tetaniya, Xvostek, Trousseau, xuruj, QT ↑. Diagnostika: Ca²⁺ ↓, fosfat ↑, PTH ↓. Davolash: Ca²⁺ glyukonat IV (o'tkir), Ca²⁺ + D vitamin."}, {"num": 72, "text": "Giperparatireoz etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: PTG adenomasi (80%). PTH ↑ → Ca²⁺ ↑, fosfat ↓. Klinika: 'stones, bones, groans, psychic moans' — toshlari, osteoporoz, peptic ulcer, depressiya. Diagnostika: Ca²⁺ ↑, PTH ↑, dexa-skan. Davolash: paratiroidektomiya."}, {"num": 73, "text": "Giperparatireozning klinik ko'rinishlari", "answer": "1) Suyak: osteoporoz, sinish; 2) Buyrak: toshlar, poliyuriya; 3) GI: peptic ulcer, pankreatit, qabziyat; 4) Neyromuskular: charchoq, depressiya; 5) Yurak: AH, QT ↓; 6) Ko'z: keratopаtiya."}, {"num": 74, "text": "Giperparatireoz va gipoparatireoz diagnostikasi", "answer": "Giperparatireoz: Ca²⁺ ↑, fosfat ↓, PTH ↑, ALP ↑; UST/sestamibi ssintigrafiya — adenoma. Gipoparatireoz: Ca²⁺ ↓, fosfat ↑, PTH ↓, QT ↑. Psevdogipoparatirez: Ca²⁺ ↓, PTH ↑ (organ javobsizligi)."}, {"num": 75, "text": "Buyrak usti bezlarining tuzilishi va gormonlar", "answer": "Korteks (80%): glomeruloza — aldosteron; fassikuloza — kortizol; retikular — DHEA. Medulla (20%): adrenalin (80%), noradrenalin (20%). Korteks boshqaruvi: AKTG; glomeruloza — RAAS; medulla — simpatik NS."}, {"num": 76, "text": "Glyukokortikoidlarning biologik ta'siri", "answer": "Kortizol: 1) Uglevod — glyukoneogenez ↑, utilizatsiya ↓; 2) Oqsil — katabolizm ↑; 3) Yog' — sentral yog' ↑, lipoliz periferada; 4) Immunitet — yallig'lanish ↓; 5) Suyak — osteoporoz; 6) Qon — neytrofiliya, eozinopenia; 7) Stress gormoni."}, {"num": 77, "text": "Mineralokortikoidlarning vazifalari", "answer": "Aldosteron (RAAS boshqaradi). 1) Distal naychada: Na⁺ ↑, K⁺/H⁺ ↓; 2) Na⁺ ushlanishi → suv ushlanishi → qon bosim ↑; 3) Gipokaliemiya. Boshqaruv: Ang II, K⁺."}, {"num": 78, "text": "Konn sindromi etiologiyasi va patogenezi", "answer": "Birlamchi aldosteronizm. Etiologiya: aldosteron adenomasi (60%), ikki tomonlama giperplaziya (35%). Patogenez: aldosteron ↑ (Ang II/AKTG mustaqil) → Na⁺ ushlanishi, K⁺ ↓ → qon hajmi ↑ → gipertenziya + gipokaliemiya."}, {"num": 79, "text": "Konn sindromi klinik ko'rinishi va davolash", "answer": "Klinika: rezistentli AH, gipokaliemiya (kuchsizlik, paraliz, paresteziya, tetaniya), poliyuriya, nikturia. EKG: U to'lqin, QT ↑. Diagnostika: aldosteron/renin nisbati ↑, KT buyrak usti. Davolash: adenoma — adrenalektomiya; giperplaziya — spironolakton."}, {"num": 80, "text": "Feoxromositoma belgilari", "answer": "Katekolaminlar sekretsiya. Klinika: gipertenziv krizlar (bosh og'rig'i, terlash, titroq, taxikardiya); oqarish yoki qizarish; panic attack; giperglikemiya. Provokatsiya: bosim, anasteziya, dorilar."}, {"num": 81, "text": "Feoxromositoma diagnostikasi", "answer": "1) 24 soatlik siydik: metanefrinlar, normetanefrinlar (eng sezgir); 2) Plazma: erkin metanefrinlar (skrining); 3) KT/MRT; 4) 123I-MIBG ssintigrafiya; 5) PET-KT; 6) Genetik: VHL, RET, SDHB mutatsiyalari."}, {"num": 82, "text": "Feoxromositoma davolash tamoyillari", "answer": "1) Alfa-blokator 7–14 kun (doksazosin) oldin; keyin beta-blokator; 2) Gidratatsiya; 3) Laparoskopik adrenalektomiya (birinchi); 4) Metastatikda: MIBG terapiya, ximioterapiya."}, {"num": 83, "text": "Buyrak usti bezlarining surunkali yetishmovchiligi etiologiya, klinika, davolash", "answer": "Etiologiya: Addison — autoimmun (70%), TB; Ikkilamchi — gipofiz, steroid to'xtatilishi. Klinika: charchoq, gipotenziya, giperpigrmentatsiya (birlamchi), giponatremia, giperkalemiya, gipoglikemiya. Davolash: gidrokortizon 15–25 mg/kun, fludrokortizon."}, {"num": 84, "text": "Addison kasalligining klinik belgilari", "answer": "1) Charchoq, kuchsizlik; 2) Giperpigrmentatsiya (qo'l kataklari, lab, tish go'shti); 3) Anoreksiya, qorin og'rig'i; 4) Vazn ↓; 5) Ortostatik gipotenziya; 6) Sho'r ishtiyoqi; 7) Giponatremia, giperkalemiya, gipoglikemiya; 8) Depressiya."}, {"num": 85, "text": "O'tkir buyrak usti bezi yetishmovchiligi (Addison krizi)", "answer": "Trigger: infeksiya, jarrohlik, stress. Klinika: kollaps, qorin og'rig'i, qusish, gipoglikemiya, ong buzilishi. Shoshilinch: gidrokortizon 100 mg IV → 200–400 mg/kun; 0.9% NaCl + glyukoza infuziyasi; sabab davolash."}, {"num": 86, "text": "Gipokortisizmga xos alomatlar", "answer": "1) Charchoq, kuchsizlik; 2) Ortostatik gipotenziya; 3) Giponatremia; 4) Giperkalemiya; 5) Gipoglikemiya; 6) Anoreksiya, ozish; 7) Qorin og'rig'i; 8) Melanodermiya (birlamchi); 9) Eozinofiliya; 10) Stress javobining yo'qligi."}, {"num": 87, "text": "Giperkortisizm belgilari", "answer": "1) Oy yuz; 2) Qorin semizligi, buffalo hump; 3) Qizil-binafsha striyalar; 4) Teri yupqalashishi; 5) Mushak atrofiyasi; 6) Osteoporoz; 7) AH; 8) Giperglikemiya; 9) Girs utizm (ayollarda); 10) Psixoz, depressiya; 11) Immunosupressiya."}, {"num": 88, "text": "Itenko-Kushing kasalligi va sindromi differentsial diagnostikasi", "answer": "Kasallik (gipofiz AKTG): AKTG ↑, kortizol ↑, bilateral adrenal giperplaziya. Birlamchi adrenal: kortizol ↑, AKTG ↓, adenoma. Ektopik AKTG: AKTG ↑↑, kortizol ↑↑. Testlar: kechqurun kortizol, 1 mg DST, 8 mg DST, MRT gipofiz, KT buyrak usti."}, {"num": 89, "text": "Birlamchi va ikkilamchi giperparatireoz farqi", "answer": "Birlamchi: PTG adenomasi → PTH ↑ → Ca²⁺ ↑, fosfat ↓. Ikkilamchi: buyrak ↓/D vitamini ↓ → Ca²⁺ ↓ → kompensator PTH ↑ → Ca²⁺ norma. Uchinchi: uzoq ikkilamchi → PTG mustaqil → Ca²⁺ ↑ ham."}, {"num": 90, "text": "Itenko-Kushing sindromi etiologiya, patogenez, klinika, diagnostika, davolash", "answer": "Etiologiya: gipofiz AKTG (70%), adrenal adenoma (20%), ektopik AKTG (10%), iatrogen. Klinika: yuqoridagi. Diagnostika: tükürik kortizol, 1 mg DST, UFC, AKTG, KT/MRT. Davolash: transphenoidal (kasallik), adrenalektomiya (adrenal), ketokonazol."}]}, {"id": "inf", "name": "Infeksion kasalliklar", "icon": "🦠", "count": 72, "questions": [{"num": 1, "text": "Общее понятие об инфекционных болезнях", "answer": "Инфекционные болезни вызваны патогенными микроорганизмами. Признаки: этиологический агент, заразность, цикличность (инкубация→продром→разгар→реконвалесценция), формирование иммунитета. Эпидпроцесс: источник → механизм передачи → восприимчивый организм."}, {"num": 2, "text": "Процесс развития инфекционного процесса", "answer": "Фазы: 1) Адгезия — прикрепление; 2) Инвазия — проникновение; 3) Колонизация — размножение; 4) Диссеминация — распространение; 5) Повреждение (токсины, иммунные реакции). Зависит от вирулентности, дозы, ворот, иммунитета."}, {"num": 3, "text": "Патогенез брюшного тифа", "answer": "S. typhi → рот → тонкая кишка → пейеровы бляшки → ЛУ (первичная бактериемия) → макрофаги → генерализованная бактериемия → паренхиматозная диффузия → повторное выделение в кишку → некроз → язвы → осложнения."}, {"num": 4, "text": "Клиническая классификация брюшного тифа", "answer": "По тяжести: лёгкая, средняя, тяжёлая. По течению: типичное, атипичное (абортивное, стёртое). Редкие: пневмотиф, менинготиф. По осложнениям: кровотечение, перфорация, ИТШ. Носительство: острое <3 мес, хроническое >3 мес."}, {"num": 5, "text": "Симптомы начального периода брюшного тифа", "answer": "1–7 день: постепенное начало, нарастающая лихорадка (лестничная кривая Вундерлиха), нарастающая головная боль, слабость, адинамия, бессонница, снижение аппетита, относительная брадикардия, обложенный язык, гепатоспленомегалия начало."}, {"num": 6, "text": "Клиника брюшного тифа (разгар)", "answer": "7–21 день: высокая лихорадка 39–40°С постоянная; тифозный статус (помрачение сознания, бред); розеолёзная сыпь 8–10 день (грудь, живот); брадикардия, дикротия; гепатоспленомегалия; феномен Падалки; запор → метеоризм."}, {"num": 7, "text": "Опорные и решающие симптомы брюшного тифа", "answer": "Опорные: постепенное начало, тифозный статус, розеолёзная сыпь, брадикардия, гепатоспленомегалия. Решающие (лаборатория): гемокультура (1–10 день), миелокультура, РА Видаля ≥1:200, РНГА, ПЦР."}, {"num": 8, "text": "Типы температурных кривых при брюшном тифе", "answer": "1) Вундерлиха — подъём 1 нед, плато 2 нед, снижение 1 нед; 2) Боткинская — быстрый подъём + волны; 3) Кильдюшевского — неправильная ремиттирующая; 4) Рецидивирующая. Относительная брадикардия — ЧСС отстаёт от t°."}, {"num": 9, "text": "Дифференциальная диагностика брюшного тифа", "answer": "От: 1) Паратиф А/В — острее; 2) Сепсис — озноб, очаг; 3) Малярия — пароксизмы; 4) Лептоспироз — желтуха, миалгии, ОПН; 5) Бруцеллёз — скот, полиартрит; 6) ИМ; 7) Грипп — острое начало; 8) Лимфогранулематоз."}, {"num": 10, "text": "Лечение и профилактика брюшного тифа", "answer": "Лечение: ципрофлоксацин 500 мг х2, 10–14 дн; дезинтоксикация; диета №4; постельный режим. Профилактика: санитарный контроль воды/пищи, контроль носителей, вакцинация, дезинфекция выделений, наблюдение контактных 25 дней."}, {"num": 11, "text": "Этиология, эпидемиология гепатита А", "answer": "HAV (Picornaviridae, РНК). Источник: больной (заразен за 2 нед до и 2 нед после желтухи). Механизм: фекально-оральный. Инкубация: 15–50 дней. Иммунитет пожизненный. Вакцинация: 2 дозы."}, {"num": 12, "text": "Этиология, эпидемиология гепатита В", "answer": "HBV (Hepadnaviridae, ДНК). Источник: больной, носитель. Парентеральный (кровь, половой, вертикальный). Инкубация: 60–180 дней. Хронизация: 10% взрослых, 90% новорождённых. Маркёры: HBsAg, анти-HBc IgM. Вакцинация: 0, 1, 6 мес."}, {"num": 13, "text": "Патогенез гепатита А", "answer": "HAV → ЖКТ → гепатоциты → репликация → иммуноопосредованный цитолиз (T-клетки) → АЛТ ↑ → нарушение конъюгации билирубина → желтуха при поражении >80% гепатоцитов. Исход: полное выздоровление, хронизации нет."}, {"num": 14, "text": "Патогенез гепатита В", "answer": "HBV → кровь → гепатоциты → репликация (не цитопатогенный) → иммунный ответ (CTL) → цитолиз; иммунокомплексный — артралгии; хронизация при иммунодефиците; HBsAg → интеграция → ГЦК. HDV только с HBV."}, {"num": 15, "text": "Клиника преджелтушного периода гепатита А", "answer": "7–14 дней. Гриппоподобный вариант (самый частый): лихорадка, катар. Диспептический: тошнота, рвота, боли в правом подреберье. К концу: тёмная моча, обесцвеченный кал, зуд, увеличение печени."}, {"num": 16, "text": "Клиника преджелтушного периода гепатита В", "answer": "2–4 нед. Артралгический (сывороточная болезнь): боли в суставах, высыпания (крапивница — иммунокомплексная). Астеновегетативный. Температура субфебрильная. Желтуха постепенная."}, {"num": 17, "text": "Клиника желтушного периода гепатита А", "answer": "2–4 нед. Желтуха нарастает 7–14 дней. Иктеричность кожи/склер; тёмная моча; обесцвеченный кал; гепатоспленомегалия; кожный зуд; улучшение самочувствия с желтухой; АЛТ, АСТ ↑ в 10–100 раз."}, {"num": 18, "text": "Клиника желтушного периода гепатита В", "answer": "4–6 нед. Нарастающая желтуха; выраженная слабость, анорексия; гепатомегалия; тёмная моча; интоксикация нарастает (в отличие от ГА); геморрагии при тяжёлой форме; АЛТ > АСТ. ОПЭ — молниеносная форма."}, {"num": 19, "text": "Ранняя дифференциальная диагностика вирусных гепатитов", "answer": "В преджелтушном периоде от: грипп/ОРВИ (катар, нет гепатомегалии), лептоспироз (миалгии, ОПН), сепсис, ИМ. Маркёры: анти-HAV IgM, HBsAg + анти-HBc IgM, анти-HCV. АЛТ ↑ уже в преджелтушном."}, {"num": 20, "text": "Гепатиты с надпечёночной желтухой (дифдиагноз)", "answer": "Надпечёночная (гемолитическая): анемия, непрямой билирубин ↑, АЛТ норма, стул тёмный (стеркобилин↑), моча тёмная (уробилин, нет билирубина), спленомегалия, ретикулоцитоз. Причины: гемолиз, малярия, несовместимые гемотрансфузии."}, {"num": 21, "text": "Правила взятия крови при вирусных гепатитах", "answer": "Натощак (12 ч); венозная кровь в сухую пробирку; не трясти; центрифугировать 10 мин; сыворотку заморозить при транспортировке. Показатели: АЛТ, АСТ, ГГТ, ЩФ, общий и прямой билирубин, ПТИ, альбумин."}, {"num": 22, "text": "Гепатиты с подпечёночной желтухой (дифдиагноз)", "answer": "Подпечёночная (механическая): прямой билирубин ↑, кал обесцвечен, моча тёмная (билирубинурия), ЩФ резко ↑, АЛТ умеренно, КТ/УЗИ — расширение протоков. Причины: ЖКБ, рак поджелудочной, стриктуры."}, {"num": 23, "text": "Осложнения вирусных гепатитов", "answer": "Острые: ОПЭ, ОПН, геморрагический синдром, ОПН. Хронические (ГВ, ГС, ГД): хронический гепатит, цирроз, ГЦК. Внепечёночные (ГВ): гломерулонефрит, полиартериит."}, {"num": 24, "text": "Клиника острой печёночной энцефалопатии", "answer": "I — эйфория/депрессия, нарушение сна; II — заторможенность, астериксис, дезориентация; III — сопор, непроизвольное мочеиспускание; IV — кома. Лаборатория: билирубин ↑, ПТИ ↓, альбумин ↓, аммиак ↑."}, {"num": 25, "text": "Принципы лечения вирусных гепатитов", "answer": "Базисная: постельный режим, диета №5, питьё. Патогенетическая: дезинтоксикация, урсодезоксихолевая к-та, витамины. Этиотропная: ГВ — тенофовир/энтекавир; ГС — даклатасвир+софосбувир; ГА — нет. ОПЭ: лактулоза, рифаксимин, плазмаферез."}, {"num": 26, "text": "Методы диагностики вирусных гепатитов", "answer": "Серология: анти-HAV IgM, HBsAg, HBeAg, анти-HBc IgM, анти-HCV. Молекулярные: ПЦР (генотип, нагрузка). Биохимия: АЛТ, АСТ, билирубин, ПТИ, альбумин. Инструментальные: УЗИ, фиброскан, биопсия."}, {"num": 27, "text": "Клиническая классификация дизентерии", "answer": "По возбудителю: Shigella dysenteriae, flexneri, sonnei. По тяжести: лёгкая, средняя, тяжёлая. По течению: острая <1 мес, затяжная 1–3 мес, хроническая >3 мес. Формы: колитическая, гастроэнтероколитическая."}, {"num": 28, "text": "Этиология и патогенез дизентерии", "answer": "Shigella spp. Фекально-оральный. Шигеллы → толстая кишка → инвазия энтероцитов → цитотоксины → воспаление; шига-токсин (S. dysenteriae 1) → ГУС. Поражение: сигмовидная и прямая кишка."}, {"num": 29, "text": "Симптомы колитической острой дизентерии", "answer": "1) Острое начало; 2) Лихорадка 38–39°С; 3) Схваткообразные боли слева; 4) Тенезмы; 5) Стул 'ректальный плевок' — слизь+кровь, скудный; 6) Стул 10–30 р/сут; 7) Спазм сигмовидной; 8) Интоксикация."}, {"num": 30, "text": "Клиника и течение острой дизентерии", "answer": "Инкубация 1–7 дней. Острое начало. 5–7 дней лёгкая, до 3 нед тяжёлая. Лихорадка + боли + тенезмы + слизь/кровь. Тяжёлая: ИТШ, нейротоксикоз. Лаборатория: лейкоцитоз; бакпосев — Shigella."}, {"num": 31, "text": "Клиника хронической дизентерии", "answer": ">3 мес. Рецидивирующая или непрерывная. Периодические боли, жидкий стул 3–5 р/сут, снижение аппетита, похудание, мальабсорбция, астения. Ректороманоскопия: атрофические изменения."}, {"num": 32, "text": "Лечение и профилактика дизентерии", "answer": "Лечение: ципрофлоксацин 500 мг х2, 5 дн; регидратация; диета №4; пробиотики; спазмолитики. Профилактика: санитарный контроль, мытьё рук, дезинфекция, изоляция."}, {"num": 33, "text": "Этиология, эпидемиология холеры", "answer": "V. cholerae O1/O139 (Гр−, запятая). Биовары: классический, Эль-Тор. Источник: больной/носитель. Механизм: фекально-оральный (водный — основной). Инкубация: часы–5 дней. Особо опасная, карантинная."}, {"num": 34, "text": "Патогенез холеры", "answer": "V. cholerae → тонкая кишка → холерный токсин (CT) → GM1 → аденилатциклаза → цАМФ ↑ → гиперсекреция Cl−/H₂O → профузная диарея. Нет воспаления. Обезвоживание → гипокалиемия, ацидоз → шок → ОПН. Стул 'рисовый отвар'."}, {"num": 35, "text": "Клиника холеры. Ранние симптомы", "answer": "Без лихорадки. 1) Водянистая диарея без болей ('рисовый отвар'); 2) Рвота фонтаном без тошноты; 3) Быстрое обезвоживание; 4) Судороги (гипокалиемия); 5) Сухость, 'руки прачки'; 6) Цианоз, анурия. Степени I–IV (потеря до >10%). t° норма или снижена."}, {"num": 36, "text": "Ранняя дифдиагностика холеры", "answer": "От: ПТИ (интоксикация, рвота сначала), сальмонеллёз (лихорадка, зелёный стул), дизентерия (тенезмы, кровь), ротавирус (дети, катар). Решает: бакпосев — V. cholerae, серология, ПЦР."}, {"num": 37, "text": "Лечение и профилактика холеры", "answer": "Лечение: регидратация (оральная I–II, в/в III–IV — трисоль); доксициклин 300 мг однократно или ципрофлоксацин 1 г. Профилактика: кипячение воды, вакцина (Дюкорал), санитарный контроль, карантин; контактным — доксициклин."}, {"num": 38, "text": "Этиология, эпидемиология сальмонеллёза", "answer": "Salmonella (typhimurium, enteritidis). Источник: птица, яйца. Фекально-оральный (пищевой — основной). Инкубация: 2–72 ч (в среднем 12–24). Зооноз."}, {"num": 39, "text": "Клиническая классификация сальмонеллёза", "answer": "1) Гастроинтестинальная (гастрит, гастроэнтерит, гастроэнтероколит); 2) Генерализованная (тифоподобная, септическая); 3) Субклиническая (носительство). По тяжести: лёгкая, средняя, тяжёлая."}, {"num": 40, "text": "Клиника гастроинтестинальной формы сальмонеллёза", "answer": "Инкубация 12–24 ч. Острое начало; лихорадка 38–39°С; тошнота, рвота; боли в эпигастрии; обильный зелёный зловонный стул ('болотная тина'); обезвоживание I–III ст; интоксикация. Длительность 3–7 дней."}, {"num": 41, "text": "Ранняя дифдиагностика сальмонеллёза", "answer": "От холеры (нет лихорадки, рис-вода), дизентерии (тенезмы, кровь, левая боль), ПТИ (короткая инкубация), брюшного тифа (постепенное, розеолы). Решает: бакпосев кала, серология, ПЦР."}, {"num": 42, "text": "Клиника септической формы сальмонеллёза", "answer": "Высокая лихорадка с ознобами; потливость; вторичные очаги — остеомиелит, менингит, эндокардит; ГУС; гепатоспленомегалия; анемия; желтуха. У иммуноскомпрометированных."}, {"num": 43, "text": "Лечение и профилактика сальмонеллёза", "answer": "Лечение: регидратация; этиотропное при тяжёлой — фторхинолоны, цефалоспорины III; сорбенты; пробиотики. Профилактика: термообработка яиц/птицы, хранение пищи, мытьё рук, ветеринарный надзор."}, {"num": 44, "text": "Клиника пищевой токсикоинфекции", "answer": "Инкубация 1–6 ч. Острейшее начало; рвота (предшествует диарее); схваткообразные боли; жидкий стул; лихорадка кратковременная; обезвоживание. Групповой характер. Самоограничивается 1–3 дня."}, {"num": 45, "text": "Ранняя дифдиагностика ПТИ", "answer": "От холеры (нет интоксикации), сальмонеллёза (долгая инкубация, зелёный стул), дизентерии (тенезмы, кровь), аппендицита (нет диареи, перитонеальные). Решает: бакпосев рвоты/кала/пищи."}, {"num": 46, "text": "Лечение и профилактика ПТИ", "answer": "Лечение: промывание желудка; регидратация (оральная или в/в); сорбенты; антибиотики не показаны (при осложнениях — фторхинолоны). Профилактика: технология приготовления, хранение (≤4°С), санитарные нормы, мытьё рук."}, {"num": 47, "text": "Этиология, эпидемиология ботулизма", "answer": "Cl. botulinum (Гр+, споровый, анаэроб). Токсины A–G. Источник: почва, кишечник животных. Факторы: домашние консервы, вяленая рыба, мясо. Инкубация: 12–36 ч. Споры: кипячение до 6 ч; токсин разрушается при 80°С/30 мин."}, {"num": 48, "text": "Патогенез ботулизма", "answer": "Ботулотоксин → ЖКТ → кровь → периферические нервы → блокирует экзоцитоз ацетилхолина → нейромышечный блок → нисходящие параличи (черепные нервы → дыхание). Нет сенсорных нарушений. Сознание сохранено."}, {"num": 49, "text": "Клиника ботулизма", "answer": "1) Офтальмоплегия — двоение, птоз, мидриаз; 2) Дисфагия, дизарт-рия; 3) Нисходящий паралич: шея, туловище, конечности; 4) Дыхательная недостаточность — ведущая причина смерти; 5) Сухость во рту; 6) Запор; 7) Нет лихорадки; 8) Ясное сознание."}, {"num": 50, "text": "Ранняя дифдиагностика ботулизма", "answer": "От: полиомиелит (лихорадка, асимметрия), инсульт (очаговые), миастения (антитела АChR, волнообразно), Гийен-Барре (восходящий, ликвор изменён), дифтерия (ангина, плёнка). Решает: биопроба на мышах, ИФА токсина."}, {"num": 51, "text": "Принципы лечения ботулизма", "answer": "1) ОРИТ; 2) Антиботулиническая сыворотка (А+В+Е); 3) Промывание желудка; 4) ИВЛ при ДН; 5) Пенициллин/метронидазол; 6) Гипербарическая оксигенация; 7) Дезинтоксикация."}, {"num": 52, "text": "Правила введения ботулинической сыворотки", "answer": "1) Набор для анафилаксии рядом; 2) Кожная проба (1:100 в/к, 20 мин); 3) При отрицательной — ПЦС в/м или в/в; 4) Дозы: А — 10 000 МЕ, В — 5 000 МЕ, Е — 10 000 МЕ каждого; 5) Чем раньше — тем эффективнее."}, {"num": 53, "text": "Клиническая классификация гриппа", "answer": "По тяжести: лёгкая (<38°С), средняя (38–39°С), тяжёлая (>39°С), гипертоксическая. По течению: неосложнённый, осложнённый (пневмония, ОРДС, энцефалит). Серотипы: A (пандемический), B (сезонный), C."}, {"num": 54, "text": "Клиника неосложнённого гриппа", "answer": "Инкубация 1–3 дня. Острейшее начало; лихорадка 39–40°С; выраженная интоксикация — головная боль (виски, за глазами), миалгии, слабость; катар умеренный — сухость, саднение, ринит; геморрагии (носовые); слёзотечение, светобоязнь."}, {"num": 55, "text": "Ранняя дифдиагностика гриппа", "answer": "От ОРВИ (менее интоксикация, более катар), менингококка (сыпь, рвота), брюшного тифа (постепенное), малярии (пароксизмы), лептоспироза. Решает: ПЦР мазка из носоглотки, экспресс-тест (ИФА)."}, {"num": 56, "text": "Клиника рожи и лечение", "answer": "Гиперемия с чёткими границами (рожистый вал), жжение, боль, отёк. Формы: эритематозная, буллёзная, флегмонозная, некротическая. Лихорадка, интоксикация. Локализация: голени, лицо. Лечение: пенициллин 1 млн ЕД х6, 10 дней; НПВС; местно антисептики."}, {"num": 57, "text": "Лечение гриппа (неосложнённый и осложнённый)", "answer": "Неосложнённый: НПВС (парацетамол); осельтамивир 75 мг х2, 5 дн — при тяжёлой/рисках; питьё; постельный режим. Осложнённый (пневмония): антибиотики (амоксиклав, азитромицин); ИВЛ при ОРДС; госпитализация."}, {"num": 58, "text": "Этиология и патогенез менингококковой инфекции", "answer": "N. meningitidis (Гр−, диплококк). Серогруппы: A, B, C, W, Y. Воздушно-капельный. Патогенез: носительство → назофарингит → бактериемия → ГЭБ → менингит. Эндотоксин → ДВС, ИТШ (Вотерхаус-Фридриксен)."}, {"num": 59, "text": "Классификация менингококковой инфекции", "answer": "1) Локализованные: носительство, назофарингит; 2) Генерализованные: менингококкемия, менингит, менингоэнцефалит, смешанная; 3) Редкие: эндокардит, артрит. По тяжести: лёгкая, средняя, тяжёлая, молниеносная."}, {"num": 60, "text": "Клинические признаки менингококковой инфекции", "answer": "Назофарингит: катар, субфебрилитет. Менингококкемия: острейшее начало, лихорадка, геморрагическая сыпь (звёздочки). Менингит: ригидность, Кёрниг, Брудзинский. Молниеносная: ИТШ + ДВС, летальность 50–80%."}, {"num": 61, "text": "Клинические симптомы менингококкемии", "answer": "1) Острейшее начало; 2) Лихорадка >40°С; 3) Геморрагическая звёздчатая сыпь — нарастает часами; 4) Сыпь не исчезает при надавливании; 5) Гипотония; 6) Бледность, цианоз; 7) ДВС; 8) ИТШ → полиорганная недостаточность."}, {"num": 62, "text": "Дифдиагноз инфекции с синдромом менингита", "answer": "Гнойный бактериальный: нейтрофилы, глюкоза ↓↓, мутный ликвор. Серозный вирусный: лимфоциты, глюкоза норма, прозрачный. ТБ менингит: лимфоциты, глюкоза ↓, фибрин, хлориды ↓. Грибковый: иммунодефицит, India Ink+. СА: ксантохромия, эритроциты."}, {"num": 63, "text": "Дифдиагноз серозного и гнойного менингита", "answer": "Гнойный: нейтрофильный плеоцитоз >1000, мутный, глюкоза <2.2, белок ↑↑, бактерии+. Серозный: лимфоцитарный <500, прозрачный, глюкоза норма, белок ↑ умеренно. Клинически: гнойный тяжелее, менингококк — сыпь."}, {"num": 64, "text": "Клиника синдрома Уотерхаус-Фридрехсена", "answer": "Молниеносная менингококкемия + кровоизлияние в надпочечники. Клиника: ИТШ — гипотензия, тахикардия; нарастающая геморрагическая сыпь; острая надпочечниковая недостаточность — коллапс, анурия; ДВС; кома. Летальность >50%."}, {"num": 65, "text": "Этиология и патогенез малярии", "answer": "Plasmodium (falciparum, vivax, malariae, ovale). Переносчик: Anopheles. Тканевая шизогония → мерозоиты → эритроциты → гемолиз → пароксизм. P. vivax/ovale — гипнозоиты (рецидивы). P. falciparum — цереброформа."}, {"num": 66, "text": "Принципы лечения и профилактики менингококковой инфекции", "answer": "Лечение: пенициллин 0.3 млн ЕД/кг/сут или цефтриаксон 2 г х2; дексаметазон; ИТШ — инфузия, норадреналин; ДВС — СЗП. Профилактика: вакцинация (А, С, W, Y, В); контактным — рифампицин 600 мг х2, 2 дня."}, {"num": 67, "text": "Клиника малярии", "answer": "Пароксизм (триада): 1) Озноб 30–60 мин; 2) Жар 39–41°С; 3) Пот (профузный). Интервалы: vivax/ovale — 48 ч; malariae — 72 ч; falciparum — неправильный. Гепатоспленомегалия, анемия. P. falciparum: кома, ОРДС, ГУС, ОПН."}, {"num": 68, "text": "Лечение и профилактика малярии", "answer": "Vivax/ovale: хлорохин + примахин 14 дн. Falciparum: АКТ (артемизинин+люмефантрин); тяжёлая — в/в артесунат. Профилактика: атовахон/прогуанил, мефлохин, доксициклин; защита от комаров."}, {"num": 69, "text": "Патогенез бруцеллёза", "answer": "Brucella → кожа/слизистые → ЛУ → кровь (бактериемия) → РЭС → размножение внутри макрофагов → гранулёмы → повторные бактериемии → аллергические реакции → ОДА, ЦНС, органы размножения."}, {"num": 70, "text": "Классификация бруцеллёза", "answer": "Острая <3 мес; подострая 3–6 мес; хроническая >6 мес (компенсированная, субкомпенсированная, декомпенсированная); резидуальная. По синдрому: костно-суставная, нервная, урогенитальная. По тяжести: лёгкая, средняя, тяжёлая."}, {"num": 71, "text": "Симптомы острого септического бруцеллёза", "answer": "1) Волнообразная (ундулирующая) лихорадка; 2) Относительная брадикардия; 3) Озноб — профузные поты (ночью); 4) Полилимфаденопатия; 5) Гепатоспленомегалия; 6) Артралгии; 7) Целлюлит и фиброзиты; 8) Орхоэпидидимит (у мужчин)."}, {"num": 72, "text": "Клиника подострой и хронической формы бруцеллёза", "answer": "Подострая: нарастание органных поражений. Хроническая: 1) Остеоартрит — сакроилеит (патогномоничен), спондилит; 2) Орхоэпидидимит; 3) Нейробруцеллёз; 4) Хронический гепатит; 5) Эндокардит. Лихорадка субфебрильная."}]}, {"id": "neuro", "name": "Nevrologiya", "icon": "🧠", "count": 81, "questions": [{"num": 1, "text": "Ishemik insult klinikasi", "answer": "Fokal belgilar arteriaga bog'liq: O'rta miya — kontralateral gemiplegiya, afaziya (chap); Ichki uyqu — amaurosis fugax, afaziya, gemiplegiya; Vertebrobazilyar — ataksiya, dizartriya, diplopia, Horner; Old miya — oyoq ko'proq, paraparez."}, {"num": 2, "text": "O'tkir radikulitni davosi", "answer": "1) Dam olish; 2) NSAIDs (diklofenak, meloksikam); 3) Miorelaksantlar (tizanidin); 4) B1, B6, B12 vitaminlari; 5) Blokada (novokain + kortikosteroid); 6) Kortikosteroidlar — og'ir; 7) Fizioterapiya; 8) Masaj va LFK — o'tkir o'tgach; 9) Traktsiya; 10) Jarrohlik — qo'pol defisitda."}, {"num": 3, "text": "Markaziy va periferik falajlanish belgilari", "answer": "Markaziy (yuqori motor neyron): gipertoniya (spastik), giperrfleksiya, Babinski, klonus, atrofiya kam. Periferik (quyi motor neyron): gipotoniya, atrofiya yaqqol, arefleksiya, fassikulyatsiya, EMG o'zgarish."}, {"num": 4, "text": "Ichki kapsula zararlansa harakat qanday buziladi", "answer": "Kontralateral: spastik gemiplegiya, gemigipoesteziya, gomоnim gemianopsiya; ko'z deviyatsiyasi o'sma tomonga. 'Uchlik formulasi': falaj + sezgi + ko'ruv."}, {"num": 5, "text": "Insultlarni klassifikatsiyasi", "answer": "1) Ishemik (80–85%): trombotik, embolik, gemodianamik, lakunar; 2) Gemorragik (15–20%): intraserebral qon quyilish, subaraxnoidal (SAQ), ventrikulyar; 3) TIA — belgilar 24 soatda o'tadi."}, {"num": 6, "text": "Gemorragik insult klinikasi", "answer": "Keskin: 1) Kuchli bosh og'rig'i; 2) Ko'ngil aynishi, qusish; 3) Ong buzilishi; 4) Kontralateral gemiplegiya, afaziya; 5) Qon bosimi ↑; 6) Cheyne-Stokes nafas; 7) Meningeal belgilar; 8) Epileptik xurujlar. Likvorda qon."}, {"num": 7, "text": "Gemorragik insult davosi", "answer": "1) Qon bosimi 140–160/90 ga tushirish; 2) Mannitol/glitserol — ICP kamaytirish; 3) Traneksamik kislota — gemostaz; 4) Antikonvulsant; 5) Parvarish. Jarrohlik: gematoma olib tashlash (>30 ml), ventrikulostomiya."}, {"num": 8, "text": "Monoplegiya, paraplegiya, tetraplegiya, gemiplegiya", "answer": "Monoplegiya — 1 oyoq/qo'l. Gemiplegiya — bir tomona. Paraplegiya — ikkala oyoq. Tetraplegiya — to'rtta oyoq (yuqori servikal). Plegiya — to'liq falaj; parezda qisman kuch saqlanadi."}, {"num": 9, "text": "N. radialis zararlanishi", "answer": "Bilak pastga osilib ('osilib turuvchi qo'l', wrist drop); barmoq yozilmaydi; 1–3 barmoq dorsal sezgi yo'qolishi. Sabab: elka sinishi, turnikе, noto'g'ri holat."}, {"num": 10, "text": "N. ulnaris zararlanishi", "answer": "4–5 barmoqlar bukilgan ('tirnoq qo'l'); 5–4 barmoq medial sezgi yo'qolishi; gipotenаr atrofiyasi; barmoq yoyilmaydi; Froment belgisi+. Zararlash: tirsak kanali."}, {"num": 11, "text": "Poliomielitda harakat buziladi", "answer": "Virus oldingi shox → periferik (flaksid) falaj: mushaк atrofiyasi, atoniya, arefleksiya, fassikulyatsiya, sezgi saqlanadi. Asimmetrik. Ko'pincha oyoqlar. Bulbar: nafas, yutinish buzilishi."}, {"num": 12, "text": "N. peroneus zararlanishi", "answer": "Oyoq pastga osilib ('foot drop'); ko'tarish imkonsiz; 1–5 barmoq dorsal sezgi yo'qolishi. Yurish: 'xo'roz yurishi' (steppage). Sabab: fibula boshi bosimi, oyoqni chalishtirib o'tirish."}, {"num": 13, "text": "N. facialis davosi", "answer": "1) Prednizolon 1 mg/kg (48 soat ichida — samarali); 2) Asiklovir (Herpes Zoster da); 3) Ko'z tomchisi + bantik; 4) Fizioterapiya; 5) B vitaminlari; 6) LFK; 7) Jarrohlik — neyroliz (og'ir surunkali)."}, {"num": 14, "text": "Epilepsiyani davosi", "answer": "GTKT: valproat (1-tanlov), karbamazepin, lamotrijin. Absans: etosuksimid, valproat. Fokal: karbamazepin, okskarbazepin. Epistatusda: diazepam IV → fenitoyin/valproat IV → narkoz. Tamoyil: monoterapiya, davodan to'xtatmaslik."}, {"num": 15, "text": "Partsial talvasalar haqida tushuncha", "answer": "Fokal — bir yarim shardan. 1) Oddiy fokal (ong saqlanadi): motorik (Jackson), sezgi, vegetativ; 2) Kompleks fokal (ong buziladi): avtomatizm; 3) Ikkilamchi generalizovanniy. EEG da fokal discharge. Sabab: shikastlanish, o'sma."}, {"num": 16, "text": "Epistatusda birinchi yordam", "answer": "1) Xavfsiz holat, yostiq; 2) Nafas yo'li; 3) O2; 4) Vena yo'li; 5) Diazepam 10 mg IV; 6) Javob yo'q: lorazepam 4 mg IV; 7) 2-liniya: valproat 15–45 mg/kg IV; 8) 3-liniya: propofol, midazolam — ICU; 9) EEG monitoring."}, {"num": 17, "text": "Djekson talvasalar", "answer": "Fokal motorik talvasalar. Bitta joydan (barmoq) boshlanadi → bir tomonga tarqaladi ('march'). Ong saqlanadi. Kontralateral motor korteks ketma-ket qo'zg'alishi. Todds falaji — talvazadan keyin qisqa vaqtli falaj. Sabab: o'sma, ensefalit."}, {"num": 18, "text": "Epileptik xurujning fazalari", "answer": "1) Aura — predor (ba'zan); 2) Tonik faza (15–30 s): barcha mushaklar qisqarishi, sianoz; 3) Klonik faza (1–2 daq): ritmik qisqarish, tilni tishlash; 4) Postiktal: charchoq, dezorientatsiya, uyqu, Todds falaji."}, {"num": 19, "text": "Epilepsiyada EEG o'zgarishlar", "answer": "Interiktal: uchqunlar (spikes), uchqun-to'lqin komplekslari, o'tkir to'lqinlar. Iktal: 3 Hz uchqun-to'lqin — absanslar; fokal uchqunlar; yuqori amplitudali ritmik to'lqinlar. Video-EEG — eng aniq."}, {"num": 20, "text": "Ventrikulyar qon quyilish", "answer": "Qorinchalar ichiga qon. Sabab: gipertenziya, AVM, ichki qon quyilish yorilishi. Klinika: keskin bosh og'rig'i, tez ong buzilishi, gipertermiya, bradikardiya, qo'l/oyoq qotishi. KT: qorinchalar ichida giperdens. Gidrosefal xavfi."}, {"num": 21, "text": "Subaraxnoidal qon quyilish", "answer": "Sabab: anevrizm (80%), AVM. Klinika: 'hayotda eng kuchli bosh og'rig'i' — keskin; meningeal belgilar; ko'ngil aynishi; fotofobiya; qon bosim ↑. KT: subaraxnoidal qon. Lyumbal punksiya: xanthochromia. Angiografiya — anevrizm."}, {"num": 22, "text": "Miya ustuniga qon quyilish", "answer": "Tez koma; de-serebrat rigidlik; Cheyne-Stokes/apnoe; alternatsiyalovchi sindromlar; bradikardiya, gipertermiya; ikki tomonli Babinski; ko'z harakatlar buzilishi. Prognoz og'ir."}, {"num": 23, "text": "Meningeal belgilar, qaysi kasalliklarda", "answer": "Belgilar: bo'yin qattiqligi, Kernig, Brudzinskiy, fotofobiya. Kasalliklar: 1) Bakterial meningit; 2) SAQ; 3) Viral ensefalit; 4) TBM; 5) Kriptokokkoz; 6) Travma; 7) Qon quyilish."}, {"num": 24, "text": "Tuberkulyoz meningitda likvor tahlili", "answer": "Bosim ↑; rang — opa-rang/sariq; oqsil ↑ (1–10 g/l); glyukoza ↓ (<2.2 mmol/l); xlorid ↓; limfotsitar pleotsioz 100–500; fibrin to'ri; BK kam; PCR MTB — aniqroq."}, {"num": 25, "text": "Miya pardalari va bo'shliqlar", "answer": "Pardalar: dura mater (epidural bo'shliq), arachnoidea (subdural), pia mater (subaraxnoidal — BOS). Qorinchalar: 1–2 lateral, 3-qorincha (diensefalon), Silviy darvozasi, 4-qorincha. BOS: choroid pleksus → qorinchalar → SA bo'shliq → rezorbsiya."}, {"num": 26, "text": "Meningit klinikasi", "answer": "Uchlik: bosh og'rig'i + isitma + meningea
