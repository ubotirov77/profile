l belgilar; ko'ngil aynishi, qusish; fotofobiya; ong buzilishi; toshma (meningokokkda); kranial nerv falajligi; likvor bosim ↑."}, {"num": 27, "text": "Meningitlarni davosi", "answer": "Bakterial: seftriakson 2 g x2 IV + deksametazon; septik shok — vazopressorlar. Viral: simptomatik; gerpes — asiklovir. TBM: HRZE (izoniazid, rifampin, pirazinamid, etambutol) + steroid."}, {"num": 28, "text": "Kana entsefali klinikasi", "answer": "Inkubasiya 1–4 hafta. 1) Preparitik: isitma, bosh og'rig'i, miyalgia; 2) Ensefalit: ong buzilishi, meningeal belgilar; 3) Flaksid falaj — bo'yin, yelka; 4) Bulbar — dysfagia, dizartriya; 5) Ikki to'lqinli kurs. Limfotsitar pleotsioz."}, {"num": 29, "text": "Bosh og'rig'ini differentsial diagnostikasi", "answer": "1) Migren — unilateral, pulsirlovchi, aura; 2) Zo'riqish — ikki tomonlama, bosuvchi; 3) Klaster — periorbital, 15–180 daq, avtonomik; 4) SAQ — keskin 'hayotda eng kuchli'; 5) Meningit — isitma + meningeal; 6) AH; 7) O'sma — ertalab kuchli, progressiv; 8) Trigeminal nevralgiya — elektr zarba."}, {"num": 30, "text": "Bel og'rig'i differentsial diagnostikasi", "answer": "1) Osteokondroz/disk — radikular, Laseque+; 2) Spondiloartrit — ertalab qotish; 3) O'sma — progressiv; 4) Buyrak — Pasternatskiy+; 5) Pankreas — 'kamar' og'rig'i; 6) Osteoporoz; 7) Infeksion spondilit."}, {"num": 31, "text": "Gipo- va giperglikemik koma", "answer": "Gipoglekimik: keskin, terlaş, titrash, yumshoq teri, glyukoza <2.8. Davolash: 40% glyukoza 40–60 ml IV. Giperglikemik: sekin, quruq teri, DKA — aceton hidi, ketonlar+, insulin+infuziya; GNKG — glyukoza >33, gidratatsiya."}, {"num": 32, "text": "Ensefalitlar klinikasi (Ekonomo)", "answer": "Uyqu kasalligi: 1) Isitma, letargiya (patologik uyqu); 2) Okulomotor parezi, giperkinezlar; 3) Kech: postensefalitik parkinsonizm. Umumiy ensefalit: isitma, ong buzilishi, fokal belgilar, meningeal belgilar, xurujlar."}, {"num": 33, "text": "Mielit klinikasi", "answer": "1) Zararlanish pastida motor/sezgi buzilishi; 2) Paraplegiya/tetraplegiya; 3) Sensori level — keskin chegara; 4) Sfinkter buzilishi; 5) Avtonom buzilish; 6) Orqa miya og'rig'i."}, {"num": 34, "text": "YoAS etiopatogenezi", "answer": "Etiologiya: 90% sporadic; 10% oilaviy (SOD1, C9orf72 mutatsiyalari). Patogenez: oksidativ stress, glutamat ekssitotoksiklik, protein agregatsiya → yuqori va quyi motor neyron degeneratsiya → falaj. Riluzol — 2–3 oy uzaytiradi."}, {"num": 35, "text": "Siringomieliya etiopatogenezi", "answer": "Orqa miyada sirinx (bo'shliq). Sabab: Chiari malformatsiyasi (eng keng), travma, infeksiya, idiopatik. Patogenez: BOS oqimi buzilishi → bo'shliq → markaziy kulrang modda siqilishi → 'mandarin' analgeziya."}, {"num": 36, "text": "Tarqoq skleroz etiopatogenezi", "answer": "Autoimmun demyelinizatsiya. Etiologiya: HLA-DR2 + EBV, D vitamini kamligi, chekish. Patogenez: T-limfotsitlar mielin basiy proteiniga hujum → demyelinizatsiya plaqlari. Relaps-remittiruyuschiy (85%). Lezyonlar: periventricular, optik nerv, miya ustuni."}, {"num": 37, "text": "Parkinson kasalligi klinikasi", "answer": "To'rt belgi: 1) Tremor tinchlikda ('non yoqish', 4–6 Hz); 2) Rigidlik ('tishli g'ildirak'); 3) Bradikinezia; 4) Postural beqarorlik. Qo'shimcha: mikrografiya, gipomimiya, kichik qadamlar, gipofoniя."}, {"num": 38, "text": "Parkinson kasalligi etiopatogenezi", "answer": "Etiologiya: LRRK2, PINK1, SNCA mutatsiyalari + pestitsidlar. Patogenez: Substantia nigra dopaminergik neyron degeneratsiyasi → striatum dopamin ↓ → harakatning inhibisiyasi. Lewy tanachalari (alfa-sinuklein) — patologik belgi."}, {"num": 39, "text": "Miasteniya etiopatogenezi", "answer": "Autoimmun. AChR antitanalari (85%) → neyromushak sinaps postsinaptik membrana buzilishi → impuls blokada → mushaк charchashi. MuSK antikor (10%). Timus rol o'ynaydi."}, {"num": 40, "text": "Mielitni davosi", "answer": "1) Metilprednizolon 1 g/kun 3–5 kun IV; 2) Plazmaferez — og'ir; 3) IVIG; 4) Etiologik: antibiotik/antiviral; 5) Kateterizatsiya; 6) Tromboprofilaktika; 7) Rehabilitatsiya."}, {"num": 41, "text": "Absanslar haqida tushuncha", "answer": "5–30 s ong yo'qolishi, ko'z qotishi, harakatsizlik — birdan to'xtaydi, amneziya. Kompleks: avtomatizm. EEG: 3 Hz generalizovanniy uchqun-to'lqin. Giperventilyatsiya provokatsiya. 4–10 yosh. Etosuksimid, valproat."}, {"num": 42, "text": "Mielopatiya haqida tushuncha", "answer": "Orqa miya surunkali zararlanishi (yallig'lanmasiz). Turlari: servikal spondilogenniy, vaskulyar, kompressiv, toksik (B12 ↓), radiatsion. Klinika: sekin spastik falaj, sezgi, sfinkter buzilishi. Og'riq bo'lmasligi mumkin."}, {"num": 43, "text": "Migren etiopatogenezi", "answer": "Genetik (CACNA1A). Provokatsiya: stress, hormonal, ovqat (vino, pishloq), ob-havo. Patogenez: 1) Kortikаl tarqaluvchi depressiya — aura; 2) Trigeminal aktivatsiya; 3) Qon tomirlari kengayishi; 4) Serotonin o'zgarishi."}, {"num": 44, "text": "Elka pleksiti klinikasi", "answer": "Yuqori (Erb-Dyushen, C5–C6): abduktorlar, tashqi rotatorlar falaji — 'vaiter holati'. Quyi (Klumpke, C8–T1): bilak/qo'l mushaklari, Horner, 4–5 barmoq sezgi ↓. Sabab: tarqalish, Panko'st o'smasi."}, {"num": 45, "text": "Lyumbago haqida tushuncha", "answer": "Bel sohasida o'tkir og'riq. Sabab: disk yadro chiqishi, faset blokada, mushak spazmi. Klinika: keskin harakatdan keyin bel og'rig'i, harakat cheklanganligi, antalgik holat, lordoz tekislanishi. Davolash: dam olish, NSAIDs, miorelaksantlar."}, {"num": 46, "text": "Bulbar sindrom haqida tushuncha", "answer": "IX, X, XII nervlar periferik zararlash. Klinika: disfoniya, dizartriya, dysfagia; til atrofiyasi, fassikulyatsiya; yumshoq tanglay osilib qoladi; yo'tal refleksi ↓. Sabab: ALS, poliomielit, Giyena-Bare."}, {"num": 47, "text": "Psevdobulbar sindrom haqida tushuncha", "answer": "Kortikonuklеar yo'llar ikki tomonga zararlash. Xuddi bulbar, LEKIN: til atrofiyasi YO'Q; reflekslar oshgan; patologik kulgu/yig'lash; mandibulyar refleks ↑; xobot refleksi. Sabab: ikki tomonlama insult, demyelinizatsiya."}, {"num": 48, "text": "Miyacha insulti klinikasi", "answer": "1) Kuchli vertigo; 2) Ko'ngil aynishi, qusish; 3) Ataksiya — keng oyoqlab yurish; 4) Dismetriya; 5) Nistagm; 6) Inteksiyaviy tremor; 7) Dizartriya (skanirlovchi); 8) Ong saqlanadi. Markaziy insultdan farqi."}, {"num": 49, "text": "N. abducens neyropatiyasi klinikasi", "answer": "Lateral rektus falaji. Ko'zni tashqariga qarata olmaslik; ko'z o'rtaga burilgan (esotropiya); gorizontal diplopia (uzoqqa); kompensator bosh burilishi. Sabab: AH, diabet, ICP ↑, o'sma, MS."}, {"num": 50, "text": "N. oculomotorius neyropatiyasi klinikasi", "answer": "1) Ptoz; 2) Ko'z pastga-tashqariga; 3) Ko'z harakatlari cheklangani; 4) Midriyaz — anevrizm belgisi; 5) Akkommodatsiya buzilishi. Sabab: posterior kommunikant anevrizm, diabet (pupil tutilmaydi), herniyatsiya."}, {"num": 51, "text": "Yuz nervi nevropatiyasi klinikasi", "answer": "Periferik: 1) Yuz bir tomonga falaj (yuqori va pastki); 2) Ko'zni yopa olmaslik (lagoftalm); 3) Lab burilishi; 4) Peshona ajini ↓; 5) Giperakuziya; 6) Ta'm buzilishi; 7) Ko'z yoshi/so'lak buzilishi. Bell palsi; Ramsey-Hunt; o'rta quloq."}, {"num": 52, "text": "Uch shoxli nerv nevralgiyasi klinikasi", "answer": "Yuz sohasida 'elektr zarba' kabi qisqa og'riq. V2/V3 sohasi. Trigger: og'iz yuvish, yeyish, shamol. Bir tomonlama. Nevrologik defisit yo'q (klassik). 50 yosh+. Sabab: qon tomiri kompressiyasi (SICA)."}, {"num": 53, "text": "Yon amiotrofik skleroz klinikasi", "answer": "Yuqori motor neyron: spastik, giperrfleksiya, Babinski. Quyi motor: atrofiya, fassikulyatsiya, atoniya. Bulbar: disfoniya, dysfagia. Nafas buzilishi. Sezgi saqlanadi. Progressiv, 3–5 yil."}, {"num": 54, "text": "Vegeto-qon tomir distoniyasi klinikasi", "answer": "Simpatikotonik: tashvish, taxikardiya, gipertenziya, ter, quruq og'iz. Parasimpatikotonik: bradikardiya, gipotenziya, ko'ngil aynishi, terlaş. Vagal sinкop. Davolash: psixoterapiya, sedativlar, fizioterapiya."}, {"num": 55, "text": "Distsirkulyator entsefalopatiya klinikasi", "answer": "I: bosh og'rig'i, bosh aylanishi, xotira ↓, labillik. II: fokal belgilar, psevdobulbar, yurish buzilishi. III: demensiya, jiddiy kognitiv buzilish. KT/MRT: leukoaraioz, lakunar infarktlar."}, {"num": 56, "text": "Dyushen miopatiyasi klinikasi", "answer": "X-bog'liq, DMD geni. Faqat o'g'il bolalar. 2–5 yosh: qalqib turish qiyinligi. Gowers belgisi. Boldir psevdogipetrofiyasi. Lordoz ↑. 12 yoshda nogironlik. KMP, nafas ↓ — o'lim. CK ↑↑."}, {"num": 57, "text": "Siringomieliya klinikasi", "answer": "1) Dissossiatsiyalangan sezgi — og'riq/harorat ↓, teginish saqlanadi; 2) 'Mandarin jacket' — bo'yin, yelka, qo'l; 3) Qo'l atrofiyasi; 4) Pastda spastik paraparez; 5) Neyrogen artrоpatiya (Charcot); 6) Qorin reflekslari ↓."}, {"num": 58, "text": "Polineyropatiya klinikasi", "answer": "'Paypoq/qo'lqop' sezgi buzilishi; distal atrofiya; arefleksiya (Achilles); avtonom (ortostatik gipotenziya, terlash ↓); neyropatik og'riq — kechasi yonish, sanchish. Sabab: diabet, alkogol, B12 ↓, Giyena-Bare."}, {"num": 59, "text": "Subaraxnoidal qon quyilish davolash", "answer": "1) ICU; 2) Anevrizm kliplash yoki embolizatsiya; 3) Nimodipin — vazospazm profilaktikasi; 4) Ventrikulostomiya — gidrosefal; 5) Normovolemi; 6) Analgetiklar; 7) Antiepileptik; 8) Qon bosim nazorat."}, {"num": 60, "text": "Poliomielit klinikasi", "answer": "Preparitik: isitma, bosh og'rig'i, ko'ngil aynishi. Preparalitik: mushak og'rig'i, spazm. Paralitik: keskin asimmetrik flaksid falaj (72–96 soat). Tiklanish: oylar–yillar. Postpolio: yillar keyin kuchsizlik qaytadi."}, {"num": 61, "text": "Bel-quymich radikuliti klinikasi", "answer": "Bel og'rig'i oyoqqa irradiyatsiya — quymich, son, boldir, tovon. Laseque+ (oyoq ko'targanda og'riq). Paresteziya. Reflex ↓ (Achilles — S1, tiz — L4). Mushak ↓ xavf bo'lsa. Zo'riqish/ko'tarishdan kuchayadi."}, {"num": 62, "text": "Epilepsiyaning bosqichlari", "answer": "1) Prodromal — soatlar/kunlar oldin kayfiyat o'zgarishi; 2) Aura — fokal qo'zg'alish (ong saqlanadi); 3) Iktal — xuruj o'zi; 4) Postiktal — charchoq, amneziya, Todds falaji; 5) Interictal — xurujlar orasida."}, {"num": 63, "text": "Epistatusni davosi", "answer": "0–5 daq: diazepam 10 mg IV, lorazepam 4 mg, midazolam IN. 5–20 daq: valproat 40 mg/kg IV, levetiratsetam 60 mg/kg IV. >20 daq: propofol/midazolam infuziya — ICU, EEG monitoring."}, {"num": 64, "text": "Serozli meningit klinikasi", "answer": "Ko'pincha viral. Klinika: isitma 38–39°C, bosh og'rig'i, meningeal belgilar (o'rtacha), ong saqlanadi, toshma yo'q. Likvor: shаffof, limfotsitar pleotsioz, oqsil sal ↑, glyukoza norma."}, {"num": 65, "text": "Uch shoxli nerv nevralgiyasi davosi", "answer": "1) Karbamazepin (1-tanlov) 200–400 mg x3; 2) Okskarbazepin; 3) Gabapentin, pregabalin; 4) Baklofan; 5) Lamotrijin. Jarrohlik: Jannetta (mikrovaskular dekompressiya) — eng samarali; radiofrequency rizotomiya; gamma-knife."}, {"num": 66, "text": "Yuz nervi neyropatiyasi davosi", "answer": "1) Prednizolon 1 mg/kg 10 kun (48 soat ichida); 2) Herpes Zoster: asiklovir + steroid; 3) Ko'z tomchisi + bantik; 4) Fizioterapiya; 5) B vitaminlari; 6) LFK; 7) Jarrohlik — neyroliz (og'ir)."}, {"num": 67, "text": "Miopatiyada harakat buzilish sindromi", "answer": "Simmetrik proksimal zararlash (son, dumba, yelka kamari). Gowers belgisi. Ko'runadigan atrofiya. Psevdogipetrofiya. Miopatik yurish ('o'rdak'). Periferik tip falaj. Reflekslar ↓."}, {"num": 68, "text": "Klaster bosh og'rig'i klinikasi", "answer": "Unilateral periorbital, juda kuchli. 15–180 daq. Kuniga 1–8 marta, haftalar/oylar. Ipsilateral avtonomik: ko'z yoshi, burun oqishi, ptoz, mioz. Bemor harakatlanadi. Davolash: O2 100%, sumatritan."}, {"num": 69, "text": "Abuzis bosh og'rig'i klinikasi", "answer": "Kundalik surunkali bosh og'rig'i (≥15 kun/oy). Analgetik ≥3 oy. Dori olganda yaxshilanadi. Ertalab kuchli. Davolash: analgetikni sekin to'xtatish + profilaktik dorilar."}, {"num": 70, "text": "Bosh aylanish sindromi", "answer": "Periferik: BPPV (Dix-Hallpike+), Menyera (quloq+eshitish ↓+vertigo), labirintit. Markaziy: miya ustuni/miyacha — nerologik belgilar. Presinkopal: gipotenziya. Psixogen. Diagnostika: Dix-Hallpike, MRT."}, {"num": 71, "text": "Landuzi-Djerin miopatiyasi klinikasi", "answer": "Fasioskapolohumerаl (FSHD). Autosomal dominant. Yuz mushaklari (ko'z yopa olmaslik); yelka kamari (qanot skapula); boldir/yelka. Asimmetrik. Sekin progressiv. 20–30 yosh."}, {"num": 72, "text": "Shtryumpel kasalligi", "answer": "Oilaviy spastik paraplegiya (SPG4, spastin). Klinika: sekin progressiv oyoq spastik kuchsizligi; spastik yurish; giperrfleksiya, Babinski; sezgi sal ↓; sfinkter — kech. Davolash: baklofan, fizioterapiya."}, {"num": 73, "text": "Insultlarda nodifferentsial davo", "answer": "1) Hayot ko'rsatkichlari; 2) O2; 3) Glyukoza normalizatsiya; 4) Isitmani pasaytirish; 5) UTI davolash; 6) Tromboprofilaktika; 7) Ovqatlanish; 8) Erta rehabilitatsiya."}, {"num": 74, "text": "Giyena-Bare poliradikuloneyropatiya klinikasi", "answer": "Ko'tarilib boruvchi simmetrik flaksid falaj (oyoqdan). Arefleksiya. Paresteziya. Og'riq erta. Yuz nervi bilateral. Avtonom: AV blok, gipotenziya. Nafas falaji (20%) — ICU. 4 hafta. Likvor: albuminositologik dissossiyatsiya."}, {"num": 75, "text": "Meningokokkli meningit klinikasi", "answer": "O'ta o'tkir. Isitma 39–40°C. Kuchli bosh og'rig'i. Gemorragik toshma (petехii → purpura → nekroz). Ong buzilishi. Vaterxauz-Fridrixsen — buyrak usti qon quyilish, septik shok."}, {"num": 76, "text": "Meningokokkli meningit davosi", "answer": "1) Seftriakson 2 g x2 IV darhol; 2) Deksametazon 0.15 mg/kg x4; 3) Septik shok: infuziya, noradrenalin; 4) ИВЛ; 5) Kontaktlar: rifampin 600 mg x2, 2 kun; 6) Vaksinatsiya."}, {"num": 77, "text": "Zo'riqishdagi bosh og'rig'i klinikasi", "answer": "Ikki tomonlama. Bosuvchi/zichlovchi ('halqa'). O'rtacha intensivlik. 30 daq–7 kun. Jismoniy faollik kuchaytirmaydi. Ko'ngil aynishi — yo'q. Fotofobiya yoki fonofobiya — bittasi (ikkisi — migren)."}, {"num": 78, "text": "Zo'riqishdagi bosh og'rig'i davolash", "answer": "O'tkir: paratsetamol 1 g; ibuprofen 400–600 mg; aspirin 1000 mg. Profilaktik (≥15 kun/oy): amitriptilin 10–75 mg (1-tanlov); stress menejment; fizioterapiya; psixoterapiya."}, {"num": 79, "text": "Gantington xoreyasi klinikasi", "answer": "Autosomal dominant, HTT geni (CAG >36). 1) Xoreya — ixtiyorsiz harakatlar; 2) Ataksiya; 3) Ko'z saccade sekinligi; 4) Demensiya; 5) Depressiya, psixoz; 6) Dysfagia. Boshlanish: 30–50 yosh."}, {"num": 80, "text": "Tranzitor ishemik ataka klinikasi", "answer": "<24 soat (<1 soat) fokal defisit. Karotid: gemiparesteziya, afaziya, monookulyar amavroz. Vertebrobazilyar: diplopia, ataksiya, bilateral ko'ruv. ABCD2 skali. Antiaggregantlar, statin — darhol."}, {"num": 81, "text": "Erba-Rota miopatiyasi klinikasi", "answer": "LGMD. Autosomal retsessiv. Son/dumba mushaklari, Gowers belgisi. Yelka kamari, qanot skapula. Boldirlar psevdogipetrofiyasi. O'rdak yurishi. CK ↑. Bolalik–voyaga yetish."}]}]};

let doneSet = new Set();
let openCards = new Set();
let currentCh = null;
let storageReady = false;

const STORAGE_KEY = 'medques_done';

async function loadDone(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if(result && result.value){
      doneSet = new Set(JSON.parse(result.value));
    }
  }catch(e){
    doneSet = new Set();
  }
  storageReady = true;
  renderChapters();
}

async function saveDone(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify([...doneSet]), false);
  }catch(e){
    console.error('Saqlashda xatolik:', e);
  }
}

function getKey(c,n){return c+'_'+n}

function updateStats(){
  document.getElementById('totalDone').textContent=doneSet.size;
  document.getElementById('totalFill').style.width=Math.min(doneSet.size/315*100,100)+'%';
}

function renderChapters(){
  document.getElementById('chaptersList').innerHTML=APP_DATA.chapters.map(ch=>{
    const done=ch.questions.filter(q=>doneSet.has(getKey(ch.id,q.num))).length;
    const pct=ch.count?done/ch.count*100:0;
    return `<div class="chapter-card ${ch.id}" onclick="showQuestions('${ch.id}')">
<div class="chapter-top"><div class="chapter-info">
<div class="chapter-icon">${ch.icon}</div>
<div><div class="chapter-name">${ch.name}</div>
<div class="chapter-count">📋 ${ch.count} ta bilet</div></div></div>
<div class="chapter-arrow">›</div></div>
<div class="chapter-progress"><div class="progress-numbers">
<span><strong>${done}</strong>/${ch.count} o'rganildi</span>
<span style="color:#34d399;font-weight:600">${Math.round(pct)}%</span></div>
<div class="progress-bar-chapter"><div class="progress-fill-chapter" style="width:${pct}%"></div></div></div></div>`;
  }).join('');
  updateStats();
}

function showQuestions(chId){
  currentCh=chId;
  const ch=APP_DATA.chapters.find(c=>c.id===chId);
  if(!ch)return;
  document.getElementById('chaptersView').classList.add('hidden');
  document.getElementById('questionsView').classList.add('active');
  document.getElementById('questionsTitle').textContent=ch.name;
  document.getElementById('searchBox').value='';
  openCards.clear();
  renderQuestions(ch.questions);
}

function renderQuestions(questions){
  document.getElementById('questionsList').innerHTML=questions.length?questions.map(q=>{
    const key=getKey(currentCh,q.num);
    const isDone=doneSet.has(key);
    return `<div class="question-card ${isDone?'done':''}" id="q-${key}">
<div class="question-header" onclick="toggleQuestion('${key}')">
<div class="question-meta"><div class="question-num">Bilet №${q.num}</div>
<div class="question-text">${escapeHtml(q.text)}</div></div>
<div class="question-toggle" id="toggle-${key}">▼</div></div>
<div class="question-body" id="body-${key}">
<div class="answer-title">✓ Javob</div>
<div class="answer-text">${escapeHtml(q.answer)}</div>
<div class="question-done"><button class="btn-done ${isDone?'active':''}" onclick="toggleDone(event,'${key}')">
${isDone?"✅ O'rganildi":"⬜ O'rgandim"}</button></div></div></div>`;
  }).join(''):'<div class="empty">Hech narsa topilmadi</div>';
}

function filterQuestions(){
  const ch=APP_DATA.chapters.find(c=>c.id===currentCh);
  if(!ch)return;
  const q=document.getElementById('searchBox').value.toLowerCase();
  const filtered=q?ch.questions.filter(item=>item.text.toLowerCase().includes(q)||item.answer.toLowerCase().includes(q)):ch.questions;
  openCards.clear();
  renderQuestions(filtered);
}

function showChapters(){
  document.getElementById('questionsView').classList.remove('active');
  document.getElementById('chaptersView').classList.remove('hidden');
  openCards.clear();
  renderChapters();
}

function toggleQuestion(key){
  if(openCards.has(key))openCards.delete(key);else openCards.add(key);
  const b=document.getElementById('body-'+key);
  const t=document.getElementById('toggle-'+key);
  if(b)b.classList.toggle('open',openCards.has(key));
  if(t)t.textContent=openCards.has(key)?'▲':'▼';
}

function toggleDone(e,key){
  e.stopPropagation();
  if(doneSet.has(key))doneSet.delete(key);else doneSet.add(key);
  saveDone();
  const btn=e.target;
  const isDone=doneSet.has(key);
  btn.classList.toggle('active',isDone);
  btn.textContent=isDone?"✅ O'rganildi":"⬜ O'rgandim";
  const card=document.getElementById('q-'+key);
  if(card)card.classList.toggle('done',isDone);
  updateStats();
}

function escapeHtml(t){
  const d=document.createElement('div');
  d.textContent=t;
  return d.innerHTML;
}

loadDone();
</script>
