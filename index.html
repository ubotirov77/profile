септическая); 3) Субклиническая (носительство). По тяжести: лёгкая, средняя, тяжёлая."}, {"num": 40, "text": "Клиника гастроинтестинальной формы сальмонеллёза", "answer": "Инкубация 12–24 ч. Острое начало; лихорадка 38–39°С; тошнота, рвота; боли в эпигастрии; обильный зелёный зловонный стул ('болотная тина'); обезвоживание I–III ст; интоксикация. Длительность 3–7 дней."}, {"num": 41, "text": "Ранняя дифдиагностика сальмонеллёза", "answer": "От холеры (нет лихорадки, рис-вода), дизентерии (тенезмы, кровь, левая боль), ПТИ (короткая инкубация), брюшного тифа (постепенное, розеолы). Решает: бакпосев кала, серология, ПЦР."}, {"num": 42, "text": "Клиника септической формы сальмонеллёза", "answer": "Высокая лихорадка с ознобами; потливость; вторичные очаги — остеомиелит, менингит, эндокардит; ГУС; гепатоспленомегалия; анемия; желтуха. У иммуноскомпрометированных."}, {"num": 43, "text": "Лечение и профилактика сальмонеллёза", "answer": "Лечение: регидратация; этиотропное при тяжёлой — фторхинолоны, цефалоспорины III; сорбенты; пробиотики. Профилактика: термообработка яиц/птицы, хранение пищи, мытьё рук, ветеринарный надзор."}, {"num": 44, "text": "Клиника пищевой токсикоинфекции", "answer": "Инкубация 1–6 ч. Острейшее начало; рвота (предшествует диарее); схваткообразные боли; жидкий стул; лихорадка кратковременная; обезвоживание. Групповой характер. Самоограничивается 1–3 дня."}, {"num": 45, "text": "Ранняя дифдиагностика ПТИ", "answer": "От холеры (нет интоксикации), сальмонеллёза (долгая инкубация, зелёный стул), дизентерии (тенезмы, кровь), аппендицита (нет диареи, перитонеальные). Решает: бакпосев рвоты/кала/пищи."}, {"num": 46, "text": "Лечение и профилактика ПТИ", "answer": "Лечение: промывание желудка; регидратация (оральная или в/в); сорбенты; антибиотики не показаны (при осложнениях — фторхинолоны). Профилактика: технология приготовления, хранение (≤4°С), санитарные нормы, мытьё рук."}, {"num": 47, "text": "Этиология, эпидемиология ботулизма", "answer": "Cl. botulinum (Гр+, споровый, анаэроб). Токсины A–G. Источник: почва, кишечник животных. Факторы: домашние консервы, вяленая рыба, мясо. Инкубация: 12–36 ч. Споры: кипячение до 6 ч; токсин разрушается при 80°С/30 мин."}, {"num": 48, "text": "Патогенез ботулизма", "answer": "Ботулотоксин → ЖКТ → кровь → периферические нервы → блокирует экзоцитоз ацетилхолина → нейромышечный блок → нисходящие параличи (черепные нервы → дыхание). Нет сенсорных нарушений. Сознание сохранено."}, {"num": 49, "text": "Клиника ботулизма", "answer": "1) Офтальмоплегия — двоение, птоз, мидриаз; 2) Дисфагия, дизарт-рия; 3) Нисходящий паралич: шея, туловище, конечности; 4) Дыхательная недостаточность — ведущая причина смерти; 5) Сухость во рту; 6) Запор; 7) Нет лихорадки; 8) Ясное сознание."}, {"num": 50, "text": "Ранняя дифдиагностика ботулизма", "answer": "От: полиомиелит (лихорадка, асимметрия), инсульт (очаговые), миастения (антитела АChR, волнообразно), Гийен-Барре (восходящий, ликвор изменён), дифтерия (ангина, плёнка). Решает: биопроба на мышах, ИФА токсина."}, {"num": 51, "text": "Принципы лечения ботулизма", "answer": "1) ОРИТ; 2) Антиботулиническая сыворотка (А+В+Е); 3) Промывание желудка; 4) ИВЛ при ДН; 5) Пенициллин/метронидазол; 6) Гипербарическая оксигенация; 7) Дезинтоксикация."}, {"num": 52, "text": "Правила введения ботулинической сыворотки", "answer": "1) Набор для анафилаксии рядом; 2) Кожная проба (1:100 в/к, 20 мин); 3) При отрицательной — ПЦС в/м или в/в; 4) Дозы: А — 10 000 МЕ, В — 5 000 МЕ, Е — 10 000 МЕ каждого; 5) Чем раньше — тем эффективнее."}, {"num": 53, "text": "Клиническая классификация гриппа", "answer": "По тяжести: лёгкая (<38°С), средняя (38–39°С), тяжёлая (>39°С), гипертоксическая. По течению: неосложнённый, осложнённый (пневмония, ОРДС, энцефалит). Серотипы: A (пандемический), B (сезонный), C."}, {"num": 54, "text": "Клиника неосложнённого гриппа", "answer": "Инкубация 1–3 дня. Острейшее начало; лихорадка 39–40°С; выраженная интоксикация — головная боль (виски, за глазами), миалгии, слабость; катар умеренный — сухость, саднение, ринит; геморрагии (носовые); слёзотечение, светобоязнь."}, {"num": 55, "text": "Ранняя дифдиагностика гриппа", "answer": "От ОРВИ (менее интоксикация, более катар), менингококка (сыпь, рвота), брюшного тифа (постепенное), малярии (пароксизмы), лептоспироза. Решает: ПЦР мазка из носоглотки, экспресс-тест (ИФА)."}, {"num": 56, "text": "Клиника рожи и лечение", "answer": "Гиперемия с чёткими границами (рожистый вал), жжение, боль, отёк. Формы: эритематозная, буллёзная, флегмонозная, некротическая. Лихорадка, интоксикация. Локализация: голени, лицо. Лечение: пенициллин 1 млн ЕД х6, 10 дней; НПВС; местно антисептики."}, {"num": 57, "text": "Лечение гриппа (неосложнённый и осложнённый)", "answer": "Неосложнённый: НПВС (парацетамол); осельтамивир 75 мг х2, 5 дн — при тяжёлой/рисках; питьё; постельный режим. Осложнённый (пневмония): антибиотики (амоксиклав, азитромицин); ИВЛ при ОРДС; госпитализация."}, {"num": 58, "text": "Этиология и патогенез менингококковой инфекции", "answer": "N. meningitidis (Гр−, диплококк). Серогруппы: A, B, C, W, Y. Воздушно-капельный. Патогенез: носительство → назофарингит → бактериемия → ГЭБ → менингит. Эндотоксин → ДВС, ИТШ (Вотерхаус-Фридриксен)."}, {"num": 59, "text": "Классификация менингококковой инфекции", "answer": "1) Локализованные: носительство, назофарингит; 2) Генерализованные: менингококкемия, менингит, менингоэнцефалит, смешанная; 3) Редкие: эндокардит, артрит. По тяжести: лёгкая, средняя, тяжёлая, молниеносная."}, {"num": 60, "text": "Клинические признаки менингококковой инфекции", "answer": "Назофарингит: катар, субфебрилитет. Менингококкемия: острейшее начало, лихорадка, геморрагическая сыпь (звёздочки). Менингит: ригидность, Кёрниг, Брудзинский. Молниеносная: ИТШ + ДВС, летальность 50–80%."}, {"num": 61, "text": "Клинические симптомы менингококкемии", "answer": "1) Острейшее начало; 2) Лихорадка >40°С; 3) Геморрагическая звёздчатая сыпь — нарастает часами; 4) Сыпь не исчезает при надавливании; 5) Гипотония; 6) Бледность, цианоз; 7) ДВС; 8) ИТШ → полиорганная недостаточность."}, {"num": 62, "text": "Дифдиагноз инфекции с синдромом менингита", "answer": "Гнойный бактериальный: нейтрофилы, глюкоза ↓↓, мутный ликвор. Серозный вирусный: лимфоциты, глюкоза норма, прозрачный. ТБ менингит: лимфоциты, глюкоза ↓, фибрин, хлориды ↓. Грибковый: иммунодефицит, India Ink+. СА: ксантохромия, эритроциты."}, {"num": 63, "text": "Дифдиагноз серозного и гнойного менингита", "answer": "Гнойный: нейтрофильный плеоцитоз >1000, мутный, глюкоза <2.2, белок ↑↑, бактерии+. Серозный: лимфоцитарный <500, прозрачный, глюкоза норма, белок ↑ умеренно. Клинически: гнойный тяжелее, менингококк — сыпь."}, {"num": 64, "text": "Клиника синдрома Уотерхаус-Фридрехсена", "answer": "Молниеносная менингококкемия + кровоизлияние в надпочечники. Клиника: ИТШ — гипотензия, тахикардия; нарастающая геморрагическая сыпь; острая надпочечниковая недостаточность — коллапс, анурия; ДВС; кома. Летальность >50%."}, {"num": 65, "text": "Этиология и патогенез малярии", "answer": "Plasmodium (falciparum, vivax, malariae, ovale). Переносчик: Anopheles. Тканевая шизогония → мерозоиты → эритроциты → гемолиз → пароксизм. P. vivax/ovale — гипнозоиты (рецидивы). P. falciparum — цереброформа."}, {"num": 66, "text": "Принципы лечения и профилактики менингококковой инфекции", "answer": "Лечение: пенициллин 0.3 млн ЕД/кг/сут или цефтриаксон 2 г х2; дексаметазон; ИТШ — инфузия, норадреналин; ДВС — СЗП. Профилактика: вакцинация (А, С, W, Y, В); контактным — рифампицин 600 мг х2, 2 дня."}, {"num": 67, "text": "Клиника малярии", "answer": "Пароксизм (триада): 1) Озноб 30–60 мин; 2) Жар 39–41°С; 3) Пот (профузный). Интервалы: vivax/ovale — 48 ч; malariae — 72 ч; falciparum — неправильный. Гепатоспленомегалия, анемия. P. falciparum: кома, ОРДС, ГУС, ОПН."}, {"num": 68, "text": "Лечение и профилактика малярии", "answer": "Vivax/ovale: хлорохин + примахин 14 дн. Falciparum: АКТ (артемизинин+люмефантрин); тяжёлая — в/в артесунат. Профилактика: атовахон/прогуанил, мефлохин, доксициклин; защита от комаров."}, {"num": 69, "text": "Патогенез бруцеллёза", "answer": "Brucella → кожа/слизистые → ЛУ → кровь (бактериемия) → РЭС → размножение внутри макрофагов → гранулёмы → повторные бактериемии → аллергические реакции → ОДА, ЦНС, органы размножения."}, {"num": 70, "text": "Классификация бруцеллёза", "answer": "Острая <3 мес; подострая 3–6 мес; хроническая >6 мес (компенсированная, субкомпенсированная, декомпенсированная); резидуальная. По синдрому: костно-суставная, нервная, урогенитальная. По тяжести: лёгкая, средняя, тяжёлая."}, {"num": 71, "text": "Симптомы острого септического бруцеллёза", "answer": "1) Волнообразная (ундулирующая) лихорадка; 2) Относительная брадикардия; 3) Озноб — профузные поты (ночью); 4) Полилимфаденопатия; 5) Гепатоспленомегалия; 6) Артралгии; 7) Целлюлит и фиброзиты; 8) Орхоэпидидимит (у мужчин)."}, {"num": 72, "text": "Клиника подострой и хронической формы бруцеллёза", "answer": "Подострая: нарастание органных поражений. Хроническая: 1) Остеоартрит — сакроилеит (патогномоничен), спондилит; 2) Орхоэпидидимит; 3) Нейробруцеллёз; 4) Хронический гепатит; 5) Эндокардит. Лихорадка субфебрильная."}]}, {"id": "neuro", "name": "Nevrologiya", "icon": "🧠", "count": 81, "questions": [{"num": 1, "text": "Ishemik insult klinikasi", "answer": "Fokal belgilar arteriaga bog'liq: O'rta miya — kontralateral gemiplegiya, afaziya (chap); Ichki uyqu — amaurosis fugax, afaziya, gemiplegiya; Vertebrobazilyar — ataksiya, dizartriya, diplopia, Horner; Old miya — oyoq ko'proq, paraparez."}, {"num": 2, "text": "O'tkir radikulitni davosi", "answer": "1) Dam olish; 2) NSAIDs (diklofenak, meloksikam); 3) Miorelaksantlar (tizanidin); 4) B1, B6, B12 vitaminlari; 5) Blokada (novokain + kortikosteroid); 6) Kortikosteroidlar — og'ir; 7) Fizioterapiya; 8) Masaj va LFK — o'tkir o'tgach; 9) Traktsiya; 10) Jarrohlik — qo'pol defisitda."}, {"num": 3, "text": "Markaziy va periferik falajlanish belgilari", "answer": "Markaziy (yuqori motor neyron): gipertoniya (spastik), giperrfleksiya, Babinski, klonus, atrofiya kam. Periferik (quyi motor neyron): gipotoniya, atrofiya yaqqol, arefleksiya, fassikulyatsiya, EMG o'zgarish."}, {"num": 4, "text": "Ichki kapsula zararlansa harakat qanday buziladi", "answer": "Kontralateral: spastik gemiplegiya, gemigipoesteziya, gomоnim gemianopsiya; ko'z deviyatsiyasi o'sma tomonga. 'Uchlik formulasi': falaj + sezgi + ko'ruv."}, {"num": 5, "text": "Insultlarni klassifikatsiyasi", "answer": "1) Ishemik (80–85%): trombotik, embolik, gemodianamik, lakunar; 2) Gemorragik (15–20%): intraserebral qon quyilish, subaraxnoidal (SAQ), ventrikulyar; 3) TIA — belgilar 24 soatda o'tadi."}, {"num": 6, "text": "Gemorragik insult klinikasi", "answer": "Keskin: 1) Kuchli bosh og'rig'i; 2) Ko'ngil aynishi, qusish; 3) Ong buzilishi; 4) Kontralateral gemiplegiya, afaziya; 5) Qon bosimi ↑; 6) Cheyne-Stokes nafas; 7) Meningeal belgilar; 8) Epileptik xurujlar. Likvorda qon."}, {"num": 7, "text": "Gemorragik insult davosi", "answer": "1) Qon bosimi 140–160/90 ga tushirish; 2) Mannitol/glitserol — ICP kamaytirish; 3) Traneksamik kislota — gemostaz; 4) Antikonvulsant; 5) Parvarish. Jarrohlik: gematoma olib tashlash (>30 ml), ventrikulostomiya."}, {"num": 8, "text": "Monoplegiya, paraplegiya, tetraplegiya, gemiplegiya", "answer": "Monoplegiya — 1 oyoq/qo'l. Gemiplegiya — bir tomona. Paraplegiya — ikkala oyoq. Tetraplegiya — to'rtta oyoq (yuqori servikal). Plegiya — to'liq falaj; parezda qisman kuch saqlanadi."}, {"num": 9, "text": "N. radialis zararlanishi", "answer": "Bilak pastga osilib ('osilib turuvchi qo'l', wrist drop); barmoq yozilmaydi; 1–3 barmoq dorsal sezgi yo'qolishi. Sabab: elka sinishi, turnikе, noto'g'ri holat."}, {"num": 10, "text": "N. ulnaris zararlanishi", "answer": "4–5 barmoqlar bukilgan ('tirnoq qo'l'); 5–4 barmoq medial sezgi yo'qolishi; gipotenаr atrofiyasi; barmoq yoyilmaydi; Froment belgisi+. Zararlash: tirsak kanali."}, {"num": 11, "text": "Poliomielitda harakat buziladi", "answer": "Virus oldingi shox → periferik (flaksid) falaj: mushaк atrofiyasi, atoniya, arefleksiya, fassikulyatsiya, sezgi saqlanadi. Asimmetrik. Ko'pincha oyoqlar. Bulbar: nafas, yutinish buzilishi."}, {"num": 12, "text": "N. peroneus zararlanishi", "answer": "Oyoq pastga osilib ('foot drop'); ko'tarish imkonsiz; 1–5 barmoq dorsal sezgi yo'qolishi. Yurish: 'xo'roz yurishi' (steppage). Sabab: fibula boshi bosimi, oyoqni chalishtirib o'tirish."}, {"num": 13, "text": "N. facialis davosi", "answer": "1) Prednizolon 1 mg/kg (48 soat ichida — samarali); 2) Asiklovir (Herpes Zoster da); 3) Ko'z tomchisi + bantik; 4) Fizioterapiya; 5) B vitaminlari; 6) LFK; 7) Jarrohlik — neyroliz (og'ir surunkali)."}, {"num": 14, "text": "Epilepsiyani davosi", "answer": "GTKT: valproat (1-tanlov), karbamazepin, lamotrijin. Absans: etosuksimid, valproat. Fokal: karbamazepin, okskarbazepin. Epistatusda: diazepam IV → fenitoyin/valproat IV → narkoz. Tamoyil: monoterapiya, davodan to'xtatmaslik."}, {"num": 15, "text": "Partsial talvasalar haqida tushuncha", "answer": "Fokal — bir yarim shardan. 1) Oddiy fokal (ong saqlanadi): motorik (Jackson), sezgi, vegetativ; 2) Kompleks fokal (ong buziladi): avtomatizm; 3) Ikkilamchi generalizovanniy. EEG da fokal discharge. Sabab: shikastlanish, o'sma."}, {"num": 16, "text": "Epistatusda birinchi yordam", "answer": "1) Xavfsiz holat, yostiq; 2) Nafas yo'li; 3) O2; 4) Vena yo'li; 5) Diazepam 10 mg IV; 6) Javob yo'q: lorazepam 4 mg IV; 7) 2-liniya: valproat 15–45 mg/kg IV; 8) 3-liniya: propofol, midazolam — ICU; 9) EEG monitoring."}, {"num": 17, "text": "Djekson talvasalar", "answer": "Fokal motorik talvasalar. Bitta joydan (barmoq) boshlanadi → bir tomonga tarqaladi ('march'). Ong saqlanadi. Kontralateral motor korteks ketma-ket qo'zg'alishi. Todds falaji — talvazadan keyin qisqa vaqtli falaj. Sabab: o'sma, ensefalit."}, {"num": 18, "text": "Epileptik xurujning fazalari", "answer": "1) Aura — predor (ba'zan); 2) Tonik faza (15–30 s): barcha mushaklar qisqarishi, sianoz; 3) Klonik faza (1–2 daq): ritmik qisqarish, tilni tishlash; 4) Postiktal: charchoq, dezorientatsiya, uyqu, Todds falaji."}, {"num": 19, "text": "Epilepsiyada EEG o'zgarishlar", "answer": "Interiktal: uchqunlar (spikes), uchqun-to'lqin komplekslari, o'tkir to'lqinlar. Iktal: 3 Hz uchqun-to'lqin — absanslar; fokal uchqunlar; yuqori amplitudali ritmik to'lqinlar. Video-EEG — eng aniq."}, {"num": 20, "text": "Ventrikulyar qon quyilish", "answer": "Qorinchalar ichiga qon. Sabab: gipertenziya, AVM, ichki qon quyilish yorilishi. Klinika: keskin bosh og'rig'i, tez ong buzilishi, gipertermiya, bradikardiya, qo'l/oyoq qotishi. KT: qorinchalar ichida giperdens. Gidrosefal xavfi."}, {"num": 21, "text": "Subaraxnoidal qon quyilish", "answer": "Sabab: anevrizm (80%), AVM. Klinika: 'hayotda eng kuchli bosh og'rig'i' — keskin; meningeal belgilar; ko'ngil aynishi; fotofobiya; qon bosim ↑. KT: subaraxnoidal qon. Lyumbal punksiya: xanthochromia. Angiografiya — anevrizm."}, {"num": 22, "text": "Miya ustuniga qon quyilish", "answer": "Tez koma; de-serebrat rigidlik; Cheyne-Stokes/apnoe; alternatsiyalovchi sindromlar; bradikardiya, gipertermiya; ikki tomonli Babinski; ko'z harakatlar buzilishi. Prognoz og'ir."}, {"num": 23, "text": "Meningeal belgilar, qaysi kasalliklarda", "answer": "Belgilar: bo'yin qattiqligi, Kernig, Brudzinskiy, fotofobiya. Kasalliklar: 1) Bakterial meningit; 2) SAQ; 3) Viral ensefalit; 4) TBM; 5) Kriptokokkoz; 6) Travma; 7) Qon quyilish."}, {"num": 24, "text": "Tuberkulyoz meningitda likvor tahlili", "answer": "Bosim ↑; rang — opa-rang/sariq; oqsil ↑ (1–10 g/l); glyukoza ↓ (<2.2 mmol/l); xlorid ↓; limfotsitar pleotsioz 100–500; fibrin to'ri; BK kam; PCR MTB — aniqroq."}, {"num": 25, "text": "Miya pardalari va bo'shliqlar", "answer": "Pardalar: dura mater (epidural bo'shliq), arachnoidea (subdural), pia mater (subaraxnoidal — BOS). Qorinchalar: 1–2 lateral, 3-qorincha (diensefalon), Silviy darvozasi, 4-qorincha. BOS: choroid pleksus → qorinchalar → SA bo'shliq → rezorbsiya."}, {"num": 26, "text": "Meningit klinikasi", "answer": "Uchlik: bosh og'rig'i + isitma + meningeal belgilar; ko'ngil aynishi, qusish; fotofobiya; ong buzilishi; toshma (meningokokkda); kranial nerv falajligi; likvor bosim ↑."}, {"num": 27, "text": "Meningitlarni davosi", "answer": "Bakterial: seftriakson 2 g x2 IV + deksametazon; septik shok — vazopressorlar. Viral: simptomatik; gerpes — asiklovir. TBM: HRZE (izoniazid, rifampin, pirazinamid, etambutol) + steroid."}, {"num": 28, "text": "Kana entsefali klinikasi", "answer": "Inkubasiya 1–4 hafta. 1) Preparitik: isitma, bosh og'rig'i, miyalgia; 2) Ensefalit: ong buzilishi, meningeal belgilar; 3) Flaksid falaj — bo'yin, yelka; 4) Bulbar — dysfagia, dizartriya; 5) Ikki to'lqinli kurs. Limfotsitar pleotsioz."}, {"num": 29, "text": "Bosh og'rig'ini differentsial diagnostikasi", "answer": "1) Migren — unilateral, pulsirlovchi, aura; 2) Zo'riqish — ikki tomonlama, bosuvchi; 3) Klaster — periorbital, 15–180 daq, avtonomik; 4) SAQ — keskin 'hayotda eng kuchli'; 5) Meningit — isitma + meningeal; 6) AH; 7) O'sma — ertalab kuchli, progressiv; 8) Trigeminal nevralgiya — elektr zarba."}, {"num": 30, "text": "Bel og'rig'i differentsial diagnostikasi", "answer": "1) Osteokondroz/disk — radikular, Laseque+; 2) Spondiloartrit — ertalab qotish; 3) O'sma — progressiv; 4) Buyrak — Pasternatskiy+; 5) Pankreas — 'kamar' og'rig'i; 6) Osteoporoz; 7) Infeksion spondilit."}, {"num": 31, "text": "Gipo- va giperglikemik koma", "answer": "Gipoglekimik: keskin, terlaş, titrash, yumshoq teri, glyukoza <2.8. Davolash: 40% glyukoza 40–60 ml IV. Giperglikemik: sekin, quruq teri, DKA — aceton hidi, ketonlar+, insulin+infuziya; GNKG — glyukoza >33, gidratatsiya."}, {"num": 32, "text": "Ensefalitlar klinikasi (Ekonomo)", "answer": "Uyqu kasalligi: 1) Isitma, letargiya (patologik uyqu); 2) Okulomotor parezi, giperkinezlar; 3) Kech: postensefalitik parkinsonizm. Umumiy ensefalit: isitma, ong buzilishi, fokal belgilar, meningeal belgilar, xurujlar."}, {"num": 33, "text": "Mielit klinikasi", "answer": "1) Zararlanish pastida motor/sezgi buzilishi; 2) Paraplegiya/tetraplegiya; 3) Sensori level — keskin chegara; 4) Sfinkter buzilishi; 5) Avtonom buzilish; 6) Orqa miya og'rig'i."}, {"num": 34, "text": "YoAS etiopatogenezi", "answer": "Etiologiya: 90% sporadic; 10% oilaviy (SOD1, C9orf72 mutatsiyalari). Patogenez: oksidativ stress, glutamat ekssitotoksiklik, protein agregatsiya → yuqori va quyi motor neyron degeneratsiya → falaj. Riluzol — 2–3 oy uzaytiradi."}, {"num": 35, "text": "Siringomieliya etiopatogenezi", "answer": "Orqa miyada sirinx (bo'shliq). Sabab: Chiari malformatsiyasi (eng keng), travma, infeksiya, idiopatik. Patogenez: BOS oqimi buzilishi → bo'shliq → markaziy kulrang modda siqilishi → 'mandarin' analgeziya."}, {"num": 36, "text": "Tarqoq skleroz etiopatogenezi", "answer": "Autoimmun demyelinizatsiya. Etiologiya: HLA-DR2 + EBV, D vitamini kamligi, chekish. Patogenez: T-limfotsitlar mielin basiy proteiniga hujum → demyelinizatsiya plaqlari. Relaps-remittiruyuschiy (85%). Lezyonlar: periventricular, optik nerv, miya ustuni."}, {"num": 37, "text": "Parkinson kasalligi klinikasi", "answer": "To'rt belgi: 1) Tremor tinchlikda ('non yoqish', 4–6 Hz); 2) Rigidlik ('tishli g'ildirak'); 3) Bradikinezia; 4) Postural beqarorlik. Qo'shimcha: mikrografiya, gipomimiya, kichik qadamlar, gipofoniя."}, {"num": 38, "text": "Parkinson kasalligi etiopatogenezi", "answer": "Etiologiya: LRRK2, PINK1, SNCA mutatsiyalari + pestitsidlar. Patogenez: Substantia nigra dopaminergik neyron degeneratsiyasi → striatum dopamin ↓ → harakatning inhibisiyasi. Lewy tanachalari (alfa-sinuklein) — patologik belgi."}, {"num": 39, "text": "Miasteniya etiopatogenezi", "answer": "Autoimmun. AChR antitanalari (85%) → neyromushak sinaps postsinaptik membrana buzilishi → impuls blokada → mushaк charchashi. MuSK antikor (10%). Timus rol o'ynaydi."}, {"num": 40, "text": "Mielitni davosi", "answer": "1) Metilprednizolon 1 g/kun 3–5 kun IV; 2) Plazmaferez — og'ir; 3) IVIG; 4) Etiologik: antibiotik/antiviral; 5) Kateterizatsiya; 6) Tromboprofilaktika; 7) Rehabilitatsiya."}, {"num": 41, "text": "Absanslar haqida tushuncha", "answer": "5–30 s ong yo'qolishi, ko'z qotishi, harakatsizlik — birdan to'xtaydi, amneziya. Kompleks: avtomatizm. EEG: 3 Hz generalizovanniy uchqun-to'lqin. Giperventilyatsiya provokatsiya. 4–10 yosh. Etosuksimid, valproat."}, {"num": 42, "text": "Mielopatiya haqida tushuncha", "answer": "Orqa miya surunkali zararlanishi (yallig'lanmasiz). Turlari: servikal spondilogenniy, vaskulyar, kompressiv, toksik (B12 ↓), radiatsion. Klinika: sekin spastik falaj, sezgi, sfinkter buzilishi. Og'riq bo'lmasligi mumkin."}, {"num": 43, "text": "Migren etiopatogenezi", "answer": "Genetik (CACNA1A). Provokatsiya: stress, hormonal, ovqat (vino, pishloq), ob-havo. Patogenez: 1) Kortikаl tarqaluvchi depressiya — aura; 2) Trigeminal aktivatsiya; 3) Qon tomirlari kengayishi; 4) Serotonin o'zgarishi."}, {"num": 44, "text": "Elka pleksiti klinikasi", "answer": "Yuqori (Erb-Dyushen, C5–C6): abduktorlar, tashqi rotatorlar falaji — 'vaiter holati'. Quyi (Klumpke, C8–T1): bilak/qo'l mushaklari, Horner, 4–5 barmoq sezgi ↓. Sabab: tarqalish, Panko'st o'smasi."}, {"num": 45, "text": "Lyumbago haqida tushuncha", "answer": "Bel sohasida o'tkir og'riq. Sabab: disk yadro chiqishi, faset blokada, mushak spazmi. Klinika: keskin harakatdan keyin bel og'rig'i, harakat cheklanganligi, antalgik holat, lordoz tekislanishi. Davolash: dam olish, NSAIDs, miorelaksantlar."}, {"num": 46, "text": "Bulbar sindrom haqida tushuncha", "answer": "IX, X, XII nervlar periferik zararlash. Klinika: disfoniya, dizartriya, dysfagia; til atrofiyasi, fassikulyatsiya; yumshoq tanglay osilib qoladi; yo'tal refleksi ↓. Sabab: ALS, poliomielit, Giyena-Bare."}, {"num": 47, "text": "Psevdobulbar sindrom haqida tushuncha", "answer": "Kortikonuklеar yo'llar ikki tomonga zararlash. Xuddi bulbar, LEKIN: til atrofiyasi YO'Q; reflekslar oshgan; patologik kulgu/yig'lash; mandibulyar refleks ↑; xobot refleksi. Sabab: ikki tomonlama insult, demyelinizatsiya."}, {"num": 48, "text": "Miyacha insulti klinikasi", "answer": "1) Kuchli vertigo; 2) Ko'ngil aynishi, qusish; 3) Ataksiya — keng oyoqlab yurish; 4) Dismetriya; 5) Nistagm; 6) Inteksiyaviy tremor; 7) Dizartriya (skanirlovchi); 8) Ong saqlanadi. Markaziy insultdan farqi."}, {"num": 49, "text": "N. abducens neyropatiyasi klinikasi", "answer": "Lateral rektus falaji. Ko'zni tashqariga qarata olmaslik; ko'z o'rtaga burilgan (esotropiya); gorizontal diplopia (uzoqqa); kompensator bosh burilishi. Sabab: AH, diabet, ICP ↑, o'sma, MS."}, {"num": 50, "text": "N. oculomotorius neyropatiyasi klinikasi", "answer": "1) Ptoz; 2) Ko'z pastga-tashqariga; 3) Ko'z harakatlari cheklangani; 4) Midriyaz — anevrizm belgisi; 5) Akkommodatsiya buzilishi. Sabab: posterior kommunikant anevrizm, diabet (pupil tutilmaydi), herniyatsiya."}, {"num": 51, "text": "Yuz nervi nevropatiyasi klinikasi", "answer": "Periferik: 1) Yuz bir tomonga falaj (yuqori va pastki); 2) Ko'zni yopa olmaslik (lagoftalm); 3) Lab burilishi; 4) Peshona ajini ↓; 5) Giperakuziya; 6) Ta'm buzilishi; 7) Ko'z yoshi/so'lak buzilishi. Bell palsi; Ramsey-Hunt; o'rta quloq."}, {"num": 52, "text": "Uch shoxli nerv nevralgiyasi klinikasi", "answer": "Yuz sohasida 'elektr zarba' kabi qisqa og'riq. V2/V3 sohasi. Trigger: og'iz yuvish, yeyish, shamol. Bir tomonlama. Nevrologik defisit yo'q (klassik). 50 yosh+. Sabab: qon tomiri kompressiyasi (SICA)."}, {"num": 53, "text": "Yon amiotrofik skleroz klinikasi", "answer": "Yuqori motor neyron: spastik, giperrfleksiya, Babinski. Quyi motor: atrofiya, fassikulyatsiya, atoniya. Bulbar: disfoniya, dysfagia. Nafas buzilishi. Sezgi saqlanadi. Progressiv, 3–5 yil."}, {"num": 54, "text": "Vegeto-qon tomir distoniyasi klinikasi", "answer": "Simpatikotonik: tashvish, taxikardiya, gipertenziya, ter, quruq og'iz. Parasimpatikotonik: bradikardiya, gipotenziya, ko'ngil aynishi, terlaş. Vagal sinкop. Davolash: psixoterapiya, sedativlar, fizioterapiya."}, {"num": 55, "text": "Distsirkulyator entsefalopatiya klinikasi", "answer": "I: bosh og'rig'i, bosh aylanishi, xotira ↓, labillik. II: fokal belgilar, psevdobulbar, yurish buzilishi. III: demensiya, jiddiy kognitiv buzilish. KT/MRT: leukoaraioz, lakunar infarktlar."}, {"num": 56, "text": "Dyushen miopatiyasi klinikasi", "answer": "X-bog'liq, DMD geni. Faqat o'g'il bolalar. 2–5 yosh: qalqib turish qiyinligi. Gowers belgisi. Boldir psevdogipetrofiyasi. Lordoz ↑. 12 yoshda nogironlik. KMP, nafas ↓ — o'lim. CK ↑↑."}, {"num": 57, "text": "Siringomieliya klinikasi", "answer": "1) Dissossiatsiyalangan sezgi — og'riq/harorat ↓, teginish saqlanadi; 2) 'Mandarin jacket' — bo'yin, yelka, qo'l; 3) Qo'l atrofiyasi; 4) Pastda spastik paraparez; 5) Neyrogen artrоpatiya (Charcot); 6) Qorin reflekslari ↓."}, {"num": 58, "text": "Polineyropatiya klinikasi", "answer": "'Paypoq/qo'lqop' sezgi buzilishi; distal atrofiya; arefleksiya (Achilles); avtonom (ortostatik gipotenziya, terlash ↓); neyropatik og'riq — kechasi yonish, sanchish. Sabab: diabet, alkogol, B12 ↓, Giyena-Bare."}, {"num": 59, "text": "Subaraxnoidal qon quyilish davolash", "answer": "1) ICU; 2) Anevrizm kliplash yoki embolizatsiya; 3) Nimodipin — vazospazm profilaktikasi; 4) Ventrikulostomiya — gidrosefal; 5) Normovolemi; 6) Analgetiklar; 7) Antiepileptik; 8) Qon bosim nazorat."}, {"num": 60, "text": "Poliomielit klinikasi", "answer": "Preparitik: isitma, bosh og'rig'i, ko'ngil aynishi. Preparalitik: mushak og'rig'i, spazm. Paralitik: keskin asimmetrik flaksid falaj (72–96 soat). Tiklanish: oylar–yillar. Postpolio: yillar keyin kuchsizlik qaytadi."}, {"num": 61, "text": "Bel-quymich radikuliti klinikasi", "answer": "Bel og'rig'i oyoqqa irradiyatsiya — quymich, son, boldir, tovon. Laseque+ (oyoq ko'targanda og'riq). Paresteziya. Reflex ↓ (Achilles — S1, tiz — L4). Mushak ↓ xavf bo'lsa. Zo'riqish/ko'tarishdan kuchayadi."}, {"num": 62, "text": "Epilepsiyaning bosqichlari", "answer": "1) Prodromal — soatlar/kunlar oldin kayfiyat o'zgarishi; 2) Aura — fokal qo'zg'alish (ong saqlanadi); 3) Iktal — xuruj o'zi; 4) Postiktal — charchoq, amneziya, Todds falaji; 5) Interictal — xurujlar orasida."}, {"num": 63, "text": "Epistatusni davosi", "answer": "0–5 daq: diazepam 10 mg IV, lorazepam 4 mg, midazolam IN. 5–20 daq: valproat 40 mg/kg IV, levetiratsetam 60 mg/kg IV. >20 daq: propofol/midazolam infuziya — ICU, EEG monitoring."}, {"num": 64, "text": "Serozli meningit klinikasi", "answer": "Ko'pincha viral. Klinika: isitma 38–39°C, bosh og'rig'i, meningeal belgilar (o'rtacha), ong saqlanadi, toshma yo'q. Likvor: shаffof, limfotsitar pleotsioz, oqsil sal ↑, glyukoza norma."}, {"num": 65, "text": "Uch shoxli nerv nevralgiyasi davosi", "answer": "1) Karbamazepin (1-tanlov) 200–400 mg x3; 2) Okskarbazepin; 3) Gabapentin, pregabalin; 4) Baklofan; 5) Lamotrijin. Jarrohlik: Jannetta (mikrovaskular dekompressiya) — eng samarali; radiofrequency rizotomiya; gamma-knife."}, {"num": 66, "text": "Yuz nervi neyropatiyasi davosi", "answer": "1) Prednizolon 1 mg/kg 10 kun (48 soat ichida); 2) Herpes Zoster: asiklovir + steroid; 3) Ko'z tomchisi + bantik; 4) Fizioterapiya; 5) B vitaminlari; 6) LFK; 7) Jarrohlik — neyroliz (og'ir)."}, {"num": 67, "text": "Miopatiyada harakat buzilish sindromi", "answer": "Simmetrik proksimal zararlash (son, dumba, yelka kamari). Gowers belgisi. Ko'runadigan atrofiya. Psevdogipetrofiya. Miopatik yurish ('o'rdak'). Periferik tip falaj. Reflekslar ↓."}, {"num": 68, "text": "Klaster bosh og'rig'i klinikasi", "answer": "Unilateral periorbital, juda kuchli. 15–180 daq. Kuniga 1–8 marta, haftalar/oylar. Ipsilateral avtonomik: ko'z yoshi, burun oqishi, ptoz, mioz. Bemor harakatlanadi. Davolash: O2 100%, sumatritan."}, {"num": 69, "text": "Abuzis bosh og'rig'i klinikasi", "answer": "Kundalik surunkali bosh og'rig'i (≥15 kun/oy). Analgetik ≥3 oy. Dori olganda yaxshilanadi. Ertalab kuchli. Davolash: analgetikni sekin to'xtatish + profilaktik dorilar."}, {"num": 70, "text": "Bosh aylanish sindromi", "answer": "Periferik: BPPV (Dix-Hallpike+), Menyera (quloq+eshitish ↓+vertigo), labirintit. Markaziy: miya ustuni/miyacha — nerologik belgilar. Presinkopal: gipotenziya. Psixogen. Diagnostika: Dix-Hallpike, MRT."}, {"num": 71, "text": "Landuzi-Djerin miopatiyasi klinikasi", "answer": "Fasioskapolohumerаl (FSHD). Autosomal dominant. Yuz mushaklari (ko'z yopa olmaslik); yelka kamari (qanot skapula); boldir/yelka. Asimmetrik. Sekin progressiv. 20–30 yosh."}, {"num": 72, "text": "Shtryumpel kasalligi", "answer": "Oilaviy spastik paraplegiya (SPG4, spastin). Klinika: sekin progressiv oyoq spastik kuchsizligi; spastik yurish; giperrfleksiya, Babinski; sezgi sal ↓; sfinkter — kech. Davolash: baklofan, fizioterapiya."}, {"num": 73, "text": "Insultlarda nodifferentsial davo", "answer": "1) Hayot ko'rsatkichlari; 2) O2; 3) Glyukoza normalizatsiya; 4) Isitmani pasaytirish; 5) UTI davolash; 6) Tromboprofilaktika; 7) Ovqatlanish; 8) Erta rehabilitatsiya."}, {"num": 74, "text": "Giyena-Bare poliradikuloneyropatiya klinikasi", "answer": "Ko'tarilib boruvchi simmetrik flaksid falaj (oyoqdan). Arefleksiya. Paresteziya. Og'riq erta. Yuz nervi bilateral. Avtonom: AV blok, gipotenziya. Nafas falaji (20%) — ICU. 4 hafta. Likvor: albuminositologik dissossiyatsiya."}, {"num": 75, "text": "Meningokokkli meningit klinikasi", "answer": "O'ta o'tkir. Isitma 39–40°C. Kuchli bosh og'rig'i. Gemorragik toshma (petехii → purpura → nekroz). Ong buzilishi. Vaterxauz-Fridrixsen — buyrak usti qon quyilish, septik shok."}, {"num": 76, "text": "Meningokokkli meningit davosi", "answer": "1) Seftriakson 2 g x2 IV darhol; 2) Deksametazon 0.15 mg/kg x4; 3) Septik shok: infuziya, noradrenalin; 4) ИВЛ; 5) Kontaktlar: rifampin 600 mg x2, 2 kun; 6) Vaksinatsiya."}, {"num": 77, "text": "Zo'riqishdagi bosh og'rig'i klinikasi", "answer": "Ikki tomonlama. Bosuvchi/zichlovchi ('halqa'). O'rtacha intensivlik. 30 daq–7 kun. Jismoniy faollik kuchaytirmaydi. Ko'ngil aynishi — yo'q. Fotofobiya yoki fonofobiya — bittasi (ikkisi — migren)."}, {"num": 78, "text": "Zo'riqishdagi bosh og'rig'i davolash", "answer": "O'tkir: paratsetamol 1 g; ibuprofen 400–600 mg; aspirin 1000 mg. Profilaktik (≥15 kun/oy): amitriptilin 10–75 mg (1-tanlov); stress menejment; fizioterapiya; psixoterapiya."}, {"num": 79, "text": "Gantington xoreyasi klinikasi", "answer": "Autosomal dominant, HTT geni (CAG >36). 1) Xoreya — ixtiyorsiz harakatlar; 2) Ataksiya; 3) Ko'z saccade sekinligi; 4) Demensiya; 5) Depressiya, psixoz; 6) Dysfagia. Boshlanish: 30–50 yosh."}, {"num": 80, "text": "Tranzitor ishemik ataka klinikasi", "answer": "<24 soat (<1 soat) fokal defisit. Karotid: gemiparesteziya, afaziya, monookulyar amavroz. Vertebrobazilyar: diplopia, ataksiya, bilateral ko'ruv. ABCD2 skali. Antiaggregantlar, statin — darhol."}, {"num": 81, "text": "Erba-Rota miopatiyasi klinikasi", "answer": "LGMD. Autosomal retsessiv. Son/dumba mushaklari, Gowers belgisi. Yelka kamari, qanot skapula. Boldirlar psevdogipetrofiyasi. O'rdak yurishi. CK ↑. Bolalik–voyaga yetish."}]}]};

let currentCh = null;
let storageReady = false;

const STORAGE_KEY = 'medques_done';

async function loadDone(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if(result && result.value){
      doneSet = new Set(JSON.parse(result.value));
    }
  }catch(e){
    doneSet = new Set();
  }
  storageReady = true;
  renderChapters();
}

async function saveDone(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify([...doneSet]), false);
  }catch(e){
    console.error('Saqlashda xatolik:', e);
  }
}

function getKey(c,n){return c+'_'+n}

function updateStats(){
  document.getElementById('totalDone').textContent=doneSet.size;
  document.getElementById('totalFill').style.width=Math.min(doneSet.size/315*100,100)+'%';
}

function renderChapters(){
  document.getElementById('chaptersList').innerHTML=APP_DATA.chapters.map(ch=>{
    const done=ch.questions.filter(q=>doneSet.has(getKey(ch.id,q.num))).length;
    const pct=ch.count?done/ch.count*100:0;
    return `<div class="chapter-card ${ch.id}" onclick="showQuestions('${ch.id}')">
<div class="chapter-top"><div class="chapter-info">
<div class="chapter-icon">${ch.icon}</div>
<div><div class="chapter-name">${ch.name}</div>
<div class="chapter-count">📋 ${ch.count} ta bilet</div></div></div>
<div class="chapter-arrow">›</div></div>
<div class="chapter-progress"><div class="progress-numbers">
<span><strong>${done}</strong>/${ch.count} o'rganildi</span>
<span style="color:#34d399;font-weight:600">${Math.round(pct)}%</span></div>
<div class="progress-bar-chapter"><div class="progress-fill-chapter" style="width:${pct}%"></div></div></div></div>`;
  }).join('');
  updateStats();
}

function showQuestions(chId){
  currentCh=chId;
  const ch=APP_DATA.chapters.find(c=>c.id===chId);
  if(!ch)return;
  document.getElementById('chaptersView').classList.add('hidden');
  document.getElementById('questionsView').classList.add('active');
  document.getElementById('questionsTitle').textContent=ch.name;
  document.getElementById('searchBox').value='';
  openCards.clear();
  renderQuestions(ch.questions);
}

function renderQuestions(questions){
  document.getElementById('questionsList').innerHTML=questions.length?questions.map(q=>{
    const key=getKey(currentCh,q.num);
    const isDone=doneSet.has(key);
    return `<div class="question-card ${isDone?'done':''}" id="q-${key}">
<div class="question-header" onclick="toggleQuestion('${key}')">
<div class="question-meta"><div class="question-num">Bilet №${q.num}</div>
<div class="question-text">${escapeHtml(q.text)}</div></div>
<div class="question-toggle" id="toggle-${key}">▼</div></div>
<div class="question-body" id="body-${key}">
<div class="answer-title">✓ Javob</div>
<div class="answer-text">${escapeHtml(q.answer)}</div>
<div class="question-done"><button class="btn-done ${isDone?'active':''}" onclick="toggleDone(event,'${key}')">
${isDone?"✅ O'rganildi":"⬜ O'rgandim"}</button></div></div></div>`;
  }).join(''):'<div class="empty">Hech narsa topilmadi</div>';
}

function filterQuestions(){
  const ch=APP_DATA.chapters.find(c=>c.id===currentCh);
  if(!ch)return;
  const q=document.getElementById('searchBox').value.toLowerCase();
  const filtered=q?ch.questions.filter(item=>item.text.toLowerCase().includes(q)||item.answer.toLowerCase().includes(q)):ch.questions;
  openCards.clear();
  renderQuestions(filtered);
}

function showChapters(){
  document.getElementById('questionsView').classList.remove('active');
  document.getElementById('chaptersView').classList.remove('hidden');
  openCards.clear();
  renderChapters();
}

function toggleQuestion(key){
  if(openCards.has(key))openCards.delete(key);else openCards.add(key);
  const b=document.getElementById('body-'+key);
  const t=document.getElementById('toggle-'+key);
  if(b)b.classList.toggle('open',openCards.has(key));
  if(t)t.textContent=openCards.has(key)?'▲':'▼';
}

function toggleDone(e,key){
  e.stopPropagation();
  if(doneSet.has(key))doneSet.delete(key);else doneSet.add(key);
  saveDone();
  const btn=e.target;
  const isDone=doneSet.has(key);
  btn.classList.toggle('active',isDone);
  btn.textContent=isDone?"✅ O'rganildi":"⬜ O'rgandim";
  const card=document.getElementById('q-'+key);
  if(card)card.classList.toggle('done',isDone);
  updateStats();
}

function escapeHtml(t){
  const d=document.createElement('div');
  d.textContent=t;
  return d.innerHTML;
}

loadDone();
</script>
</body>
</html>
